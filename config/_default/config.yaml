# Configuration of Hugo
# Guide: https://wowchemy.com/docs/getting-started/
# Hugo Documentation: https://gohugo.io/getting-started/configuration/#all-configuration-settings
# This file is formatted using YAML syntax - learn more at https://learnxinyminutes.com/docs/yaml/

title: Carlos Mendez # Website name
baseurl: 'https://carlos-mendez.org/' # Website URL
copyright: '© 2018–{year} Carlos Mendez. All rights reserved.' # Footer text — {year} is auto-substituted with current year

############################
## LANGUAGE
############################

defaultContentLanguage: en
hasCJKLanguage: false
defaultContentLanguageInSubdir: false
removePathAccents: true

############################
## MODULES
############################

module:
  imports:
    - path: github.com/wowchemy/wowchemy-hugo-modules/wowchemy-cms
    - path: github.com/wowchemy/wowchemy-hugo-modules/wowchemy
  # Multi-language content layout (see config/_default/languages.yaml):
  #   English -> content/      (served at /)
  #   Spanish -> content/es/   (served at /es/)
  # The `en` mount excludes `es/**` so English never also renders the Spanish
  # tree, and the more-specific `es` mount serves it under /es/. The remaining
  # mounts simply re-declare Hugo's per-component defaults (required once any
  # `mounts` are defined) so the project's own assets/layouts/static/data/i18n
  # continue to load. To add Japanese later: add a `content/ja` mount (lang: ja)
  # and extend the en mount's excludeFiles to '{es,ja}/**'.
  mounts:
    - source: content
      target: content
      lang: en
      excludeFiles: 'es/**'
    - source: content/es
      target: content
      lang: es
    - source: assets
      target: assets
    - source: static
      target: static
    - source: layouts
      target: layouts
    - source: data
      target: data
    - source: i18n
      target: i18n
    - source: archetypes
      target: archetypes

############################
## ADVANCED
############################

enableGitInfo: false
summaryLength: 30
paginate: 10
enableEmoji: true
enableRobotsTXT: true
footnotereturnlinkcontents: <sup>^</sup>
ignoreFiles: [\.ipynb$, .ipynb_checkpoints$, \.Rmd$, \.Rmarkdown$, _cache$, /\.venv/, /\.quarto/, /tutorial_files/]
permalinks:
  event: '/talk/:slug/'
  tags: '/tag/:slug/'
  categories: '/category/:slug/'
  publication_types: '/publication-type/:slug/'
disableAliases: true
outputs:
  home: [HTML, RSS, JSON, WebAppManifest, headers, redirects]
  section: [HTML, RSS]
markup:
  defaultMarkdownHandler: goldmark
  goldmark:
    renderer:
      unsafe: true
  highlight:
    codeFences: false
  tableOfContents:
    startLevel: 2
    endLevel: 3
imaging:
  resampleFilter: lanczos
  quality: 75
  anchor: smart
timeout: 600000
security:
  funcs:
    getenv:
      - ^HUGO_
      - ^CI$
      - ^WC_
taxonomies:
  tag: tags
  category: categories
  publication_type: publication_types
  author: authors
related:
  threshold: 80
  includeNewer: true
  toLower: true
  indices:
    - name: tags
      weight: 100
    - name: categories
      weight: 70
