# Configuration of Hugo
# Guide: https://wowchemy.com/docs/getting-started/
# Hugo Documentation: https://gohugo.io/getting-started/configuration/#all-configuration-settings
# This file is formatted using YAML syntax - learn more at https://learnxinyminutes.com/docs/yaml/

title: Carlos Mendez # Website name
baseurl: 'https://carlos-mendez.org/' # Website URL
copyright: '© 2018–{year} Carlos Mendez. All rights reserved.' # Footer text — {year} is auto-substituted with current year

############################
## LANGUAGE
############################

defaultContentLanguage: en
hasCJKLanguage: true
defaultContentLanguageInSubdir: false
removePathAccents: true

############################
## MODULES
############################

module:
  imports:
    - path: github.com/wowchemy/wowchemy-hugo-modules/wowchemy-cms
    - path: github.com/wowchemy/wowchemy-hugo-modules/wowchemy
  # Multi-language content layout (see config/_default/languages.yaml):
  #   English  -> content/      (served at /)
  #   Spanish  -> content/es/   (served at /es/)
  #   Japanese -> content/ja/   (served at /ja/)
  # The `en` mount excludes `{es,ja}/**` so English never also renders the
  # translated trees, and the more-specific `es`/`ja` mounts serve them under
  # /es/ and /ja/. The remaining mounts simply re-declare Hugo's per-component
  # defaults (required once any `mounts` are defined) so the project's own
  # assets/layouts/static/data/i18n continue to load. To add another language:
  # add a `content/<lang>` mount and extend the en mount's excludeFiles.
  # `cv/**` is also excluded: content/cv/ holds the LaTeX CV build project
  # (main.tex + moderncv .cls/.sty + avatar.png + certificates/), not website
  # content — keeping it out of the build prevents an empty /cv/ page and stops
  # the .tex/.sty/.pdf sources from leaking into the published site. The only
  # public CV artifact is static/media/CV.pdf (served at /media/CV.pdf), which
  # the update-cv skill compiles from content/cv/main.tex.
  mounts:
    - source: content
      target: content
      lang: en
      excludeFiles: '{es,ja,cv}/**'
    - source: content/es
      target: content
      lang: es
    - source: content/ja
      target: content
      lang: ja
    - source: assets
      target: assets
    - source: static
      target: static
    - source: layouts
      target: layouts
    - source: data
      target: data
    - source: i18n
      target: i18n
    - source: archetypes
      target: archetypes

############################
## ADVANCED
############################

# Mirrors HUGO_ENABLEGITINFO=true in netlify.toml so local builds match production:
# .Lastmod = last git commit date of a page's index.md (falls back to `date`).
enableGitInfo: true
summaryLength: 30
paginate: 10
enableEmoji: true
enableRobotsTXT: true
footnotereturnlinkcontents: <sup>^</sup>
ignoreFiles: [\.ipynb$, .ipynb_checkpoints$, \.Rmd$, \.Rmarkdown$, _cache$, /\.venv/, /\.quarto/, /tutorial_files/]
permalinks:
  event: '/talk/:slug/'
  tags: '/tag/:slug/'
  categories: '/category/:slug/'
  publication_types: '/publication-type/:slug/'
disableAliases: true
outputs:
  home: [HTML, RSS, JSON, WebAppManifest, headers, redirects]
  section: [HTML, RSS]
markup:
  defaultMarkdownHandler: goldmark
  goldmark:
    renderer:
      unsafe: true
  highlight:
    codeFences: false
  tableOfContents:
    startLevel: 2
    endLevel: 3
imaging:
  resampleFilter: lanczos
  quality: 75
  anchor: smart
timeout: 600000
security:
  funcs:
    getenv:
      - ^HUGO_
      - ^CI$
      - ^WC_
taxonomies:
  tag: tags
  category: categories
  publication_type: publication_types
  author: authors
related:
  threshold: 80
  includeNewer: true
  toLower: true
  indices:
    - name: tags
      weight: 100
    - name: categories
      weight: 70
