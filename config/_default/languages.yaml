# Languages
#   One section per site language.
#   Content layout is handled by `module.mounts` in config.yaml:
#     en -> content/      (served at /)
#     es -> content/es/   (served at /es/)
#   so no `contentDir` is set here.
#   Docs: https://wowchemy.com/docs/guide/language/

# Default language — English, served at the site root "/".
en:
  languageCode: en-us
  languageName: English
  weight: 1

# Spanish — served at /es/. The homepage and the items it shows are translated;
# other sections stay English. Untranslated real-page links (e.g. Courses) are
# omitted from this menu to avoid /es/ 404s; hash-anchor items scroll the /es/
# homepage and the external Events link is unchanged.
es:
  languageCode: es-es
  languageName: Español
  weight: 2
  params:
    description: 'Carlos Mendez — Profesor Asociado de Economía del Desarrollo en la Universidad de Nagoya (Japón). Investigación sobre desarrollo regional, ciencia de datos espaciales y econometría aplicada.'
  menu:
    main:
      - name: 'Perfil'
        url: '#about'
        weight: 10
      - name: 'Laboratorio'
        url: '#researchLab'
        weight: 20
      - name: 'Publicaciones'
        url: '#featured'
        weight: 30
      - name: 'Presentaciones'
        url: '#talks'
        weight: 40
      - name: 'Tutoriales'
        url: '#posts'
        weight: 41
      - name: 'Proyectos'
        url: '#projects'
        weight: 45
      - name: 'Estudiantes'
        url: '#people'
        weight: 60
      - name: 'Eventos'
        url: 'https://lu.ma/cmg'
        weight: 80
      - name: 'Contacto'
        url: '#contact'
        weight: 90

