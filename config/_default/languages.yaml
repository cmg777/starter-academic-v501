# Languages
#   One section per site language.
#   Content layout is handled by `module.mounts` in config.yaml:
#     en -> content/      (served at /)
#     es -> content/es/   (served at /es/)
#   so no `contentDir` is set here.
#   Docs: https://wowchemy.com/docs/guide/language/

# Default language — English, served at the site root "/".
en:
  languageCode: en-us
  languageName: English
  weight: 1

# Spanish — served at /es/. The homepage, the items it shows, and the Courses
# page are translated. Courses links to the localized /es/courses/; hash-anchor
# items scroll the /es/ homepage and the external Events link is unchanged.
es:
  languageCode: es-es
  languageName: Español
  weight: 2
  params:
    description: 'Carlos Mendez — Profesor Asociado de Economía del Desarrollo en la Universidad de Nagoya (Japón). Investigación sobre desarrollo regional, ciencia de datos espaciales y econometría aplicada.'
  menu:
    main:
      - name: 'Perfil'
        url: '#about'
        weight: 10
      - name: 'Laboratorio'
        url: '#researchLab'
        weight: 20
      - name: 'Publicaciones'
        url: '#featured'
        weight: 30
      - name: 'Presentaciones'
        url: '#talks'
        weight: 40
      - name: 'Tutoriales'
        url: '#posts'
        weight: 41
      - name: 'Proyectos'
        url: '#projects'
        weight: 45
      - name: 'Estudiantes'
        url: '#people'
        weight: 60
      - name: 'Cursos'
        url: '/es/courses/'
        weight: 70
      - name: 'Eventos'
        url: 'https://lu.ma/cmg'
        weight: 80
      - name: 'Contacto'
        url: '#contact'
        weight: 90

# Japanese — served at /ja/. Mirrors the Spanish layer: the homepage, the items
# it shows, and the Courses page are translated. Courses links to the localized
# /ja/courses/; hash-anchor items scroll the /ja/ homepage and the external
# Events link is unchanged. Infra hooks live in config.yaml (content/ja mount + hasCJKLanguage),
# netlify/edge-functions/geo-lang.ts (JP -> /ja/), and assets/js/lang-pref.js.
ja:
  languageCode: ja-jp
  languageName: 日本語
  weight: 3
  params:
    description: 'カルロス・メンデス — 名古屋大学（日本）開発経済学准教授。地域開発、空間データサイエンス、応用計量経済学を研究しています。'
  menu:
    main:
      - name: 'プロフィール'
        url: '#about'
        weight: 10
      - name: '研究室'
        url: '#researchLab'
        weight: 20
      - name: '業績'
        url: '#featured'
        weight: 30
      - name: '講演'
        url: '#talks'
        weight: 40
      - name: 'チュートリアル'
        url: '#posts'
        weight: 41
      - name: 'プロジェクト'
        url: '#projects'
        weight: 45
      - name: '学生'
        url: '#people'
        weight: 60
      - name: 'コース'
        url: '/ja/courses/'
        weight: 70
      - name: 'イベント'
        url: 'https://lu.ma/cmg'
        weight: 80
      - name: 'お問い合わせ'
        url: '#contact'
        weight: 90
