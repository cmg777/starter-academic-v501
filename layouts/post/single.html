{{- define "main" -}}

<article class="article">

  {{ partial "page_header" . }}

  {{ if .Params.toc }}
  <div class="container">
    <div class="row justify-content-center">
      <div class="d-none d-lg-block col-lg-3 docs-toc">
        <ul class="nav toc-top">
          <li><a href="#" id="back_to_top" class="docs-toc-title">{{ i18n "on_this_page" | default "On this page" }}</a></li>
        </ul>
        {{ .TableOfContents }}
      </div>
      <div class="col-12 col-lg-8">
        <div class="article-style">
          {{ .Content }}
        </div>
        {{ partial "page_footer" . }}
      </div>
    </div>
  </div>
  {{ else }}
  <div class="article-container">
    <div class="article-style">
      {{ .Content }}
    </div>
    {{ partial "page_footer" . }}
  </div>
  {{ end }}
</article>

{{- end -}}
