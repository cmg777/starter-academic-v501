files:
  synthetic-co2-cross-section.csv:
    label: "Synthetic CO2 cross-section: outcome + 12 candidate regressors"
    grain: "country (cross-section)"
    years: "none (no time dimension)"
    coverage: "120 fictional countries"
    key: "country"
    purpose: "Grade BMA, LASSO, and WALS variable selection against a known answer key (7 true predictors, 5 noise)."
    note: "Fully synthetic cross-section of 120 fictional countries, generated with set.seed(2017). One row per country; log_co2 is the outcome and the remaining 12 numeric columns are candidate regressors. 7 regressors have true nonzero effects on log_co2; 5 are pure noise correlated with GDP. Loaded in the post via read.csv from the raw GitHub URL."

columns:
  country:
    label: "Country identifier"
    definition: "Synthetic country label (Country_001 … Country_120); the cross-section key."
    construction: "Sequential identifier assigned to each of the 120 simulated observations."
    units: "string"
    source: "Synthetic (this study)"
    coverage: "120 countries"
    kind: str
  log_co2:
    label: "Log CO2 emissions (dependent variable)"
    definition: "Natural-log CO2 emissions; the outcome all three methods explain."
    construction: "log_co2 = 2.0 + 1.200·log_gdp + 0.008·industry + 0.012·fossil_fuel + 0.010·urban_pop + 0.004·democracy + 0.500·trade_network + 0.005·agriculture + N(0, 0.3²). Noise variables enter with coefficient 0."
    units: "log units"
    source: "Synthetic (this study)"
    coverage: "120 countries"
    kind: cont
  log_gdp:
    label: "Log GDP per capita"
    definition: "Natural-log GDP per capita; the dominant true predictor (true β = 1.200, an elasticity)."
    construction: "log_gdp ~ N(8.5, 1.5²); drives all other regressors."
    units: "log units"
    source: "Synthetic (this study)"
    coverage: "120 countries"
    kind: cont
  industry:
    label: "Industry share"
    definition: "Industrial output share; true predictor (true β = 0.008, composition effect)."
    construction: "industry = 15 + 1.5·log_gdp + N(0, 6²)."
    units: "% / index"
    source: "Synthetic (this study)"
    coverage: "120 countries"
    kind: cont
  fossil_fuel:
    label: "Fossil fuel dependence (%)"
    definition: "Fossil-fuel share of energy; true predictor (true β = 0.012, semi-elasticity)."
    construction: "fossil_fuel = 30 + 3·log_gdp + N(0, 10²)."
    units: "% of energy"
    source: "Synthetic (this study)"
    coverage: "120 countries"
    kind: cont
  urban_pop:
    label: "Urban population (%)"
    definition: "Urbanization rate; true predictor with a moderate effect (true β = 0.010; borderline for BMA)."
    construction: "urban_pop = 20 + 5·log_gdp + N(0, 12²)."
    units: "% of population"
    source: "Synthetic (this study)"
    coverage: "120 countries"
    kind: cont
  democracy:
    label: "Democracy index"
    definition: "Democratic-governance score; true predictor with a small effect (true β = 0.004; borderline for BMA)."
    construction: "democracy = 5 + 2·log_gdp + N(0, 8²)."
    units: "index"
    source: "Synthetic (this study)"
    coverage: "120 countries"
    kind: cont
  trade_network:
    label: "Trade network centrality"
    definition: "Trade-centrality measure; true predictor with a moderate effect (true β = 0.500)."
    construction: "trade_network = 0.2 + 0.05·log_gdp + N(0, 0.15²)."
    units: "index (0-1 scale)"
    source: "Synthetic (this study)"
    coverage: "120 countries"
    kind: cont
  agriculture:
    label: "Agricultural activity"
    definition: "Agricultural share; true predictor with the weakest effect (true β = 0.005; missed by all three methods)."
    construction: "agriculture = 40 − 3·log_gdp + N(0, 8²) (negatively correlated with GDP)."
    units: "% / index"
    source: "Synthetic (this study)"
    coverage: "120 countries"
    kind: cont
  log_trade:
    label: "Log trade openness (noise)"
    definition: "Noise regressor — correlated with GDP but with zero true effect on log_co2."
    construction: "log_trade = 3.5 + 0.1·log_gdp + N(0, 0.5²). True β = 0."
    units: "log units"
    source: "Synthetic (this study)"
    coverage: "120 countries"
    kind: cont
  fdi:
    label: "Foreign direct investment (noise)"
    definition: "Noise regressor — zero true effect on log_co2 (the one noise variable not built from GDP)."
    construction: "fdi = 2 + N(0, 4²). True β = 0."
    units: "% / index"
    source: "Synthetic (this study)"
    coverage: "120 countries"
    kind: cont
  corruption:
    label: "Corruption index (noise)"
    definition: "Noise regressor — weakly (negatively) correlated with GDP but with zero true effect."
    construction: "corruption = 0.8 − 0.05·log_gdp + N(0, 0.15²). True β = 0."
    units: "index"
    source: "Synthetic (this study)"
    coverage: "120 countries"
    kind: cont
  log_tourism:
    label: "Log tourism (noise)"
    definition: "Noise regressor — correlated with GDP (~0.3) but with zero true effect on log_co2."
    construction: "log_tourism = 12 + 0.3·log_gdp + N(0, 1.2²). True β = 0."
    units: "log units"
    source: "Synthetic (this study)"
    coverage: "120 countries"
    kind: cont
  log_credit:
    label: "Log domestic credit (noise)"
    definition: "Noise regressor — correlated with GDP but with zero true effect on log_co2."
    construction: "log_credit = 2.5 + 0.15·log_gdp + N(0, 0.6²). True β = 0."
    units: "log units"
    source: "Synthetic (this study)"
    coverage: "120 countries"
    kind: cont
