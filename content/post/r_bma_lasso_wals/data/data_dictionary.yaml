# Data dictionary metadata for r_bma_lasso_wals — drives build_data_dictionary.py.
# Generated by the write-data-dictionary skill from the post's text + data; edit and rerun.

study:
  title: "Robust Variable Selection: BMA, LASSO, and WALS"
  subtitle: "A synthetic CO2 cross-section with a built-in answer key, for grading three variable-selection methods in R."
  overview: >
    Companion data for a hands-on R tutorial comparing three principled responses to the variable
    selection problem &mdash; <strong>Bayesian Model Averaging (BMA)</strong>, the <strong>LASSO</strong>,
    and <strong>Weighted Average Least Squares (WALS)</strong> &mdash; on a <strong>fully synthetic</strong>
    cross-section of 120 fictional countries. Twelve candidate regressors compete to explain log CO<sub>2</sub>
    emissions: <strong>7 have true nonzero effects</strong> and <strong>5 are pure noise</strong> deliberately
    correlated with GDP and the true predictors, creating realistic multicollinearity. Because the
    data-generating process is known, the data carries its own &ldquo;answer key&rdquo; against which each
    method is graded. The convergence of mechanically distinct methods on the same variables &mdash; four
    are flagged by all three (triple-robust) &mdash; illustrates methodological triangulation. The entire
    DGP is open and reproducible (<code>set.seed(2017)</code>).
  panel_structure: >
    <strong>One file, a pure cross-section.</strong> <code>synthetic-co2-cross-section.csv</code> has one
    row per fictional country (no time dimension): a string identifier, the dependent variable
    <code>log_co2</code>, and the 12 candidate regressors. There are no real countries behind the rows.
  kpis:
    - {n: 1, l: "dataset"}
    - {n: 14, l: "variables"}
    - {n: 120, l: "countries"}
    - {n: "12 + 1", l: "regressors + outcome"}

dta_format_version: 118

sources:
  - name: "Synthetic (this study)"
    provides: "All values — simulated from a calibrated cross-sectional DGP with set.seed(2017); 7 true predictors, 5 noise variables (open & reproducible)"
    reference: "Mendez, C. (2026). See the post's R script script.R for the full data-generating process."
  - name: "Bayesian Model Averaging (BMA)"
    provides: "Method: posterior inclusion probabilities over the 2^12 = 4,096 model space"
    reference: "Hoeting, J.A., Madigan, D., Raftery, A.E., & Volinsky, C.T. (1999). Bayesian Model Averaging: A Tutorial. Statistical Science, 14(4), 382–417. (PIP threshold conventions: Raftery 1995.)"
  - name: "LASSO"
    provides: "Method: L1-penalized regression for automatic variable selection (Post-LASSO refit per Belloni & Chernozhukov 2013)"
    reference: "Tibshirani, R. (1996). Regression Shrinkage and Selection via the Lasso. Journal of the Royal Statistical Society, Series B, 58(1), 267–288."
  - name: "WALS (Weighted Average Least Squares)"
    provides: "Method: fast frequentist model averaging via a semi-orthogonal transform and a Laplace prior, yielding t-statistics"
    reference: "Magnus, J.R., Powell, O., & Prufer, P. (2010). A Comparison of Two Model Averaging Techniques with an Application to Growth Empirics. Journal of Econometrics, 154(2), 139–153."

formulas_html: |
  <p>The target model regresses log CO<sub>2</sub> on the 12 candidate regressors:</p>
  <ul class="tight">
    <li><strong>General model</strong>: <code>log_co2 = β₀ + Σⱼ βⱼ xⱼ + ε</code>, j = 1…12.</li>
    <li><strong>BMA &mdash; posterior inclusion probability</strong> (<code>PIP</code>):
      <code>PIPⱼ = Σ_{k: j ∈ Mₖ} P(Mₖ | y)</code> &mdash; total posterior mass on models containing
      variable j; PIP &ge; 0.80 is the robustness threshold (Raftery 1995). Posterior mean
      <code>E[βⱼ | y] = Σₖ β̂ⱼ,ₖ · P(Mₖ | y)</code>.</li>
    <li><strong>LASSO &mdash; L1 penalty</strong>:
      <code>β̂ = argmin (1/2n)·‖y − Xβ‖² + λ‖β‖₁</code>; λ chosen by 10-fold CV (lambda.min / lambda.1se).
      Post-LASSO refits OLS on the selected variables for unbiased magnitudes.</li>
    <li><strong>WALS &mdash; Laplace prior</strong>: split <code>y = X₁β₁ + X₂β₂ + ε</code> into focus
      regressors X₁ (here the intercept) and auxiliary regressors X₂ (the 12 candidates); orthogonalize
      X₂ and average each coefficient independently under <code>p(γⱼ) ∝ exp(−|γⱼ|/τ)</code>, the same prior
      that underlies the LASSO penalty. Robustness flagged at <code>|t| ≥ 2</code>.</li>
  </ul>
  <p><strong>Synthetic data-generating process</strong> (<code>set.seed(2017)</code>, n = 120). GDP drives
  the system: <code>log_gdp ~ N(8.5, 1.5²)</code>. True predictors and noise are built as linear functions
  of <code>log_gdp</code> plus Gaussian noise, so the noise variables are correlated with GDP yet have zero
  true effect. The outcome is
  <code>log_co2 = 2.0 + 1.200·log_gdp + 0.008·industry + 0.012·fossil_fuel + 0.010·urban_pop
  + 0.004·democracy + 0.500·trade_network + 0.005·agriculture + N(0, 0.3²)</code>; the five noise variables
  (<code>log_trade, fdi, corruption, log_tourism, log_credit</code>) enter the outcome with coefficient
  exactly 0.</p>

caveats:
  - "<strong>Synthetic data.</strong> There is no real data behind this tutorial. The 120 &ldquo;countries&rdquo; and all 13 numeric variables are simulated; results are internally consistent with the calibrated DGP but are not empirical evidence about real CO<sub>2</sub> emissions or their determinants."
  - "<strong>Built-in answer key.</strong> The true coefficients are known by design (7 nonzero, 5 exactly zero). The point of the dataset is to grade each method against this truth; that luxury does not exist with real data, which is exactly why the post recommends using all three methods."
  - "<strong>Deliberate multicollinearity.</strong> The noise variables are constructed to be correlated with GDP and the true predictors, so a naive OLS can show spurious significance. This is intentional, to make variable selection genuinely hard."
  - "<strong>Power, not bias, limits detection.</strong> All methods reach perfect specificity, but small true effects (agriculture, β = 0.005; and the borderline urban_pop / democracy for BMA) are hard to detect at n = 120 — a sample-size limitation, not a flaw in any method."
  - "<strong>Cross-section only.</strong> No time dimension and no panel structure; the methods here address model uncertainty, not endogeneity, nonlinearity, or heteroskedasticity, which real applications must handle separately."

