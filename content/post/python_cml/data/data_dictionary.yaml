files:
  cml_data.csv:
    label: "Observed synthetic ALMP cohort: 6 covariates + treatment + outcome"
    grain: "jobseeker (cross-section)"
    years: "30-month follow-up (single cohort, no calendar year)"
    coverage: "5,000 jobseekers"
    key: "row order (positional; no explicit id column)"
    purpose: "The data a real analyst sees — used to estimate the ATE (DoubleML), GATE (by Dutch proficiency), and IATE (causal forest)."
    note: "Synthetic Flanders-ALMP-style cross-section, N=5,000. Six pre-treatment covariates X, binary training indicator D, and months employed over a 30-month window Y. Joined positionally (row i) to cml_truth.csv."
  cml_truth.csv:
    label: "Hidden ground truth: potential outcomes, individual effect, true propensity"
    grain: "jobseeker (cross-section)"
    years: "matches cml_data.csv (positional)"
    coverage: "5,000 jobseekers"
    key: "row order (positional; aligns 1:1 with cml_data.csv)"
    purpose: "Benchmark every estimator against the truth: tau scores the IATE, and tau feeds the welfare/oracle comparison."
    note: "Known only because the data are simulated. Both potential outcomes Y0/Y1, the individual treatment effect tau, the true propensity pi_true, and dutch_prof carried over for self-contained group-bys. NOT observable predictors — for scoring only."

columns:
  age:
    label: "Age (years)"
    definition: "Jobseeker age in years at programme entry (pre-treatment covariate)."
    construction: "Drawn age ~ Uniform(20, 60)."
    units: "years"
    source: "Simulation"
    coverage: "cml_data.csv"
    kind: cont
  edu_years:
    label: "Years of education"
    definition: "Completed years of formal education (pre-treatment covariate)."
    construction: "Drawn N(12, 3), clipped to [6, 20]."
    units: "years"
    source: "Simulation"
    coverage: "cml_data.csv"
    kind: cont
  prior_emp_months:
    label: "Prior employment in look-back window (months)"
    definition: "Months employed during the pre-programme look-back window (pre-treatment covariate)."
    construction: "Drawn 60 · Beta(2, 5)."
    units: "months"
    source: "Simulation"
    coverage: "cml_data.csv"
    kind: cont
  dutch_prof:
    label: "Dutch language proficiency (0–3)"
    definition: "Ordinal Dutch proficiency: 0=no, 1=low, 2=intermediate, 3=native. The GATE stratifier."
    construction: "Drawn from {0,1,2,3} with probabilities (0.25, 0.30, 0.30, 0.15)."
    units: "0-3 (ordinal)"
    source: "Simulation"
    coverage: "cml_data.csv & cml_truth.csv"
    kind: id
    value_labels: {0: "No Dutch", 1: "Low", 2: "Intermediate", 3: "Native"}
  female:
    label: "Female (1=yes)"
    definition: "Sex indicator, 1 if female else 0 (pre-treatment covariate)."
    construction: "Drawn Bernoulli(0.48)."
    units: "0/1"
    source: "Simulation"
    coverage: "cml_data.csv"
    kind: dummy
    value_labels: {0: "Male", 1: "Female"}
  migrant:
    label: "Migrant (1=yes)"
    definition: "Migrant-background indicator, 1 if migrant else 0 (pre-treatment covariate; a moderator of the effect)."
    construction: "Drawn Bernoulli(0.30)."
    units: "0/1"
    source: "Simulation"
    coverage: "cml_data.csv"
    kind: dummy
    value_labels: {0: "Non-migrant", 1: "Migrant"}
  D:
    label: "Treatment: received training (1=yes)"
    definition: "Binary training indicator — 1 if the jobseeker received the ALMP training, else 0."
    construction: "D ~ Bernoulli(pi_true), with pi_true the true logistic propensity in the covariates."
    units: "0/1"
    source: "Simulation"
    coverage: "cml_data.csv"
    kind: dummy
    value_labels: {0: "Untreated (no training)", 1: "Treated (training)"}
  Y:
    label: "Observed outcome: months employed (0–30)"
    definition: "Observed months employed over the 30-month follow-up — the realised potential outcome under the assigned treatment."
    construction: "Y = D·Y1 + (1−D)·Y0, where Y0/Y1 are the clipped potential outcomes."
    units: "months (0-30)"
    source: "Simulation"
    coverage: "cml_data.csv"
    kind: cont
  Y0:
    label: "Untreated potential outcome (months, truth)"
    definition: "Months employed the jobseeker WOULD have over 30 months WITHOUT training — counterfactual; observable only in the simulation."
    construction: "Y0 = clip(12 + 0.20·prior_emp + 0.30·edu + 1.0·dutch_prof − 0.005(age−40)² + N(0,2.5), 0, 30)."
    units: "months (0-30)"
    source: "Simulation (ground truth)"
    coverage: "cml_truth.csv"
    kind: cont
  Y1:
    label: "Treated potential outcome (months, truth)"
    definition: "Months employed the jobseeker WOULD have over 30 months WITH training — counterfactual; observable only in the simulation."
    construction: "Y1 = clip(Y0 + tau, 0, 30)."
    units: "months (0-30)"
    source: "Simulation (ground truth)"
    coverage: "cml_truth.csv"
    kind: cont
  tau:
    label: "True individual treatment effect (months)"
    definition: "The true per-jobseeker effect of training, τ = Y(1) − Y(0) (pre-clipping). Benchmark for the IATE and input to the oracle/welfare rule."
    construction: "tau = 3.0 + 1.5(3 − dutch_prof) + 0.4·migrant − 0.02(age − 40) + N(0, 0.3)."
    units: "months"
    source: "Simulation (ground truth)"
    coverage: "cml_truth.csv"
    kind: cont
  pi_true:
    label: "True propensity P(D=1 | X)"
    definition: "The true probability of receiving training given covariates, used to generate D. The estimand a propensity model tries to recover."
    construction: "logistic(−0.6 + 0.020(40−age) + 0.05(12−edu) + 0.015(30−prior_emp) + 0.30(3−dutch) + 0.20·migrant − 0.10·female), clipped to [0.05, 0.95]."
    units: "0-1 (probability)"
    source: "Simulation (ground truth)"
    coverage: "cml_truth.csv"
    kind: cont
