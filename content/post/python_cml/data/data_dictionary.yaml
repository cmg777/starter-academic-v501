# Data dictionary metadata for python_cml — drives build_data_dictionary.py.
# Generated by the write-data-dictionary skill from the post's text + data; edit and rerun.

study:
  title: "Causal Machine Learning for Policy Evaluation"
  subtitle: "From ATE to GATE to IATE to a welfare-maximising assignment rule, on a synthetic Flanders-ALMP cohort with known true effects."
  overview: >
    Companion data for a hands-on Python tutorial on <strong>Causal Machine Learning (CML)</strong>
    for active-labour-market-programme (ALMP) evaluation. The cohort is a <strong>fully
    synthetic</strong> Flemish-ALMP-style sample of 5,000 jobseekers with six pre-treatment
    covariates, a binary training indicator, and months employed over a 30-month follow-up. The
    post walks the full CML roadmap &mdash; the average treatment effect (<strong>ATE</strong>) via
    DoubleML's cross-fitted, doubly-robust Interactive Regression Model; group effects
    (<strong>GATE</strong>) by Dutch proficiency via doubly-robust pseudo-outcome averaging;
    individual effects (<strong>IATE</strong>) via EconML's CausalForestDML; and a
    welfare-maximising training-assignment rule. Because the data are simulated, the
    <em>true</em> individual treatment effect of every jobseeker is known, so every estimator is
    benchmarked against ground truth. The data-generating process is modelled on Cockx, Lechner
    &amp; Bollens (2023) and the methodological roadmap in Lechner (2023).
  panel_structure: >
    <strong>Two files, one row per jobseeker, joined by row order.</strong>
    <code>cml_data</code> is the <em>observed</em> cross-section a real analyst would see: six
    covariates (<code>X</code>), the treatment <code>D</code>, and the outcome <code>Y</code>.
    <code>cml_truth</code> is the <em>hidden ground truth</em> available only because the data are
    simulated: both potential outcomes (<code>Y0</code>, <code>Y1</code>), the individual effect
    <code>tau</code>, and the true propensity <code>pi_true</code>, plus <code>dutch_prof</code>
    carried over for self-contained group-bys. Row <em>i</em> of <code>cml_truth</code>
    corresponds to row <em>i</em> of <code>cml_data</code> (no shared key column &mdash; the join
    is positional). The truth columns are <strong>not</strong> observable predictors and must
    never enter an estimator; they exist only to score the estimates.
  kpis:
    - {n: 2, l: "datasets"}
    - {n: 12, l: "variables"}
    - {n: "5,000", l: "jobseekers"}
    - {n: "30-month", l: "follow-up"}

dta_format_version: 118

sources:
  - name: "Synthetic (this study)"
    provides: "All values — simulated via a calibrated ALMP data-generating process (open & reproducible)"
    reference: "Mendez, C. (2026). See the post's Python script script.py (simulate_almp) for the full DGP."
  - name: "Cockx, Lechner & Bollens (2023)"
    provides: "Empirical case study the synthetic DGP is calibrated to (Flanders ALMP; Dutch-proficiency heterogeneity)"
    reference: "Cockx, B., Lechner, M., & Bollens, J. (2023). Priority to unemployed immigrants? A causal machine learning evaluation of training in Belgium. Labour Economics, 80, 102306. https://doi.org/10.1016/j.labeco.2023.102306"
  - name: "Method references"
    provides: "Estimators and concepts"
    reference: "Lechner (2023); Chernozhukov et al. (2018, DoubleML / IRM); Athey, Tibshirani & Wager (2019, generalized random forests / causal forests)."

formulas_html: |
  <p>The post targets three causal estimands of increasing granularity, all under
  <strong>unconfoundedness</strong> (selection-on-observables) over the six covariates
  <code>X</code>:</p>
  <ul class="tight">
    <li><strong>ATE</strong> = <code>E[Y(1) − Y(0)]</code> — the population-average effect,
      estimated by <code>DoubleMLIRM</code> (cross-fitted, doubly-robust, random-forest nuisances,
      5-fold cross-fitting).</li>
    <li><strong>GATE(z)</strong> = <code>E[Y(1) − Y(0) | Z = z]</code> with <code>Z = dutch_prof</code>
      — the subgroup average, estimated as the within-stratum mean of the doubly-robust
      pseudo-outcome <code>ψ</code>.</li>
    <li><strong>IATE(x)</strong> = <code>E[Y(1) − Y(0) | X = x]</code> — the per-individual effect,
      estimated by EconML's <code>CausalForestDML</code>.</li>
  </ul>
  <p>The <strong>doubly-robust score</strong> at observation <code>i</code> (whose group-mean gives
  the GATE) is
  <code>ψ_i = g₁(Xᵢ) − g₀(Xᵢ) + Dᵢ·(Yᵢ − g₁(Xᵢ))/m(Xᵢ) − (1−Dᵢ)·(Yᵢ − g₀(Xᵢ))/(1 − m(Xᵢ))</code>,
  where <code>g_d(X) = E[Y | D = d, X]</code> is the outcome regression and
  <code>m(X) = P(D = 1 | X)</code> is the propensity. The <strong>welfare</strong> of an assignment
  rule under a fixed cost <code>c = 4</code> months is <code>W = E[ rule(X)·(τ(X) − c) ]</code>.</p>
  <p><strong>Synthetic data-generating process</strong> (<code>simulate_almp</code>). Covariates are
  drawn independently: <code>age ~ U(20,60)</code>, <code>edu_years ~ N(12,3)</code> clipped to
  [6,20], <code>prior_emp_months ~ 60·Beta(2,5)</code>, <code>dutch_prof ∈ {0,1,2,3}</code> with
  probabilities (0.25, 0.30, 0.30, 0.15), <code>female ~ Bernoulli(0.48)</code>,
  <code>migrant ~ Bernoulli(0.30)</code>. The <strong>true propensity</strong> is logistic in the
  covariates,
  <code>logit π = −0.6 + 0.020(40−age) + 0.05(12−edu) + 0.015(30−prior_emp) + 0.30(3−dutch) + 0.20·migrant − 0.10·female</code>,
  clipped to [0.05, 0.95], and <code>D ~ Bernoulli(π)</code>. The <strong>true individual
  effect</strong> is
  <code>τ = 3.0 + 1.5(3 − dutch_prof) + 0.4·migrant − 0.02(age − 40) + N(0, 0.3)</code> — so the
  effect is largest for low-Dutch, migrant, younger jobseekers (the policy punchline). The
  <strong>untreated potential outcome</strong> is
  <code>Y0 = 12 + 0.20·prior_emp + 0.30·edu + 1.0·dutch_prof − 0.005(age−40)² + N(0, 2.5)</code>
  clipped to [0,30], the <strong>treated</strong> outcome is <code>Y1 = clip(Y0 + τ, 0, 30)</code>,
  and the <strong>observed</strong> outcome is <code>Y = D·Y1 + (1−D)·Y0</code>.</p>

caveats:
  - "<strong>Synthetic data.</strong> There is no real cohort behind this tutorial; results are internally consistent with the calibration but are not empirical evidence about any real ALMP."
  - "<strong>Truth columns are not observable predictors.</strong> <code>Y0</code>, <code>Y1</code>, <code>tau</code>, and <code>pi_true</code> in <code>cml_truth.csv</code> are knowable only because the data are simulated. They are for benchmarking and welfare scoring only — feeding any of them into an estimator is circular and must not be done."
  - "<strong>Positional join.</strong> <code>cml_data.csv</code> and <code>cml_truth.csv</code> share no key column; row <em>i</em> of one matches row <em>i</em> of the other. Preserve row order when merging (e.g. <code>pd.concat([df, truth], axis=1)</code>), never sort one file independently."
  - "<strong>Easy overlap by construction.</strong> True propensities are clipped to [0.05, 0.95] (and the logistic-regression estimate lands inside [0.21, 0.81]), so trimming choices and doubly-robust denominators are not stressed here. Real ALMP cohorts have tighter overlap and trimming matters more."
  - "<strong>Treatment share is high (≈53%).</strong> Calibrated to keep overlap comfortable in every Dutch-proficiency stratum; do not over-interpret the magnitude of effects as representative of a real programme."
  - "<strong>Unconfoundedness holds by construction.</strong> The DGP satisfies selection-on-observables over the six covariates; in a real application this is the strong identifying assumption that justifies DoubleML and CausalForestDML over a naive comparison."

