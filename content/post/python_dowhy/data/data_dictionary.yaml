formulas_html: |
  <p>The post applies DoWhy's <strong>four-step framework</strong> to this data, targeting the
  <strong>average treatment effect (ATE)</strong>, <code>ATE = E[Y(1) &minus; Y(0)]</code>, of
  <code>treat</code> on <code>re78</code>:</p>
  <ul class="tight">
    <li><strong>1. Model</strong> &mdash; encode a DAG in which the eight covariates
      (<code>age, educ, black, hisp, married, nodegr, re74, re75</code>) are common causes of both
      <code>treat</code> and <code>re78</code>; <code>treat &rarr; re78</code> is the effect of interest.</li>
    <li><strong>2. Identify</strong> &mdash; the <strong>backdoor criterion</strong> returns the
      adjustment estimand <code>d/d[treat] E[re78 | age, educ, black, hisp, married, nodegr, re74, re75]</code>
      under the unconfoundedness assumption.</li>
    <li><strong>3. Estimate</strong> &mdash; five estimators of the same ATE:
      regression adjustment (models <code>E[Y|X,T]</code>);
      <strong>IPW</strong> <code>&tau; = (1/n) &Sigma; [ T&middot;Y / e(X) &minus; (1&minus;T)&middot;Y / (1&minus;e(X)) ]</code>
      with propensity score <code>e(X) = P(T=1|X)</code>;
      <strong>doubly robust AIPW</strong> = regression estimate plus an IPW-weighted residual correction
      (consistent if <em>either</em> the outcome or the propensity model is correct);
      PS stratification (5 strata); and PS matching (nearest-neighbour, shifting the estimand toward the ATT).</li>
    <li><strong>4. Refute</strong> &mdash; placebo-treatment, random-common-cause, and data-subset tests
      stress the estimate (the placebo collapses the effect from ~$1,676 to ~$62).</li>
  </ul>
  <p>The dataset itself contains <strong>no constructed variables</strong>: every column is an observed
  field from the NSW evaluation (assignment, demographics, prior/post earnings). The quantities above
  are computed by the analysis code, not stored in the file.</p>

caveats:
  - "<strong>Small sample.</strong> Only 445 observations (185 treated / 260 control); propensity-score methods can suffer from poor overlap and estimates carry high variance."
  - "<strong>Earnings are right-skewed with mass at zero.</strong> <code>re74</code>, <code>re75</code>, and <code>re78</code> have a large spike at $0 (no earnings) and a long right tail, so means exceed medians substantially."
  - "<strong>Unconfoundedness.</strong> The backdoor estimand assumes the eight covariates capture all confounding; this is credible here because assignment was randomized, but the same data is often used to study what happens when it is not."
  - "<strong>ATE vs ATT.</strong> Four estimators target the ATE; propensity-score matching discards unmatched controls and shifts the estimand toward the ATT, so its estimate answers a slightly different question."
  - "<strong>Experimental subsample.</strong> This is the randomized NSW experimental sample (Dehejia-Wahba), not the larger observational PSID/CPS comparison versions; results are not directly comparable to those non-experimental variants."

