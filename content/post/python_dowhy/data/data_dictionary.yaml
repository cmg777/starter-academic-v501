study:
  title: "Causal Inference with DoWhy: The Lalonde Job-Training Data"
  subtitle: "The NSW Demonstration evaluation sample used to estimate the ATE of job training on earnings."
  overview: >
    Companion data for a hands-on Python tutorial that estimates the causal effect of a job-training
    program on earnings using <strong>DoWhy</strong>'s four-step framework (Model &rarr; Identify
    &rarr; Estimate &rarr; Refute). The file is the <strong>Lalonde sample</strong> from the U.S.
    <strong>National Supported Work (NSW) Demonstration</strong>, a 1970s randomized employment
    program for disadvantaged workers (LaLonde 1986; the experimental subsample popularized by Dehejia
    &amp; Wahba 1999). It records 445 participants &mdash; 185 randomly assigned to job training
    (treatment) and 260 to control &mdash; with eight pre-treatment covariates and real earnings in
    1978 (<code>re78</code>) as the outcome. The post encodes the eight covariates as common causes in
    a causal graph, identifies the backdoor estimand, and estimates the average treatment effect with
    five methods (regression adjustment, IPW, doubly robust AIPW, propensity-score stratification, and
    propensity-score matching), all clustering near a roughly 34&ndash;38% earnings gain over the
    control mean. These are <strong>real data</strong> from a field experiment, not a simulation.
  panel_structure: >
    <strong>One file, one cross-section.</strong> <code>lalonde_dowhy</code> is a single
    cross-sectional table &mdash; one row per study participant (445 rows), with no panel or time
    dimension. <code>treat</code> is the randomized assignment, <code>re78</code> the post-program
    outcome, and the remaining eight columns are pre-treatment covariates (including prior earnings in
    1974 and 1975). It is the verbatim DoWhy <code>lalonde_dataset()</code> export used by the post.
  kpis:
    - {n: 1, l: "dataset"}
    - {n: 10, l: "variables"}
    - {n: 445, l: "participants"}
    - {n: "treat = 185 / control = 260", l: "assignment"}

dta_format_version: 118

