formulas_html: |
  <p>The dataset is generated by a known structural model so that every estimator can be checked
  against the truth. For employee <code>i</code> the causal graph is
  <code>subway_disruption &rarr; work_from_home &rarr; productivity</code>, with
  <code>introversion</code> and <code>num_children</code> pointing into <strong>both</strong>
  treatment and outcome (confounders).</p>
  <ul class="tight">
    <li><strong>Confounders.</strong>
      <code>introversion ~ Normal(5, 1.5)</code>;
      <code>num_children ~ Poisson(1.5)</code>.</li>
    <li><strong>Instrument.</strong>
      <code>subway_disruption ~ Bernoulli(0.4)</code> &mdash; affects treatment only.</li>
    <li><strong>Treatment assignment</strong> (observational, non-random):
      <code>logit P(WFH) = &minus;1.5 + 0.3&middot;introversion + 0.2&middot;num_children + 1.0&middot;subway_disruption</code>;
      <code>work_from_home ~ Bernoulli(P(WFH))</code>.</li>
    <li><strong>Outcome.</strong>
      <code>productivity = 50 + 1.0&middot;work_from_home + 0.8&middot;introversion &minus; 0.5&middot;num_children + &epsilon;</code>,
      with <code>&epsilon; ~ Normal(0, 2)</code>. The instrument does <strong>not</strong> enter
      this equation &mdash; the exclusion restriction holds by construction.</li>
  </ul>
  <p>The coefficient on <code>work_from_home</code> in the outcome equation is the
  <strong>true average treatment effect (ATE = 1.0)</strong> &mdash; the target every estimator in
  the post is judged against. Confounder bias arises because introverts both self-select into WFH
  (treatment coefficient 0.3) and are independently more productive (outcome coefficient 0.8), so a
  naive WFH&minus;office comparison overstates the effect (1.39 vs the true 1.0).</p>

caveats:
  - "<strong>Synthetic data.</strong> There is no real survey behind this dataset; values are drawn from the data-generating process above. Results are internally consistent with the simulation but are not empirical evidence about real-world work-from-home effects."
  - "<strong>Known truth by design.</strong> The true ATE is fixed at 1.0 so methods can be scored. On real data the truth is unknown — that is exactly why identification (DoWhy's Step 2) and refutation (Step 4) matter."
  - "<strong>Cross-section, not a panel.</strong> Each row is one simulated employee at a single point; there is no time dimension, no repeated measurement, and no row identifier."
  - "<strong>Exclusion restriction is assumed true here.</strong> <code>subway_disruption</code> is built to affect productivity only through WFH choice. In practice the exclusion restriction cannot be tested from data and must be justified by domain knowledge."
  - "<strong>Selection on observables is satisfiable here.</strong> The two confounders are fully observed, so backdoor methods are unbiased by construction; with a missing confounder they would be biased while IV would remain valid."

