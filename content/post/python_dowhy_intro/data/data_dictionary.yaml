study:
  title: "Causal Inference with DoWhy: Working From Home & Productivity"
  subtitle: "A fully synthetic 5,000-employee observational dataset with a known true treatment effect (ATE = 1.0)."
  overview: >
    Companion data for a beginner-friendly causal-inference tutorial that uses
    <strong>DoWhy</strong>'s four-step framework (Model, Identify, Estimate, Refute) to recover a
    <strong>known</strong> average treatment effect from observational data. The dataset is
    <strong>fully synthetic</strong>: 5,000 employees with a binary work-from-home treatment, a
    continuous productivity outcome, two confounders (introversion, number of children) that drive
    self-selection into treatment, and a subway-disruption instrument that satisfies the exclusion
    restriction by construction. Because the true causal effect is fixed at
    <strong>1.0 productivity points</strong>, every estimator can be scored against the truth: the
    naive difference in means overshoots to 1.39, while the backdoor methods (regression, IPW,
    doubly robust) recover ~1.0 and IV (2SLS) returns 0.89 with a much wider interval. The entire
    data-generating process is open and reproducible.
  panel_structure: >
    <strong>One file.</strong> <code>wfh_simulated_data</code> is a cross-section &mdash; one row per
    simulated employee (5,000 rows), with no time or panel dimension. There is no identifier column;
    rows are exchangeable draws from the data-generating process.
  kpis:
    - {n: 1, l: "dataset"}
    - {n: 5, l: "variables"}
    - {n: "5,000", l: "employees"}
    - {n: "ATE = 1.0", l: "true effect"}

