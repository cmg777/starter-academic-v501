files:
  wfh_simulated_data.csv:
    label: "Simulated WFH observational cross-section (5,000 employees)"
    grain: "employee (cross-section)"
    years: "n/a (no time dimension)"
    coverage: "5,000 simulated employees"
    key: "none (rows are exchangeable; no identifier column)"
    purpose: "Recover a known ATE (=1.0) of working from home on productivity via DoWhy's four-step framework; compare naive, regression, IPW, doubly-robust, and IV estimators."
    note: "Fully synthetic cross-section of 5,000 employees generated by generate_wfh_data (seed 42). Binary treatment work_from_home, continuous outcome productivity, two confounders (introversion, num_children), and one instrument (subway_disruption). True ATE = 1.0 by construction; the exclusion restriction holds because subway_disruption does not enter the outcome equation."

columns:
  work_from_home:
    label: "Works from home (treatment, 1=yes)"
    definition: "Binary treatment: 1 if the employee works from home, 0 if office-based."
    construction: "Bernoulli draw with P from logit(-1.5 + 0.3*introversion + 0.2*num_children + 1.0*subway_disruption); non-random (observational) assignment."
    units: "0/1"
    source: "Simulation"
    coverage: "5,000 employees"
    kind: dummy
    value_labels: {0: "Office", 1: "Work from home"}
  productivity:
    label: "Productivity score (outcome)"
    definition: "Continuous outcome: employee productivity, in points."
    construction: "50 + 1.0*work_from_home + 0.8*introversion - 0.5*num_children + Normal(0,2) noise; the coefficient 1.0 on work_from_home is the true ATE."
    units: "points"
    source: "Simulation"
    coverage: "5,000 employees"
    kind: cont
  introversion:
    label: "Introversion (confounder)"
    definition: "Personality trait; higher values = more introverted. A confounder of WFH and productivity."
    construction: "Normal(mean=5, sd=1.5) draw. Raises both the probability of WFH (logit coef 0.3) and productivity (outcome coef 0.8)."
    units: "scale (~0-10)"
    source: "Simulation"
    coverage: "5,000 employees"
    kind: cont
  num_children:
    label: "Number of children (confounder)"
    definition: "Count of children in the household. A confounder of WFH and productivity."
    construction: "Poisson(lambda=1.5) draw. Raises the probability of WFH (logit coef 0.2) but lowers productivity (outcome coef -0.5)."
    units: "count"
    source: "Simulation"
    coverage: "5,000 employees"
    kind: cont
  subway_disruption:
    label: "Subway line disrupted (instrument, 1=yes)"
    definition: "Binary instrument: 1 if the employee lives near a disrupted subway line. Affects treatment only (exclusion restriction)."
    construction: "Bernoulli(0.4) draw. Enters the treatment logit (coef 1.0) but NOT the outcome equation, so the exclusion restriction holds by construction."
    units: "0/1"
    source: "Simulation"
    coverage: "5,000 employees"
    kind: dummy
    value_labels: {0: "No disruption", 1: "Disrupted line"}
