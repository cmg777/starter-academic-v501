files:
  raw_data.csv:
    label: "Full Linden-Rockoff transaction file (NC home sales)"
    grain: "home sale (transaction)"
    years: "1994-2004"
    coverage: "170,239 North Carolina home sales"
    key: "parcel x sale_date"
    purpose: "Source data; the 9,092 sales within 1/3 mile of an offender form the analysis sample."
    note: "Full home-transaction file from Butts's (2023) replication archive of Linden & Rockoff (2008); one row per sale, 1994-2004. distance is zero for sales outside every offender's catchment. This is a CSV dump of the original Stata source (linden_rockoff.dta); the .dta column labels are reused here."
  data_prepared.csv:
    label: "Analysis sample: offender catchment sales (<= 1/3 mile)"
    grain: "home sale (transaction)"
    years: "1994-2004"
    coverage: "9,092 sales within 1/3 mile of an offender"
    key: "parcel x sale_date (within srn_year strata)"
    purpose: "Estimate the ring DiD (parametric & nonparametric) on the real Linden-Rockoff data."
    note: "Analysis sample: rows with offender == 1 (within 1/3 mile of some offender's eventual address). Built from raw_data by rescaling distance to miles and adding dist_post, post, srn_year, and offdays for the estimators."

columns:
  # --- identifiers / time ----------------------------------------------------
  sale_month:
    label: "Month of sale"
    definition: "Calendar month in which the home transaction closed."
    construction: "From the transaction record."
    units: "1-12"
    source: "Linden & Rockoff (2008)"
    kind: id
  sale_year:
    label: "Year of sale"
    definition: "Calendar year in which the home transaction closed."
    construction: "From the transaction record."
    units: "year"
    source: "Linden & Rockoff (2008)"
    kind: year
  cpi_value:
