    definition: "Consumer Price Index value used to deflate sale prices."
    construction: "From the transaction record (price-deflation series)."
    units: "index"
    source: "Linden & Rockoff (2008)"
    kind: cont
  correction_term_dec_2004:
    label: "Price correction term (Dec 2004 base)"
    definition: "Inflation-correction factor expressing prices in December-2004 dollars."
    construction: "Derived from the CPI series, base = December 2004."
    units: "factor"
    source: "Linden & Rockoff (2008)"
    kind: cont
  geo_code:
    label: "Census geo code (state-county-tract-block group)"
    definition: "Census geography identifier: state, county, tract, block group."
    construction: "Geocoded census block-group code."
    units: "code"
    source: "Linden & Rockoff (2008)"
    kind: id
  parcel:
    label: "Parcel ID number"
    definition: "Unique tax-parcel identifier for the property."
    construction: "From the county property records."
    units: "string"
    source: "Linden & Rockoff (2008)"
    kind: id
  amt_Price:
    label: "Sale price (US$)"
    definition: "Recorded sale price of the home."
    construction: "From the transaction record."
    units: "US$"
    source: "Linden & Rockoff (2008)"
    kind: cont
  sale_date:
    label: "Sale date"
    definition: "Date the home transaction closed."
    construction: "From the transaction record."
    units: "date"
    source: "Linden & Rockoff (2008)"
    kind: str
  year_built:
    label: "Year built"
    definition: "Year the property was constructed."
    construction: "From the county property records."
    units: "year"
    source: "Linden & Rockoff (2008)"
    kind: year
  HEATED:
    label: "Heated area (sq ft)"
    definition: "Heated floor area of the home."
    construction: "From the county property records."
    units: "sq ft"
    source: "Linden & Rockoff (2008)"
    kind: cont
  BATHS:
    label: "Number of bathrooms"
    definition: "Count of bathrooms in the home."
    construction: "From the county property records."
    units: "count"
    source: "Linden & Rockoff (2008)"
    kind: id
  BEDROOMS:
    label: "Number of bedrooms"
    definition: "Count of bedrooms in the home."
    construction: "From the county property records."
    units: "count"
    source: "Linden & Rockoff (2008)"
    kind: id
  neighborhood:
    label: "Neighborhood code"
    definition: "Assessor neighborhood identifier (the clustering unit for SEs)."
    construction: "From the county property records."
    units: "code"
    source: "Linden & Rockoff (2008)"
    kind: id
  distance:
    label: "Distance to offender"
    definition: "Distance from the home to the nearest offender's eventual address; zero if the home is in no offender's area. In data_prepared this is rescaled to miles (raw distance / 3)."
    construction: "Geocoded straight-line distance; the analysis sample rescales to miles via distance / 3."
    units: "miles (prepared) / raw units (raw_data)"
    source: "Linden & Rockoff (2008)"
    kind: cont
  srn:
    label: "Offender ID number"
    definition: "Identifier of the registered offender whose catchment the home falls in."
    construction: "Sex-offender registry record number."
    units: "string"
    source: "Linden & Rockoff (2008)"
    kind: id
  offender_address_date:
    label: "Date offender arrived"
    definition: "Date the offender's address was published / the offender moved in."
    construction: "From the sex-offender registry."
    units: "date"
    source: "Linden & Rockoff (2008)"
    kind: str
  building_grade:
    label: "Building grade"
    definition: "Assessor construction-quality grade of the home."
    construction: "From the county property records."
    units: "category"
    source: "Linden & Rockoff (2008)"
    kind: str
  offender:
    label: "In an offender catchment (1=yes)"
    definition: "1 if the home is within 1/3 mile of some offender's eventual address (i.e. enters the analysis sample); else 0."
    construction: "Flag derived from distance to nearest offender."
    units: "0/1"
    source: "Linden & Rockoff (2008)"
    kind: dummy
  streetname:
    label: "Street name"
    definition: "Street on which the property is located."
    construction: "From the county property records."
    units: "string"
    source: "Linden & Rockoff (2008)"
    kind: str
  BQM1:
    label: "Building quality, part 1"
    definition: "First component of the assessor building-quality grade (1-6)."
    construction: "From the county property records."
    units: "1-6"
    source: "Linden & Rockoff (2008)"
    kind: id
  BQM2:
    label: "Building quality, part 2"
    definition: "Second component of the assessor building-quality grade (1-6)."
    construction: "From the county property records."
    units: "1-6"
    source: "Linden & Rockoff (2008)"
    kind: id
  AIRCOND:
    label: "Air conditioning (1=yes)"
    definition: "1 if the home has air conditioning, else 0."
    construction: "From the county property records."
    units: "0/1"
    source: "Linden & Rockoff (2008)"
    kind: dummy
  HEIGHT:
    label: "Building height / stories code"
    definition: "Coded number of stories / height class (1, 1.5, 2, 3, 8, 9)."
    construction: "From the county property records."
    units: "code"
    source: "Linden & Rockoff (2008)"
    kind: cont
  WALL:
    label: "Exterior wall material"
    definition: "Exterior wall-material category (e.g. ALUM,VINYL; FACE BRICK; WOOD SHINGLE)."
    construction: "From the county property records."
    units: "category"
    source: "Linden & Rockoff (2008)"
    kind: str
  AGE:
    label: "Building age at sale (years)"
    definition: "Age of the home at the time of sale."
    construction: "sale_year minus year_built."
    units: "years"
    source: "Linden & Rockoff (2008)"
    kind: cont
  NEW:
    label: "New construction (1=yes)"
    definition: "1 if the sale is of newly built property, else 0."
    construction: "From the county property records."
    units: "0/1"
    source: "Linden & Rockoff (2008)"
    kind: dummy
  orig_distance:
    label: "Distance to offender (before 4-year window)"
    definition: "Distance to the offender's address before limiting the sample to the 4-year arrival window."
    construction: "Geocoded distance, pre-windowing."
    units: "raw units"
    source: "Linden & Rockoff (2008)"
    kind: cont
  close_offender:
    label: "Treated ring: within 0.1 mile (1=yes)"
    definition: "1 if the home is in the inner treated ring (within 0.1 mile of the offender's address), else 0."
    construction: "Indicator distance <= 0.1 mile."
    units: "0/1"
    source: "Butts (2023)"
    kind: dummy
  post_move:
    label: "Post-arrival sale (1=yes)"
    definition: "1 if the sale closed after the offender's arrival, else 0 (pre-arrival)."
