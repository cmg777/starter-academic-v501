# Data dictionary metadata for r_did_ring — drives build_data_dictionary.py.
# Generated by the write-data-dictionary skill from the post's text + data; edit and rerun.

study:
  title: "Difference-in-Differences with Geocoded Microdata: When Distance Defines Treatment"
  subtitle: "Replication data for the ring DiD tutorial — Linden & Rockoff (2008) home sales near sex-offender arrivals."
  overview: >
    Companion data for a hands-on R tutorial on the <strong>spatial (ring) difference-in-differences</strong>
    design, where the treatment is a point in space and distance to that point becomes the running variable
    that defines who is treated and who is control. The post reproduces and extends Linden &amp; Rockoff's
    (2008) study of how a registered sex offender's arrival affects nearby home prices, comparing a
    <strong>parametric ring estimator</strong> (a one-line <code>feols()</code> regression of first-differenced
    log prices on a treated-ring indicator) against the data-driven <strong>nonparametric estimator</strong>
    of Butts (2023), which uses <code>binsreg</code> to trace a whole treatment-effect curve over distance.
    At the canonical 0.1-mile cutoff the parametric ring DiD returns &minus;5.78&nbsp;%, but moving the inner
    ring from 0.05 to 0.15 mile swings the estimate from &minus;6.40&nbsp;% to &minus;4.21&nbsp;% (a 52&nbsp;%
    relative spread); the nonparametric estimator finds the effect concentrated within the first 300 feet
    (bin&nbsp;1 at &minus;20.6&nbsp;%) and crossing zero at <code>d &asymp; 0.094</code> mile.
  panel_structure: >
    <strong>Two files.</strong> <code>raw_data</code> is the full Linden &amp; Rockoff transaction file
    (one row per home sale; 170,239 North Carolina sales, of which 9,092 fall within 1/3 mile of an
    offender's eventual address). <code>data_prepared</code> is the analysis sample &mdash; the 9,092 sales
    in some offender's catchment area (<code>offender == 1</code>), with five derived fields added
    (distance rescaled to miles plus the post/pre flag, neighborhood&times;year strata, and days-to-arrival
    used by the estimators).
  kpis:
    - {n: 2, l: "datasets"}
    - {n: 55, l: "variables"}
    - {n: "170,239", l: "home sales (raw)"}
    - {n: "9,092", l: "analysis sales"}

dta_format_version: 118

sources:
  - name: "Linden & Rockoff (2008)"
    provides: "Original study and source data: North Carolina home transactions geocoded to registered-offender addresses"
    reference: "Linden, L., & Rockoff, J. E. (2008). Estimates of the Impact of Crime Risk on Property Values from Megan's Laws. American Economic Review, 98(3), 1103–1127. https://www.aeaweb.org/articles?id=10.1257/aer.98.3.1103"
  - name: "Butts (2023)"
    provides: "Replicated methodology (parametric & nonparametric ring estimators) and the cleaned data archive used here"
    reference: "Butts, K. (2023). JUE Insight: Difference-in-Differences with Geocoded Microdata. Journal of Urban Economics, 133, 103493. https://doi.org/10.1016/j.jue.2022.103493"
  - name: "Method references"
    provides: "Estimators and concepts"
    reference: "Cattaneo, Crump, Farrell & Feng (2024), On Binscatter, American Economic Review 114(5), 1488–1514; the fixest and binsreg R packages."

formulas_html: |
  <p>The ring DiD reuses the textbook 2&times;2 difference-in-differences logic, but the treated and
  control groups are defined by <strong>distance to a treatment point</strong> rather than by policy
  assignment. The estimand is the average treatment effect among the treated,
  <code>&tau; = E[&Delta;Y | treated] &minus; E[&Delta;Y | control]</code>.</p>
  <ul class="tight">
    <li><strong>Treated ring</strong> (<code>close_offender</code>): homes within the inner radius
      <code>d &le; 0.1</code> mile of the offender's eventual address (Butts's &#x1D49F;<sub>t</sub>).</li>
    <li><strong>Control ring (donut)</strong>: homes between the inner cutoff and the outer boundary,
      <code>0.1 &lt; d &le; 0.3</code> mile (&#x1D49F;<sub>c</sub>).</li>
    <li><strong>Parametric estimator</strong>: <code>feols(delta_log_price ~ close_post_move | srn_year,
      cluster = "neighborhood")</code> &mdash; the coefficient on the treated&times;post interaction is the
      ring-DiD ATT, with neighborhood-clustered SEs. On Linden&ndash;Rockoff: <code>&minus;0.0595</code>
      log-points = <strong>&minus;5.78&nbsp;%</strong>.</li>
    <li><strong>Nonparametric estimator</strong> (<code>binsreg</code>): partition distance into
      <code>L</code> quantile-spaced bins, fit a flat constant in each, difference post&minus;pre, and
      anchor the right-most bin at zero &mdash; yielding a treatment-effect curve over distance
      (23 bins on the real data; bin&nbsp;1 at <strong>&minus;20.6&nbsp;%</strong>).</li>
    <li><strong>Sample-weighted inner-ring ATT</strong>: average the nonparametric
      <code>&tau;&#770;(d)</code> over observations inside 0.1 mile (not over bins): <code>&minus;0.132</code>
      log-points = <strong>&minus;12.4&nbsp;%</strong>.</li>
  </ul>
  <p>Distance bookkeeping: the raw <code>distance</code> column is rescaled to miles inside the analysis
  sample (<code>distance / 3</code>); <code>dist_post = distance &times; 10 &times; close_post_move</code>;
  <code>offdays = sale_date &minus; offender_address_date</code> (days relative to arrival);
  <code>srn_year = paste(srn, sale_year)</code> is the neighborhood&times;year fixed-effect stratum;
  <code>log_price = log(amt_Price)</code>.</p>

caveats:
  - "<strong>Replication data.</strong> All values are the Linden &amp; Rockoff (2008) home-sale records as cleaned and distributed in Butts's (2023) replication archive; this is real empirical data, not a simulation."
  - "<strong>Ring choice is part of the estimand.</strong> The parametric headline depends on the inner-ring cutoff: moving it from 0.05 to 0.15 mile shifts the ATT from −6.40 % to −4.21 % (a 52 % relative spread driven by the researcher's choice, not by sampling noise)."
  - "<strong>Local parallel trends + no anticipation.</strong> Identification rests on inner- and outer-ring prices sharing the same counterfactual trend, and on buyers not pricing in the offender's arrival before it becomes public; neither is formally testable in this cross-section."
  - "<strong>distance == 0 means 'not in any offender area'.</strong> In the raw file, <code>distance</code> is zero for sales outside every offender's catchment; the analysis sample keeps only <code>offender == 1</code> rows (within 1/3 mile), where distance is strictly positive."
  - "<strong>Fixed-effect singletons are dropped at estimation.</strong> The parametric models discard srn_year strata with a single observation (≈63–73 obs), so reported regression N (≈7,534–9,029) is below the 9,092-row analysis sample."

