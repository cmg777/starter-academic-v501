# Data dictionary metadata for stata_convergence — drives build_data_dictionary.py.
# Generated by the write-data-dictionary skill from the post's text + data; edit and rerun.

study:
  title: "Beta and Sigma Convergence Across Countries"
  subtitle: "Penn World Table 10.0 income data and the 84-country balanced panel behind a Stata convergence tutorial."
  overview: >
    Companion data for a hands-on Stata tutorial that tests whether poorer countries are catching
    up to richer ones. The analysis uses <strong>Penn World Table 10.0</strong> (Feenstra, Inklaar &amp;
    Timmer, 2015) expenditure-side real GDP in purchasing-power-parity terms and builds the complete
    convergence toolkit &mdash; OLS <em>beta</em>-convergence regressions of annualized growth on log
    initial income, an algebraic conversion of the OLS slope <code>&lambda;</code> to the structural
    speed <code>&beta; = &minus;ln(1+&lambda;s)/s</code> (Barro &amp; Sala-i-Martin, 1992), direct
    Nonlinear Least Squares, rolling windows, and <em>sigma</em> convergence measured by the variance
    of log GDP per capita. Over 1960&ndash;2019 the OLS slope is essentially zero, but splitting at
    2000 reveals a structural break: divergence during 1960&ndash;2000 flips to convergence during
    2000&ndash;2019 (&beta; = 0.36% per year, half-life 190 years), even as the variance of log income
    rose 90.8% &mdash; beta convergence without sigma convergence.
  panel_structure: >
    <strong>Two files.</strong> <code>pwt100</code> is the raw Penn World Table 10.0 source &mdash; an
    annual country panel (one row per country &times; year, 1950&ndash;2019) with 52 macroeconomic
    series for 183 economies. <code>convergence_data_prepared</code> is the <strong>analysis subset</strong>
    built from it in Section 3 of the post: keep <code>country</code>, <code>ccode</code>,
    <code>year</code>, <code>pop</code>, <code>rgdpe</code>; compute <code>gdppc = rgdpe/pop</code>;
    drop oil producers and countries under 1 million; restrict to a <strong>balanced panel of 84
    countries</strong> with data since 1960 (5,040 country-year rows, 1960&ndash;2019).
  kpis:
    - {n: 2, l: "datasets"}
    - {n: 84, l: "countries (analysis)"}
    - {n: "1960–2019", l: "years (analysis)"}
    - {n: "5,040", l: "country-years (analysis)"}

dta_format_version: 118

sources:
  - name: "Penn World Table 10.0"
    provides: "Source income data: expenditure-side real GDP at chained PPPs, population, and 50 other macro series"
    reference: "Feenstra, R. C., Inklaar, R., & Timmer, M. P. (2015). The Next Generation of the Penn World Table. American Economic Review, 105(10), 3150–3182. https://www.rug.nl/ggdc/productivity/pwt/"
  - name: "Patel, Sandefur & Subramanian (2021)"
    provides: "Sample design: exclude oil producers and small countries; the post-2000 unconditional-convergence framing"
    reference: "Patel, D., Sandefur, J., & Subramanian, A. (2021). The New Era of Unconditional Convergence. Journal of Development Economics, 152, 102687. https://doi.org/10.1016/j.jdeveco.2021.102687"
  - name: "Method references"
    provides: "Convergence estimators and concepts (beta/sigma convergence, speed, half-life)"
    reference: "Barro & Sala-i-Martin (1992); Sala-i-Martin (1996); Young, Higgins & Levy (2008)."

formulas_html: |
  <p>Convergence is measured on annualized growth and log initial income across the 84-country
  cross-section, with per-capita income <code>gdppc = rgdpe / pop</code>.</p>
  <ul class="tight">
    <li><strong>Annualized growth</strong> (<code>g_i</code>):
      <code>g_i = (1/s)·ln(y_{i,t+s} / y_{i,t})</code> over a window of <code>s</code> years.</li>
    <li><strong>Beta convergence (OLS)</strong> (<code>&lambda;</code>):
      <code>g_i = &alpha; + &lambda;·ln(y_{i,0}) + &epsilon;_i</code> — a negative slope
      <code>&lambda;</code> means poorer countries grow faster (convergence).</li>
    <li><strong>OLS &rarr; structural speed</strong> (<code>&beta;</code>):
      <code>&beta; = &minus;ln(1 + &lambda;s) / s</code> (Barro &amp; Sala-i-Martin 1992); note the sign
      convention flips — positive <code>&beta;</code> means convergence.</li>
    <li><strong>NLS direct estimate</strong>:
      <code>g_i = &alpha; &minus; (1 &minus; e^{&minus;&beta;s})/s · ln(y_{i,0}) + &epsilon;_i</code>,
      fit with Stata <code>nl</code>; matches the OLS conversion to ~10&#8315;&#185;&#8311;.</li>
    <li><strong>Half-life</strong> (<code>&tau;</code>):
      <code>&tau; = ln(2) / &beta;</code> — years to close half the income gap.</li>
    <li><strong>Sigma convergence</strong> (<code>&sigma;&sup2;_t</code>):
      variance of <code>ln(gdppc)</code> across countries at year <code>t</code>; falling
      <code>&sigma;&sup2;_t</code> means the income spread is narrowing.</li>
    <li><strong>Rolling window</strong>: re-estimate &lambda; (then &beta;) for every start year
      1960&ndash;2010 with the end year fixed at 2019.</li>
  </ul>

caveats:
  - "<strong>Real data.</strong> Income comes from Penn World Table 10.0 (Feenstra, Inklaar & Timmer, 2015) — expenditure-side real GDP at chained PPPs in 2017 US$. Results depend on this income measure and the chosen sample restrictions."
  - "<strong>Balanced-panel selection.</strong> The analysis subset keeps only the 84 countries with GDP data since 1960, excluding ~40 economies (disproportionately African and small-island) that entered PWT coverage later; results may not generalize to the full set of developing countries."
  - "<strong>Sample exclusions.</strong> Oil producers (IMF classification) and countries under 1 million population are dropped, following Patel et al. (2021); convergence results are sensitive to these choices."
  - "<strong>Low explanatory power.</strong> The convergence regressions have R² between 0.001 and 0.069 — the research question is about the sign and significance of the slope, not prediction."
  - "<strong>Beta ≠ sigma.</strong> Beta convergence (poorer countries growing faster) is necessary but not sufficient for sigma convergence (a narrowing distribution); the two diverge in this sample (Young, Higgins & Levy, 2008)."

