files:
  convergence_data_prepared.csv:
    label: "Analysis panel: GDP per capita + population, 84 countries"
    grain: "country-year"
    years: "1960-2019"
    coverage: "84 countries (balanced)"
    key: "ccode x year"
    purpose: "The analysis sample for all beta/sigma convergence regressions."
    note: "Balanced panel of 84 countries, 1960-2019 (5,040 rows). Built from pwt100.dta in Section 3: keep country/ccode/year/pop/rgdpe, compute gdppc=rgdpe/pop, drop oil producers and countries under 1 million, restrict to countries with data since 1960."
  pwt100.dta:
    label: "Penn World Table 10.0 source (52 macro series, 183 economies)"
    grain: "country-year"
    years: "1950-2019"
    coverage: "183 economies"
    key: "countrycode x year"
    purpose: "Raw upstream source from which the analysis panel is built."
    note: "Penn World Table 10.0 (Feenstra, Inklaar & Timmer 2015). Annual macro panel; the post uses countrycode, country, year, pop, and rgdpe (to form gdppc=rgdpe/pop). The remaining columns carry the official PWT variable labels."

