# Data dictionary metadata for stata_iv — drives build_data_dictionary.py.
# Generated by the write-data-dictionary skill from the post's text + data; edit and rerun.

study:
  title: "Do Institutions Cause Prosperity? The AJR (2001) IV Datasets"
  subtitle: "The eight Acemoglu–Johnson–Robinson replication datasets behind an instrumental-variables tutorial in Stata."
  overview: >
    Companion data for a hands-on Stata tutorial that replicates Acemoglu, Johnson and Robinson
    (2001), <em>The Colonial Origins of Comparative Development</em>. The study instruments modern
    property-rights institutions (<code>avexpr</code>) with European <strong>settler mortality</strong>
    during colonization (<code>logem4</code>) to recover the causal effect of institutions on income
    (<code>logpgp95</code>) across ex-colonies. The naive OLS slope is 0.522; the two-stage
    least-squares (2SLS) estimate is <strong>0.944</strong> &mdash; about 81% larger &mdash;
    implying that measurement error dominates OLS bias and that institutional reform is roughly twice
    as valuable as naive regressions suggest. The eight datasets here are AJR's original replication
    archive: one per table of the paper, each a country cross-section that progressively narrows from
    the full ~163-country world to the 64-country <strong>base sample</strong> of ex-colonies with
    valid settler-mortality data.
  panel_structure: >
    <strong>Eight cross-sections, one per AJR table.</strong> Every file is a country-level
    cross-section keyed on <code>shortnam</code> (3-letter country code); there is no time dimension.
    <code>maketable1</code> and <code>maketable3</code> carry the full ~376-row archive; the others
    hold ~163 rows. The base sample is selected with <code>baseco==1</code> (and, in the original
    coding, this flag is missing for non-base countries rather than set to 0). The datasets share a
    common spine (<code>shortnam</code>, <code>avexpr</code>, <code>logpgp95</code>,
    <code>logem4</code>) and each adds the specific controls its table needs &mdash; OLS controls
    (Table&nbsp;2), first-stage/historical-institution variables (Tables&nbsp;3 &amp; 8), colonial /
    legal / religion controls (Table&nbsp;5), geography &amp; climate (Table&nbsp;6), and modern
    health channels (Table&nbsp;7).
  kpis:
    - {n: 8, l: "datasets"}
    - {n: 55, l: "variables"}
    - {n: 64, l: "ex-colonies (base sample)"}
    - {n: "163–376", l: "rows per file"}

dta_format_version: 118

sources:
  - name: "Acemoglu, Johnson & Robinson (2001)"
    provides: "All eight datasets (maketable1–maketable8) — the original AJR replication archive, one per table of the paper"
    reference: "Acemoglu, D., Johnson, S., & Robinson, J. A. (2001). The Colonial Origins of Comparative Development: An Empirical Investigation. American Economic Review, 91(5), 1369–1401. https://www.aeaweb.org/articles?id=10.1257/aer.91.5.1369"
  - name: "World Bank / Penn World Table"
    provides: "Log PPP GDP per capita 1995 (logpgp95); Hall–Jones GDP per worker (loghjypl)"
    reference: "Underlying income series compiled by AJR from World Bank and Hall & Jones (1999)."
  - name: "Curtin (settler mortality)"
    provides: "European settler/soldier mortality rates used to build extmort4 / logem4"
    reference: "Mortality figures assembled by AJR from Curtin (1989, 1998) and related historical sources; see Albouy (2012) on imputation."
  - name: "Method references"
    provides: "Estimators, weak-instrument and overidentification diagnostics"
    reference: "Imbens & Angrist (1994, LATE); Staiger & Stock (1997); Stock & Yogo (2005); Olea & Pflueger (2013); Baum, Schaffer & Stillman (2007, ivreg2)."

formulas_html: |
  <p>The tutorial estimates the causal effect of institutions on income via
  <strong>two-stage least squares (2SLS)</strong>. The structural model has an endogenous
  regressor <code>X = avexpr</code> correlated with the error, an outcome <code>Y = logpgp95</code>,
  and an instrument <code>Z = logem4</code>:</p>
  <ul class="tight">
    <li><strong>Structural equation:</strong>
      <code>Y_i = α + β·X_i + U_i</code>, with <code>Cov(X_i, U_i) ≠ 0</code> (this endogeneity is
      what biases OLS).</li>
    <li><strong>First stage (relevance):</strong>
      <code>X_i = π_0 + π_1·Z_i + v_i</code> — settler mortality must move institutions
      (here <code>π_1 = −0.607</code>, Kleibergen–Paap F = 16.32).</li>
    <li><strong>Reduced form:</strong>
      <code>Y_i = γ_0 + γ_1·Z_i + e_i</code> — the total effect of the instrument on the outcome
      (here <code>γ_1 ≈ −0.573</code>).</li>
    <li><strong>2SLS estimator (just-identified):</strong>
      <code>β̂_2SLS = Cov(Y,Z) / Cov(X,Z) = γ̂_RF / π̂_FS = −0.573 / −0.607 = 0.944</code>.</li>
    <li><strong>Exclusion restriction:</strong> <code>Z</code> affects <code>Y</code>
      <em>only</em> through <code>X</code> — settler mortality circa 1700 influences 1995 GDP only by
      shaping inherited institutions. This is untestable in a just-identified model.</li>
    <li><strong>Overidentification (Hansen J):</strong> with more instruments than endogenous
      regressors, the J-test checks whether the instruments agree on one causal effect; non-rejection
      is consistent with (but does not prove) joint exogeneity.</li>
  </ul>
  <p>The 2SLS estimate identifies a <strong>Local Average Treatment Effect (LATE)</strong> for
  "complier" countries whose institutions would respond to a change in settler mortality
  (Imbens &amp; Angrist 1994); under constant effects, LATE = ATE.</p>

caveats:
  - "<strong>Cross-section, not panel.</strong> Every file is a country cross-section keyed on <code>shortnam</code>; there is no time dimension. Most variables are measured at a single point (e.g. GDP in 1995, religion shares in 1980)."
  - "<strong>baseco coding.</strong> The base-sample flag <code>baseco</code> takes the value 1 for the 64 base-sample ex-colonies and is <em>missing</em> (not 0) for other countries. Restrict with <code>keep if baseco==1</code>."
  - "<strong>Imputed mortality (Albouy 2012).</strong> Roughly 36% of AJR's settler-mortality observations are imputed or shared across countries, which weakens the exclusion restriction and gives Hansen J low power against shared imputation bias."
  - "<strong>Weak instruments in robustness specs.</strong> Several specifications (e.g. Table 6 resource/geography columns, Table 7 health-channel overidentified columns) drop the first-stage F below 5 — read their confidence intervals via the weak-IV-robust Anderson–Rubin test, not their point estimates."
  - "<strong>LATE, not ATE.</strong> The headline 0.944 is the effect for colonization-margin compliers, not a population-average treatment effect."
  - "<strong>Missing values.</strong> Coverage varies by variable (institutions, mortality, and many controls are missing for a subset of countries); the labeled <code>.dta</code> preserves AJR's original missing-data pattern byte-for-byte."

