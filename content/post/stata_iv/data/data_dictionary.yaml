files:
  maketable1.dta:
    label: "AJR Table 1 data: full archive, summary statistics"
    grain: "country (cross-section)"
    years: "GDP 1995; institutions 1985-95; settlers 1900; mortality colonial era"
    coverage: "~376 rows; 64 base-sample ex-colonies (baseco==1)"
    key: "shortnam"
    purpose: "Source for Table 1 summary statistics on the whole world and the AJR base sample."
    note: "Full AJR archive used for descriptive statistics; carries the income, institutions, settler, historical-institution, and mortality variables plus the baseco flag."
  maketable2.dta:
    label: "AJR Table 2 data: OLS benchmark (income, institutions, controls)"
    grain: "country (cross-section)"
    years: "GDP 1995; institutions 1985-95"
    coverage: "~163 rows; 64 base-sample ex-colonies"
    key: "shortnam"
    purpose: "Naive OLS regressions of logpgp95 on avexpr with latitude and continent controls."
    note: "Holds the continent dummies (africa, asia, other) and latitude used as OLS controls in AJR Table 2."
  maketable3.dta:
    label: "AJR Table 3 data: first stage + determinants of institutions"
    grain: "country (cross-section)"
    years: "settlers/mortality colonial era; institutions 1900 and 1st-year-indep"
    coverage: "~376 rows"
    key: "shortnam"
    purpose: "First-stage and historical-institution determinants of modern expropriation protection."
    note: "Carries the historical-institution variables (cons00a, democ00a, cons1, indtime, euro1900) and raw/log mortality (extmort4, logem4) for the determinants-of-institutions table."
  maketable4.dta:
    label: "AJR Table 4 data: main 2SLS estimate"
    grain: "country (cross-section)"
    years: "GDP 1995; institutions 1985-95; mortality colonial era"
    coverage: "~163 rows; 64 base-sample ex-colonies"
    key: "shortnam"
    purpose: "The headline 2SLS regression: instrument avexpr with logem4 (effect = 0.944)."
    note: "The core IV dataset; adds the rich4 (neo-Europe) dummy used in robustness columns of AJR Table 4."
  maketable5.dta:
    label: "AJR Table 5 data: colonial, legal & religion controls"
    grain: "country (cross-section)"
    years: "GDP 1995; religion shares 1980"
    coverage: "~163 rows; 64 base-sample ex-colonies"
    key: "shortnam"
    purpose: "Robustness: add British/French colonizer, French legal origin, and religion shares."
    note: "Adds colonizer-identity dummies (f_brit, f_french), French legal origin (sjlofr), and 1980 religion-composition shares (catho80, muslim80, no_cpm80)."
  maketable6.dta:
    label: "AJR Table 6 data: geography, climate & resources"
    grain: "country (cross-section)"
    years: "GDP 1995; geography time-invariant"
    coverage: "~163 rows; 64 base-sample ex-colonies"
    key: "shortnam"
    purpose: "Robustness: control for temperature, humidity, soil, minerals, landlock, ethnic fractionalization."
    note: "The widest file (29 vars): five temperature and four humidity indices, six soil/climate dummies, five mineral-resource measures, landlock, ethnolinguistic fractionalization (avelf), and European-descent share (edes1975)."
  maketable7.dta:
    label: "AJR Table 7 data: modern health channels"
    grain: "country (cross-section)"
    years: "GDP 1995; health 1994-95"
    coverage: "~163 rows; 62-64 base-sample ex-colonies"
    key: "shortnam"
    purpose: "Robustness/threat: control for malaria, life expectancy, infant mortality, and add coastal/temperature/latitude instruments for overidentified GMM."
    note: "The trickiest robustness file: modern health controls (malfal94, leb95, imr95, yellow) plus McArthur–Sachs geography instruments (meantemp, lt100km, latabs) used in the overidentified Hansen-J columns."
  maketable8.dta:
    label: "AJR Table 8 data: alternative instruments & overidentification"
    grain: "country (cross-section)"
    years: "settlers 1900; historical institutions 1900 and 1st-year-indep"
    coverage: "~163 rows; 64 base-sample ex-colonies"
    key: "shortnam"
    purpose: "Overidentification: pair logem4 with alternative historical-institution instruments and run Hansen J / Panel-D sensitivity."
    note: "Holds the alternative instruments (euro1900, cons00a, democ00a, cons1, democ1, indtime) tested against logem4 for joint exogeneity."

columns:
  shortnam:
    label: "Country code (3-letter)"
    definition: "Three-letter country identifier; the row key in every dataset."
    construction: "AJR country abbreviation (e.g. AUS, USA, NGA); used for scatter point labels (mlabel)."
    units: "string"
    source: "AJR (2001)"
    coverage: "all files"
    kind: id
  avexpr:
    label: "Avg protection against expropriation risk"
    definition: "Average index of protection against expropriation of private investment, ~1985-95 (the endogenous regressor X — 'modern institutions')."
    construction: "Mean over available years of the Political Risk Services expropriation-risk index, scaled 0 (worst) to 10 (best)."
    units: "0-10 scale"
    source: "AJR (2001), from Political Risk Services"
    coverage: "all files"
    kind: cont
  logpgp95:
    label: "Log GDP per capita, PPP, 1995"
    definition: "Natural log of 1995 PPP GDP per capita (the outcome Y)."
    construction: "log of World Bank PPP GDP per capita, 1995."
    units: "log US$ (PPP)"
    source: "AJR (2001), from World Bank"
    coverage: "all files"
    kind: cont
  logem4:
    label: "Log settler mortality"
    definition: "Natural log of European settler/soldier mortality during early colonization (the instrument Z)."
    construction: "log of corrected annualized deaths per 1,000 (extmort4)."
    units: "log deaths per 1,000"
    source: "AJR (2001), from Curtin and related sources"
    coverage: "tables 1, 3, 4, 5, 6, 7, 8"
    kind: cont
  extmort4:
    label: "Corrected settler mortality rate"
    definition: "Annualized European settler/soldier mortality during colonization (raw level behind logem4)."
    construction: "Deaths per 1,000 mean strength, corrected/standardized by AJR (≈2.55 to 2,940)."
    units: "deaths per 1,000"
    source: "AJR (2001)"
    coverage: "tables 1, 3"
    kind: cont
  baseco:
    label: "Base-sample flag (1 = AJR base sample)"
    definition: "Indicator for the 64-country base sample of ex-colonies with valid settler-mortality data."
    construction: "1 for base-sample countries; MISSING (not 0) otherwise. Restrict with keep if baseco==1."
    units: "1/missing"
    source: "AJR (2001)"
    coverage: "tables 1, 2, 4, 5, 6, 7, 8"
    kind: dummy
    value_labels: {1: "Base sample"}
  loghjypl:
    label: "Log GDP per worker (Hall-Jones)"
    definition: "Natural log of GDP per worker from Hall & Jones (1999); an alternative income measure."
    construction: "log of Hall–Jones output per worker."
    units: "log US$"
    source: "Hall & Jones (1999) via AJR"
    coverage: "tables 1, 2, 4"
    kind: cont
  euro1900:
    label: "European settlers in 1900 (% of pop.)"
    definition: "Share of the population that was of European descent in 1900 (also used as an alternative instrument)."
    construction: "Percent European in 1900, AJR."
    units: "% (0-100)"
    source: "AJR (2001)"
    coverage: "tables 1, 3, 8"
    kind: cont
  cons1:
    label: "Constraint on executive, 1st year of independence"
    definition: "Polity constraint-on-the-executive score in the country's first year of independence."
    construction: "Polity index, 1 (low) to 7 (high) constraint."
    units: "1-7 scale"
    source: "Polity via AJR"
    coverage: "tables 1, 3, 8"
    kind: cont
  democ00a:
    label: "Democracy in 1900"
    definition: "Polity democracy score in 1900 (a historical-institution / alternative-instrument variable)."
    construction: "Polity democracy index, 0 (low) to 10 (high)."
    units: "0-10 scale"
    source: "Polity via AJR"
    coverage: "tables 1, 3, 8"
    kind: cont
  cons00a:
    label: "Constraint on executive in 1900"
    definition: "Polity constraint-on-the-executive score in 1900 (historical-institution / alternative instrument)."
    construction: "Polity index, 1 (low) to 7 (high) constraint."
    units: "1-7 scale"
    source: "Polity via AJR"
    coverage: "tables 1, 3, 8"
    kind: cont
  democ1:
    label: "Democracy, 1st year of independence"
    definition: "Polity democracy score in the country's first year of independence (alternative instrument)."
    construction: "Polity democracy index, 0 (low) to 10 (high)."
    units: "0-10 scale"
    source: "Polity via AJR"
    coverage: "table 8"
    kind: cont
  indtime:
    label: "Years independent (1995 - first year)"
    definition: "Number of years a country had been independent by 1995."
    construction: "1995 minus the first year of independence."
    units: "years"
    source: "AJR (2001)"
    coverage: "tables 3, 8"
    kind: cont
  excolony:
    label: "Ex-colony dummy"
    definition: "1 if the country was ever a European colony (FLOPS definition)."
    construction: "Binary indicator from AJR/FLOPS coding."
    units: "0/1"
    source: "AJR (2001)"
    coverage: "table 3"
    kind: dummy
  africa:
    label: "Africa dummy"
    definition: "1 if the country is in Africa (continent control)."
    construction: "Binary continent indicator."
    units: "0/1"
    source: "AJR (2001)"
    coverage: "tables 2, 4, 7"
    kind: dummy
  asia:
    label: "Asia dummy"
    definition: "1 if the country is in Asia (continent control)."
    construction: "Binary continent indicator."
    units: "0/1"
    source: "AJR (2001)"
    coverage: "tables 2, 4, 7"
    kind: dummy
  other:
    label: "Other-continent dummy"
    definition: "1 if the country is not in Asia, Africa, or the Americas (continent control)."
    construction: "Binary continent indicator."
    units: "0/1"
    source: "AJR (2001)"
    coverage: "table 2"
    kind: dummy
  lat_abst:
    label: "Absolute latitude (scaled 0-1)"
    definition: "Absolute latitude of the capital, divided by 90 (a geography control)."
    construction: "abs(latitude of capital) / 90."
    units: "0-1"
    source: "AJR (2001)"
    coverage: "tables 2, 3, 4, 5, 6, 7, 8"
    kind: cont
  rich4:
    label: "Neo-Europe dummy"
    definition: "1 for the 'neo-Europes' (e.g. Australia, Canada, New Zealand, USA); dropped in some robustness columns."
    construction: "Binary indicator from AJR."
    units: "0/1"
    source: "AJR (2001)"
    coverage: "table 4"
    kind: dummy
  catho80:
    label: "Catholic share of population, 1980 (%)"
    definition: "Percent of population Catholic in 1980 (religion-composition control)."
    construction: "Percent Catholic, World Christian Encyclopedia 1995."
    units: "% (0-100)"
    source: "WCE via AJR"
    coverage: "table 5"
    kind: cont
  muslim80:
    label: "Muslim share of population, 1980 (%)"
