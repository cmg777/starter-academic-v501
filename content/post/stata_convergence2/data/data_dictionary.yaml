files:
  main_data.dta:
    label: "Country-year panel: GDP, 10-yr growth + 90 correlates"
    grain: "country-year"
    years: "1960-2017"
    coverage: "174 country codes (160 with GDP data); unbalanced"
    key: "code (ISO3) x year"
    purpose: "Estimate beta/sigma convergence and the OVB decomposition (Kremer, Willis & You 2021)."
    note: "The Kremer, Willis & You (2021) replication panel: Penn World Table 10.0 GDP plus 50+ institutional, policy, geographic and cultural growth correlates. Pre-cleaned to exclude very small countries (<200,000 pop) and resource-dependent economies (>75% resource rents). loggdp_growth_10 is forward-looking, so the last usable year is 2007/2008."
  WDICountry.csv:
    label: "World Bank country metadata lookup (code, region, income group)"
    grain: "country / aggregate"
    years: "metadata snapshot"
    coverage: "263 rows (individual economies + World Bank regional/income aggregates)"
    key: "country_code (ISO3)"
    purpose: "Reference lookup merged onto the panel by ISO3 code to attach region (Section 6.2 regional decomposition)."
    note: "World Development Indicators country-metadata file. Only the code and region columns are used by the analysis (to build the four-way region_group); the remaining columns are the WDI country attributes (currency, income group, accounting standards, latest-survey dates). Aggregate rows (e.g. 'Arab World', 'World') have blank region and are not matched. Column names were normalized to valid Stata identifiers; values are unchanged."

columns:
  # ---------------- main_data identifiers / time ----------------
  code:
    label: "Country code (ISO3)"
    definition: "Three-letter ISO country code; the panel identifier and the merge key to WDICountry."
    units: "ISO3 string"
    source: "Replication panel / WDI"
    coverage: "174 codes"
    kind: id
  country:
    label: "Country name"
    definition: "Country name corresponding to the ISO3 code."
    units: "string"
    source: "Replication panel"
    kind: str
  country_id:
    label: "Numeric country id"
    definition: "Numeric panel id (Stata egen group(code)); used as the panel/cluster unit."
    construction: "group(code)"
    units: "integer id"
    source: "Derived (this study)"
    kind: id
  year:
    label: "Calendar year"
    definition: "Annual time index, 1960-2017."
    units: "year"
    source: "Replication panel"
    kind: year

  # ---------------- main_data income & growth (PWT) ----------------
  loggdp:
    label: "Log GDP per capita (PWT)"
    definition: "Natural log of real GDP per capita from Penn World Table 10.0; the initial-income regressor in convergence regressions."
    construction: "log(GDPpc), PWT real GDP per capita (national-accounts series, logrgdpna)."
    units: "log US$ (PPP)"
    source: "Penn World Table 10.0"
    kind: cont
  loggdp_growth_10:
    label: "10-year forward GDP-pc growth (annualized %)"
    definition: "Forward-looking 10-year annualized growth rate of GDP per capita; the main outcome variable."
    construction: "100 x (F10.logrgdpna - logrgdpna)/10 over a 10-year horizon (forward-looking; last usable year ~2007)."
    units: "% per year"
    source: "Penn World Table 10.0 (derived)"
    kind: cont
  loggdp_WDI:
    label: "Log GDP per capita (WDI)"
    definition: "Natural log of GDP per capita from World Bank WDI (alternative income series)."
    units: "log US$"
    source: "World Bank WDI"
    kind: cont
  loggdp_pw:
    label: "Log GDP per capita (PWT variant)"
    definition: "Alternative log GDP-per-capita measure used in robustness checks."
    units: "log US$"
    source: "Penn World Table 10.0"
    kind: cont
  logrgdpna:
    label: "Log real GDP (national accounts)"
    definition: "Log real GDP per capita, PWT national-accounts growth series (rgdpna); base for the 10-year growth rate."
    units: "log US$"
    source: "Penn World Table 10.0"
    kind: cont
  logcgdpo:
    label: "Log real GDP (output, current PPP)"
    definition: "Log real GDP per capita, PWT output-side series at current PPPs (cgdpo)."
    units: "log US$"
    source: "Penn World Table 10.0"
    kind: cont
  logrgdpo:
    label: "Log real GDP (output side)"
    definition: "Log real GDP per capita, PWT output-side series (rgdpo)."
    units: "log US$"
    source: "Penn World Table 10.0"
    kind: cont
  logrgdpe:
    label: "Log real GDP (expenditure side)"
    definition: "Log real GDP per capita, PWT expenditure-side series (rgdpe)."
    units: "log US$"
    source: "Penn World Table 10.0"
    kind: cont
  logrgdpo_91:
    label: "Log real GDP (output side, 1991 base)"
    definition: "Log real GDP per capita, PWT output-side series anchored to a 1991 base."
    units: "log US$"
    source: "Penn World Table 10.0"
    kind: cont
  WDI_GDP_pc:
    label: "GDP per capita (WDI, level)"
    definition: "GDP per capita level from World Bank WDI."
    units: "US$"
    source: "World Bank WDI"
    kind: cont

  # ---------------- Solow fundamentals ----------------
  investment:
    label: "Gross capital formation (% of GDP)"
    definition: "Investment share of GDP; a Solow fundamental (steady-state determinant)."
    units: "% of GDP"
    source: "World Bank WDI"
    kind: cont
  population_growth:
    label: "Population growth (annual %)"
    definition: "Annual rate of total-population growth; a Solow fundamental."
    units: "% per year"
    source: "World Bank WDI"
    kind: cont
  barrolee2060:
    label: "Average years of schooling (Barro-Lee)"
    definition: "Mean years of schooling, population aged 20-60; the human-capital Solow fundamental."
    construction: "(sum) w_yr_sch from the Barro-Lee dataset."
    units: "years"
    source: "Barro-Lee"
    kind: cont
  edugap:
    label: "Education gender gap"
    definition: "Gap in schooling between men and women (used in the multivariate convergence set)."
    units: "years"
    source: "Barro-Lee (derived)"
    kind: cont

  # ---------------- short-run correlates: institutions / democracy ----------------
  polity2:
    label: "Polity2 democracy score (-10..10)"
    definition: "Combined Polity score; the headline democracy correlate in the OVB worked example. Interpolated/analysis-ready (no special missing codes)."
    units: "-10 (autocracy) to +10 (democracy)"
    source: "Polity IV"
    kind: cont
  democ:
    label: "Institutionalized democracy (0-10)"
    definition: "Polity democracy sub-index. Special codes -66 (interruption), -77 (interregnum), -88 (transition) denote non-scores, not values."
    units: "0-10 (+ Polity special codes)"
    source: "Polity IV"
    kind: cont
  autoc:
    label: "Institutionalized autocracy (0-10)"
    definition: "Polity autocracy sub-index. Special codes -66/-77/-88 denote non-scores, not values."
    units: "0-10 (+ Polity special codes)"
    source: "Polity IV"
    kind: cont
  FH_political_rights:
    label: "Freedom House political rights (1-7)"
    definition: "Freedom House political-rights rating (1 = most free, 7 = least free); a short-run institutional correlate."
    units: "1-7 rating"
    source: "Freedom House"
    kind: cont
  FH_civil_liberties:
    label: "Freedom House civil liberties (1-7)"
    definition: "Freedom House civil-liberties rating (1 = most free, 7 = least free)."
    units: "1-7 rating"
    source: "Freedom House"
    kind: cont

  # ---------------- short-run correlates: governance (WGI) ----------------
  WGI_gov_effectiveness:
    label: "Government effectiveness (WGI)"
    definition: "Worldwide Governance Indicators: government-effectiveness estimate."
    units: "z-score (~ -2.5 to 2.5)"
