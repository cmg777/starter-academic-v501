    units: "z-score (~ -2.5 to 2.5)"
    source: "World Bank WGI"
    kind: cont
  WGI_rule_law:
    label: "Rule of law (WGI)"
    definition: "Worldwide Governance Indicators: rule-of-law estimate."
    units: "z-score (~ -2.5 to 2.5)"
    source: "World Bank WGI"
    kind: cont
  WGI_control_corruption:
    label: "Control of corruption (WGI)"
    definition: "Worldwide Governance Indicators: control-of-corruption estimate."
    units: "z-score (~ -2.5 to 2.5)"
