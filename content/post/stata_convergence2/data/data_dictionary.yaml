# Data dictionary metadata for stata_convergence2 — drives build_data_dictionary.py.
# Generated by the write-data-dictionary skill from the post's text + data; edit and rerun.

study:
  title: "Converging to Convergence"
  subtitle: "Replication data for a Stata tutorial on beta/sigma convergence and the OVB decomposition (Kremer, Willis & You 2021)."
  overview: >
    Companion data for a hands-on Stata tutorial that reproduces the main findings of
    <strong>Kremer, Willis &amp; You (2021), &ldquo;Converging to Convergence.&rdquo;</strong>
    The analysis documents how the cross-country relationship between economic growth and initial
    income reversed &mdash; from <strong>divergence</strong> in the 1960s to <strong>unconditional
    convergence</strong> by the 2000s &mdash; and explains the shift through the convergence of
    growth correlates. It estimates beta-convergence (growth on initial log income) and
    sigma-convergence (the cross-country spread of log income), year-interacted rolling beta
    regressions, income-quartile and regional decompositions, and the omitted-variable-bias (OVB)
    identity that decomposes the gap between unconditional and conditional convergence as
    <code>&beta; &minus; &beta;* = &delta; &times; &lambda;</code>. The data are
    <strong>real</strong>: the authors&rsquo; replication panel combines Penn World Table 10.0 GDP
    with 50+ institutional, policy, geographic, and cultural correlates. The analysis is purely
    descriptive &mdash; it documents correlations and trends, not causal effects.
  panel_structure: >
    <strong>Two files.</strong> <code>main_data</code> is the analysis panel &mdash; one row per
    country &times; year, an unbalanced panel of ~160 GDP-reporting countries (174 country codes in
    all) over 1960&ndash;2017, carrying GDP, the 10-year forward growth rate, and the full set of
    growth correlates. <code>WDICountry</code> is the World Bank country-metadata lookup &mdash; one
    row per country/aggregate &mdash; merged onto the panel by ISO3 country <code>code</code> to
    attach the World Bank <code>region</code> used in the regional decomposition (Section&nbsp;6.2).
  kpis:
    - {n: 2, l: "datasets"}
    - {n: "160", l: "countries"}
    - {n: "1960–2017", l: "years"}
    - {n: "8,328", l: "GDP obs"}

dta_format_version: 118

sources:
  - name: "Kremer, Willis & You (2021)"
    provides: "Replicated study; the replication panel (main_data) and its variable set"
    reference: "Kremer, M., Willis, J., & You, Y. (2021). Converging to Convergence. NBER Working Paper 29484. https://www.nber.org/papers/w29484"
  - name: "Penn World Table 10.0"
    provides: "Real GDP per capita levels and the 10-year forward growth rate (loggdp, loggdp_growth_10)"
    reference: "Feenstra, R. C., Inklaar, R., & Timmer, M. P. (2015). The Next Generation of the Penn World Table. American Economic Review, 105(10), 3150-3182. https://www.rug.nl/ggdc/productivity/pwt/"
  - name: "World Bank WDI"
    provides: "Most growth correlates (investment, inflation, schooling, credit, taxes, openness) and the country/region lookup (WDICountry)"
    reference: "World Bank, World Development Indicators. https://databank.worldbank.org/source/world-development-indicators"
  - name: "Other correlate sources"
    provides: "Institutions, geography and culture correlates merged into the panel"
    reference: "Polity IV (democracy); Freedom House (political rights/civil liberties); Worldwide Governance Indicators; Heritage Foundation Index of Economic Freedom; Hofstede VSM (culture); Acemoglu-Johnson-Robinson settler-mortality data; La Porta et al. (legal origin); Barro-Lee (schooling)."
  - name: "Method references"
    provides: "Convergence concepts and estimators"
    reference: "Barro (1991); Barro & Sala-i-Martin (1992); Patel, Sandefur & Subramanian (2021); Durlauf, Johnson & Temple (2005)."

formulas_html: |
  <p>Convergence is measured on real GDP per capita. Let <code>y_it</code> be country <code>i</code>'s
  GDP per capita in year <code>t</code> and <code>g_{i,t&rarr;t+10}</code> its 10-year forward annualized
  growth rate (the outcome <code>loggdp_growth_10</code>).</p>
  <ul class="tight">
    <li><strong>Beta-convergence</strong>: <code>g_{i,t&rarr;t+10} = &alpha; + &beta;&middot;log(y_it) + &epsilon;</code>
      &mdash; a negative <code>&beta;</code> means poorer countries grow faster (convergence).</li>
    <li><strong>Trend in beta</strong> (year-interacted): <code>g = &beta;_t&middot;log(y_it) + &mu;_t + &epsilon;</code>,
      one <code>&beta;_t</code> per year, with year fixed effects <code>&mu;_t</code>.</li>
    <li><strong>Sigma-convergence</strong>: <code>&sigma;_t = SD_i[ log(y_it) ]</code> &mdash; the
      cross-country standard deviation of log income each year; a narrowing series is sigma-convergence.</li>
    <li><strong>Conditional convergence</strong>: <code>g = &alpha; + &beta;*&middot;log(y_it) + &lambda;&middot;X_it + &epsilon;</code>,
      where <code>X</code> is a growth correlate and <code>&beta;*</code> is the convergence slope holding it fixed.</li>
    <li><strong>Correlate-income slope</strong>: <code>X_it = &nu; + &delta;&middot;log(y_it) + u</code>
      &mdash; how much richer countries have more of the correlate.</li>
    <li><strong>OVB identity</strong>: <code>&beta; &minus; &beta;* = &delta; &times; &lambda;</code>
      &mdash; the gap between unconditional and conditional convergence equals the product of the
      correlate-income slope and the growth-regression slope (an exact algebraic identity).</li>
  </ul>
  <p>Speed and half-life of convergence follow from <code>&beta;</code>: the implied convergence
  speed is <code>&lambda;_conv = &minus;ln(1 + &beta;)/T</code> and the half-life is
  <code>ln(2)/&lambda;_conv</code> (here <code>T = 10</code> years). Income variables are in natural
  logs (<code>loggdp</code> from PWT real GDP per capita); correlates are normalized by their 1985
  cross-country standard deviation in the OVB exercises so coefficients are comparable across variables.</p>

caveats:
  - "<strong>Descriptive, not causal.</strong> All regressions document cross-country correlations and trends; the OVB decomposition partitions observed correlations and does not establish causal effects."
  - "<strong>Unbalanced panel.</strong> The sample grows from 109 GDP-reporting countries in 1960 to ~160 by 1990 (decolonization, then post-Soviet states); changing composition can mechanically affect estimates."
  - "<strong>Pre-2008 endpoint.</strong> The 10-year forward growth rate is forward-looking, so the last usable year is 2007/2008 &mdash; the Global Financial Crisis, the post-GFC recovery, and COVID-19 are not covered."
  - "<strong>Small samples for some correlates.</strong> Culture (Hofstede VSM) and tariff variables have fewer than ~60 observations, limiting precision; coverage varies widely across the 90+ correlates."
  - "<strong>Polity coded missingness.</strong> The Polity series (<code>democ</code>, <code>autoc</code>) use special codes (&minus;66 interruption, &minus;77 interregnum, &minus;88 transition); treat these as missing, not as scores. <code>polity2</code> is the interpolated, analysis-ready version on a &minus;10&hellip;+10 scale."
  - "<strong>Normalization sensitivity.</strong> In the OVB exercises every correlate is divided by its 1985 standard deviation; the &delta;/&lambda; magnitudes (not signs) depend on this choice."

