  WGI_pol_stability:
    label: "Political stability & absence of violence (WGI)"
    definition: "Worldwide Governance Indicators: political-stability / absence-of-violence estimate."
    units: "z-score (~ -2.5 to 2.5)"
    source: "World Bank WGI"
    kind: cont

  # ---------------- short-run correlates: Heritage economic freedom ----------------
  overallscore:
    label: "Index of Economic Freedom (overall)"
    definition: "Heritage Foundation overall economic-freedom score."
    units: "0-100"
