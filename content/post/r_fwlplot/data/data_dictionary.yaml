files:
  store_data.csv:
    label: "Simulated retail cross-section (sales, coupons, income, day)"
    grain: "store (cross-section)"
    years: "n/a (simulated)"
    coverage: "200 simulated stores"
    key: "row index (no id column)"
    purpose: "Illustrate confounding, FWL residualization, OVB, and Simpson's paradox where the true coupon effect (+0.2) is known."
    note: "Simulated with set.seed(42); income confounds coupons and sales. coupons = 60 − 0.5·income + N(0,5); sales = 10 + 0.2·coupons + 0.3·income + 0.5·dayofweek + N(0,3)."
  flights_sample.csv:
    label: "Cleaned 2013 NYC flights sample (delays, air time, route)"
    grain: "flight"
    years: "2013"
    coverage: "5,000 flights sampled from ~317,578 cleaned departures (EWR/JFK/LGA)"
    key: "row (one per flight; no stable id)"
    purpose: "Demonstrate fixed-effects residualization (origin + destination FE) on real data with fwl_plot()."
    note: "Sampled with set.seed(123) from flights kept with non-missing dep_delay/air_time/origin/dest, dep_delay in (−30,120), and non-singleton origin-dest routes. From the nycflights13 package (US BTS)."
  wagepan.csv:
    label: "Wooldridge wage panel: 545 men, 1980-1987 (balanced)"
    grain: "individual-year"
    years: "1980-1987"
    coverage: "545 individuals × 8 years = 4,360 observations"
    key: "nr x year"
    purpose: "Demonstrate individual and two-way fixed effects (returns to experience) with fwl_plot()."
    note: "Standard Wooldridge wagepan dataset (originally Vella & Verbeek 1998). Balanced panel of young working men; many regressors are 0/1 industry, occupation, region, and year-dummy indicators."

columns:
  # ---- store_data.csv ----
  sales:
    label: "Store sales (simulated)"
    definition: "Simulated sales for the store (the outcome variable)."
    construction: "sales = 10 + 0.2·coupons + 0.3·income + 0.5·dayofweek + N(0,3); rounded to 2 decimals."
    units: "index units"
    source: "Simulation (this study)"
    coverage: "200 stores"
    kind: cont
  coupons:
    label: "Coupons distributed (treatment)"
    definition: "Number/intensity of coupons distributed (the regressor of interest)."
    construction: "coupons = 60 − 0.5·income + N(0,5); rounded to 2 decimals. Negatively driven by income (the confounder)."
    units: "count/index"
    source: "Simulation (this study)"
    coverage: "200 stores"
    kind: cont
  income:
    label: "Neighborhood income (confounder)"
    definition: "Neighborhood income level — the confounder that drives both coupons and sales."
    construction: "income ~ N(50, 10); rounded to 2 decimals."
    units: "index units"
    source: "Simulation (this study)"
    coverage: "200 stores"
    kind: cont
  dayofweek:
    label: "Day of week (1-7)"
    definition: "Day-of-week indicator used as an additional control in §5.4."
    construction: "Uniform draw sample(1:7); 1=first day ... 7=last day."
    units: "1-7"
    source: "Simulation (this study)"
    coverage: "200 stores"
    kind: id

  # ---- flights_sample.csv ----
  dep_delay:
    label: "Departure delay (min)"
    definition: "Departure delay in minutes (the outcome in the flights regressions)."
    construction: "From nycflights13; cleaned sample keeps dep_delay in (−30, 120)."
    units: "minutes"
    source: "nycflights13 (US BTS)"
    coverage: "5,000 flights"
    kind: cont
  arr_delay:
    label: "Arrival delay (min)"
    definition: "Arrival delay in minutes."
    construction: "From nycflights13 (carried in the saved sample; not used in the post's regressions)."
    units: "minutes"
    source: "nycflights13 (US BTS)"
    coverage: "5,000 flights"
    kind: cont
  air_time:
    label: "Air time (min)"
    definition: "Time in the air, in minutes (the regressor of interest in the flights example)."
    construction: "From nycflights13; cleaned to non-missing values."
    units: "minutes"
    source: "nycflights13 (US BTS)"
    coverage: "5,000 flights"
    kind: cont
  origin:
    label: "Origin airport (FE)"
    definition: "Origin airport code — one of New York's three airports; used as a fixed effect."
    construction: "From nycflights13: EWR, JFK, or LGA."
    units: "code"
    source: "nycflights13 (US BTS)"
    coverage: "5,000 flights"
    kind: str
  dest:
    label: "Destination airport (FE)"
    definition: "Destination airport code; used as a fixed effect alongside origin."
    construction: "From nycflights13 (IATA destination code)."
    units: "code"
    source: "nycflights13 (US BTS)"
    coverage: "5,000 flights"
    kind: str
  carrier:
    label: "Carrier code"
    definition: "Two-letter airline carrier code."
    construction: "From nycflights13 (carried in the sample; not used in the post's regressions)."
    units: "code"
    source: "nycflights13 (US BTS)"
    coverage: "5,000 flights"
    kind: str
  month:
    label: "Month of flight (1-12)"
    definition: "Calendar month of the scheduled departure."
    construction: "From nycflights13."
    units: "1-12"
    source: "nycflights13 (US BTS)"
    coverage: "5,000 flights"
    kind: id
  day:
    label: "Day of month (1-31)"
    definition: "Calendar day of month of the scheduled departure."
    construction: "From nycflights13."
    units: "1-31"
    source: "nycflights13 (US BTS)"
    coverage: "5,000 flights"
    kind: id
  hour:
    label: "Scheduled departure hour (0-23)"
    definition: "Scheduled departure hour (local)."
    construction: "From nycflights13."
    units: "0-23"
    source: "nycflights13 (US BTS)"
    coverage: "5,000 flights"
    kind: id

  # ---- wagepan.csv ----
  nr:
    label: "Person identifier"
