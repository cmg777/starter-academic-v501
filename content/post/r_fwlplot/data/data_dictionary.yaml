# Data dictionary metadata for r_fwlplot — drives build_data_dictionary.py.
# Generated by the write-data-dictionary skill from the post's text + data; edit and rerun.

study:
  title: "Visualizing Regression with the FWL Theorem in R"
  subtitle: "Three example datasets for the fwlplot tutorial: one simulated retail panel and two real-world panels."
  overview: >
    Companion data for a hands-on R tutorial on the <a href="https://cran.r-project.org/package=fwlplot">fwlplot</a>
    package (Butts &amp; McDermott, 2024), which renders the <strong>Frisch&ndash;Waugh&ndash;Lovell (FWL)
    theorem</strong> as a picture: any multiple-regression coefficient equals the slope of a simple bivariate
    regression after partialling the other controls out of both axes. The post builds intuition across three
    datasets &mdash; an <strong>n=200 simulated retail panel</strong> where income confounds the coupon&ndash;sales
    relationship, the <strong>nycflights13</strong> flights data (a 5,000-row cleaned sample), and Wooldridge's
    <strong>wagepan</strong> panel (545 individuals over 1980&ndash;1987). The simulated case shows confounding
    reverse the naive coupon slope from &minus;0.093 to the controlled +0.212 (true effect +0.2); fixed effects on
    the flights and wage panels show what "controlling for" looks like geometrically.
  panel_structure: >
    <strong>Three files.</strong> <code>store_data</code> is a simulated cross-section (one row per store, n=200)
    with sales, coupons, income and day-of-week. <code>flights_sample</code> is a 5,000-row sample of cleaned 2013
    NYC departures (one row per flight) from the <code>nycflights13</code> package. <code>wagepan</code> is a
    balanced wage panel (one row per individual &times; year; 545 individuals &times; 8 years = 4,360 rows,
    1980&ndash;1987) from the Wooldridge package.
  kpis:
    - {n: 3, l: "datasets"}
    - {n: 57, l: "variables"}
    - {n: 9560, l: "rows"}
    - {n: "200 / 5,000 / 4,360", l: "rows per file"}

dta_format_version: 118

sources:
  - name: "Simulated (this study)"
    provides: "store_data — a synthetic retail cross-section with a known confounder (income) and a known true coupon effect (+0.2)"
    reference: "Mendez, C. (2026). See the post's R script analysis.R for the full data-generating process (set.seed(42))."
  - name: "nycflights13"
    provides: "flights_sample — a 5,000-row cleaned sample of on-time departures from New York's three airports in 2013"
    reference: "Wickham, H. (2021). nycflights13: Flights that Departed NYC in 2013. CRAN. https://cran.r-project.org/package=nycflights13 (source: US Bureau of Transportation Statistics)."
  - name: "Wooldridge wagepan"
    provides: "wagepan — panel of 545 men over 8 years (1980–1987) used in Wooldridge's panel-data examples"
    reference: "Wooldridge, J. M. Introductory Econometrics. wagepan dataset via the wooldridge R package. https://cran.r-project.org/package=wooldridge (originally from Vella & Verbeek, 1998, J. Applied Econometrics)."
  - name: "Method references"
    provides: "FWL theorem and the fwlplot / fixest implementation"
    reference: "Frisch & Waugh (1933); Lovell (1963); Butts & McDermott (2024, fwlplot); Berge (2018, fixest)."

formulas_html: |
  <p>The <strong>Frisch&ndash;Waugh&ndash;Lovell (FWL) theorem</strong>: in the regression
  <code>Y = X&#8321;&beta;&#8321; + X&#8322;&beta;&#8322; + &epsilon;</code>, the coefficient
  <code>&beta;&#8321;</code> on the variable of interest equals the slope from a simple bivariate regression
  after partialling <code>X&#8322;</code> out of both axes:</p>
  <ul class="tight">
    <li><strong>Step 1 &mdash; residualize the outcome</strong>: regress <code>Y</code> on the controls
      <code>X&#8322;</code>, keep the residuals <code>&Ytilde; = M&#8322; Y</code>.</li>
    <li><strong>Step 2 &mdash; residualize the regressor</strong>: regress <code>X&#8321;</code> on the controls
      <code>X&#8322;</code>, keep the residuals <code>X&#8321;tilde = M&#8322; X&#8321;</code>.</li>
    <li><strong>Step 3 &mdash; residual-on-residual</strong>: regress <code>&Ytilde;</code> on
      <code>X&#8321;tilde</code>; the slope equals <code>&beta;&#8321;</code> exactly
      (<code>0.212288</code> in the store data, matching <code>feols()</code> to six decimals).</li>
  </ul>
  <p>Here <code>M&#8322; = I &minus; X&#8322;(X&#8322;'X&#8322;)&#8315;&sup1;X&#8322;'</code> is the
  residual-maker matrix. <strong>Fixed effects</strong> are FWL applied to group dummies: including
  <code>| origin + dest</code> (flights) or <code>| nr</code> (wages) demeans each variable within group before
  fitting. <code>fwl_plot()</code> automates all of this and plots the residualized scatter (an added-variable
  plot) with the regression line overlaid.</p>
  <p><strong>Omitted variable bias</strong>: <code>bias = &gamma; &times; &delta;</code>, where <code>&gamma;</code>
  is the effect of the omitted control on the outcome and <code>&delta;</code> is the slope of the omitted control
  on the regressor. In the store data, <code>0.300 &times; (&minus;0.494) = &minus;0.148</code>.</p>

caveats:
  - "<strong>store_data is simulated.</strong> Values come from a known data-generating process (set.seed(42)); the true coupon effect is +0.2 by construction. It illustrates confounding and FWL, not a real retail market."
  - "<strong>flights_sample is a 5,000-row sample</strong> drawn (set.seed(123)) from ~317,578 cleaned flights — kept only delays in (−30, 120) minutes with no missing air time/origin/destination, and routes with more than one observation. Slopes in the post's tables are estimated on the full cleaned data, not this sample; use the sample for plotting/teaching, not for headline estimates."
  - "<strong>wagepan covers employed men only, 1980–1987.</strong> Time-invariant traits (educ, black, hisp) drop under individual fixed effects; the linear exper term drops under two-way (individual + year) fixed effects because experience increments by one year for everyone (collinear with year dummies)."
  - "<strong>FWL is exact only for linear regression.</strong> For logit/Poisson and other nonlinear models the residualized scatter is at best an approximation of the conditional relationship."

