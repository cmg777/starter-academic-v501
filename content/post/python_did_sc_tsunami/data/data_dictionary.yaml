files:
  aceh_tsunami_district_panel.csv:
    label: "Annual district panel: GDP growth + covariates + treatment"
    grain: "district-year"
    years: "1999-2012"
    coverage: "125 Sumatran districts (10 flooded Aceh treated)"
    key: "district_id x year"
    purpose: "Dynamic DiD on district GDP growth, the synthetic control, and Conley spatial inference."
    note: "Annual district panel; 125 synthetic Sumatran districts, 1999-2012 (1,750 rows). District GDP growth, covariates, treatment indicators, and centroids for Conley spatial standard errors. Growth is missing in 1999 and for Subulussalam 2003-2006."
  aceh_tsunami_subdistrict_panel.csv:
    label: "Annual Aceh sub-district panel: night-lights + flood dose"
    grain: "kecamatan-year"
    years: "1999-2012"
    coverage: "276 Aceh sub-districts (kecamatans); 68 flooded"
    key: "kecamatan_id x year"
    purpose: "Night-lights dose-response — continuous flood intensity on sub-district luminosity growth."
    note: "Annual sub-district (kecamatan) panel; 276 Aceh kecamatans, 1999-2012 (3,864 rows). Satellite night-lights (DMSP-OLS proxy) and continuous/quintile flood intensity. Night-lights growth is missing in 1999."

columns:
  district_id:
    label: "District ID"
    definition: "Unique identifier for the district (Kabupaten/Kota); the panel key."
    construction: "Assigned as <PROVINCE-ABBREV>_D<nn>; Aceh districts carry real names in district_name."
    units: "string"
    source: "Assigned (this study)"
    coverage: "125 districts"
    kind: id
  district_name:
    label: "District name"
    definition: "Name of the district. Real names for Aceh's 23 districts; systematic placeholders elsewhere."
    construction: "Real Aceh district names hand-coded from the paper's maps; other provinces use 'Province District k'."
    units: "string"
    source: "Assigned (this study)"
    coverage: "125 districts / 276 kecamatans"
    kind: str
  province:
    label: "Province"
    definition: "Indonesian province the unit belongs to (district panel: 10 Sumatra provinces; sub-district panel: always Aceh)."
    construction: "Hand-coded; 10 Sumatra provinces in the district panel, constant 'Aceh' in the sub-district panel."
    units: "string"
    source: "Assigned (this study)"
    kind: str
  region_group:
    label: "Region group"
    definition: "Coarse grouping used to build estimation samples."
    construction: "Derived from province: Aceh, North Sumatra, or Rest of Sumatra."
    units: "{Aceh, North Sumatra, Rest of Sumatra}"
    source: "Derived"
    kind: str
  district_type:
    label: "District type"
    definition: "Kota (urban city district) vs Kabupaten (rural regency)."
    construction: "Hand-coded to reproduce the paper's city/rural sample sizes (Aceh: 5 Kota, 18 Kabupaten)."
    units: "{Kota, Kabupaten}"
    source: "Assigned (this study)"
    kind: str
  coastal:
    label: "Coastal dummy (1=coastal)"
    definition: "1 if the district lies on the coast, 0 if inland."
    construction: "Hand-coded; all 10 treated districts are coastal. Used to drop inland controls."
    units: "0/1"
    source: "Assigned (this study)"
    kind: dummy
  flooded:
    label: "Flooded / treated dummy (1=flooded)"
    definition: "Treatment indicator: 1 if the unit was flooded by the 2004 tsunami (the DiD 'D' variable)."
    construction: "Hand-coded from the inundation maps; district panel: 10 Aceh + 2 North Sumatra island districts; sub-district panel: 68 of 276 kecamatans."
    units: "0/1"
    source: "Assigned (this study)"
    kind: dummy
  neighbour_of_flooded:
    label: "Neighbour-of-flooded dummy (1=neighbour)"
    definition: "1 if a non-flooded district borders a flooded one (placebo-treated in the robustness test)."
    construction: "Hand-coded adjacency for the placebo test; flooded districts are dropped in that test."
    units: "0/1"
    source: "Assigned (this study)"
    kind: dummy
  flood_treatment_group:
    label: "Treatment-group label"
    definition: "Readable label combining treatment status and region (convenience for selecting control pools)."
    construction: "Derived from flooded + region_group."
    units: "category"
    source: "Derived"
    kind: str
  latitude:
    label: "Latitude (decimal degrees, +N)"
    definition: "Unit-centroid latitude; time-invariant. Enables Conley spatial standard errors."
    construction: "Real approximate centroids for Aceh's 23 districts; synthetic non-Aceh districts drawn within the province bounding box. Sub-districts: parent centroid + ~20 km jitter."
    units: "degrees"
    source: "Assigned (this study)"
    kind: cont
  longitude:
    label: "Longitude (decimal degrees, +E)"
    definition: "Unit-centroid longitude; time-invariant. Used with latitude for haversine distances."
    construction: "See latitude. Used for the Conley spatial kernel (≤100 km)."
    units: "degrees"
    source: "Assigned (this study)"
    kind: cont
  year:
    label: "Calendar year"
    definition: "Calendar year of the observation. Panel spans 1999-2012 (levels); growth rates defined 2000-2012."
    construction: "Annual index."
    units: "year"
    source: "Simulation"
    kind: year
  post:
    label: "Post-tsunami dummy (1=2005+)"
    definition: "1 for years 2005 and later (simple pre/post split)."
    construction: "1 if year >= 2005."
    units: "0/1"
    source: "Derived"
    kind: dummy
  period:
    label: "DiD event-time period"
    definition: "Event-time period for the staggered DiD dummies; baseline 2000-02 is the omitted reference."
    construction: "Mapped from year: '(base year)' 1999, baseline 2000-02, pre 2003-04, tsunami 2005, recovery 2006-08, postrec 2009-12."
    units: "category"
    source: "Derived"
    kind: str
  gdp_const_usd_m:
    label: "Real GDP (million constant 2004 USD)"
    definition: "District real GDP excluding oil & gas, constant 2004 USD, millions."
    construction: "Cumulated from the 1999 base level using the simulated gdp_growth series."
    units: "million constant 2004 USD"
    source: "Simulation"
    coverage: "district panel"
    kind: cont
  gdp_growth:
    label: "GDP growth rate (log difference)"
    definition: "Annual growth rate of real district GDP (main dependent variable)."
    construction: "district FE + year FE + treated increment (city/rural) + Aceh-control spillover + spatial & serial shocks + N(0,0.04) noise."
    units: "proportion/yr"
    source: "Simulation"
    coverage: "1621 rows (NaN in 1999; Subulussalam 2003-06)"
    kind: cont
  population:
    label: "Population (persons)"
    definition: "District population; drives the per-capita denominator."
    construction: "Cumulated from the 1999 base using pop_growth (flooded districts lose ~9.6% in 2005)."
    units: "persons"
    source: "Simulation"
    coverage: "district panel"
    kind: cont
  pop_growth:
    label: "Population growth rate"
    definition: "Annual population growth rate (carries the 2005 death/displacement shock)."
    construction: "district FE + year FE + flooded x population increment (death shock 2005) + noise."
    units: "proportion/yr"
    source: "Simulation"
    coverage: "NaN in 1999; Subulussalam 2003-06"
    kind: cont
  gdp_pc_usd:
    label: "GDP per capita (constant 2004 USD)"
    definition: "Real GDP per capita."
    construction: "gdp_const_usd_m * 1e6 / population."
    units: "constant 2004 USD"
    source: "Derived"
    coverage: "district panel"
    kind: cont
  gdp_pc_growth:
    label: "GDP per-capita growth rate"
    definition: "Annual growth rate of real GDP per capita; no significant 2005 loss, significant 2006-08 gain."
    construction: "gdp_growth - pop_growth (reproduces the paper's per-capita table by construction)."
    units: "proportion/yr"
    source: "Derived"
    coverage: "NaN where growth missing"
    kind: cont
  va_agri_share:
    label: "Agriculture VA share (% of GDP)"
    definition: "Agriculture value added as % of GDP; Aceh falls 44->32% after 2004."
    construction: "Province trajectory + district/type offset."
    units: "% of GDP"
    source: "Simulation"
    kind: cont
  va_manu_share:
    label: "Manufacturing VA share (% of GDP)"
    definition: "Manufacturing value added as % of GDP; Aceh falls ~6->3.5% after 2004."
    construction: "Province trajectory + noise."
    units: "% of GDP"
    source: "Simulation"
    kind: cont
  va_serv_share:
    label: "Services VA share (% of GDP)"
    definition: "Services / tertiary value added as % of GDP; Aceh rises ~40->55% after 2004."
    construction: "Province trajectory + offset."
    units: "% of GDP"
    source: "Simulation"
    kind: cont
  capital_formation_pc_usd:
    label: "Capital formation per capita (current USD)"
    definition: "Gross capital formation per capita; reproduces the post-tsunami investment bonanza."
    construction: "Smooth path + reconstruction spike (peak 2006) for Aceh; smooth for donors."
    units: "current USD per capita"
    source: "Simulation"
    kind: cont
  poverty_rate:
    label: "Poverty rate (%)"
    definition: "Share of population below the poverty line; Aceh improves after 2005 (synthetic-control predictor)."
    construction: "District base + downward trend."
    units: "%"
    source: "Simulation"
    kind: cont
  doctors_per_1000:
    label: "Doctors per 1,000"
    definition: "Physicians per 1,000 people; Aceh rises faster after 2005 (synthetic-control predictor)."
    construction: "District base + upward trend."
    units: "per 1,000"
    source: "Simulation"
    kind: cont
  water_access_pct:
    label: "Water access (%)"
    definition: "% of households with clean-water access; Aceh boosted after 2005 (synthetic-control predictor)."
    construction: "District base + upward trend."
    units: "%"
    source: "Simulation"
    kind: cont
  sanitation_access_pct:
    label: "Sanitation access (%)"
    definition: "% of households with sanitation access; Aceh boosted after 2005 (synthetic-control predictor)."
    construction: "District base + upward trend."
    units: "%"
    source: "Simulation"
    kind: cont
  electricity_access_pct:
    label: "Electricity access (%)"
    definition: "% of households with electricity; Aceh 84% (2004) -> 97% (2012)."
    construction: "Aceh boosted path; others smooth upward trend."
    units: "%"
    source: "Simulation"
    kind: cont
  hdi:
    label: "Human Development Index (0-100)"
    definition: "Human Development Index; Aceh ~69 -> ~73 over the period."
    construction: "Aceh boosted path; others smooth upward trend."
    units: "index 0-100"
    source: "Simulation"
    kind: cont
  kecamatan_id:
    label: "Sub-district (kecamatan) ID"
    definition: "Unique identifier for the sub-district; the sub-district panel key."
    construction: "Assigned KEC_001 .. KEC_276."
    units: "string"
    source: "Assigned (this study)"
    coverage: "276 kecamatans"
    kind: id
  kecamatan_name:
    label: "Sub-district name"
    definition: "Readable name linking the kecamatan to its parent district."
    construction: "Built as <ParentDistrict>_Kec_<nn>."
    units: "string"
    source: "Assigned (this study)"
    kind: str
  share_pop_flooded:
    label: "Share of population flooded"
    definition: "Share of the kecamatan's population in flooded area — the headline continuous dose."
    construction: "latent dose * 0.62 + noise (flooded only); GRUMP-population analogue."
    units: "0-1"
    source: "Simulation"
    coverage: "flooded kecamatans only (0 elsewhere)"
    kind: cont
  share_area_flooded:
    label: "Share of area flooded"
    definition: "Share of the kecamatan's physical area flooded; tiny mean (~1.2%) gives a large coefficient."
    construction: "latent dose * 0.00566 + noise (flooded only)."
    units: "0-1"
    source: "Simulation"
    coverage: "flooded kecamatans only (0 elsewhere)"
    kind: cont
  flood_intensity_quintile:
    label: "Flood-intensity quintile (1-5; 0=non-flooded)"
    definition: "Quintile of the flooding-intensity distribution among flooded units; only the top quintile shows a significant effect."
    construction: "qcut of the latent dose into 5 groups among flooded kecamatans; 0 for non-flooded."
    units: "0-5"
    source: "Derived"
    kind: id
    value_labels: {0: "Non-flooded", 1: "Q1 (least)", 2: "Q2", 3: "Q3", 4: "Q4", 5: "Q5 (most flooded)"}
  area_km2:
    label: "Area (km^2)"
    definition: "Approximate land area of the kecamatan; sets the number of night-light pixels."
    construction: "Drawn lognormal (30-1500 km^2)."
    units: "km^2"
    source: "Simulation"
    kind: cont
  n_pixels:
    label: "Pixel count"
    definition: "Number of ~0.86 km^2 night-light grid cells in the kecamatan."
    construction: "round(area_km2 / 0.86); 30x30 arc-second pixels ~0.86 km^2 at the equator."
    units: "count"
    source: "Derived"
    kind: cont
  avg_luminosity:
    label: "Average luminosity (DN 0-63)"
    definition: "Mean Digital Number (brightness) across the kecamatan's pixels; flooded 2004 mean ~5.79, non-flooded ~2.36."
    construction: "nl_sum / n_pixels, top-coded at 63 (DMSP saturation)."
    units: "DN (0-63)"
    source: "Simulation"
    kind: cont
  nl_sum:
    label: "Summed luminosity (DN-sum)"
    definition: "Sum of Digital Numbers over all pixels in the kecamatan (the unit-level activity measure)."
    construction: "exp(nl_log) - 0.001."
    units: "DN-sum"
    source: "Derived"
    kind: cont
  nl_log:
    label: "Log luminosity (log DN-sum)"
    definition: "log( sum of (DN + 0.001) ) — the transformed regression variable matching the paper's log night-lights."
    construction: "Cumulated from the 2004 anchor using the nl_growth series."
    units: "log DN-sum"
    source: "Simulation"
    kind: cont
  nl_growth:
    label: "Night-lights growth rate (log difference)"
    definition: "Annual growth rate of log night-lights (main sub-district dependent variable)."
    construction: "kecamatan FE + year FE + theta(period)*dose^2 (flooded) + N(0,0.005) noise."
    units: "proportion/yr"
    source: "Simulation"
    coverage: "NaN in 1999"
    kind: cont
