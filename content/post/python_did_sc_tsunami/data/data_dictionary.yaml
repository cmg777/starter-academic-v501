# Data dictionary metadata for python_did_sc_tsunami — drives build_data_dictionary.py.
# Generated by the write-data-dictionary skill from the post's text + data; edit and rerun.

study:
  title: "Evaluating the Economic Impact of the Aceh Tsunami"
  subtitle: "Companion data for a causal-inference replication of Heger & Neumayer (2019) on fully synthetic, calibrated panels."
  overview: >
    Companion data for a hands-on Python tutorial that evaluates the long-run economic impact of
    the 2004 Indian Ocean tsunami on the Indonesian province of <strong>Aceh</strong>, replicating
    Heger &amp; Neumayer (2019) on <strong>fully synthetic, calibrated</strong> panels. The post
    treats coastal inundation as a quasi-natural experiment and estimates a dynamic four-period
    difference-in-differences with <code>pyfixest</code>, an event study with <code>diff-diff</code>,
    a night-lights dose-response, a synthetic control with <code>mlsynth</code>, and Conley
    spatial-HAC standard errors validated by Moran&rsquo;s I. Flooded districts lost about 7.9% of
    output in 2005 but grew 6.3 percentage points per year faster during 2006&ndash;08, and the
    synthetic control places flooded Aceh +18.3% above its no-tsunami counterfactual by 2012. The
    data-generating process is calibrated so that re-running the paper&rsquo;s analyses reproduces
    its findings (signs, significance, approximate magnitudes); it is for teaching the methods, not
    for drawing new conclusions about Aceh.
  panel_structure: >
    <strong>Two files.</strong> <code>aceh_tsunami_district_panel</code> is an annual district panel
    (one row per district &times; year) of 125 Sumatran districts over 1999&ndash;2012 carrying
    district GDP growth, covariates, treatment indicators, and centroids for spatial inference.
    <code>aceh_tsunami_subdistrict_panel</code> is a finer annual panel of 276 Aceh sub-districts
    (<em>kecamatans</em>) over the same years, carrying satellite night-lights and continuous flood
    intensity for the dose-response analysis.
  kpis:
    - {n: 2, l: "datasets"}
    - {n: 49, l: "variables"}
    - {n: "125 / 276", l: "districts / sub-districts"}
    - {n: "1999–2012", l: "years"}

dta_format_version: 118

sources:
  - name: "Heger & Neumayer (2019)"
    provides: "Replicated study; calibration targets (coefficient signs, significance, approximate magnitudes) and the empirical design"
    reference: "Heger, M. P., & Neumayer, E. (2019). The impact of the Indian Ocean tsunami on Aceh's long-term economic growth. Journal of Development Economics, 141, 102365. https://doi.org/10.1016/j.jdeveco.2019.06.008"
  - name: "Synthetic (this study)"
    provides: "All values — simulated via a calibrated data-generating process (open & reproducible)"
    reference: "Mendez, C. (2026). See the post's Python script script.py and reference/generate_synthetic_data.py for the full DGP."
  - name: "Real-world analogues (proxied, not used directly)"
    provides: "The constructs the synthetic series imitate: district GDP (INDO-DAPOER / SUSENAS), night-lights (DMSP-OLS), inundation maps (DLR/ZKI, Dartmouth Flood Observatory)"
    reference: "World Bank INDO-DAPOER (https://datacatalog.worldbank.org/); NOAA DMSP-OLS Nighttime Lights (https://www.ncei.noaa.gov/); DLR/ZKI & Dartmouth Flood Observatory inundation maps."
  - name: "Method references"
    provides: "Estimators and concepts"
    reference: "Abadie, Diamond & Hainmueller (2010, synthetic control); Conley (1999, spatial-HAC standard errors)."

formulas_html: |
  <p>The disaster is treated as a <strong>quasi-natural experiment</strong>: coastal geography (not
  economic prospects) decided which districts the wave flooded. Treatment is split into event-time
  windows measured against the omitted <strong>2000&ndash;02 baseline</strong>: <code>pre</code>
  (2003&ndash;04), <code>tsunami</code> (2005), <code>recovery</code> (2006&ndash;08), and
  <code>postrec</code> (2009&ndash;12).</p>
  <ul class="tight">
    <li><strong>Dynamic DiD</strong> (the headline, on district GDP growth):
      <code>&Delta;Y_it = &beta;1&middot;D_i&middot;1[pre] + &beta;2&middot;D_i&middot;1[2005] + &beta;3&middot;D_i&middot;1[recovery] + &beta;4&middot;D_i&middot;1[post] + &alpha;_i + &gamma;_t + &epsilon;_it</code>,
      with district FE <code>&alpha;_i</code> and year FE <code>&gamma;_t</code>. The estimand is the
      <strong>ATT</strong>; identification rests on <strong>parallel trends</strong>.</li>
    <li><strong>Night-lights measure</strong> (<code>nl_log</code>):
      <code>NL_ct = log( &sum;_n ( DN_nct + 0.001 ) )</code> &mdash; log of total Digital Numbers
      (DMSP-OLS brightness, 0&ndash;63) summed over a kecamatan&rsquo;s pixels; the tiny 0.001 keeps
      zeros loggable. <code>nl_growth</code> is its annual log-difference.</li>
    <li><strong>Dose-response</strong>: the same DiD with the on/off dummy replaced by continuous
      <code>share_pop_flooded</code> / <code>share_area_flooded</code>, or by flood-intensity
      quintiles.</li>
    <li><strong>Synthetic control</strong>: choose donor weights <code>w</code> &ge; 0 summing to 1 to
      minimise the pre-2005 mismatch <code>min_w (X1 &minus; X0&middot;w)&prime; V (X1 &minus; X0&middot;w)</code>;
      the treated-minus-synthetic gap after 2005 is the estimated effect.</li>
    <li><strong>Conley spatial-HAC standard errors</strong>: a sandwich estimator adding serial
      (a district with itself over time) and spatial (different districts within 100&nbsp;km in the
      same year, weight fading linearly to zero) error correlation; the point estimates never move.</li>
  </ul>
  <p><strong>Synthetic data-generating process.</strong> GDP and night-lights levels are cumulated
  from a base year using simulated growth series built as district/kecamatan FE + year FE + a
  treated&times;period increment + spatial &amp; serial shocks + Gaussian noise, tuned so a
  fixed-effects DiD recovers the paper&rsquo;s coefficients column by column (within about 0.005 on
  the headline cells). Centroids and continuous flood doses are injected so the spatial standard
  errors and the dose-response behave like the paper&rsquo;s without moving the point estimates.</p>

caveats:
  - "<strong>Synthetic data.</strong> There is no real data behind this tutorial; the panels are simulated and calibrated to reproduce the paper's findings. They teach the methods — they are not new empirical evidence about Aceh."
  - "<strong>Tiny treatment group.</strong> Only 10 flooded Aceh districts are treated, so point estimates are fragile and standard errors wide; the Aceh-only and city (Kota) columns are especially imprecise (2 flooded Kota districts)."
  - "<strong>Observational identification.</strong> The estimand is the ATT under parallel trends — an assumption, supported by the flat pre-trend and the null neighbour placebo but never proven."
  - "<strong>Clustered treatment needs honest inference.</strong> All treated units sit in one corner of Sumatra; residual growth is spatially autocorrelated (Moran's I = +0.065, p = 0.003). Conley spatial-HAC errors roughly double the recovery effect's SE (0.0146 → 0.0244), downgrading it from a spurious 1% to an honest 5%."
  - "<strong>Missing growth rows are intentional.</strong> Growth (gdp_growth, gdp_pc_growth, pop_growth, nl_growth) is undefined in 1999 (no prior year) and gdp/pop growth is also missing for Subulussalam over 2003–06 (an administrative boundary change); every estimator simply drops those rows to match the paper's sample sizes."
  - "<strong>Magnitudes can differ slightly.</strong> Signs and significance track the paper closely, but synthetic magnitudes can diverge a little; the night-lights quintile and share-of-area scales follow Table 3's (smaller) units rather than the paper's mutually inconsistent Table 4. See Section 11 of the post for the reproduction audit."

