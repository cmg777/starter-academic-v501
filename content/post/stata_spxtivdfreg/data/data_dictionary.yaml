# Generated by the write-data-dictionary skill from the post's text + data; edit and rerun.

study:
  title: "Spatial Dynamic Panels with Common Factors: Credit Risk in US Banking"
  subtitle: "The Kripfganz–Sarafidis (2025) replication panel — 350 US commercial banks, quarterly 2006–2014."
  overview: >
    Companion data for a Stata tutorial that replicates the empirical application of
    Kripfganz &amp; Sarafidis (2025, <em>Journal of Statistical Software</em> 113(6)) with the
    <code>spxtivdfreg</code> package &mdash; a <strong>defactored instrumental-variables</strong>
    estimator for spatial dynamic panels with unobserved common factors. The panel models the
    non-performing-loan (NPL) ratio of <strong>350 US commercial banks</strong> observed quarterly
    over <strong>2006:Q1&ndash;2014:Q4</strong> (36 quarters; 12,600 observations, 12,250 in the
    effective estimation sample), spanning the entire Global Financial Crisis. Credit risk is
    modelled through four simultaneous endogeneity channels &mdash; a spatial lag of NPL
    (<code>&psi;</code>), temporal persistence (<code>&rho;</code>), an endogenous regressor
    (<code>INEFF</code>, instrumented by <code>INTEREST</code>), and latent common factors &mdash;
    using a 350&times;350 economic-distance spatial weight matrix built from Spearman rank
    correlations of bank debt ratios. This page documents the bank-quarter panel
    (<code>v113i06.dta</code>); the weight matrix <code>W.csv</code> is a separate file (see note
    below).
  panel_structure: >
    <strong>One file documented here.</strong> <code>v113i06</code> is a <strong>strongly balanced
    bank-quarter panel</strong> &mdash; one row per bank &times; quarter, 350 banks &times; 36
    quarters = 12,600 rows. <code>ID</code> is the bank identifier and <code>TIME</code> the
    quarterly index (1&ndash;36, mapping 2006:Q1&ndash;2014:Q4); <code>xtset ID TIME</code> declares
    the panel. The companion <strong>spatial weight matrix</strong> <code>W.csv</code> &mdash; a
    350&times;350, row-standardized, economic-distance matrix (6,300 nonzero entries, ~18 neighbours
    per bank) &mdash; is a bare numeric matrix with no variable columns and is therefore not a
    documented variable table here; <code>spxtivdfreg</code> loads it via
    <code>spmatrix("W.csv", import)</code>.
  kpis:
    - {n: 350, l: "banks"}
    - {n: 11, l: "variables"}
    - {n: "2006–2014", l: "quarters"}
    - {n: "12,600", l: "obs"}

dta_format_version: 118

