    label: "Bank-quarter panel: NPL + 7 financial ratios + instrument"
    grain: "bank-quarter"
    years: "2006:Q1-2014:Q4 (TIME 1-36)"
    coverage: "350 US commercial banks (strongly balanced)"
    key: "ID x TIME"
    purpose: "Estimate the spatial dynamic panel model of credit risk with common factors (spxtivdfreg)."
    note: "Strongly balanced quarterly panel of 350 US commercial banks, 2006:Q1-2014:Q4 (TIME 1-36). Replication data from Kripfganz & Sarafidis (2025), JSS 113(6). NPL is the dependent variable; INEFF is endogenous and instrumented by INTEREST; the 350x350 spatial weight matrix is the separate file W.csv."

columns:
  ID:
    label: "Bank identifier"
    definition: "Anonymized US commercial-bank identifier (1-350); the panel cross-section unit."
    construction: "Integer bank code from the replication package; declared with xtset ID TIME."
    units: "1-350"
    source: "Kripfganz & Sarafidis (2025)"
    coverage: "350 banks"
    kind: id
  TIME:
    label: "Quarterly time index"
    definition: "Quarter counter 1-36, mapping 2006:Q1 (=1) to 2014:Q4 (=36)."
    construction: "Sequential quarter index from the replication package; the panel time variable."
    units: "1-36 (quarters)"
    source: "Kripfganz & Sarafidis (2025)"
    coverage: "36 quarters"
    kind: id
  NPL:
    label: "Non-performing loan ratio (%)"
    definition: "Non-performing loans as a share of total loans, in percentage points; the dependent variable (credit risk)."
    construction: "Bank-quarter NPL/total-loans from the replication package; modelled with spatial and temporal lags."
    units: "% (percentage points)"
    source: "Kripfganz & Sarafidis (2025)"
    coverage: "bank-quarter"
    kind: cont
  INEFF:
    label: "Operational inefficiency (endogenous)"
    definition: "Bank operational inefficiency; treated as the endogenous regressor in the NPL equation."
    construction: "Bank-quarter inefficiency measure; instrumented by INTEREST and lagged exogenous regressors."
    units: "ratio"
    source: "Kripfganz & Sarafidis (2025)"
    coverage: "bank-quarter"
    kind: cont
  CAR:
    label: "Capital adequacy ratio (%)"
    definition: "Regulatory capital adequacy ratio of the bank."
    construction: "Bank-quarter CAR from the replication package; an exogenous covariate."
    units: "%"
    source: "Kripfganz & Sarafidis (2025)"
    coverage: "bank-quarter"
    kind: cont
  SIZE:
    label: "Bank size, ln(total assets)"
    definition: "Natural log of total assets; a proxy for bank scale and systemic exposure."
    construction: "log of bank total assets, bank-quarter; an exogenous covariate."
    units: "log (ln assets)"
    source: "Kripfganz & Sarafidis (2025)"
    coverage: "bank-quarter"
    kind: cont
  BUFFER:
    label: "Capital buffer (leverage ratio minus 8%)"
    definition: "Capital buffer above the regulatory minimum (leverage ratio minus the 8% threshold)."
    construction: "Leverage ratio minus 8, bank-quarter; an exogenous covariate (protective: enters NPL negatively)."
    units: "percentage points"
    source: "Kripfganz & Sarafidis (2025)"
    coverage: "bank-quarter"
    kind: cont
  PROFIT:
    label: "Profitability (return on equity, %)"
    definition: "Bank profitability, annualized return on equity."
    construction: "Bank-quarter ROE from the replication package; an exogenous covariate."
    units: "% (annualized ROE)"
    source: "Kripfganz & Sarafidis (2025)"
    coverage: "bank-quarter"
    kind: cont
  QUALITY:
    label: "Loan quality (loan-loss provisions / assets, %)"
    definition: "Loan loss provisions as a share of assets; a flow indicator of asset quality."
    construction: "Bank-quarter provisions/assets from the replication package; an exogenous covariate."
    units: "%"
    source: "Kripfganz & Sarafidis (2025)"
    coverage: "bank-quarter"
    kind: cont
  LIQUIDITY:
    label: "Loan-to-deposit ratio"
    definition: "Loans relative to deposits; the covariate with the largest effect on NPL in the full model."
    construction: "Bank-quarter loan-to-deposit ratio from the replication package; an exogenous covariate."
    units: "ratio"
    source: "Kripfganz & Sarafidis (2025)"
    coverage: "bank-quarter"
    kind: cont
  INTEREST:
    label: "Interest expenses / deposits (instrument)"
    definition: "Interest expenses relative to deposits; the excluded instrument for the endogenous INEFF."
    construction: "Bank-quarter interest-expense/deposits from the replication package; enters only the iv() instrument set."
    units: "ratio"
    source: "Kripfganz & Sarafidis (2025)"
    coverage: "bank-quarter"
    kind: cont
