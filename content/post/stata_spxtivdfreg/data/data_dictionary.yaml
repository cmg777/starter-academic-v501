    provides: "Comparator packages and spatial-panel framework"
    reference: "Belotti, Hughes & Mortari (2017), Stata Journal 17(1); Elhorst (2014), Spatial Econometrics, Springer."

formulas_html: |
  <p>The model is a <strong>spatial dynamic panel with interactive (factor) fixed effects</strong>,
  estimated by defactored IV. For bank <code>i</code> at quarter <code>t</code>:</p>
  <ul class="tight">
    <li><strong>Structural equation</strong>:
      <code>NPL_it = &psi; &Sigma;_j w_ij NPL_jt + &rho; NPL_i,t-1 + x_it &beta; + &alpha;_i + &lambda;_i' f_t + &epsilon;_it</code>
      &mdash; spatial lag (<code>&psi;</code>), temporal lag (<code>&rho;</code>), covariates
      (<code>&beta;</code>), bank fixed effect (<code>&alpha;_i</code>), and the interactive fixed
      effect (<code>&lambda;_i' f_t</code>, the common factors).</li>
    <li><strong>Spatial lag</strong>: <code>W&middot;NPL</code>, the row-standardized weighted
      average of neighbours' NPL; <code>w_ij &gt; 0</code> when banks <code>i, j</code> are economic
      neighbours (debt-ratio Spearman correlation above the 95th percentile).</li>
    <li><strong>Defactored IV</strong>: step 1 extracts and removes the common factors via principal
      components (the <code>std</code> option standardizes first); step 2 runs IV/GMM on the
      defactored data, instrumenting <code>INEFF</code> with <code>INTEREST</code> and lagged
      exogenous regressors.</li>
    <li><strong>Variance share of factors</strong>:
      <code>&rho;_factor = &sigma;_f&sup2; / (&sigma;_f&sup2; + &sigma;_e&sup2;)</code> &mdash;
      fraction of residual variance due to common factors (0.335 in the full model).</li>
    <li><strong>Long-run total effect</strong>:
      <code>&beta; / [(1 &minus; &rho;)(1 &minus; &psi;)]</code> &mdash; the short-run coefficient
      amplified by the temporal multiplier <code>1/(1&minus;&rho;)</code> and the spatial multiplier
      <code>1/(1&minus;&psi;)</code>.</li>
  </ul>
  <p>The covariates <code>x_it</code> are the bank financial ratios <code>INEFF</code>,
  <code>CAR</code>, <code>SIZE</code>, <code>BUFFER</code>, <code>PROFIT</code>, <code>QUALITY</code>,
  and <code>LIQUIDITY</code>; <code>INTEREST</code> serves only as an excluded instrument for the
  endogenous <code>INEFF</code>.</p>

caveats:
  - "<strong>Real replication data.</strong> This is the published JSS replication panel from Kripfganz &amp; Sarafidis (2025); it is empirical bank data, not simulated. Use it under the terms of the original replication package and cite the source article."
  - "<strong>The weight matrix is separate.</strong> The spatial structure lives in <code>W.csv</code> (a 350&times;350 row-standardized economic-distance matrix), not in this panel; it has no variable columns and is documented in the post (§3.3), not as a variable table here."
  - "<strong>INEFF is endogenous.</strong> Operational inefficiency is treated as endogenous in the NPL equation (reverse causality plus unobserved management quality) and is instrumented by <code>INTEREST</code> and lagged exogenous regressors &mdash; do not interpret its OLS correlation causally."
  - "<strong>Effective sample is smaller than 12,600.</strong> Absorbing bank fixed effects and forming the temporal lag drops the first period, leaving 12,250 observations (350 banks &times; 35 periods) in estimation."
  - "<strong>Common factors are essential for inference.</strong> Omitting them roughly doubles the temporal-persistence estimate and causes the Hansen J-test to reject (p &lt; 0.001); the documented variables support, but do not by themselves guarantee, valid inference without the factor structure."

