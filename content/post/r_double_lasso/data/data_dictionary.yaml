# Data dictionary metadata for r_double_lasso — drives build_data_dictionary.py.
# Generated by the write-data-dictionary skill from the post's text + data; edit and rerun.

study:
  title: "Double LASSO for Causal Inference: Does Abortion Reduce Crime?"
  subtitle: "The Belloni–Chernozhukov–Hansen Levitt panel — 48 U.S. states × 12 first-differenced years, 284 candidate controls."
  overview: >
    Companion data for a hands-on R tutorial that replicates the empirical example in Fitzgerald,
    Lattimore, Robinson &amp; Zhu (2026, <em>Journal of Applied Econometrics</em>), which itself
    builds on <a href="https://doi.org/10.1093/restud/rdt044" target="_blank" rel="noopener">Belloni,
    Chernozhukov &amp; Hansen (2014)</a> and the controversial
    <a href="https://doi.org/10.1162/00335530151144050" target="_blank" rel="noopener">Donohue &amp;
    Levitt (2001)</a> finding that legalized abortion reduced U.S. crime. The panel is 48 U.S. states
    over 12 first-differenced years (1986&ndash;1997, 576 observations) after the raw 13-year
    (1985&ndash;1997) panel is first-differenced to absorb state fixed effects. The treatment is the
    <strong>effective abortion rate</strong>; the three outcomes are <strong>violent crime,
    property crime, and murder</strong> rates; and the candidate-control set has <strong>284
    columns</strong> per outcome. The post compares five estimators &mdash; first-difference OLS,
    kitchen-sink OLS, Post-Structural LASSO, and Double LASSO under both the rigorous
    (<code>hdm::rlasso</code>) and cross-validated (<code>glmnet::cv.glmnet</code>) penalties &mdash;
    each with HC1 state-clustered standard errors. These CSVs are the inputs the post's
    <code>analysis.R</code> loads over HTTPS; they were extracted from the paper's Matlab replication
    archive by the companion <code>prepare_data.R</code>.
  panel_structure: >
    <strong>Seven files.</strong> <code>levitt_state</code> holds the state cluster id (1&ndash;48,
    each appearing 12 times). <code>levitt_linear</code> is the raw first differences of the three
    outcomes and treatment; <code>levitt_partialled</code> is the same six series after year
    fixed-effect partialling (so LASSO sees no time dummies). <code>levitt_controls_viol</code>,
    <code>levitt_controls_prop</code>, and <code>levitt_controls_murd</code> are the three 576&times;284
    candidate-control matrices (one per outcome equation), already partialled and
    multicollinearity-screened. <code>levitt_control_names</code> is the 284-row crosswalk mapping each
    column index to its variable name in each of the three control matrices.
  kpis:
    - {n: 7, l: "datasets"}
    - {n: 48, l: "U.S. states"}
    - {n: 576, l: "observations"}
    - {n: 284, l: "candidate controls"}

dta_format_version: 118

sources:
  - name: "Fitzgerald et al. (2026)"
    provides: "Replicated study; the Matlab replication archive these CSVs were extracted from"
    reference: "Fitzgerald Sice, J., Lattimore, F., Robinson, T. & Zhu, A. (2026). Double LASSO: Replication and Practical Insights. Journal of Applied Econometrics, forthcoming. https://doi.org/10.15456/jae.2025335.0258270663"
  - name: "Belloni, Chernozhukov & Hansen (2014)"
    provides: "Double LASSO method; the 284-control extension of the Levitt panel used here"
    reference: "Belloni, A., Chernozhukov, V. & Hansen, C. (2014). Inference on treatment effects after selection among high-dimensional controls. Review of Economic Studies, 81(2), 608–650. https://doi.org/10.1093/restud/rdt044"
  - name: "Donohue & Levitt (2001)"
    provides: "Original empirical study and the abortion–crime panel of 48 U.S. states"
    reference: "Donohue III, J. J. & Levitt, S. D. (2001). The impact of legalized abortion on crime. Quarterly Journal of Economics, 116(2), 379–420. https://doi.org/10.1162/00335530151144050"
  - name: "Method references"
    provides: "Rigorous LASSO penalty and cluster-robust inference"
    reference: "Belloni, Chen, Chernozhukov & Hansen (2012); Tibshirani (1996); Cameron & Miller (2015)."

formulas_html: |
  <p>The structural equation of interest is, for state <code>s</code> and differenced year
  <code>t</code>, <code>Δy_st = α·Δd_st + x_st'θ + ε_st</code>, where <code>Δy</code> is a
  first-differenced crime rate, <code>Δd</code> is the differenced effective abortion rate, and the
  parameter of interest is the average partial effect <code>α</code>.</p>
  <ul class="tight">
    <li><strong>First differencing</strong> (<code>levitt_linear</code>): the raw 13-year (1985&ndash;1997)
      level panel is differenced to 12 years (1986&ndash;1997), absorbing all time-invariant state
      effects. Columns <code>Dy*</code> are the differenced outcomes, <code>Dx*</code> the differenced
      treatment.</li>
    <li><strong>Year-FE partialling</strong> (<code>levitt_partialled</code>): each differenced series
      is residualised against year dummies via the Frisch&ndash;Waugh&ndash;Lovell projection, so the
      LASSO regressions carry no time dummies. <code>Dy*</code>/<code>Dx*</code> become the
      partialled <code>Dy*</code>/<code>Dx*</code> (uppercase suffix V/P/M).</li>
    <li><strong>Rigorous LASSO penalty</strong> (Belloni et al. 2012): <code>λ^rig =
      2·c·σ̂/√n · Φ⁻¹(1 − γ/(2p))</code> with <code>c = 1.1</code>, <code>γ = 0.05</code>,
      <code>n = 576</code>, <code>p = 284</code> &mdash; a Bonferroni-style, theory-driven penalty
      (not tuned for prediction).</li>
    <li><strong>Double LASSO</strong>: LASSO of <code>y</code> on <code>X</code> (index set
      <code>I_y</code>) and LASSO of <code>d</code> on <code>X</code> (index set <code>I_d</code>);
      refit plain OLS of <code>y</code> on <code>d</code> and the union <code>I_y ∪ I_d</code>. The
      union approximates the FWL residual-maker <code>M_X = I − X(X'X)⁻¹X'</code> without using all
      284 controls.</li>
    <li><strong>State-clustered SE</strong> (HC1): <code>V̂ = (n−1)/(n−k) · G/(G−1) · (X'X)⁻¹ ·
      [Σ_g X_g'ê_g ê_g'X_g] · (X'X)⁻¹</code> with <code>G = 48</code> states.</li>
  </ul>
  <p>Control-matrix column names follow the replication archive's Matlab scheme: prefix
  <code>D</code> = first difference, <code>L</code> = lagged level, <code>^2</code> = square,
  <code>*</code> = interaction, <code>t</code> = time trend; e.g. <code>Lprison^2</code> is the
  squared lagged prison-population level and <code>xV0*t</code> is an initial-value × trend
  interaction for the violent-crime equation. The eight base Donohue&ndash;Levitt controls are
  prison population, police, unemployment, income, poverty, AFDC generosity, beer consumption, and a
  lagged-prisoner term, expanded into 284 columns of squares, interactions, time interactions, and
  initial-value × trend terms.</p>

caveats:
  - "<strong>Replication, not a primary causal claim.</strong> Fitzgerald et al. (2026) is itself a methods replication; whether abortion access caused less crime is a substantive debate that goes well beyond any single regression. The data is borrowed as a clean case study of Double LASSO, not to endorse the Donohue–Levitt 2001 claim."
  - "<strong>Identification rests on two assumptions.</strong> Conditional independence given the 284 partialled controls, and parallel trends in levels (state FE absorbed by first-differencing, year FE by the partialling step). Neither is innocuous."
  - "<strong>Non-syntactic column names.</strong> The control matrices keep the original Matlab names (containing <code>^</code> and <code>*</code>), so the post loads them with <code>check.names = FALSE</code>. The labeled Stata <code>.dta</code> in this bundle sanitizes those characters to underscores (<code>Lprison^2</code> → <code>Lprison_2</code>) so the names are valid Stata identifiers; the source CSVs keep the originals."
  - "<strong>State-clustering relies on G ≥ 30.</strong> Cluster-robust inference is justified asymptotically in the number of clusters; with G = 48 states it is above the rule of thumb."
  - "<strong>CV LASSO is non-deterministic.</strong> cv.glmnet randomly partitions folds; the post sets set.seed(20260520) so its numbers reproduce. The rigorous LASSO is deterministic given the data and penalty arguments."
  - "<strong>Equal weighting.</strong> Every state-year observation gets equal weight; the estimand is not population-weighted."

