files:
  levitt_state.csv:
    label: "State cluster identifier (1-48) for each observation"
    grain: "state-year (one row per observation)"
    years: "1986-1997 (differenced)"
    coverage: "48 states x 12 differenced years = 576 rows"
    key: "row order matches all other files"
    purpose: "Cluster id for the state-clustered (HC1) standard errors."
    note: "Integer cluster id 1-48; each state appears exactly 12 times (one per first-differenced year). Aligns row-for-row with levitt_linear, levitt_partialled, and the three control matrices."
  levitt_linear.csv:
    label: "Raw first differences of the three outcomes and treatment"
    grain: "state-year (first-differenced)"
    years: "1986-1997 (differenced)"
    coverage: "576 rows; 48 states x 12 years"
    key: "row order x state"
    purpose: "First-difference OLS baseline (no controls) for each outcome."
    note: "Raw first differences of the 1985-1997 level panel. Three (Dy, Dx) pairs, one per outcome: v=violent, p=property, m=murder. Used for the no-controls Donohue-Levitt baseline before any year-FE partialling."
  levitt_partialled.csv:
    label: "Outcomes and treatment after year fixed-effect partialling"
    grain: "state-year (partialled)"
    years: "1986-1997 (differenced)"
    coverage: "576 rows; 48 states x 12 years"
    key: "row order x state"
    purpose: "Treatment/outcome inputs to the LASSO regressions (no time dummies)."
    note: "Differenced outcomes and treatment after residualising against year dummies (Frisch-Waugh-Lovell). Uppercase suffix V/P/M = violent/property/murder. These align with the partialled control matrices so the LASSO steps carry no time dummies."
  levitt_controls_viol.csv:
    label: "Candidate-control matrix Z_v for the violent-crime equation"
    grain: "state-year x control"
    years: "1986-1997 (differenced)"
    coverage: "576 rows x 284 controls"
    key: "row order x state; columns = named controls"
    purpose: "The 284 candidate controls the LASSO selects from for violent crime."
    note: "576x284 control matrix for the violent-crime equation, already partialled for year FE and screened for multicollinearity. Column names follow the Matlab scheme (D=difference, L=lag, ^2=square, *=interaction, t=trend); see levitt_control_names. The .dta sanitizes ^ and * to underscores."
  levitt_controls_prop.csv:
    label: "Candidate-control matrix Z_p for the property-crime equation"
    grain: "state-year x control"
    years: "1986-1997 (differenced)"
    coverage: "576 rows x 284 controls"
    key: "row order x state; columns = named controls"
    purpose: "The 284 candidate controls the LASSO selects from for property crime."
    note: "576x284 control matrix for the property-crime equation, already partialled for year FE and screened for multicollinearity. Column names follow the Matlab scheme; see levitt_control_names. The .dta sanitizes ^ and * to underscores."
  levitt_controls_murd.csv:
    label: "Candidate-control matrix Z_m for the murder equation"
    grain: "state-year x control"
    years: "1986-1997 (differenced)"
    coverage: "576 rows x 284 controls"
    key: "row order x state; columns = named controls"
    purpose: "The 284 candidate controls the LASSO selects from for murder."
    note: "576x284 control matrix for the murder equation, already partialled for year FE and screened for multicollinearity. Column names follow the Matlab scheme; see levitt_control_names. The .dta sanitizes ^ and * to underscores."
  levitt_control_names.csv:
    label: "Crosswalk: column index to control name in each matrix"
    grain: "control index (1-284)"
    years: "n/a"
    coverage: "284 rows x 4 columns"
    key: "index"
    purpose: "Map each control-matrix column position to its variable name per outcome."
    note: "One row per control-matrix column (1-284). The viol/prop/murd columns give the corresponding variable name in levitt_controls_viol/_prop/_murd, which differ because each equation's expansion and multicollinearity screen retain a slightly different set."

columns:
  state:
    label: "State cluster identifier (1-48)"
    definition: "Integer id of the U.S. state for an observation; the clustering variable for HC1 standard errors."
    construction: "From the replication archive's State.mat (Dstate); 1..48, each state appears 12 times."
    units: "integer 1-48"
    source: "Donohue & Levitt (2001) / BCH (2014) panel"
    coverage: "576 rows"
    kind: id
  Dyv:
    label: "Δ violent-crime rate (raw first difference)"
    definition: "First difference of the violent-crime rate (per 100,000, log-change scale)."
    construction: "Year-over-year difference of the level violent-crime series, 1986-1997."
    units: "differenced rate"
    source: "Donohue & Levitt panel"
    kind: cont
  Dxv:
    label: "Δ effective abortion rate (violent-crime sample)"
    definition: "First difference of the effective abortion rate aligned to the violent-crime equation."
    construction: "Year-over-year difference of the effective abortion rate (lagged abortion-to-birth weighted average)."
    units: "differenced rate"
    source: "Donohue & Levitt panel"
    kind: cont
  Dyp:
