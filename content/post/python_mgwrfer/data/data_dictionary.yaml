    provides: "Estimators and software"
    reference: "Fotheringham, Yang & Kang (2017, Multiscale GWR); Oshan et al. (2019, the mgwr package); GeoZhipengLi/MGWPR (panel-enabled mgwr fork); Wooldridge (2010, omitted-variable-bias derivation)."

formulas_html: |
  <p>The data are generated from a two-part data-generating process on a 15&times;15 grid of
  <code>N = 225</code> units indexed by integer coordinates <code>(i, j)</code>, each observed over
  <code>T = 3</code> periods (paper Eqs. 39&ndash;45). The columns <code>alpha_true</code> and
  <code>beta1_true</code>&ndash;<code>beta4_true</code> are the <strong>known truth</strong> the
  estimators are scored against.</p>
  <ul class="tight">
    <li><strong>Time-invariant spatial context / fixed effect</strong> (<code>alpha_true</code>,
      <code>sc_i</code>): <code>sc_i = 30·(exp(j/15) − 1)</code> — an exponential gradient in the
      column index <code>j</code> (range 2.07&ndash;51.55, mean 23.29). It enters the outcome
      directly <em>and</em> drives the covariate levels.</li>
    <li><strong>True slope β₁</strong> (<code>beta1_true</code>): a quadratic dome peaking at the grid
      centre, <code>1 + (q²−(q−i/2)²)(q²−(q−j/2)²)/q⁴</code> with <code>q = ⌈15/4⌉</code> (range
      1.06&ndash;2.00).</li>
    <li><strong>True slope β₂</strong> (<code>beta2_true</code>): a linear gradient,
      <code>1 + (i+j)/(2·15)</code> (range 1.07&ndash;2.00).</li>
    <li><strong>True slope β₃</strong> (<code>beta3_true</code>): constant <code>1.5</code> everywhere
      (tests spatial homogeneity).</li>
    <li><strong>True slope β₄</strong> (<code>beta4_true</code>): identically <code>0</code> everywhere
      (a null effect — tests false-positive detection).</li>
    <li><strong>Covariate equation</strong> (the indirect contextual channel, Eqs. 40&ndash;43):
      <code>x_k,it = 0.05·sc_i + ν_k,it</code>, <code>ν ~ N(0, 0.5)</code>, for
      <code>k = 1,2,3,4</code> — every covariate is a noisy linear function of spatial context, giving
      <code>Cor(x_k, sc) ≈ 0.84</code>.</li>
    <li><strong>Outcome equation</strong> (Eqs. 44&ndash;45):
      <code>y_it = sc_i + β₁(i,j)·x1 + β₂(i,j)·x2 + β₃(i,j)·x3 + ε_it</code>, <code>ε ~ N(0, 0.5)</code>
      — note <code>x4</code> is <em>excluded</em> from <code>y</code> (β₄ ≡ 0), so its 0.84
      correlation with <code>y</code> is spurious, transmitted only through the shared parent
      <code>sc</code>.</li>
  </ul>
  <p>The headline correction: pooled estimators recover <code>β_k + δ_k</code> (true slope plus the
  indirect contextual effect <code>δ_k</code>); the within-transformation
  <code>ỹ_it = y_it − ȳ_i</code> removes the time-invariant <code>sc_i</code> exactly, neutralising
  <code>δ_k</code> and restoring identification of the local slopes.</p>

caveats:
  - "<strong>Synthetic data.</strong> There is no real data behind this tutorial; values are simulated from the paper's DGP with a fixed seed. Results are internally consistent with the design but are not empirical evidence about real-world spatial processes."
  - "<strong>Truth columns are not observable in practice.</strong> <code>alpha_true</code> and <code>beta1_true</code>&ndash;<code>beta4_true</code> are carried only so estimators can be scored. In an applied setting these are exactly the unknowns the methods try to recover — do not feed them to the models as predictors."
  - "<strong>Indirect channel by construction.</strong> Every covariate is 84% correlated with spatial context, and <code>x4</code> is 84% correlated with <code>y</code> despite β₄ = 0. Any model that fails to condition on <code>sc</code> (cross-sectional/pooled OLS, MGWR_cs, PMGWR) will misread this as a real local effect — that is the point of the simulation, not a data error."
  - "<strong>Reduced 15×15 grid.</strong> The paper uses a 30×30 grid; this panel uses 15×15 (225 units) so the multiscale bandwidth search completes in minutes. All qualitative conclusions are preserved, but exact RMSE/correlation magnitudes differ from the paper's."
  - "<strong>Balanced, short panel.</strong> Only T = 3 periods; the within estimator's degrees of freedom are NT − K − N = 446. Fixed-effects identification relies on strict exogeneity conditional on the fixed effects (no time-varying confounders)."

