    reference: "Li, Z., & Fotheringham, A. S. (2026). Spatial Context as a Time-Invariant Confounder: A Fixed-Effects Extension of MGWR. Annals of the American Association of Geographers. https://doi.org/10.1080/24694452.2026.2654481"
