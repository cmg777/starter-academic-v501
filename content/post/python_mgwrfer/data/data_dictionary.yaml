# Generated by the write-data-dictionary skill from the post's text + script; edit and rerun.

study:
  title: "MGWFER: Causal Spatially Varying Coefficients via Panel Fixed Effects"
  subtitle: "A fully synthetic 15×15 spatial panel (225 units × 3 periods) with known coefficient surfaces and a time-invariant spatial confounder."
  overview: >
    Companion data for a Python tutorial faithful to <strong>Li &amp; Fotheringham (2026)</strong>,
    which introduces <strong>Multiscale Geographically Weighted Fixed Effects Regression
    (MGWFER)</strong> &mdash; a local panel framework that removes time-invariant spatial
    confounders from Multiscale GWR. The dataset is a <strong>fully synthetic</strong> spatial panel
    generated verbatim from the paper&rsquo;s data-generating process (Eqs. 39&ndash;45) on a
    15&times;15 grid of 225 spatial units observed over 3 time periods (675 observations). Each
    covariate is coupled to a time-invariant spatial context <code>sc_i</code> (<code>Cor(x_k, sc)
    &asymp; 0.84</code>), so the <em>indirect contextual effect</em> channel is active and
    <code>Cor(x_4, y) &asymp; 0.84</code> even though <code>&beta;_4 &equiv; 0</code>. Because the
    true coefficient surfaces (<code>beta1_true</code>&ndash;<code>beta4_true</code>) and the
    confounder (<code>alpha_true</code>) are carried as columns, the panel is ground truth against
    which OLS, pooled OLS, fixed effects, cross-sectional MGWR, pooled MGWR, and MGWFER can be
    benchmarked. The entire data-generating process is open and reproducible.
  panel_structure: >
    <strong>One file.</strong> <code>simulated_panel_data</code> is a balanced spatial panel: one row
    per spatial unit &times; time period (225 units &times; 3 periods = 675 rows). Spatial position
    is fixed by integer grid coordinates <code>(coord_i, coord_j)</code> on a 15&times;15 lattice;
    <code>time_id</code> indexes the three periods. Alongside the observed outcome <code>y</code> and
    four covariates <code>x1</code>&ndash;<code>x4</code>, the file carries the <em>known</em> truth
    columns &mdash; the fixed effect <code>alpha_true</code> and the four spatially varying slopes
    <code>beta1_true</code>&ndash;<code>beta4_true</code> &mdash; so every estimator can be scored
    against ground truth.
  kpis:
    - {n: 1, l: "dataset"}
    - {n: 14, l: "variables"}
    - {n: 225, l: "spatial units"}
    - {n: "3 periods", l: "panel (675 obs)"}

dta_format_version: 118

