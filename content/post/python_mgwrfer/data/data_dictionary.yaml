files:
  simulated_panel_data.csv:
    label: "Synthetic spatial panel: outcome, 4 covariates + ground-truth surfaces"
    grain: "unit-period (spatial panel)"
    years: "3 periods (time_id 0-2; not calendar years)"
    coverage: "225 spatial units on a 15x15 grid; 675 observations"
    key: "unit_id x time_id"
    purpose: "Benchmark OLS / pooled OLS / FE / cross-sectional MGWR / PMGWR / MGWFER against known truth."
    note: "Balanced spatial panel simulated from Li & Fotheringham (2026) Eqs. 39-45 (seed 42). One row per spatial unit x time period; alpha_true and beta1_true-beta4_true carry the known data-generating coefficients so estimators can be scored. Coordinates (coord_i, coord_j) are integer grid positions, identical across the unit's 3 periods."

columns:
  unit_id:
    label: "Spatial unit ID"
    definition: "Identifier of the spatial unit (one of 225 grid cells); repeats across the unit's 3 time periods."
    construction: "0..224, in row-major order over the 15x15 grid (np.repeat(arange(225), 3))."
    units: "integer ID (0-224)"
    source: "Simulation"
    coverage: "all rows"
    kind: id
  time_id:
    label: "Time period index"
    definition: "Period index within the panel (3 periods per unit). Not a calendar year."
    construction: "np.tile(arange(3), 225); values 0, 1, 2."
    units: "integer (0-2)"
    source: "Simulation"
    coverage: "all rows"
    kind: id
  coord_i:
    label: "Grid row coordinate (i)"
    definition: "Row position of the unit on the 15x15 lattice; spatial coordinate for kernel weighting."
    construction: "Row index 1..15, np.repeat(arange(1,16), 15) then replicated across time."
    units: "grid units (1-15)"
    source: "Simulation"
    coverage: "all rows"
    kind: id
  coord_j:
    label: "Grid column coordinate (j)"
    definition: "Column position on the 15x15 lattice; drives the exponential spatial-context gradient."
    construction: "Column index 1..15, np.tile(arange(1,16), 15) then replicated across time."
    units: "grid units (1-15)"
    source: "Simulation"
    coverage: "all rows"
    kind: id
  y:
    label: "Outcome variable"
    definition: "Simulated response: spatial context plus three causally-active covariates plus noise."
    construction: "y = sc_i + beta1*x1 + beta2*x2 + beta3*x3 + epsilon; epsilon ~ N(0, 0.5). x4 is excluded (paper Eqs. 44-45)."
    units: "synthetic units"
    source: "Simulation"
    coverage: "all rows"
    kind: cont
  x1:
    label: "Covariate x1 (effect = quadratic dome)"
    definition: "Causally-active covariate; its true local slope beta1 is a quadratic dome peaking at the grid centre."
    construction: "x1 = 0.05*sc_i + N(0, 0.5) (indirect contextual channel, paper Eq. 40)."
    units: "synthetic units"
    source: "Simulation"
    coverage: "all rows"
    kind: cont
  x2:
    label: "Covariate x2 (effect = linear gradient)"
    definition: "Causally-active covariate; its true local slope beta2 is a linear gradient increasing with i+j."
    construction: "x2 = 0.05*sc_i + N(0, 0.5) (paper Eq. 41)."
    units: "synthetic units"
    source: "Simulation"
    coverage: "all rows"
    kind: cont
  x3:
    label: "Covariate x3 (effect = constant 1.5)"
    definition: "Causally-active covariate; its true local slope beta3 is constant at 1.5 everywhere."
    construction: "x3 = 0.05*sc_i + N(0, 0.5) (paper Eq. 42)."
    units: "synthetic units"
    source: "Simulation"
    coverage: "all rows"
    kind: cont
  x4:
    label: "Covariate x4 (null effect; spurious link to y)"
    definition: "Covariate with NO causal effect on y (beta4 = 0); shares parent sc with y, so Cor(x4, y) ~ 0.84."
    construction: "x4 = 0.05*sc_i + N(0, 0.5) (paper Eq. 43); omitted from the y equation."
    units: "synthetic units"
    source: "Simulation"
    coverage: "all rows"
    kind: cont
  alpha_true:
    label: "True spatial context / fixed effect (sc_i)"
    definition: "Known time-invariant confounder; the intrinsic contextual effect MGWFER recovers. Truth column — not an observable predictor."
    construction: "sc_i = 30*(exp(j/15) - 1); exponential in column index j (range 2.07-51.55). Constant across the unit's 3 periods."
    units: "synthetic units"
    source: "Simulation (ground truth)"
    coverage: "all rows"
    kind: cont
  beta1_true:
    label: "True local slope beta1 (quadratic dome)"
    definition: "Known spatially varying coefficient on x1; ground truth for scoring. Quadratic dome peaking at the grid centre."
    construction: "1 + (q^2-(q-i/2)^2)*(q^2-(q-j/2)^2)/q^4, q=ceil(15/4) (range 1.06-2.00). Constant across periods."
    units: "coefficient"
    source: "Simulation (ground truth)"
    coverage: "all rows"
    kind: cont
  beta2_true:
    label: "True local slope beta2 (linear gradient)"
    definition: "Known spatially varying coefficient on x2; ground truth for scoring. Linear gradient in i+j."
    construction: "1 + (i+j)/(2*15) (range 1.07-2.00). Constant across periods."
    units: "coefficient"
    source: "Simulation (ground truth)"
    coverage: "all rows"
    kind: cont
  beta3_true:
    label: "True local slope beta3 (constant 1.5)"
    definition: "Known spatially homogeneous coefficient on x3; ground truth for scoring."
    construction: "1.5 everywhere (np.full(225, 1.5))."
    units: "coefficient"
    source: "Simulation (ground truth)"
    coverage: "all rows"
    kind: cont
  beta4_true:
    label: "True local slope beta4 (null = 0)"
    definition: "Known null coefficient on x4; ground truth for false-positive testing."
    construction: "0 everywhere (np.zeros(225))."
    units: "coefficient"
    source: "Simulation (ground truth)"
    coverage: "all rows"
    kind: cont
