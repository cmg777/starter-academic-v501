files:
  r_sc_bayes_spatial_source_data.csv:
    label: "State-year tobacco panel: cigarette sales + retail price"
    grain: "state-year"
    years: "1970-2000"
    coverage: "39 US states (balanced)"
    key: "state (state_id) x year"
    purpose: "Fit classical, Bayesian-horseshoe, and Bayesian-spatial synthetic control for California's Prop 99 ATT."
    note: "Balanced annual panel from the scspill replication package (Abadie et al. 2010 California tobacco data). 39 states x 31 years = 1,209 rows. California (state_id 3) is the treated unit; the other 38 states are donors. treatment = 1 for California in 1988-2000."

