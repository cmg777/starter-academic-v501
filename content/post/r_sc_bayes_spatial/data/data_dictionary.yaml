# Data dictionary metadata for r_sc_bayes_spatial — drives build_data_dictionary.py.
# Generated by the write-data-dictionary skill from the post's text + data; edit and rerun.

study:
  title: "Bayesian Spatial Synthetic Control: California's Proposition 99"
  subtitle: "The Abadie et al. (2010) tobacco panel — 39 US states, 1970–2000 — used to fit classical, Bayesian-horseshoe, and Bayesian-spatial synthetic control in R."
  overview: >
    Companion data for an R tutorial that replicates the California case study of Sakaguchi &amp;
    Tagawa (2026) on cigarette consumption and Proposition 99. The single file is the balanced
    state-year panel bundled in the <code>scspill</code> replication package &mdash; the same
    <strong>real</strong> tobacco panel introduced by Abadie, Diamond &amp; Hainmueller (2010):
    per-capita cigarette sales (<code>cigsale</code>) and real retail price (<code>retprice</code>)
    for 39 US states over 1970&ndash;2000. California is the one treated unit (Prop 99 switches on in
    1988); the other 38 states form the donor pool. The post fits three nested synthetic-control
    estimators on this panel &mdash; classical SCM (<code>tidysynth</code>), a Bayesian horseshoe-prior
    SCM, and a Bayesian spatial SCM with a spatial autoregressive (SAR) layer &mdash; and reads the
    ATT, the donor weights, and the per-state spillovers off each.
  panel_structure: >
    <strong>One file.</strong> <code>r_sc_bayes_spatial_source_data.csv</code> is a balanced annual
    state panel: one row per state &times; year, 39 states &times; 31 years = 1,209 rows. The
    <code>treatment</code> dummy is 1 only for California in 1988&ndash;2000 (13 rows); 18
    pre-treatment years (1970&ndash;1987) and 13 post-treatment years (1988&ndash;2000). The contiguity
    weights used by the SAR layer (California's <code>w</code> row and the 38&times;38 donor
    <code>W</code> matrix) ship separately inside the <code>scspill</code> package and are not part of
    this CSV.
  kpis:
    - {n: 1, l: "dataset"}
    - {n: 6, l: "variables"}
    - {n: 39, l: "states"}
    - {n: "1970–2000", l: "years"}

dta_format_version: 118

sources:
  - name: "Sakaguchi & Tagawa (2026)"
    provides: "Inspiring study + the scspill replication package that bundles this exact panel and the spatial weights"
    reference: "Sakaguchi, S. & Tagawa, H. (2026). Identification and Bayesian Inference for Synthetic Control Methods with Spillover Effects. The Econometrics Journal. https://doi.org/10.1093/ectj/utag006 (replication package: Zenodo record 19066186)."
  - name: "Abadie, Diamond & Hainmueller (2010)"
    provides: "Original California tobacco panel (cigsale, retprice) and the synthetic control method"
    reference: "Abadie, A., Diamond, A. & Hainmueller, J. (2010). Synthetic control methods for comparative case studies: Estimating the effect of California's tobacco control program. Journal of the American Statistical Association, 105(490), 493–505. https://doi.org/10.1198/jasa.2009.ap08746"
  - name: "Method references"
    provides: "Estimators and concepts"
    reference: "Carvalho, Polson & Scott (2010, horseshoe prior); LeSage & Pace (2009, spatial econometrics)."

formulas_html: |
  <p>The data are an observed state-year panel; the post derives no new columns &mdash; the three
  estimators below all operate on the same <code>cigsale</code> outcome. California is the treated
  unit; the 38 other states are donors.</p>
  <ul class="tight">
    <li><strong>ATT</strong>: <code>ATT = mean_t( Y_obs(CA, t) − Y_synth(CA, t) )</code> averaged over the
      post-treatment years 1988&ndash;2000, where the synthetic California is a weighted blend of donor
      states.</li>
    <li><strong>Classical SCM (Stage 1)</strong>: choose donor weights on the simplex
      (<code>α_j ≥ 0, Σ α_j = 1</code>) that minimize pre-treatment fit error, via
      <code>tidysynth</code>.</li>
    <li><strong>Bayesian horseshoe SCM (Stage 2)</strong>: <code>α_j ~ N(0, τ² λ_j²)</code> with
      <code>τ, λ_j ~ HalfCauchy(0, 1)</code> &mdash; heavy-tailed shrinkage on the same weights,
      relaxing the simplex.</li>
    <li><strong>Bayesian spatial SCM (Stage 3)</strong>:
      <code>Y_c,t = ρ·W·Y_c,t + X_c,t·β + Y_c^lag·α + ε_t</code> &mdash; adds a SAR layer with
      contiguity matrix <code>W</code> and spatial autocorrelation <code>ρ</code>, relaxing SUTVA, so
      per-donor spillovers become estimable.</li>
  </ul>
  <p>The <code>treatment</code> dummy is constructed as <code>1 if state == "California" &amp; year ≥
  1988 else 0</code> (the package's Prop&nbsp;99 convention). Everything else in the file is observed
  data read directly from the replication package.</p>

caveats:
  - "<strong>Narrow predictor set.</strong> The shipped panel carries only <code>cigsale</code> and <code>retprice</code> — not the log income, youth-share, or beer-sales predictors Abadie (2010) used. This is the main reason the classical ATT (≈ −18) is smaller in magnitude than Abadie's published ≈ −27."
  - "<strong>Spatial weights live elsewhere.</strong> The SAR layer needs California's contiguity vector <code>w</code> and the 38×38 donor contiguity matrix <code>W</code>, which ship inside the <code>scspill</code> package, not in this CSV. The data dictionary documents only the outcome panel."
  - "<strong>Tutorial-scale MCMC.</strong> The post runs 5,000 iterations (vs the paper's 100,000), so the SAR ρ effective sample size is only ~3 and the Stage 3 credible interval is illustrative, not paper-grade. This is an analysis caveat, not a data caveat — the panel itself is exact."
  - "<strong>Treatment timing.</strong> Prop 99 was approved in November 1988 and took effect January 1989, but the package convention codes 1988 as the first post-treatment year; the <code>treatment</code> dummy follows that convention."

