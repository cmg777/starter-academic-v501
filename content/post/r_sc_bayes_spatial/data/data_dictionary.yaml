    source: "scspill package (Abadie et al. 2010)"
    coverage: "39 states"
    kind: str
  state_id:
    label: "State numeric ID"
    definition: "Integer index for the state (1-39); California is 3."
    construction: "Sequential package index aligned to the alphabetical state list."
