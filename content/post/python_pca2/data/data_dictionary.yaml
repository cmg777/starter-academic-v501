# Data dictionary metadata for python_pca2 — drives build_data_dictionary.py.
# Generated by the write-data-dictionary skill from the post's text + data; edit and rerun.

study:
  title: "Pooled PCA for Building Development Indicators Across Time"
  subtitle: "Subnational Human Development data for 153 South American regions in 2013 and 2019, in wide and long-panel form."
  overview: >
    Companion data for a hands-on Python tutorial that builds a <strong>temporally comparable</strong>
    composite Human Development Index using <strong>pooled PCA</strong> and contrasts it with the naive
    per-period approach. The data are a South American subset of the
    <a href="https://globaldatalab.org/shdi/">Subnational Human Development Index</a> from the Global
    Data Lab (<a href="https://doi.org/10.1038/sdata.2019.38">Smits &amp; Permanyer, 2019</a>), with
    Education, Health, and Income sub-indices (plus the official SHDI and its underlying components)
    for 153 sub-national regions across 12 South American countries in 2013 and 2019. Pooled PCA
    stacks both periods and computes a single set of standardization parameters, eigenvector weights,
    and normalization bounds from the combined data, so a region's 2013 score is measured against the
    same yardstick as its 2019 score. The pooled PC1 captures 72.42&#37; of variance with weights
    [0.5642, 0.5448, 0.6204] and registers a net development shift of +0.1439 that per-period PCA
    forces to zero by construction.
  panel_structure: >
    <strong>Two files, same underlying observations in two shapes.</strong> <code>data.csv</code> is
    the <strong>wide source</strong> &mdash; one row per region with year-suffixed columns
    (<code>*2013</code> / <code>*2019</code>) for the SHDI, its three sub-indices, and the underlying
    HDI components. <code>data_long.csv</code> is the <strong>reshaped long panel</strong> the pooled
    PCA actually consumes &mdash; one row per region &times; period (153 &times; 2 = 306 rows), keeping
    only the three sub-indices used by the index plus the official SHDI, population, and a display
    label. The post melts <code>data.csv</code> into <code>data_long.csv</code>; both ship here so the
    reshape is fully reproducible.
  kpis:
    - {n: 2, l: "datasets"}
    - {n: 153, l: "regions"}
    - {n: 12, l: "countries"}
    - {n: "2013, 2019", l: "periods"}

dta_format_version: 118

sources:
  - name: "Global Data Lab — Subnational HDI"
    provides: "All values: SHDI, sub-indices (education/health/income), and HDI components by region-year"
    reference: "Global Data Lab. Subnational Human Development Index (SHDI). https://globaldatalab.org/shdi/"
  - name: "Smits & Permanyer (2019)"
    provides: "Source database construction and methodology for the SHDI"
    reference: "Smits, J., & Permanyer, I. (2019). The Subnational Human Development Database. Scientific Data, 6, 190038. https://doi.org/10.1038/sdata.2019.38"
  - name: "Method references"
    provides: "PCA / composite-index methods"
    reference: "Jolliffe & Cadima (2016), Phil. Trans. R. Soc. A 374(2065); Peiro-Palomino, Picazo-Tadeo & Rios (2023), Oxford Economic Papers 75(2); UNDP (2024), Human Development Index Technical Notes."

formulas_html: |
  <p>The composite index is built with <strong>pooled PCA</strong> on the three SHDI sub-indices
  (<code>education</code>, <code>health</code>, <code>income</code>), stacking both periods so a single
  set of parameters applies to all 306 region-year observations.</p>
  <ul class="tight">
    <li><strong>Pooled standardization</strong> (z-score):
      <code>Z = (X &minus; &mu;_pool) / &sigma;_pool</code>, where the mean and SD are computed across
      <em>all</em> 306 rows (both years) rather than period by period &mdash; a fixed yardstick.
      Pooled means [0.6786, 0.8437, 0.7254], SDs [0.0814, 0.0472, 0.0749].</li>
    <li><strong>Pooled covariance &amp; eigen-decomposition</strong>:
      <code>&Sigma; = (1/nT) Z&#8348; Z</code>, then <code>&Sigma; v_k = &lambda;_k v_k</code>.
      Eigenvalues [2.1726, 0.5631, 0.2643]; PC1 eigenvector (weights) [0.5642, 0.5448, 0.6204].</li>
    <li><strong>Variance explained</strong>: <code>&lambda;_k / &Sigma;&lambda;</code> &mdash;
      PC1 = 72.42&#37;, PC2 = 18.77&#37;, PC3 = 8.81&#37;.</li>
    <li><strong>PC1 score (composite index)</strong>:
      <code>PC1_i = w&#8321;Z_edu + w&#8322;Z_health + w&#8323;Z_income</code>, the projection of each
      region-year onto the first eigenvector.</li>
    <li><strong>Pooled normalization (0&ndash;1)</strong>:
      <code>HDI_i = (PC1_i &minus; PC1_min) / (PC1_max &minus; PC1_min)</code>, using the min/max
      across all 306 observations (a common scale across periods).</li>
  </ul>
  <p><strong>Wide vs long.</strong> <code>data.csv</code> stores each region once with year-suffixed
  columns; <code>data_long.csv</code> melts it so each (region, period) pair is a row, rounding the
  sub-indices/SHDI to 4 decimals and population to 1 decimal and adding a <code>region_country</code>
  display label (shortened region name + 3-letter country code). The official SHDI uses a geometric
  mean of its three components, <code>SHDI = (Education &times; Health &times; Income)^(1/3)</code>,
  and serves as the external validation benchmark.</p>

caveats:
  - "<strong>Real data.</strong> Values are the Global Data Lab's published Subnational HDI for South America (Smits &amp; Permanyer, 2019); they are not simulated."
  - "<strong>Two periods only.</strong> 2013 and 2019 are the minimum for temporal analysis; more periods would strengthen the pooled estimates and allow testing the constant-correlation assumption."
  - "<strong>Sample-relative index.</strong> The PCA-based HDI is relative to this specific 153-region sample &mdash; adding or removing regions changes every score, and Min-Max normalization is sensitive to outliers (Potaro-Siparuni, Guyana anchors the bottom)."
  - "<strong>South America only.</strong> Correlation structure and eigenvector weights are specific to this region; other world regions can produce different weights."
  - "<strong>Income decline is genuine.</strong> Average income fell 2013&rarr;2019 (driven by Venezuela's collapse, 0.782&rarr;0.630), which is why a fixed (pooled) yardstick is needed to compare scores across time."

