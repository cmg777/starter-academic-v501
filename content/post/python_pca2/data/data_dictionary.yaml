files:
  data.csv:
    label: "Wide source: SHDI + sub-indices + HDI components (2013 & 2019)"
    grain: "region (one row per region)"
    years: "2013 & 2019 (year-suffixed columns)"
    coverage: "153 sub-national regions, 12 South American countries"
    key: "GDLcode"
    purpose: "Wide source table; melted into the long panel that pooled PCA consumes."
    note: "One row per region; each variable appears twice with a year suffix (e.g. edindex2013/edindex2019). South American subset of the Global Data Lab Subnational HDI (Smits & Permanyer 2019)."
  data_long.csv:
    label: "Long panel: 3 sub-indices used by the pooled PCA (153 x 2 periods)"
    grain: "region-period"
    years: "2013, 2019 (period = Y2013 / Y2019)"
    coverage: "306 rows = 153 regions x 2 periods"
    key: "GDLcode x period"
    purpose: "Analysis dataset for pooled PCA: stacked region-year rows with the three SHDI sub-indices."
    note: "Reshaped from data.csv: each region x year is a row; sub-indices and SHDI rounded to 4 dp, pop to 1 dp; adds a region_country display label."

columns:
  # ── Identifiers / labels (shared) ────────────────────────────────
  GDLcode:
    label: "Global Data Lab region code"
    definition: "Unique identifier of the sub-national region in the Global Data Lab database."
    construction: "Assigned by the Global Data Lab (e.g. ARGr101 = a region of Argentina)."
    units: "code"
    source: "Global Data Lab"
    coverage: "all rows"
    kind: id
  region:
    label: "Region name"
    definition: "Name of the sub-national region."
    construction: "From the Global Data Lab SHDI database."
    units: "string"
    source: "Global Data Lab"
    coverage: "all rows"
    kind: str
  country:
    label: "Country name"
    definition: "Country containing the region (12 South American countries)."
    construction: "From the Global Data Lab SHDI database."
    units: "string"
    source: "Global Data Lab"
    coverage: "all rows"
    kind: str
  SubContinent:
    label: "Sub-continent"
    definition: "Geographic sub-continent of the region (constant: South America)."
    construction: "From the Global Data Lab SHDI database; this subset is South America only."
    units: "string"
    source: "Global Data Lab"
    coverage: "data.csv"
    kind: str
  period:
    label: "Period (year tag)"
    definition: "Time period of the observation in the long panel (Y2013 or Y2019)."
    construction: "Created when reshaping wide to long; one row per region per period."
    units: "Y2013 / Y2019"
    source: "Derived (reshape)"
    coverage: "data_long.csv"
    kind: str
    value_labels: {2013: "Y2013", 2019: "Y2019"}
  region_country:
    label: "Region + country display label"
    definition: "Human-readable label combining a shortened region name with a 3-letter country code."
    construction: "First 25 chars of region name + uppercase country abbreviation, e.g. 'City of Buenos Aires (ARG)'."
    units: "string"
    source: "Derived (this study)"
    coverage: "data_long.csv"
    kind: str

  # ── Long-panel analysis variables ────────────────────────────────
  education:
    label: "Education sub-index"
    definition: "SHDI education dimension index (higher = more education)."
    construction: "Global Data Lab education index from expected & mean years of schooling; long-panel copy of edindex2013/edindex2019, rounded to 4 dp."
    units: "0-1"
    source: "Global Data Lab"
    coverage: "data_long.csv"
    kind: cont
  health:
    label: "Health sub-index"
    definition: "SHDI health dimension index (higher = better health)."
    construction: "Global Data Lab health index from life expectancy; long-panel copy of healthindex2013/healthindex2019, rounded to 4 dp."
    units: "0-1"
    source: "Global Data Lab"
    coverage: "data_long.csv"
    kind: cont
  income:
    label: "Income sub-index"
    definition: "SHDI income dimension index (higher = higher income)."
    construction: "Global Data Lab income index from log GNI per capita; long-panel copy of incindex2013/incindex2019, rounded to 4 dp."
    units: "0-1"
    source: "Global Data Lab"
    coverage: "data_long.csv"
    kind: cont
  shdi_official:
    label: "Official Subnational HDI"
    definition: "Global Data Lab's published composite Subnational HDI (validation benchmark)."
    construction: "Geometric mean of the three sub-indices: (Education x Health x Income)^(1/3); long-panel copy of shdi2013/shdi2019, rounded to 4 dp."
    units: "0-1"
    source: "Global Data Lab"
    coverage: "data_long.csv"
    kind: cont
  pop:
    label: "Population (thousands)"
    definition: "Regional population for the period."
    construction: "Global Data Lab population; long-panel copy of pop2013/pop2019, rounded to 1 dp."
    units: "thousands of persons"
    source: "Global Data Lab"
    coverage: "data_long.csv"
    kind: cont

