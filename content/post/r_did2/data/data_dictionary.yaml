files:
  raw_data.csv:
    label: "Raw CDC county mortality + ACA expansion timing (uncleaned)"
    grain: "county-year"
    years: "2009-2019"
    coverage: "U.S. counties, 51 state codes (~2,900 counties; unbalanced)"
    key: "county_code x year"
    purpose: "Source file as downloaded — merged CDC mortality, population, covariates, and state Medicaid-expansion status before any inclusion filtering."
    note: "Raw merged input: one row per county-year, 2009-2019. Contains the CDC mortality counts/rates, population denominators, county socioeconomic covariates, and the state ACA-expansion adoption fields. The analysis sample data_prepared.csv is built from this by the post's R script."
  data_prepared.csv:
    label: "Balanced county-year analysis panel for the DiD pipeline"
    grain: "county-year"
    years: "2009-2019"
    coverage: "2,604 counties x 11 years = 28,644 rows (46 states)"
    key: "county_code x year"
    purpose: "Cleaned, balanced panel that feeds every DiD stage (2x2, TWFE, OR/IPW/DRDID, 2xT, GxT, HonestDiD), with covariate shares and the 2013 population weight."
    note: "Analysis sample: drop the five pre-2014 expanders (DC, DE, MA, NY, VT); keep counties with full mortality coverage 2009-2019 and full covariate coverage in 2013 and 2014. set_wt is the fixed 2013 adult population; treat_year/Treat_2014/Post are the treatment-timing indicators. Cohorts: 1,222 never-expand, 978 in 2014, 171 in 2015, 93 in 2016, 140 in 2019."

columns:
  # ---- raw_data.csv ----
  state:
    label: "State name"
    definition: "Full name of the U.S. state the county belongs to."
    construction: "From the CDC mortality file."
    units: "string"
    source: "CDC WONDER"
    coverage: "raw file"
    kind: str
  stfips:
    label: "State FIPS code"
    definition: "Numeric federal (FIPS) identifier for the state (1-56)."
    construction: "From the CDC mortality file."
    units: "FIPS"
    source: "CDC WONDER"
    coverage: "raw file"
    kind: id
  county:
    label: "County name (with state abbrev.)"
    definition: "County name followed by its two-letter state abbreviation, e.g. \"Autauga County, AL\"."
    construction: "From the CDC mortality file; the trailing two characters give state_abb in the prepared data."
    units: "string"
    source: "CDC WONDER"
    coverage: "both files"
    kind: str
  county_code:
    label: "County FIPS code"
    definition: "Five-digit federal (FIPS) county identifier; the unit id for the panel."
    construction: "From the CDC mortality file."
    units: "FIPS"
    source: "CDC WONDER"
    coverage: "both files"
    kind: id
  year:
    label: "Calendar year"
    definition: "Annual time index of the observation."
    construction: "From the CDC mortality file (2009-2019)."
    units: "year"
    source: "CDC WONDER"
    coverage: "both files"
    kind: year
  year_code:
    label: "Year code (CDC)"
    definition: "CDC WONDER's year code; numerically equal to the calendar year here."
    construction: "From the CDC mortality file."
    units: "year"
    source: "CDC WONDER"
    coverage: "raw file"
    kind: year
  deaths:
    label: "Deaths, adults 20-64"
    definition: "Count of deaths among adults aged 20-64 in the county-year."
    construction: "From the CDC mortality file (numerator of the crude rate)."
    units: "count"
    source: "CDC WONDER"
    coverage: "raw file"
    kind: cont
  population_20_64:
    label: "Population aged 20-64"
    definition: "County adult population aged 20-64 (denominator of the crude mortality rate)."
    construction: "From the CDC mortality file."
    units: "persons"
    source: "CDC WONDER"
    coverage: "both files"
    kind: cont
  crude_rate_20_64:
    label: "Crude mortality rate, adults 20-64"
    definition: "Deaths per 100,000 adults aged 20-64 — the DiD outcome variable."
    construction: "100,000 x deaths / population_20_64 (as supplied by CDC WONDER)."
    units: "per 100,000"
    source: "CDC WONDER"
    coverage: "both files"
    kind: cont
  population_total:
    label: "Total county population"
    definition: "Total resident population of the county-year (all ages)."
    construction: "From the CDC mortality file."
    units: "persons"
    source: "CDC WONDER"
    coverage: "raw file"
    kind: cont
  population_20_64_hispanic:
    label: "Population 20-64, Hispanic"
    definition: "Adults aged 20-64 identifying as Hispanic (numerator for perc_hispanic)."
    construction: "From the CDC mortality file."
    units: "persons"
    source: "CDC WONDER"
    coverage: "raw file"
    kind: cont
  population_20_64_female:
    label: "Population 20-64, female"
    definition: "Female adults aged 20-64 (numerator for perc_female)."
    construction: "From the CDC mortality file."
    units: "persons"
    source: "CDC WONDER"
    coverage: "raw file"
    kind: cont
  population_20_64_white:
    label: "Population 20-64, white"
    definition: "White adults aged 20-64 (numerator for perc_white)."
    construction: "From the CDC mortality file."
    units: "persons"
    source: "CDC WONDER"
    coverage: "raw file"
    kind: cont
  unemployed:
    label: "Number unemployed"
    definition: "County count of unemployed persons in the labor force."
    construction: "From the county labor-market series in the merged file."
    units: "persons"
    source: "BLS (merged)"
    coverage: "raw file"
    kind: cont
  labor_force:
    label: "Civilian labor force"
    definition: "County civilian labor force count (denominator of the raw unemployment rate)."
    construction: "From the county labor-market series in the merged file."
    units: "persons"
    source: "BLS (merged)"
    coverage: "raw file"
    kind: cont
  poverty_rate:
    label: "Poverty rate (%)"
    definition: "Share of the county population below the federal poverty line."
    construction: "From the county socioeconomic series in the merged file (already in percent)."
    units: "%"
    source: "Census (merged)"
    coverage: "both files"
    kind: cont
  median_income:
    label: "Median household income"
    definition: "County median household income; in the raw file expressed in US$, rescaled to thousands of US$ in the prepared data."
    construction: "From the county socioeconomic series; the prepared data divides by 1,000."
    units: "US$ (raw) / US$ 000s (prepared)"
    source: "Census (merged)"
    coverage: "both files"
    kind: cont
  expansion_status:
    label: "ACA Medicaid expansion status (text)"
    definition: "Whether the state had adopted and implemented Medicaid expansion."
    construction: "From the state ACA-expansion timing source."
    units: "category"
    source: "KFF / ACA timing"
    coverage: "raw file"
    kind: str
  Description:
    label: "Expansion description (free text)"
    definition: "Free-text note on the state's expansion implementation (date, retroactivity, etc.)."
    construction: "From the state ACA-expansion timing source."
    units: "string"
    source: "KFF / ACA timing"
    coverage: "raw file"
    kind: str
  yaca:
    label: "Year of ACA Medicaid expansion"
    definition: "Calendar year the state implemented Medicaid expansion; missing (NA) for never-expanders."
    construction: "Parsed from the state ACA-expansion timing source; arrives as a string with \"NA\" sentinels and is coerced to numeric."
    units: "year"
    source: "KFF / ACA timing"
    coverage: "both files"
    kind: year
  maca:
    label: "Month of ACA Medicaid expansion"
    definition: "Calendar month (1-12) in which the state implemented expansion; missing for never-expanders."
    construction: "Parsed from the state ACA-expansion timing source."
    units: "month (1-12)"
    source: "KFF / ACA timing"
    coverage: "raw file"
    kind: id
  # ---- data_prepared.csv (cleaned / constructed) ----
  state_abb:
    label: "State abbreviation"
    definition: "Two-letter U.S. state postal abbreviation."
    construction: "Last two characters of the county string (str_sub)."
    units: "code"
    source: "Derived"
    coverage: "prepared file"
    kind: str
  perc_female:
    label: "Female share, adults 20-64 (%)"
    definition: "Percent of the county's 20-64 population that is female (baseline covariate)."
    construction: "100 x population_20_64_female / population_20_64."
    units: "%"
    source: "Derived (CDC)"
    coverage: "prepared file"
    kind: cont
  perc_white:
    label: "White share, adults 20-64 (%)"
    definition: "Percent of the county's 20-64 population that is white (baseline covariate)."
    construction: "100 x population_20_64_white / population_20_64."
    units: "%"
    source: "Derived (CDC)"
    coverage: "prepared file"
    kind: cont
  perc_hispanic:
    label: "Hispanic share, adults 20-64 (%)"
    definition: "Percent of the county's 20-64 population that is Hispanic (baseline covariate)."
    construction: "100 x population_20_64_hispanic / population_20_64."
    units: "%"
    source: "Derived (CDC)"
    coverage: "prepared file"
    kind: cont
  unemp_rate:
    label: "Unemployment rate (%)"
    definition: "County unemployment rate (baseline covariate)."
    construction: "Raw fractional rate rescaled to percent (x100) in the prepared data."
    units: "%"
    source: "Derived (BLS)"
    coverage: "prepared file"
    kind: cont
  set_wt:
    label: "Fixed 2013 adult population weight"
    definition: "Each county's 2013 population aged 20-64, held constant across all 11 years (the population weight)."
    construction: "population_20_64 in 2013, broadcast to every year of the county so weighting does not conflate population growth with mortality change."
    units: "persons"
    source: "Derived (CDC)"
    coverage: "prepared file"
    kind: cont
  treat_year:
    label: "Treatment year (did convention)"
    definition: "Year the county's state expanded Medicaid (2014/2015/2016/2019), or 0 for never-treated counties."
    construction: "yaca if 2014 <= yaca <= 2019, else 0 — the did package's never-treated coding."
    units: "year / 0"
    source: "Derived"
    coverage: "prepared file"
    kind: id
  Treat_2014:
    label: "2014-cohort treatment dummy"
    definition: "1 if the county's state expanded Medicaid in 2014, else 0."
    construction: "1 if yaca == 2014, else 0."
    units: "0/1"
    source: "Derived"
    coverage: "prepared file"
    kind: dummy
    value_labels: {0: "Not a 2014 expander", 1: "2014 expander"}
  Post:
    label: "Post-2014 period dummy"
    definition: "1 for years 2014 and later, else 0 (the post period in the 2x2 design)."
    construction: "1 if year >= 2014, else 0."
    units: "0/1"
    source: "Derived"
    coverage: "prepared file"
    kind: dummy
    value_labels: {0: "Pre (<= 2013)", 1: "Post (>= 2014)"}
