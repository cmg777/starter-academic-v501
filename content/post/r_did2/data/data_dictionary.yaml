# Data dictionary metadata for r_did2 — drives build_data_dictionary.py.
# Generated by the write-data-dictionary skill from the post's text + data; edit and rerun.

study:
  title: "Difference-in-Differences for Regional Data"
  subtitle: "CDC county mortality + ACA Medicaid-expansion timing — did expansion reduce adult mortality?"
  overview: >
    Companion data for a hands-on R tutorial that asks whether the Affordable Care Act's staggered
    Medicaid expansion reduced adult mortality, and uses the question to show how
    <strong>population weighting changes the target parameter</strong> when the units (U.S. counties)
    differ in size by orders of magnitude. Following Baker, Callaway, Cunningham, Goodman-Bacon and
    Sant'Anna's (2025) <em>Practitioner's Guide</em>, the post runs an eight-stage DiD pipeline &mdash;
    2&times;2 cell means, three equivalent TWFE specifications, covariate-adjusted OR/IPW/DRDID, a
    2&times;T event study, the Callaway&ndash;Sant'Anna staggered ATT(g,t) design, and a
    Rambachan&ndash;Roth HonestDiD sensitivity analysis &mdash; computing every estimate both
    unweighted and weighted by 2013 adult population. The headline 2&times;2 ATT(2014) flips sign
    with weighting, from +0.122 deaths per 100,000 unweighted to &minus;2.563 weighted, while no 95%
    confidence interval at any stage comfortably excludes zero. The two estimands answer different
    questions &mdash; the typical treated <em>county</em> versus the typical treated <em>adult</em>.
  panel_structure: >
    <strong>Two files.</strong> <code>raw_data</code> is the merged CDC county mortality file
    (deaths per 100,000 adults aged 20&ndash;64) joined to state-level ACA Medicaid-expansion timing,
    as downloaded &mdash; one row per county &times; year, 2009&ndash;2019, before any cleaning.
    <code>data_prepared</code> is the balanced analysis sample built from it: drop the five
    pre-2014 expanders (DC, DE, MA, NY, VT), require full mortality coverage 2009&ndash;2019 and full
    covariate coverage in 2013&ndash;2014, and add the modeling columns (covariate shares, fixed
    2013 population weight, treatment-year and post indicators).
  kpis:
    - {n: 2, l: "datasets"}
    - {n: 35, l: "variables"}
    - {n: 2604, l: "counties (analysis)"}
    - {n: "2009–2019", l: "years"}

dta_format_version: 118

sources:
  - name: "CDC WONDER (mortality)"
    provides: "County-level death counts and crude mortality rates for adults aged 20-64, plus population denominators"
    reference: "U.S. Centers for Disease Control and Prevention, CDC WONDER. https://wonder.cdc.gov/"
  - name: "ACA Medicaid expansion timing"
    provides: "State Medicaid-expansion adoption status, year, and month (the staggered treatment timing)"
    reference: "KFF, Status of State Medicaid Expansion Decisions. https://www.kff.org/medicaid/issue-brief/status-of-state-medicaid-expansion-decisions-interactive-map/"
  - name: "County socioeconomic covariates"
    provides: "Unemployment, poverty, and median household income by county-year (baseline covariates)"
    reference: "U.S. Census Bureau / Bureau of Labor Statistics county-level series (as merged in the source file)."
  - name: "Replicated study & method references"
    provides: "Empirical example, estimators, and concepts"
    reference: "Baker et al. (2025, arXiv:2503.13323); Callaway & Sant'Anna (2021); Sant'Anna & Zhao (2020); Rambachan & Roth (2023); Imbens & Rubin (2015)."

formulas_html: |
  <p>The outcome is the CDC crude mortality rate <code>crude_rate_20_64</code> (deaths per 100,000
  adults aged 20&ndash;64). Every estimate is computed twice: <strong>unweighted</strong> (each county
  counts equally &mdash; the ATT for the typical treated <em>county</em>) and
  <strong>population-weighted</strong> by the fixed 2013 adult population <code>set_wt</code>
  (each adult counts equally &mdash; the ATT for the typical treated <em>adult</em>).</p>
  <ul class="tight">
    <li><strong>2&times;2 cell-means DiD</strong> (<code>ATT(2014)</code>):
      <code>(Ȳ_T,post &minus; Ȳ_T,pre) &minus; (Ȳ_C,post &minus; Ȳ_C,pre)</code> &mdash; the treated
      group's 2013&rarr;2014 change minus the control group's change.</li>
    <li><strong>TWFE 2&times;2</strong>:
      <code>Y_it = β₀ + β₁·1{D=1} + β₂·1{t=2014} + β^(2×2)·(D×Post) + ε_it</code>; on a balanced 2&times;2
      panel the Levels, two-way-FE, and long-difference forms recover the same <code>β^(2×2)</code>.</li>
    <li><strong>Normalized difference</strong> (covariate balance):
      <code>(X̄_T &minus; X̄_C) / √[(S²_T + S²_C)/2]</code>; |value| &gt; 0.25 flags imbalance
      (Imbens &amp; Rubin 2015).</li>
    <li><strong>Doubly-robust DiD (DRDID)</strong>:
      <code>(1/n) Σ (ŵ_{D=1} &minus; ŵ_{D=0})(ΔY_i &minus; μ̂_{Δ,D=0}(X_i))</code> &mdash; consistent if
      <em>either</em> the outcome model or the propensity model is correct (Sant'Anna &amp; Zhao 2020).</li>
    <li><strong>Group-time ATT</strong> (Callaway&ndash;Sant'Anna):
      <code>ATT(g,t) = E[Y_it(g) &minus; Y_it(∞) | G_i = g]</code>, aggregated by cohort and by event time.</li>
    <li><strong>HonestDiD relative magnitudes</strong>: bound the post-period parallel-trends
      violation at a multiple <code>M̄</code> of the worst observed pre-period violation; the
      breakdown value is the smallest <code>M̄</code> that overturns the sign.</li>
  </ul>
  <p>Constructed columns in <code>data_prepared</code> (built by the post's R script from
  <code>raw_data</code>): <code>perc_white = population_20_64_white / population_20_64 · 100</code>
  (and likewise <code>perc_hispanic</code>, <code>perc_female</code>); <code>unemp_rate</code> rescaled
  to percent (×100); <code>median_income</code> rescaled to thousands of US$ (÷1000);
  <code>set_wt</code> = each county's 2013 <code>population_20_64</code>, held constant across years;
  <code>treat_year</code> = <code>yaca</code> if it falls in 2014&ndash;2019, else 0 (the <code>did</code>
  never-treated convention); <code>Treat_2014</code> = 1 if <code>yaca</code> == 2014;
  <code>Post</code> = 1 if <code>year</code> &ge; 2014.</p>

caveats:
  - "<strong>Pedagogical, not definitive.</strong> The authors of the replicated guide flag this case as illustrative: \"The results are pedagogical in spirit and do not represent the best possible estimates of Medicaid's effect on adult mortality.\""
  - "<strong>Underpowered.</strong> None of the six 2x2 covariate-adjusted 95% confidence intervals excludes zero; the data cannot settle the policy question."
  - "<strong>Weighting changes the estimand.</strong> Unweighted (ATT for the typical treated county) and population-weighted (ATT for the typical treated adult) answer different causal questions; the 2x2 ATT(2014) flips sign between them (+0.122 vs -2.563)."
  - "<strong>Crude, not age-adjusted.</strong> The outcome is the CDC crude death rate for ages 20-64, not an age-adjusted rate, so compositional differences across cohorts are not removed."
  - "<strong>Small cohorts are noisy.</strong> The 2015, 2016, and 2019 expansion cohorts are small (171 / 93 / 140 counties); cohort-specific estimates carry wide confidence intervals."
  - "<strong>Tutorial bootstrap.</strong> The Callaway-Sant'Anna bootstrap uses 2,000 iterations for speed (the reference scripts use 25,000), affecting the third significant figure of each CI."

