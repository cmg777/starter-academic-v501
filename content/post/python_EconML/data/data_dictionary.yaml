study:
  title: "Causal Machine Learning and the Resource Curse"
  subtitle: "Simulated district panel with known ground-truth treatment effects, analysed with EconML's CausalForestDML (Double Machine Learning)."
  overview: >
    Companion data for a hands-on Python tutorial that estimates <strong>heterogeneous causal
    effects</strong> of mining and mineral prices on economic development using
    <strong>EconML's <code>CausalForestDML</code></strong> &mdash; a Double Machine Learning causal
    forest. The dataset is <strong>fully synthetic</strong> with a known data-generating process, so
    estimates can be checked against ground truth. Its structure mirrors Hodler, Lechner &amp;
    Raschky (2023): 300 districts across 8 countries observed annually over 2003&ndash;2012
    (3,000 district-year rows). Treatment has four levels &mdash; no mining (0) and mining at low (1),
    medium (2), and high (3) mineral prices &mdash; and is heavily imbalanced at 85%/5%/5%/5%. The
    outcome is log nighttime lights. The forest recovers an ATE of 0.240 for the basic mining effect
    (true 0.250), a non-linear price gradient, and the finding that institutions moderate the mining
    margin but not the price margin. The entire DGP is open and reproducible.
  panel_structure: >
    <strong>One file.</strong> <code>sim_resource_curse</code> is a balanced annual district panel
    (one row per district &times; year) covering 300 districts in 8 countries over 2003&ndash;2012.
    It carries the four-level treatment, the binary mining flag and price index, two outcomes (log
    nighttime lights and a conflict dummy), and the geographic, institutional, and demographic
    covariates used as heterogeneity features (X) and first-stage controls (W).
  kpis:
    - {n: 300, l: "districts"}
    - {n: 8, l: "countries"}
    - {n: "2003–2012", l: "years"}
    - {n: 3000, l: "district-years"}

dta_format_version: 118

