  - name: "Method references"
    provides: "Estimators and concepts"
    reference: "Microsoft EconML (CausalForestDML); Chernozhukov et al. (2018, double/debiased ML); Wager & Athey (2018, causal forests); Robinson (1988); Athey, Tibshirani & Wager (2019, generalized random forests / BLB)."

formulas_html: |
  <p>The estimator is EconML's <code>CausalForestDML</code>, a Double Machine Learning (DML) causal
  forest applied to the four-level treatment with log nighttime lights as the outcome.</p>
  <ul class="tight">
    <li><strong>Partially linear model (Robinson 1988; Chernozhukov et al. 2018)</strong>:
      <code>Y = τ(X)·T + g₀(X,W) + ε</code> and <code>T = m₀(X,W) + v</code>, where
      <code>g₀</code> and <code>m₀</code> are nuisance conditional means estimated by Gradient
      Boosting.</li>
    <li><strong>Residualization</strong>: <code>Ỹ = Y − E[Y|X,W]</code>,
      <code>T̃ = T − m₀(X,W)</code>, then <code>Ỹ = τ(X)·T̃ + ε</code> &mdash; the
      Frisch&ndash;Waugh&ndash;Lovell logic. The causal forest is the second-stage learner that
      estimates the covariate-dependent slope <code>τ(X)</code>.</li>
    <li><strong>CATE</strong>: <code>τ(x) = E[Y(1) − Y(0) | X = x]</code> &mdash; the per-profile
      treatment effect (here estimated for each pairwise treatment contrast).</li>
    <li><strong>GATE</strong>: <code>GATE_g = (1/n_g) · Σ_{i∈g} τ̂(Xᵢ)</code> &mdash; the CATE
      averaged over a pre-specified subgroup; SE <code>= sqrt(mean(seᵢ²)/n_g)</code> from the
      per-observation Bootstrap-of-Little-Bags standard errors.</li>
    <li><strong>ATE</strong>: <code>E[τ(X)]</code> &mdash; the overall average, reported per pairwise
      contrast with 90% BLB confidence intervals.</li>
    <li><strong>Honest causal forest (Wager &amp; Athey 2018)</strong>: each tree uses one subsample
      to choose splits and a disjoint subsample to estimate leaf means; 5-fold cross-fitting via
      <code>GroupKFold</code> on <code>district_id</code> blocks within-district leakage.</li>
  </ul>
  <p>Synthetic data-generating process (ground truth, from <code>script.py</code>): the log-NTL
  effect of mining is <code>0.25</code> at mean institutions with institutional moderation
  <code>0.15</code>; the medium-price premium is <code>0.05</code> (small) and the high-price
  premium is <code>0.30</code> (large), yielding ground-truth ATEs of 1-0 = 0.25, 2-0 = 0.30,
  3-0 = 0.55, 2-1 = 0.05, 3-1 = 0.30, 3-2 = 0.25. Outcome noise SD is <code>0.25</code>. A parallel
  conflict process (mining base 0.70, institutional dampening −0.50, price premia 0.15/0.50, base
  rate 0.12) generates the conflict dummy. Because every confounder is built in, the Conditional
  Independence Assumption holds by construction.

caveats:
  - "<strong>Synthetic data.</strong> There is no real data behind this tutorial; results are internally consistent with the calibration but are not empirical evidence about real-world mining, prices, or development."
  - "<strong>Heavily imbalanced treatment.</strong> 85% of rows are untreated (no mining) and only 5% fall in each mining level (150 rows each); within-mining price contrasts (e.g. 3-1) draw on just 300 observations, so price-effect standard errors are large."
  - "<strong>No clustered standard errors.</strong> EconML's <code>inference=True</code> reports forest-level Bootstrap-of-Little-Bags SEs that treat observations as independent; with this panel (same district across years) true clustered SEs would typically be larger. <code>GroupKFold</code> by district prevents first-stage leakage but does not cluster second-stage variance."
  - "<strong>Contemporaneous outcomes.</strong> Treatment and outcome are measured in the same year; the structural template (Hodler, Lechner &amp; Raschky 2023) lags the outcome to <code>t+1</code> to rule out reverse causality."
  - "<strong>Identification rests on the CIA.</strong> The Conditional Independence Assumption holds here by construction; in real data it is untestable and a causal forest does not relax it."

