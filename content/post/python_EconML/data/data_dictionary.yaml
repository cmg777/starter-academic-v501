files:
  sim_resource_curse.csv:
    label: "Simulated district-year panel: resource curse with known ground-truth effects"
    grain: "district-year"
    years: "2003-2012"
    coverage: "300 districts, 8 countries (balanced)"
    key: "district_id x year"
    purpose: "Estimate heterogeneous causal effects of mining and mineral prices on development (CausalForestDML / DML)."
    note: "Balanced annual district panel; 300 synthetic districts across 8 countries, 2003-2012. Four-level treatment (no mining; mining at low/medium/high prices), heavily imbalanced at 85/5/5/5. Outcome is log nighttime lights. Structure mirrors Hodler, Lechner & Raschky (2023); the CIA holds by construction. True ATEs: 1-0=0.25, 2-0=0.30, 3-0=0.55, 2-1=0.05, 3-1=0.30, 3-2=0.25."

