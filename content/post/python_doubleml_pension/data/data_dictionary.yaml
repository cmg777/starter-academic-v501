# Data dictionary metadata for python_doubleml_pension — drives build_data_dictionary.py.
# Generated by the write-data-dictionary skill from the post's text + data; edit and rerun.

study:
  title: "Double Machine Learning with 401(k) Pension Data"
  subtitle: "The real 1991 SIPP 401(k) eligibility & net-wealth sample behind a PLR / IRM / IIVM tutorial."
  overview: >
    Companion data for a hands-on Python tutorial that estimates the causal effect of 401(k)
    eligibility and participation on household net financial assets using <strong>Double Machine
    Learning</strong> (DoubleML). The dataset is the <strong>real</strong> 401(k) sample drawn from
    the 1991 U.S. Survey of Income and Program Participation (SIPP) &mdash; the same nationally
    representative cross-section of 9,915 households used by Chernozhukov et&nbsp;al. (2018) and
    distributed with the DoubleML package via <code>fetch_401K</code> (originally constructed from
    the SIPP by Poterba, Venti &amp; Wise). About 37&nbsp;% of households are eligible for a 401(k)
    and 26&nbsp;% participate. The post fits three estimators &mdash; Partially Linear Regression
    (PLR) and the doubly robust Interactive Regression Model (IRM), both targeting the Average
    Treatment Effect of eligibility, and the Interactive IV Model (IIVM), which instruments
    participation with eligibility to recover the Local Average Treatment Effect on compliers &mdash;
    each fit with four ML learners (Lasso, Random Forest, Decision Tree, XGBoost) under cross-fitting.
  panel_structure: >
    <strong>One file, one row per household.</strong> <code>pension_raw</code> is a cross-section
    (no time dimension): each of the 9,915 rows is a single U.S. household observed once in the 1991
    SIPP. There is no panel/longitudinal structure &mdash; dynamic effects of 401(k) participation
    over time are not captured. <code>e401</code> is the (conditionally exogenous) treatment /
    instrument; <code>p401</code> is the endogenous treatment; <code>net_tfa</code> is the outcome;
    the remaining columns are demographic and financial covariates.
  kpis:
    - {n: 1, l: "dataset"}
    - {n: 14, l: "variables"}
    - {n: "9,915", l: "households"}
    - {n: 1991, l: "SIPP year"}

dta_format_version: 118

