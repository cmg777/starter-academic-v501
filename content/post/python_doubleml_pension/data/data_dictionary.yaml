    definition: "1 if the household has two earners, else 0."
    construction: "SIPP income record; covariate X."
    units: "0/1"
    source: "1991 SIPP / fetch_401K"
    coverage: "9,915 households"
    kind: dummy
    value_labels: {0: "Not two-earner", 1: "Two-earner"}
  e401:
    label: "401(k) eligibility (1=eligible) — treatment / instrument"
    definition: "1 if the household is eligible for a 401(k) plan, else 0. Plausibly exogenous after conditioning on X; the treatment in PLR/IRM and the instrument in IIVM."
    construction: "SIPP-derived eligibility flag (employer offers a 401(k)). Eligible: 3,682 / 9,915 (37.1%)."
    units: "0/1"
    source: "1991 SIPP / fetch_401K"
    coverage: "9,915 households"
    kind: dummy
    value_labels: {0: "Not eligible", 1: "Eligible"}
  p401:
    label: "401(k) participation (1=participates) — endogenous treatment"
    definition: "1 if the household participates in a 401(k) plan, else 0. The endogenous treatment in IIVM (instrumented by e401)."
    construction: "SIPP-derived participation flag (household enrolled). Participating: 2,594 / 9,915 (26.2%)."
    units: "0/1"
    source: "1991 SIPP / fetch_401K"
    coverage: "9,915 households"
    kind: dummy
    value_labels: {0: "Does not participate", 1: "Participates"}
  pira:
    label: "IRA participation (1=yes)"
    definition: "1 if the household participates in an IRA, else 0."
    construction: "SIPP pension/saving record; covariate X."
    units: "0/1"
