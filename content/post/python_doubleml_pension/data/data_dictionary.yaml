    definition: "Marital status of the household head."
    construction: "SIPP demographic record; covariate X."
    units: "0/1"
    source: "1991 SIPP / fetch_401K"
    coverage: "9,915 households"
    kind: dummy
    value_labels: {0: "Not married", 1: "Married"}
  twoearn:
