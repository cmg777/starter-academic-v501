files:
  pension_raw.csv:
    label: "1991 SIPP 401(k) cross-section: net wealth + eligibility + covariates"
    grain: "household (cross-section)"
    years: "1991 (SIPP survey year)"
    coverage: "9,915 U.S. households"
    key: "one row per household (no explicit id column)"
    purpose: "Estimate the causal effect of 401(k) eligibility/participation on net financial assets (PLR / IRM / IIVM)."
    note: "Real 1991 SIPP 401(k) sample loaded via DoubleML's fetch_401K (Chernozhukov et al. 2018; Poterba, Venti & Wise 1995). 9,915 households, 14 variables, single cross-section. e401 = eligibility (treatment / instrument), p401 = participation (endogenous treatment), net_tfa = outcome."

columns:
  nifa:
    label: "Non-401(k) financial assets (US$)"
    definition: "Net financial assets held outside 401(k) accounts."
    construction: "From the SIPP wealth module (financial assets excluding 401(k) balances)."
    units: "US$"
    source: "1991 SIPP / fetch_401K"
    coverage: "9,915 households"
    kind: cont
  net_tfa:
    label: "Net total financial assets (US$) — outcome"
    definition: "Household net total financial assets; the outcome variable in the tutorial."
    construction: "Total financial assets net of liabilities, from the SIPP wealth module."
    units: "US$"
    source: "1991 SIPP / fetch_401K"
    coverage: "9,915 households"
    kind: cont
  tw:
    label: "Total wealth (US$)"
    definition: "Household total wealth (broader than net_tfa)."
    construction: "Total net worth from the SIPP wealth module; not used in the post's models."
    units: "US$"
    source: "1991 SIPP / fetch_401K"
    coverage: "9,915 households"
    kind: cont
  age:
    label: "Age of household head (years)"
    definition: "Age of the reference person of the household."
    construction: "SIPP demographic record; sample restricted to working ages (25–64)."
    units: "years"
    source: "1991 SIPP / fetch_401K"
    coverage: "9,915 households"
    kind: cont
  inc:
    label: "Household income (US$)"
    definition: "Annual household income — the dominant confounder."
    construction: "SIPP income record; covariate X in all models."
    units: "US$"
    source: "1991 SIPP / fetch_401K"
    coverage: "9,915 households"
    kind: cont
  fsize:
    label: "Family size (count)"
    definition: "Number of household members."
    construction: "SIPP household roster; covariate X."
    units: "persons"
    source: "1991 SIPP / fetch_401K"
    coverage: "9,915 households"
    kind: cont
  educ:
    label: "Education (years)"
    definition: "Years of schooling of the household head."
    construction: "SIPP education record; covariate X."
    units: "years"
    source: "1991 SIPP / fetch_401K"
    coverage: "9,915 households"
    kind: cont
  db:
