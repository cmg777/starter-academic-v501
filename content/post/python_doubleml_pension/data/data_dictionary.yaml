    coverage: "9,915 households"
    kind: dummy
    value_labels: {0: "No IRA", 1: "Has IRA"}
  hown:
    label: "Home ownership (1=owns)"
    definition: "1 if the household owns its home, else 0."
    construction: "SIPP housing record; covariate X."
    units: "0/1"
