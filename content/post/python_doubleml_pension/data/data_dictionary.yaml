    reference: "Chernozhukov, V., Chetverikov, D., Demirer, M., Duflo, E., Hansen, C., Newey, W., & Robins, J. (2018). Double/Debiased Machine Learning for Treatment and Structural Parameters. The Econometrics Journal, 21(1), C1–C68."

formulas_html: |
  <p>The post estimates the causal effect of 401(k) access on net financial assets with three
  Double Machine Learning (DML) models. In every model the nuisance functions are fit by ML learners
  (Lasso / Random Forest / Decision Tree / XGBoost) under <strong>cross-fitting</strong>, and the
  treatment parameter is recovered from a Neyman-orthogonal score.</p>
  <ul class="tight">
    <li><strong>Naive benchmark</strong> (biased): difference in mean <code>net_tfa</code> between
      groups, <code>Δ̂ = Ȳ(e401=1) − Ȳ(e401=0)</code> = $19,559 for eligibility (and $27,372 for
      participation) — conflates the causal effect with confounding from income, education, etc.</li>
    <li><strong>PLR — Partially Linear Regression</strong> (estimand: ATE of eligibility):
      <code>Y = θ₀·D + g₀(X) + ε</code> with <code>D = m₀(X) + V</code>. Partial out
      <code>g₀</code> (outcome model) and <code>m₀</code> (treatment model), regress the residuals;
      assumes a constant additive effect θ₀. Mean ATE ≈ $8,730.</li>
    <li><strong>IRM — Interactive Regression Model</strong> (estimand: ATE of eligibility, doubly
      robust / AIPW):
      <code>θ₀ = E[ g₀(1,X) − g₀(0,X) + D·(Y−g₀(1,X))/m₀(X) − (1−D)·(Y−g₀(0,X))/(1−m₀(X)) ]</code>,
      where <code>m₀(X)=P(D=1|X)</code> is the propensity score; consistent if either g₀ or m₀ is
      correct; <code>trimming_threshold = 0.01</code>. Mean ATE ≈ $8,213.</li>
    <li><strong>IIVM — Interactive IV Model</strong> (estimand: LATE on compliers): treatment =
      <code>p401</code> (participation, endogenous), instrument <code>Z = e401</code> (eligibility).
      Wald-type ratio
      <code>θ_LATE = (E[Y|Z=1] − E[Y|Z=0]) / (E[D|Z=1] − E[D|Z=0])</code>. Mean LATE ≈ $11,746.</li>
  </ul>
  <p><strong>Covariates (X).</strong> The base specification uses 9 covariates
  (<code>age, inc, educ, fsize, marr, twoearn, db, pira, hown</code>); a flexible specification adds
  quadratic terms for the four continuous covariates (age, inc, educ, fsize) so the Lasso can capture
  nonlinear confounding. <code>nifa</code> and <code>tw</code> are alternative wealth measures present
  in the source file but not used as outcome or covariates in the tutorial.</p>

caveats:
  - "<strong>Real survey data, single snapshot.</strong> These are real 1991 SIPP households, not simulated; but the cross-section is one point in time, so dynamic effects of 401(k) participation over time are not identified."
  - "<strong>Conditional exogeneity.</strong> The ATE estimates assume eligibility is as good as randomly assigned after conditioning on the observed covariates. Unobserved factors (e.g. financial literacy) that affect both eligibility and savings would bias the estimates."
  - "<strong>Extreme asset values.</strong> <code>net_tfa</code> ranges from −$502,302 to $1,536,798 (and <code>tw</code> up to $2,029,910); a handful of outliers influence the mean-based ATE estimates."
  - "<strong>IIVM identifies the LATE, not the ATE.</strong> The ≈$11,746 IIVM estimate applies only to compliers (households who participate because eligible) and should not be generalized to the full population without the monotonicity assumption."
  - "<strong>nifa / tw are extras.</strong> The tutorial's outcome is <code>net_tfa</code>; <code>nifa</code> (non-401(k) financial assets) and <code>tw</code> (total wealth) ship in the source file but are not modeled — included here for completeness."

