files:
  industrial_park_district_panel.csv:
    label: "Satellite district-year panel: activity outcomes + treatment + covariates"
    grain: "district-year (woreda x year)"
    years: "2005-2020"
    coverage: "139 woredas (17 treated, 122 matched controls); balanced"
    key: "district_id x year"
    purpose: "Static TWFE DiD, event study, modern staggered estimators, heterogeneity, spillover, and Conley-SE robustness on satellite outcomes."
    note: "Balanced annual satellite panel, 139 synthetic woredas, 2005-2020. Carries the staggered open_year, the activity outcomes (IHS light, raw light, impervious ratio), geography, road density, and 2007 baseline characteristics used for the unit-specific trend interactions."
  industrial_park_household_rcs.csv:
    label: "DHS household repeated cross-section: living-standards outcomes"
    grain: "household-round (repeated cross-section)"
    years: "rounds 2000, 2005, 2011, 2016, 2019"
    coverage: "13,200 households across 5 DHS rounds; 139 districts"
    key: "hh_id (no panel key; identified off district_id x survey_round)"
    purpose: "Survey-weighted repeated-cross-section DiD on household durables, housing quality, and wealth (Table 5)."
    note: "DHS-style repeated cross-section: each round samples DIFFERENT households, so there is no within-household panel key. Effects are identified off district x region-round group means with DHS survey weights; only coarse event phases are available."
  industrial_park_individual_rcs.csv:
    label: "DHS individual repeated cross-section: employment + women's empowerment"
    grain: "individual-round (repeated cross-section)"
    years: "rounds 2000, 2005, 2011, 2016, 2019"
    coverage: "17,900 individuals across 5 DHS rounds; 139 districts"
    key: "ind_id (no panel key; identified off district_id x survey_round)"
    purpose: "Survey-weighted RCS DiD on non-agricultural employment and (for women) decision power, savings, and acceptance of domestic violence (Tables 6-7) — the study's heterogeneity climax."
    note: "DHS-style repeated cross-section of individuals; the analytical climax splits by sex. The five dv_* sub-items are the wife-beating-acceptance scenarios that compose dv_accept."

columns:
  # ---- identifiers & treatment design (district panel) ----
  district_id:
    label: "Woreda (district) identifier"
    definition: "Synthetic woreda identifier; the panel's unit of analysis and DiD fixed-effect / cluster key."
    construction: "Sequential synthetic codes ET_D001 .. ET_D139."
    units: "string"
    source: "Synthetic (this study)"
    coverage: "all files"
    kind: id
  district_name:
    label: "Woreda (district) name"
    definition: "Human-readable name for the woreda (real Ethiopian district names used as labels)."
    construction: "Assigned from a name scaffold; calibrated to the paper's park geography."
    units: "string"
    source: "Synthetic (this study)"
    coverage: "district panel"
    kind: str
  region:
    label: "Region (regional state) name"
    definition: "Ethiopian regional state the woreda belongs to."
    construction: "Assigned per woreda (e.g. Oromia, Addis Ababa, Amhara, Tigray, Sidama)."
    units: "string"
    source: "Synthetic (this study)"
    coverage: "district panel"
    kind: str
  region_id:
    label: "Region numeric code"
    definition: "Integer code for the regional state; used in region x year and region x round fixed effects."
    construction: "1..12, one per region."
    units: "code"
    source: "Synthetic (this study)"
    coverage: "all files"
    kind: id
  treated:
    label: "Ever-treated woreda (1=hosts a park)"
    definition: "1 if the woreda ever receives an industrial park (group indicator), else 0 (never-treated control)."
    construction: "1 for the 17 park-hosting woredas, 0 for the 122 matched controls."
    units: "0/1"
    source: "Synthetic (this study)"
    coverage: "all files"
    kind: dummy
    value_labels: {0: "Control (never-treated)", 1: "Treated (ever hosts a park)"}
  open_year:
    label: "Park opening year (treated woredas)"
    definition: "Calendar year the woreda's park opened; missing for never-treated controls."
    construction: "Staggered rollout: 2008 anchor, then 2014-2020 build-out (2-3 woredas/year)."
    units: "year"
    source: "Synthetic (this study)"
    coverage: "district panel (treated only)"
    kind: year
  treatment:
    label: "Treatment switch (1 once the park is open)"
    definition: "Time-varying DiD indicator: 1 for a treated woreda in years at/after its open_year, else 0."
    construction: "1[treated == 1 and year >= open_year]."
    units: "0/1"
    source: "Synthetic (this study)"
    coverage: "all files"
    kind: dummy
  nearby:
    label: "Control woreda near an open park (<=10 km)"
    definition: "1 for a control woreda within 10 km of an operational park (spillover/SUTVA test), else 0."
    construction: "1 if a never-treated woreda lies within 10 km of any open park in that year."
    units: "0/1"
    source: "Synthetic (this study)"
    coverage: "district panel"
    kind: dummy
  event_time:
    label: "Years relative to park opening"
    definition: "Year minus the woreda's open_year (event time k); the event-study time axis."
    construction: "year - open_year for treated woredas."
    units: "years (k)"
    source: "Synthetic (this study)"
    coverage: "district panel (treated)"
    kind: cont
  year:
    label: "Calendar year"
    definition: "Annual time index of the satellite panel."
    construction: "2005-2020, balanced for all 139 woredas."
    units: "year"
    source: "Synthetic (this study)"
    coverage: "district panel"
    kind: year
  post:
    label: "Post-2017 indicator (naive 2x2)"
    definition: "1 for years at/after the median opening year (2017), used to collapse the design into the naive 2x2."
    construction: "1[year >= 2017]."
    units: "0/1"
    source: "Synthetic (this study)"
    coverage: "district panel"
    kind: dummy
  # ---- satellite outcomes ----
  light_intensity:
    label: "Raw nighttime light intensity"
    definition: "Untransformed mean nighttime luminosity of the woreda (VIIRS-like, calibrated)."
    construction: "Simulated; treated park-cities carry an intrinsically bright base (the bright-base device)."
    units: "DN (light units)"
    source: "Synthetic (this study)"
    coverage: "district panel"
    kind: cont
  ihs_light:
    label: "IHS nighttime light (headline activity outcome)"
    definition: "Inverse hyperbolic sine of nighttime luminosity; a log-like transform that handles zeros."
    construction: "asinh(light_intensity); coefficients read approximately as proportional changes."
    units: "asinh(DN)"
    source: "Synthetic (this study)"
    coverage: "district panel"
    kind: cont
  light_positive:
    label: "Woreda emits any light (1=positive)"
    definition: "1 if the woreda has positive nighttime luminosity, else 0."
    construction: "1[light_intensity > 0]."
    units: "0/1"
    source: "Synthetic (this study)"
    coverage: "district panel"
    kind: dummy
  impervious_ratio:
    label: "Built-up (impervious) land share"
    definition: "Share of the woreda's land that is built-up/impervious surface; observed only every five years."
    construction: "Simulated impervious-surface ratio calibrated to the GISD30-style product."
    units: "0-1 (share)"
    source: "Synthetic (this study)"
    coverage: "district panel (5-yearly)"
    kind: cont
  # ---- geography & roads ----
  longitude:
    label: "Woreda longitude"
    definition: "Woreda centroid longitude (decimal degrees)."
    construction: "Assigned per woreda, calibrated to the paper's park geography."
    units: "degrees"
    source: "Synthetic (this study)"
    coverage: "district panel"
    kind: cont
  latitude:
    label: "Woreda latitude"
    definition: "Woreda centroid latitude (decimal degrees)."
    construction: "Assigned per woreda, calibrated to the paper's park geography."
    units: "degrees"
    source: "Synthetic (this study)"
    coverage: "district panel"
    kind: cont
  elevation:
    label: "Elevation (m)"
    definition: "Woreda mean elevation above sea level."
    construction: "Assigned per woreda (time-invariant)."
    units: "metres"
    source: "Synthetic (this study)"
    coverage: "district panel"
    kind: cont
  slope:
    label: "Terrain slope"
    definition: "Woreda mean terrain slope."
    construction: "Assigned per woreda (time-invariant)."
    units: "degrees"
    source: "Synthetic (this study)"
    coverage: "district panel"
    kind: cont
  dist_addis_km:
    label: "Distance to Addis Ababa (km)"
    definition: "Road/great-circle distance from the woreda to the capital, Addis Ababa."
    construction: "Computed from woreda coordinates; a heterogeneity moderator."
    units: "km"
    source: "Synthetic (this study)"
    coverage: "district panel"
    kind: cont
  dist_state_capital_km:
    label: "Distance to regional-state capital (km)"
    definition: "Distance from the woreda to its regional-state capital."
    construction: "Computed from woreda coordinates; a heterogeneity moderator."
    units: "km"
    source: "Synthetic (this study)"
    coverage: "district panel"
    kind: cont
  dist_nearest_city_km:
    label: "Distance to nearest city (km)"
    definition: "Distance from the woreda to the nearest city; the steepest effect moderator."
    construction: "Computed from woreda coordinates; a heterogeneity moderator."
    units: "km"
    source: "Synthetic (this study)"
    coverage: "district panel"
    kind: cont
  urbanization_rate_2007:
    label: "Urbanization rate, 2007 baseline"
    definition: "Share of the woreda's population in urban areas at the 2007 baseline."
    construction: "2007 baseline value; interacted with centred time for the unit-specific trends."
    units: "0-1 (share)"
    source: "Synthetic (this study)"
    coverage: "district panel"
    kind: cont
  employment_rate_2007:
    label: "Employment rate, 2007 baseline"
    definition: "Share of the woreda's working-age population employed at the 2007 baseline."
    construction: "2007 baseline value; interacted with centred time for the unit-specific trends."
    units: "0-1 (share)"
    source: "Synthetic (this study)"
    coverage: "district panel"
    kind: cont
  log_pop_density_2007:
    label: "Log population density, 2007 baseline"
    definition: "Natural log of population per km^2 at the 2007 baseline."
    construction: "log of 2007 population density; interacted with centred time for the trends."
    units: "log persons/km^2"
    source: "Synthetic (this study)"
    coverage: "district panel"
    kind: cont
  population_2007:
    label: "Population, 2007 baseline"
    definition: "Woreda population at the 2007 baseline."
    construction: "2007 baseline population count."
    units: "persons"
    source: "Synthetic (this study)"
    coverage: "district panel"
    kind: cont
  primary_road_density:
    label: "Primary-road density"
    definition: "Density of primary roads in the woreda; a road-access moderator."
    construction: "Assigned per woreda; positive interaction with treatment (amplifies the effect)."
    units: "km/km^2 (density)"
    source: "Synthetic (this study)"
    coverage: "district panel"
    kind: cont
  paved_road_density:
    label: "Paved-road density"
    definition: "Density of paved roads in the woreda; the significant road moderator."
    construction: "Assigned per woreda; positive interaction with treatment (amplifies the effect)."
    units: "km/km^2 (density)"
    source: "Synthetic (this study)"
    coverage: "district panel"
    kind: cont
  share_christian_2007:
    label: "Christian population share, 2007 baseline"
    definition: "Share of the woreda population that is Christian at the 2007 baseline."
    construction: "2007 baseline value; interacted with centred time for the unit-specific trends."
    units: "0-1 (share)"
    source: "Synthetic (this study)"
    coverage: "district panel"
    kind: cont
  share_amharic_2007:
    label: "Amharic-speaking share, 2007 baseline"
    definition: "Share of the woreda population speaking Amharic at the 2007 baseline."
    construction: "2007 baseline value; interacted with centred time for the unit-specific trends."
    units: "0-1 (share)"
    source: "Synthetic (this study)"
    coverage: "district panel"
    kind: cont
  labor_intensive_park:
    label: "Labor-intensive park (1=yes)"
    definition: "1 if the woreda's park is labor-intensive (textiles/garments), else 0 (park-type context)."
