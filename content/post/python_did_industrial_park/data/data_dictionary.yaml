# Data dictionary metadata for python_did_industrial_park — drives build_data_dictionary.py.
# Generated by the write-data-dictionary skill from the post's text + data; edit and rerun.

study:
  title: "Do Industrial Parks Work? Evaluating Place-Based Policy in Ethiopia with Difference-in-Differences"
  subtitle: "Companion data for a staggered DiD tutorial in Python, on synthetic data calibrated to Huang, Wang & Xu (2026)."
  overview: >
    Companion data for a beginner-friendly, end-to-end staggered difference-in-differences (DiD)
    tutorial that asks whether Ethiopia's industrial parks raised local economic activity,
    household living standards, and women's economic agency &mdash; and for whom. The tutorial
    replicates <strong>Huang, Wang &amp; Xu (2026)</strong> on <strong>fully synthetic</strong> data
    spanning three grains: a satellite district-year panel of 139 woredas (2005&ndash;2020), and two
    Ethiopia DHS repeated cross-sections of households and individuals across five survey rounds. The
    estimand throughout is the <strong>average treatment effect on the treated (ATT)</strong> &mdash;
    the effect on the 17 park-hosting woredas relative to 122 propensity-score-matched never-treated
    controls &mdash; identified under parallel trends in an explicitly observational setting. The
    analysis runs a static two-way fixed-effects DiD and an event study with <code>pyfixest</code>,
    cross-checks them against the Sun-Abraham, Borusyak/Gardner and Callaway-Sant'Anna estimators plus
    a Goodman-Bacon decomposition, and runs survey-weighted repeated-cross-section DiD with Conley
    spatial standard errors.
  panel_structure: >
    <strong>Three files at three grains.</strong>
    <code>industrial_park_district_panel</code> is a balanced annual satellite panel (one row per
    woreda &times; year, 139 woredas &times; 16 years, 2005&ndash;2020) carrying the activity
    outcomes, the staggered treatment timing, geography, and 2007 baseline covariates.
    <code>industrial_park_household_rcs</code> and <code>industrial_park_individual_rcs</code> are DHS
    <strong>repeated cross-sections</strong> (different respondents each of five rounds: 2000, 2005,
    2011, 2016, 2019), so they carry <em>no</em> within-respondent panel key and admit only coarse
    event phases and survey-weighted regressions, never unit fixed effects.
  kpis:
    - {n: 3, l: "datasets"}
    - {n: "139", l: "woredas"}
    - {n: "17 / 122", l: "treated / control"}
    - {n: "2005–2020", l: "panel years"}

dta_format_version: 118

sources:
  - name: "Huang, Wang & Xu (2026)"
    provides: "Replicated study; calibration targets (coefficient magnitudes, signs, significance) and the real park geography shown for context"
    reference: "Huang, G., Wang, M., & Xu, H. (2026). The socioeconomic impacts of industrial parks in Ethiopia. Journal of Urban Economics. https://doi.org/10.1016/j.jue.2026.103867"
  - name: "Synthetic (this study)"
    provides: "All values — simulated by a calibrated data-generating process so re-running the paper's regressions reproduces its findings (open & reproducible)"
    reference: "Mendez, C. (2026). See the post's Python script.py for the full DGP."
  - name: "Ethiopia DHS (calibration reference)"
    provides: "Survey design and outcome definitions the household/individual cross-sections imitate (the real DHS micro-data are confidential and not used)"
    reference: "Ethiopia Demographic and Health Surveys (DHS), 2000–2019 — The DHS Program, ICF / Ethiopian Public Health Institute. https://dhsprogram.com/"
  - name: "Method references"
    provides: "Estimators and concepts"
    reference: "Callaway & Sant'Anna (2021); Sun & Abraham (2021); Borusyak, Jaravel & Spiess (2024); Goodman-Bacon (2021); Conley (1999)."

formulas_html: |
  <p>All estimators target the <strong>ATT</strong> &mdash; the average park effect on the treated
  woredas, identified under parallel trends.</p>
  <ul class="tight">
    <li><strong>Static TWFE DiD</strong> (satellite panel):
      <code>Y_dt = β·D_dt + α_d + γ_{r(d),t} + ε_dt</code> &mdash; <code>α_d</code> is a woreda fixed
      effect, <code>γ_{r(d),t}</code> a region&times;year fixed effect, and <code>β</code> the ATT.
      The "with-trends" spec adds <code>t_*</code> interactions of centred time (year&nbsp;&minus;&nbsp;2012)
      with 2007 baseline characteristics, letting each woreda follow its own linear trend.</li>
    <li><strong>Event study</strong>:
      <code>Y_dt = Σ_{k≠−1} δ_k·1[t−g = k] + α_d + γ_{r(d),t} + ε_dt</code> &mdash; one coefficient per
      event time <code>k</code> (years since opening <code>g</code>), normalized to <code>k = −1</code>.</li>
    <li><strong>Repeated-cross-section DiD</strong> (DHS household/individual): no respondent panel, so
      identified off district&times;round means &mdash; <code>Y ~ treatment | district_id + region_id^survey_round</code>,
      DHS survey-weighted, district-clustered; only coarse event <em>phases</em>.</li>
    <li><strong>Goodman-Bacon</strong>: decomposes TWFE into weighted 2&times;2 comparisons
      (treated-vs-never, earlier-vs-later, forbidden later-vs-earlier).</li>
    <li><strong>Conley spatial-HAC SE</strong>: hardens the panel SE for spatial (nearby woredas in a
      year) and serial dependence; the point estimate is unchanged.</li>
    <li><strong>IHS transform</strong>: <code>ihs_light = asinh(light_intensity)</code> &mdash; a
      log-like transform that admits zeros; coefficients read approximately as proportional changes.</li>
  </ul>
  <p><strong>Synthetic data-generating process.</strong> The three CSVs are 100% synthetic, calibrated
  so re-running the paper's regressions reproduces its findings (signs, significance stars, approximate
  magnitudes). A deliberate <em>bright-base device</em> keeps treated park-cities intrinsically much
  brighter than rural controls (a level the district fixed effect absorbs); spatial and serial shocks
  are injected so standard errors behave realistically without moving the point estimates.</p>

caveats:
  - "<strong>Synthetic data.</strong> The three CSVs are 100% synthetic, built for teaching. They are calibrated to reproduce the paper's findings, not the paper's real (confidential) inputs — harmonized nighttime lights, the GISD30 impervious-surface product, Ethiopia DHS micro-data, and the official park list. Use them to learn the methods, not to draw conclusions about Ethiopia."
  - "<strong>Tiny treated group.</strong> Only 17 treated woredas against 122 matched controls, so several effects are borderline and the small treated sample cannot make all moderators precise at once (e.g. the primary-road interaction is correctly signed but insignificant)."
  - "<strong>Observational, not randomized.</strong> Parks were not randomly placed (they went to denser, more urban, better-connected woredas), so identification rests on parallel trends, not randomization; the fixed effects and trend terms are confounding controls, not precision-only adjustments."
  - "<strong>Documented synthetic gaps.</strong> The raw-light coefficient runs high (~1.6 vs the paper's 1.276, a bright-base artifact); light levels are intentionally not PSM-matched (the EDA figure is baseline-normalized); the decision-power mean sits a touch below the paper's because of a linear-probability clipping ceiling. See the post's Section 13 reproduction audit."
  - "<strong>Repeated cross-sections.</strong> The household and individual files have no within-respondent panel key, so they admit only coarse event phases and survey-weighted regressions, never unit fixed effects."

