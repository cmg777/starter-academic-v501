files:
  synthetic_ekc_panel.csv:
    label: "Synthetic country-year EKC panel: CO2, GDP cubic + 12 controls"
    grain: "country-year"
    years: "1995-2014"
    coverage: "80 countries (balanced; 1,600 obs)"
    key: "country_id x year"
    purpose: "Test the inverted-N EKC and grade BMA vs Double-Selection LASSO against a known answer key."
    note: "Balanced annual panel of 80 synthetic countries, 1995-2014 (1,600 obs). Outcome is log CO2 per capita generated from a cubic GDP polynomial + 5 true controls + country/year fixed effects + noise; 7 further controls are pure noise (true coefficient 0). Set as a panel with xtset country_id year, yearly. Inspired by Gravina & Lanzafame (2025) but fully synthetic."

columns:
  country_id:
    label: "Country ID"
    definition: "Synthetic country identifier (1-80); no real-country mapping."
    construction: "Sequential 1..80 assigned at panel creation (gen country_id = _n)."
    units: "integer (1-80)"
    source: "Simulation"
    coverage: "80 countries"
    kind: id
  year:
    label: "Calendar year"
    definition: "Annual time index, 1995-2014."
    construction: "1995 + sequence within country (20 years per country, balanced)."
    units: "year"
    source: "Simulation"
    coverage: "1995-2014"
    kind: year
  ln_co2:
    label: "CO2 per capita (log)"
    definition: "Outcome variable: natural log of CO2 emissions per capita."
    construction: "Generated from the DGP: b1*ln_gdp + b2*ln_gdp_sq + b3*ln_gdp_cb + 5 true controls + country FE + year FE + N(0,0.15) noise."
    units: "log"
    source: "Simulation (DGP outcome)"
    coverage: "country-year"
    kind: cont
  ln_gdp:
    label: "GDP per capita (log)"
    definition: "Log GDP per capita; the income axis of the EKC."
    construction: "Country baseline (uniform 7.0-11.5) + annual growth*(year-1995) + N(0,0.05) noise."
    units: "log international $"
    source: "Simulation"
    coverage: "country-year"
    kind: cont
  ln_gdp_sq:
    label: "GDP per capita squared (log)"
    definition: "Quadratic GDP term for the EKC polynomial."
    construction: "ln_gdp^2."
    units: "log^2"
    source: "Derived"
    coverage: "country-year"
    kind: cont
  ln_gdp_cb:
    label: "GDP per capita cubed (log)"
    definition: "Cubic GDP term (inverted-N) for the EKC polynomial."
    construction: "ln_gdp^3."
    units: "log^3"
    source: "Derived"
    coverage: "country-year"
    kind: cont
  fossil_fuel:
    label: "Fossil fuel share (%)"
    definition: "TRUE predictor (coef +0.015): fossil-fuel share of energy; more fossil fuels -> more CO2."
    construction: "Country base (correlated with GDP) + N(0,3) noise - 0.3*(year-1995), bounded to [5,95]."
    units: "% (5-95)"
    source: "Simulation (true predictor)"
    coverage: "country-year"
    kind: cont
  renewable:
    label: "Renewable energy (%)"
    definition: "TRUE predictor (coef -0.010): renewable share of energy; more renewables -> less CO2."
    construction: "Country base (negatively correlated with GDP) + N(0,2) + 0.4*(year-1995), bounded to [1,80]."
    units: "% (1-80)"
    source: "Simulation (true predictor)"
    coverage: "country-year"
    kind: cont
  urban:
    label: "Urban population (%)"
    definition: "TRUE predictor (coef +0.007, weak): urbanization rate; more urban -> more CO2."
    construction: "Country base (correlated with GDP) + N(0,1.5) + 0.3*(year-1995), bounded to [10,95]."
    units: "% (10-95)"
    source: "Simulation (true predictor)"
    coverage: "country-year"
    kind: cont
  democracy:
    label: "Democracy score"
    definition: "TRUE predictor (coef -0.005, weak): democracy index (-10 to 10); more democracy -> less CO2."
    construction: "Country base (uniform -5..10) + N(0,0.5), bounded to [-10,10]."
    units: "index (-10 to 10)"
    source: "Simulation (true predictor)"
    coverage: "country-year"
    kind: cont
  industry:
    label: "Industry VA (% GDP)"
    definition: "TRUE predictor (coef +0.010): industry value added share; more industry -> more CO2."
    construction: "Country base (correlated with GDP) + N(0,2) - 0.1*(year-1995), bounded to [5,60]."
    units: "% of GDP (5-60)"
    source: "Simulation (true predictor)"
    coverage: "country-year"
    kind: cont
  globalization:
    label: "Globalization index"
    definition: "NOISE control (true coef 0): tricky decoy, strongly correlated with GDP."
    construction: "Country base (strong GDP corr) + N(0,3) + 0.2*(year-1995), bounded to [20,95]."
    units: "index (20-95)"
    source: "Simulation (noise)"
    coverage: "country-year"
    kind: cont
  pop_density:
    label: "Population density"
    definition: "NOISE control (true coef 0): population density; no GDP correlation."
    construction: "Log-normal base exp(N(4,1.2)) * (1+0.01*(year-1995)) + N(0,5), floored at 1."
    units: "persons per km^2"
    source: "Simulation (noise)"
    coverage: "country-year"
    kind: cont
  corruption:
    label: "Corruption index"
    definition: "NOISE control (true coef 0): corruption score; no GDP correlation."
    construction: "Country base (uniform 0-100) + N(0,5), bounded to [0,100]."
    units: "index (0-100)"
    source: "Simulation (noise)"
    coverage: "country-year"
    kind: cont
  services:
    label: "Services VA (% GDP)"
    definition: "NOISE control (true coef 0): tricky decoy, strongly correlated with GDP."
    construction: "Country base (strong GDP corr) + N(0,2) + 0.2*(year-1995), bounded to [10,80]."
    units: "% of GDP (10-80)"
    source: "Simulation (noise)"
    coverage: "country-year"
    kind: cont
  trade:
    label: "Trade openness (% GDP)"
    definition: "NOISE control (true coef 0): trade openness; moderately correlated with GDP."
    construction: "Country base (moderate GDP corr) + N(0,5), bounded to [10,200]."
    units: "% of GDP (10-200)"
    source: "Simulation (noise)"
    coverage: "country-year"
    kind: cont
  fdi:
    label: "FDI inflows (% GDP)"
    definition: "NOISE control (true coef 0): foreign direct investment inflows; no GDP correlation."
    construction: "Country base N(3,4) + N(0,2)."
    units: "% of GDP"
    source: "Simulation (noise)"
    coverage: "country-year"
    kind: cont
  credit:
    label: "Domestic credit (% GDP)"
    definition: "NOISE control (true coef 0): domestic credit; moderately correlated with GDP."
    construction: "Country base (moderate GDP corr) + N(0,5) + 0.3*(year-1995), floored at 5."
    units: "% of GDP"
    source: "Simulation (noise)"
    coverage: "country-year"
    kind: cont
