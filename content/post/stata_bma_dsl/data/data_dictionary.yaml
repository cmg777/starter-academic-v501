# Data dictionary metadata for stata_bma_dsl — drives build_data_dictionary.py.
# Generated by the write-data-dictionary skill from the post's text + data; edit and rerun.

study:
  title: "Taming Model Uncertainty in the Environmental Kuznets Curve"
  subtitle: "A synthetic 80-country panel with a known answer key for grading BMA and Double-Selection LASSO."
  overview: >
    Companion data for a Stata tutorial that confronts the <strong>model-uncertainty
    problem</strong> in testing the Environmental Kuznets Curve (EKC). With 12 candidate
    control variables there are <code>2&#8313;&sup2; = 4,096</code> possible regressions on log
    CO<sub>2</sub> per capita, and choosing one is a hidden assumption. The tutorial applies two
    principled solutions &mdash; <strong>Bayesian Model Averaging</strong> (BMA, via Stata&rsquo;s
    <code>bmaregress</code>) and <strong>Post-Double-Selection LASSO</strong> (DSL, via
    <code>dsregress</code>) &mdash; to estimate the inverted-N cubic relationship between log CO<sub>2</sub>
    and log GDP. The data is <strong>fully synthetic</strong>, built from a known data-generating
    process in which <strong>5 controls truly affect emissions and 7 are pure noise</strong>, so
    each method can be graded against ground truth. With country and year fixed effects, BMA recovers
    the GDP cubic almost exactly and flags 6 of 8 true predictors at PIP &ge; 0.80 with zero false
    positives; DSL produces fast cluster-robust estimates. Stripping the fixed effects inflates the
    GDP coefficient and generates false positives.
  panel_structure: >
    <strong>One file.</strong> <code>synthetic_ekc_panel</code> is a balanced annual country panel
    &mdash; one row per country &times; year, 80 countries &times; 20 years (1995&ndash;2014) =
    1,600 observations. It carries the outcome (log CO<sub>2</sub> per capita), the three GDP
    polynomial terms, and the 12 candidate controls (5 true predictors + 7 noise). Set the panel in
    Stata with <code>xtset country_id year, yearly</code>.
  kpis:
    - {n: 1, l: "dataset"}
    - {n: 18, l: "variables"}
    - {n: 80, l: "countries"}
    - {n: "1995–2014", l: "years"}

dta_format_version: 118

sources:
  - name: "Synthetic (this study)"
    provides: "All values — simulated from a calibrated cubic-EKC data-generating process with a known answer key (open & reproducible)"
    reference: "Mendez, C. (2026). See the post's Stata do-file generate_data.do for the full DGP."
  - name: "Gravina & Lanzafame (2025)"
    provides: "Inspiration for the panel structure and variable set (the synthetic data is NOT identical to the original)"
    reference: "Gravina, A. F., & Lanzafame, M. (2025). Inequality and the Environmental Kuznets Curve."
  - name: "Method references"
    provides: "Estimators and concepts"
    reference: "Bayesian Model Averaging (Raftery 1995; Steel 2020); Post-Double-Selection LASSO (Belloni, Chernozhukov & Hansen 2014); Environmental Kuznets Curve (Grossman & Krueger 1995)."

formulas_html: |
  <p>The synthetic outcome &mdash; log CO<sub>2</sub> per capita &mdash; is generated from a
  <strong>cubic EKC with country and year fixed effects</strong> (the inverted-N shape):</p>
  <p><code>ln(CO2)_it = &beta;&#8321;&middot;ln(GDP)_it + &beta;&#8322;&middot;ln(GDP)&sup2;_it + &beta;&#8323;&middot;ln(GDP)&sup3;_it + X&#7511;&#7512;&#7512;&#7497;&middot;&gamma; + &alpha;_i + &delta;_t + &epsilon;_it</code></p>
  <p>with the <strong>true coefficients written into the DGP</strong>:
  <code>&beta;&#8321; = -7.10</code>, <code>&beta;&#8322; = +0.81</code>, <code>&beta;&#8323; = -0.03</code>
  (designed turning points near \$1,895 and \$34,647), five true control slopes
  &mdash; <code>fossil_fuel +0.015</code>, <code>renewable -0.010</code>, <code>urban +0.007</code>,
  <code>democracy -0.005</code>, <code>industry +0.010</code> &mdash; and seven noise controls with
  a true coefficient of exactly <strong>0</strong> (<code>globalization, pop_density, corruption,
  services, trade, fdi, credit</code>). Country fixed effects are <code>N(0, 0.50)</code> draws,
  the year effect is a downward decarbonization trend, and observation noise is <code>N(0, 0.15)</code>.</p>
  <ul class="tight">
    <li><strong>GDP polynomial</strong>: <code>ln_gdp_sq = ln_gdp&sup2;</code>,
      <code>ln_gdp_cb = ln_gdp&sup3;</code> &mdash; the linear/squared/cubic terms that trace the inverted-N.</li>
    <li><strong>Turning points</strong> (income where emissions change direction):
      <code>x* = [-&beta;&#8322; &plusmn; &radic;(&beta;&#8322;&sup2; - 3&beta;&#8321;&beta;&#8323;)] / (3&beta;&#8323;)</code>,
      <code>GDP* = exp(x*)</code>.</li>
    <li><strong>BMA</strong>: averages over the <code>2&#8313;&sup2; = 4,096</code> model space; each
      variable&rsquo;s <strong>posterior inclusion probability</strong> (PIP) is
      <code>PIP_j = &Sigma;_{k: x_j &isin; M_k} P(M_k | data)</code>, the posterior weight on models
      containing it (robustness threshold PIP &ge; 0.80). The posterior mean is
      <code>&beta;&#770;_j = &Sigma;_k P(M_k | data)&middot;&beta;&#770;_{j,k}</code>.</li>
    <li><strong>Double-Selection LASSO</strong>: LASSO-select controls for the outcome, then for each
      variable of interest, take the <strong>union</strong>, then run OLS on that union (cluster-robust SE)
      &mdash; "select, then regress" protection against omitted-variable bias.</li>
  </ul>
  <p>The true predictors and several noise variables are deliberately correlated with GDP in the DGP
  (e.g. <code>globalization</code>, <code>services</code> strongly), so a naive regression would flag
  the noise as "significant"; the task for BMA and DSL is to see through that correlation.</p>

caveats:
  - "<strong>Synthetic data.</strong> There is no real data behind this tutorial. Every value is simulated from a known data-generating process; results are internally consistent with the calibration but are NOT empirical evidence about real-world CO<sub>2</sub> emissions or the EKC."
  - "<strong>Inspired by, not identical to.</strong> The panel is inspired by Gravina & Lanzafame (2025) but the values are fully synthetic and do not reproduce that study's data."
  - "<strong>Known answer key.</strong> Exactly 5 controls (<code>fossil_fuel, renewable, urban, democracy, industry</code>) have a true non-zero effect; the other 7 are pure noise with a true coefficient of zero. Use this only to grade method accuracy, not to draw substantive conclusions."
  - "<strong>Weak signals are hard.</strong> Two true controls (<code>urban</code> +0.007, <code>democracy</code> -0.005) have small coefficients and fall below the PIP &ge; 0.80 threshold even though they belong &mdash; a realistic limitation, not a data error."
  - "<strong>Fixed effects matter.</strong> The cubic-EKC recovery and zero-false-positive selection hold only with country and year fixed effects; pooled (no-FE) estimates inflate the GDP coefficient 2&ndash;3&times; and generate false positives."
  - "<strong>Country IDs are arbitrary.</strong> <code>country_id</code> 1&ndash;80 are synthetic identifiers with no real-country mapping; the CSV rows are not sorted by id."

