study:
  title: "California's Proposition 99: The Synthetic DiD Panel"
  subtitle: "The canonical state-cigarette panel behind synthetic difference-in-differences, in Stata."
  overview: >
    Companion data for a hands-on Stata tutorial on <strong>synthetic difference-in-differences
    (SDID)</strong>, applied to re-evaluate <strong>California's Proposition 99</strong> &mdash; the
    1988 ballot measure that raised the cigarette excise tax by 25 cents a pack and funded an
    anti-smoking campaign. The file is the canonical strongly balanced panel distributed with the
    <code>sdid</code> package (originally from Abadie, Diamond &amp; Hainmueller 2010, and used by
    Arkhangelsky et&nbsp;al. 2021): <strong>39 US states</strong> observed annually from
    <strong>1970&ndash;2000</strong> &mdash; 1,209 observations &mdash; with annual cigarette sales
    in <strong>packs per capita</strong> as the sole outcome. California is the single treated unit;
    the policy bites from 1989 onward. The post writes DiD, synthetic control, and SDID as one
    weighted two-way fixed-effects regression and estimates the ATT of Proposition&nbsp;99 with the
    <code>sdid</code> command, cross-checking synthetic control against <code>synth2</code>.
  panel_structure: >
    <strong>One file, one outcome.</strong> <code>prop99_example</code> is a strongly balanced
    state-year panel (one row per state &times; year, no gaps) carrying a single outcome
    &mdash; cigarette packs per capita &mdash; and a 0/1 treatment indicator. Of the 1,209
    observations only <strong>12 are treated</strong> (California, 1989&ndash;2000). The panel
    deliberately contains <em>no</em> covariates, so synthetic control and SDID see exactly the same
    information set (the pre-period smoking paths) &mdash; an apples-to-apples comparison.
  kpis:
    - {n: 1, l: "dataset"}
    - {n: 4, l: "variables"}
    - {n: 39, l: "states"}
    - {n: "1970–2000", l: "years"}

dta_format_version: 118

