formulas_html: |
  <p>Every estimator in the post is the <strong>same weighted two-way fixed-effects (TWFE)
  regression</strong> over <code>packspercapita</code> (<code>Y</code>) and the treatment indicator
  <code>treated</code> (<code>W</code>), changing only the weights — the unifying view of
  Arkhangelsky et&nbsp;al. (2021).</p>
  <ul class="tight">
    <li><strong>Synthetic DiD objective</strong>:
      <code>(τ̂, μ̂, α̂, β̂) = argmin Σ_i Σ_t (Y_it − μ − α_i − β_t − W_it·τ)² · ω̂_i · λ̂_t</code>
      — a TWFE regression weighted by unit weights <code>ω̂_i</code> and time weights
      <code>λ̂_t</code>. <code>α_i</code> = state fixed effect; <code>β_t</code> = year fixed
      effect; <code>τ</code> = the ATT.</li>
    <li><strong>DiD</strong>: the special case with <em>uniform</em> ω and λ (plain TWFE) — credibility
      rests entirely on parallel trends versus all controls.</li>
    <li><strong>Synthetic control</strong>: keeps optimized unit weights ω but drops the time weights λ
      <em>and</em> the unit fixed effects α — so it must match California's pre-period level
      <em>and</em> trend.</li>
    <li><strong>Unit weights</strong> ω: chosen so the weighted controls track California's pre-period
      path (with intercept ω₀ and a ridge penalty ζ² for stability).</li>
    <li><strong>Time weights</strong> λ: chosen so weighted pre-period years line up with the
      post-period — here SDID places all pre-period weight on 1986–1988.</li>
  </ul>
  <p><strong>Estimand (ATT).</strong>
  <code>τ = (1 / (N_tr·T_post)) · Σ_{i: W_i=1} Σ_{t > T_pre} [ Y_it(1) − Y_it(0) ]</code>
  — the effect of Proposition 99 on California over the post-1988 period, where the counterfactual
  <code>Y_it(0)</code> is never observed and each method imputes it differently. Here
  <code>N_tr = 1</code> (California). Because California was not randomly assigned, this is an
  observational design.</p>

caveats:
  - "<strong>Single treated unit.</strong> Only 12 of 1,209 observations are treated (California, 1989–2000). With one treated unit, placebo (permutation) inference is the only valid procedure — the jackknife is undefined and the bootstrap is unreliable; statistical power is inherently limited."
  - "<strong>Outcome-only panel.</strong> The file carries no income, price, or demographic covariates — only cigarette packs per capita. This is deliberate: synthetic control and SDID see exactly the same information, so any difference in their answers comes from the estimator, not from different predictors."
  - "<strong>Strongly balanced.</strong> Every state is observed in every year 1970–2000 with no gaps; this balance is required by all three estimators in the post."
  - "<strong>Observational, not experimental.</strong> California was not randomly assigned Proposition 99; identification assumes a stable comparison group, no large contemporaneous shock unique to California in 1989, and no cross-state spillovers (e.g., border cigarette purchases contaminating donor states)."
  - "<strong>Distributed dataset.</strong> Values are byte-faithful to the canonical prop99_example.dta shipped with the sdid package; this data dictionary adds only metadata (variable + value labels)."

