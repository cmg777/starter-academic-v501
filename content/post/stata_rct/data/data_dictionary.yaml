files:
  dataSIM4RCT.dta:
    label: "Simulated RCT household panel: 2021 baseline + 2024 endline"
    grain: "household-year (two waves)"
    years: "2021, 2024"
    coverage: "2,000 households (strongly balanced; 4,000 rows)"
    key: "id x year"
    purpose: "Evaluate a cash-transfer program (RA / IPW / DR / DiD / DR-DiD / endogenous-treatment IV) against a known 0.12 effect."
    note: "Synthetic balanced household panel, 2,000 households observed in 2021 (baseline) and 2024 (endline). Random assignment to offer (treat) is fixed within household; receipt (D) turns on only at endline for compliers. True treatment effect = 0.12 log points (~12%). wave/year/post encode the same time axis; alpha/eps/y0 are data-generating-process internals."

columns:
  id:
    label: "Household identifier"
    definition: "Unique household ID; the panel unit, repeated across the two waves."
    construction: "1..2000, one per household."
    units: "integer"
    source: "Simulation"
    kind: id
  year:
    label: "Survey year (2021 or 2024)"
    definition: "Calendar year of the survey wave."
    construction: "2021 for the baseline wave, 2024 for the endline wave."
    units: "year"
    source: "Simulation"
    kind: year
  wave:
    label: "Survey wave index (1=baseline, 2=endline)"
    definition: "Integer wave index; an alternative encoding of the time axis to year/post."
    construction: "1 for the 2021 baseline, 2 for the 2024 endline."
    units: "1/2"
    source: "Simulation"
    kind: id
    value_labels: {1: "Baseline (2021)", 2: "Endline (2024)"}
  post:
    label: "Endline indicator (1 = 2024)"
    definition: "Binary post-treatment period flag; 1 at endline, 0 at baseline."
    construction: "1 if year==2024 (endline), else 0."
    units: "0/1"
    source: "Simulation"
    kind: dummy
    value_labels: {0: "Baseline (pre)", 1: "Endline (post)"}
  treat:
    label: "Assignment to offer (intent-to-treat)"
    definition: "Random assignment to the program offer; exogenous, fixed within household across waves."
    construction: "Stratified (block) randomization within poverty strata; ~52% assigned."
    units: "0/1"
    source: "Simulation (randomized)"
    kind: dummy
    value_labels: {0: "Control (not offered)", 1: "Treatment (offered)"}
  D:
    label: "Receipt of cash transfer (endogenous)"
    definition: "Actual receipt of the transfer; endogenous take-up, non-zero only at endline."
    construction: "0 at baseline; at endline ~85% of the offered and ~5% of controls receive (imperfect compliance)."
    units: "0/1"
    source: "Simulation"
    kind: dummy
    value_labels: {0: "Did not receive", 1: "Received transfer"}
  y:
    label: "Log monthly consumption (outcome)"
    definition: "Outcome variable: natural log of monthly household consumption in each wave."
    construction: "Baseline level + household and time components, plus the 0.12 treatment bump at endline for recipients."
    units: "log of monetary units"
    source: "Simulation"
    kind: cont
  y0:
    label: "Baseline log consumption (pre-treatment)"
    definition: "Each household's 2021 baseline value of y, carried to both rows for ANCOVA-style adjustment."
    construction: "y at the baseline wave; constant within household across the two rows."
    units: "log of monetary units"
    source: "Simulation"
    kind: cont
  age:
    label: "Age of household head"
    definition: "Age in years of the household head (time-invariant in this panel)."
    construction: "Drawn at baseline; held fixed across waves."
    units: "years"
    source: "Simulation"
    kind: cont
  female:
    label: "Female-headed household"
    definition: "1 if the household head is female, else 0 (the chance baseline imbalance, SMD ~9.3%)."
    construction: "Drawn at baseline; held fixed across waves."
    units: "0/1"
    source: "Simulation"
    kind: dummy
    value_labels: {0: "Male-headed", 1: "Female-headed"}
  poverty:
    label: "Poverty status at baseline"
    definition: "1 if the household is in poverty at baseline (the randomization stratum), else 0."
    construction: "Drawn at baseline; randomization was stratified on this variable."
    units: "0/1"
    source: "Simulation"
    kind: dummy
    value_labels: {0: "Non-poor", 1: "In poverty"}
  edu:
    label: "Years of education (household head)"
    definition: "Years of education of the household head (time-invariant in this panel)."
    construction: "Drawn at baseline; held fixed across waves."
    units: "years"
    source: "Simulation"
    kind: cont
  alpha:
    label: "Household DGP component (random effect)"
    definition: "Simulation random component contributing to consumption; not a tutorial covariate."
    construction: "Generated by the data-generating process (household/wave-level term)."
    units: "log scale"
    source: "Simulation (DGP internal)"
    kind: cont
  eps:
    label: "Idiosyncratic DGP error term"
    definition: "Simulation idiosyncratic shock to consumption; not a tutorial covariate."
    construction: "Generated by the data-generating process (per-observation noise)."
    units: "log scale"
    source: "Simulation (DGP internal)"
    kind: cont
