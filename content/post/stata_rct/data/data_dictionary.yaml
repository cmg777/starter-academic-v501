# Data dictionary metadata for stata_rct — drives build_data_dictionary.py.
# Generated by the write-data-dictionary skill from the post's text + data; edit and rerun.

study:
  title: "Evaluating a Cash Transfer Program (RCT) with Panel Data"
  subtitle: "The simulated two-wave household panel behind the Stata RCT tutorial, with a known 12% true effect."
  overview: >
    Companion data for a hands-on Stata tutorial that evaluates the causal effect of a cash
    transfer program on household consumption. The data are <strong>fully synthetic</strong>:
    2,000 households in a developing country, observed in a balanced panel across a 2021 baseline
    and a 2024 endline (4,000 observations). The outcome is log monthly consumption and the
    program raises it by a <strong>known true effect of 12%</strong> (0.12 log points). The
    tutorial walks from baseline-balance checks through three cross-sectional estimators
    &mdash; regression adjustment (RA), inverse probability weighting (IPW), and doubly robust
    AIPW/IPWRA &mdash; then difference-in-differences and doubly robust DiD on the panel, and an
    endogenous-treatment IV model for imperfect compliance. Because the ground truth is known,
    every estimate can be checked against 0.12.
  panel_structure: >
    <strong>One file, long panel.</strong> <code>dataSIM4RCT.dta</code> is a strongly balanced
    household panel &mdash; two rows per household (2021 baseline and 2024 endline), keyed by
    <code>id &times; year</code>. Random assignment to the program offer (<code>treat</code>) is
    fixed within a household; actual receipt (<code>D</code>) turns on only at endline and only
    for compliers (imperfect take-up: 85% of the offered, 5% of controls). The variables
    <code>wave</code>, <code>year</code>, and <code>post</code> are three encodings of the same
    two-period time axis; <code>alpha</code> and <code>eps</code> are data-generating-process
    internals exposed for transparency.
  kpis:
    - {n: 1, l: "dataset"}
    - {n: 14, l: "variables"}
    - {n: 2000, l: "households"}
    - {n: "2021 & 2024", l: "waves"}

dta_format_version: 118

sources:
  - name: "Synthetic (this study)"
    provides: "All values — simulated household panel with a calibrated, known 12% true effect (open & reproducible)"
    reference: "Mendez, C. (2026). See the post's Stata do-file analysis.do and the tutorial for the design."
  - name: "Method references"
    provides: "Estimators and concepts (RA / IPW / doubly-robust AIPW-IPWRA / DiD / DR-DiD / endogenous-treatment IV)"
    reference: "Stata teffects manual; Sant'Anna & Zhao (2020); Imbens & Rubin (2015); Rios-Avila, Sant'Anna & Callaway (drdid)."

formulas_html: |
  <p>The outcome <code>y</code> is log monthly consumption. The causal target is the program's
  average effect, with a known true value of <strong>0.12 log points (&approx;12%)</strong>.
  Two estimands recur throughout:</p>
  <ul class="tight">
    <li><strong>ATE</strong> (policymaker's quantity): <code>ATE = E[Y(1) &minus; Y(0)]</code> &mdash;
      the average effect if the program were scaled to everyone.</li>
    <li><strong>ATT</strong> (evaluator's quantity): <code>ATT = E[Y(1) &minus; Y(0) | T=1]</code> &mdash;
      the average effect among the treated. DiD estimates the ATT only.</li>
  </ul>
  <p>Five estimation strategies are applied to these data:</p>
  <ul class="tight">
    <li><strong>Regression adjustment (RA)</strong>: fit outcome models on treated and control,
      impute both potential outcomes, average the difference:
      <code>&tau;_RA = (1/N) &Sigma; [&mu;&#770;_1(X_i) &minus; &mu;&#770;_0(X_i)]</code>.
      Consistent if the outcome model is correct (<code>teffects ra</code>).</li>
    <li><strong>Inverse probability weighting (IPW)</strong>: reweight by the inverse propensity
      score <code>p&#770;(X)=Pr(T=1|X)</code>:
      <code>&tau;_IPW = (1/N) &Sigma; [T_i Y_i / p&#770; &minus; (1&minus;T_i) Y_i / (1&minus;p&#770;)]</code>.
      Consistent if the treatment model is correct (<code>teffects ipw</code>).</li>
    <li><strong>Doubly robust (AIPW / IPWRA)</strong>: RA plus an IPW-weighted bias-correction term,
      <code>&tau;_DR = &tau;_RA + (1/N) &Sigma; [T_i(Y_i&minus;&mu;&#770;_1)/p&#770; &minus; (1&minus;T_i)(Y_i&minus;&mu;&#770;_0)/(1&minus;p&#770;)]</code>.
      Consistent if <em>either</em> model is correct (<code>teffects aipw</code> / <code>teffects ipwra</code>).</li>
    <li><strong>Difference-in-differences (DiD)</strong>: the difference of pre/post changes,
      <code>&tau;_DiD = (Y&#772;_tr,post &minus; Y&#772;_tr,pre) &minus; (Y&#772;_ct,post &minus; Y&#772;_ct,pre)</code>,
      netting out time-invariant unobservables; estimates the ATT (<code>xtdidregress</code>).</li>
    <li><strong>Doubly robust DiD (DR-DiD)</strong>: Sant'Anna &amp; Zhao (2020) extend the DR logic to
      changes &Delta;Y, consistent if the outcome <em>or</em> the propensity model holds
      (<code>drdid</code>, <code>xthdidregress aipw</code>).</li>
  </ul>
  <p>Imperfect compliance is handled by using random assignment <code>treat</code> as an instrument
  for receipt <code>D</code> (endogenous-treatment regression, <code>etregress</code>), separating
  the effect of the <em>offer</em> (ITT) from the effect of <em>receipt</em>.</p>
  <p><strong>Data-generating process.</strong> For household <code>i</code>, log consumption is built
  from a baseline level plus a household component <code>alpha</code>, an idiosyncratic shock
  <code>eps</code>, a common time trend, and the 0.12 treatment bump applied at endline to households
  that receive the transfer. The baseline value is stored as <code>y0</code> and carried to both rows;
  <code>wave</code>/<code>year</code>/<code>post</code> encode the two-period time axis.</p>

caveats:
  - "<strong>Synthetic data.</strong> There is no real program behind this tutorial; values are simulated with a known 0.12 log-point effect. Results are internally consistent with the calibration but are not empirical evidence about real cash-transfer programs."
  - "<strong>Two periods only.</strong> The panel has a single baseline (2021) and endline (2024), so it cannot test pre-treatment (parallel) trends or estimate dynamic/staggered effects."
  - "<strong>Homogeneous effect by construction.</strong> The treatment effect is the same for all households, so ATE and ATT nearly coincide; real programs typically show heterogeneity worth exploring by subgroup."
  - "<strong>Imperfect compliance.</strong> Random assignment <code>treat</code> &ne; actual receipt <code>D</code> (85% take-up among the offered, 5% among controls); offer-based (ITT) and receipt-based estimates differ — use <code>treat</code> for the policy offer and the IV/DR-receipt models for the effect of receipt."
  - "<strong>DGP internals.</strong> <code>alpha</code> and <code>eps</code> are simulation components (household and idiosyncratic terms), and <code>y0</code> is the baseline outcome carried to both rows; they are exposed for transparency and are not analysis covariates in the tutorial."

