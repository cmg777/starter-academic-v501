# Data dictionary metadata for r_sc_multi_country — drives build_data_dictionary.py.
# Generated by the write-data-dictionary skill from the post's text + data; edit and rerun.

study:
  title: "Augmented Synthetic Control for Multiple Countries"
  subtitle: "Simulated panels for an augsynth tutorial — a two-country intuition example and a 25-country factor-model panel with a known injected effect."
  overview: >
    Companion data for a hands-on R tutorial on the <strong>Augmented Synthetic Control Method
    (ASCM)</strong> of Ben-Michael, Feller &amp; Rothstein (2021), demonstrated in a multi-country
    setting with the <code>augsynth</code> package and its three entry points
    (<code>single_augsynth</code>, <code>multisynth</code>, <code>augsynth_multiout</code>). Both
    files here are <strong>fully synthetic</strong>: the true counterfactual and injected effect are
    known by construction, so every estimate can be graded against ground truth before the method is
    turned loose on the real Penn-World-Table EMU data (which lives in the post's <code>reference/</code>
    folder and is not documented here). The simulated panels validate that each estimator recovers a
    known effect and show exactly where plain SCM fails and Ridge augmentation rescues it.
  panel_structure: >
    <strong>Two files.</strong> <code>synthetic_panel_2country_intuition</code> is a minimal two-unit
    annual panel (Atlantia treated vs Borealis control, 2000&ndash;2023) used in &sect;3 to show
    synthetic control in its simplest possible form. <code>synthetic_panel_multicountry</code> is the
    reusable 25-country &times; 39-year (1985&ndash;2023) factor-model panel used in &sect;4&ndash;&sect;9:
    five treated units with staggered adoption and twenty never-treated donors, shipped with the
    <em>true</em> counterfactual and <em>true</em> injected effect columns for grading.
  kpis:
    - {n: 2, l: "datasets"}
    - {n: 14, l: "variables"}
    - {n: 25, l: "sim countries"}
    - {n: "1985–2023", l: "years"}

dta_format_version: 118

