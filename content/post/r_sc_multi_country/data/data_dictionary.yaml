files:
  synthetic_panel_2country_intuition.csv:
    label: "Two-country intuition panel: treated vs matched control"
    grain: "country-year"
    years: "2000-2023"
    coverage: "2 countries (Atlantia, Borealis)"
    key: "country x year"
    purpose: "Show synthetic control in its simplest form: one perfectly matched comparison unit."
    note: "Two-unit annual panel for the section-3 intuition example. Borealis (control) is the counterfactual by construction; Atlantia (treated) equals it plus an injected effect that turns on in 2012 and grows 1.5 units/year, so the post-2012 gap equals the effect."
  synthetic_panel_multicountry.csv:
    label: "Reusable 25-country factor-model panel (known effect)"
    grain: "country-year"
    years: "1985-2023"
    coverage: "25 countries (5 treated, 20 donors), balanced"
    key: "country x year"
    purpose: "Validate all three augsynth entry points and the suitability/inference tests against a known truth."
    note: "Balanced annual panel of 25 synthetic countries x 39 years = 975 rows. Five treated units (C01-C05) with staggered adoption (2010/2013/2016) and twenty never-treated donors (C06-C25). Built from a three-factor model; ships the true counterfactual and true injected-effect columns for grading."

columns:
  country:
    label: "Country identifier"
    definition: "Synthetic unit name (panel id)."
    construction: "Two-country file: 'Atlantia (treated)' / 'Borealis (control)'. Multi-country file: C01-C25 (C01-C05 treated, C06-C25 donors)."
    units: "string"
    source: "Simulation"
    kind: str
  year:
    label: "Calendar year"
    definition: "Annual time index."
    construction: "Two-country file 2000-2023; multi-country file 1985-2023."
    units: "year"
    source: "Simulation"
    kind: year
  outcome:
    label: "Outcome series (two-country file)"
    definition: "The single observed outcome path for each unit in the intuition example."
    construction: "Common trend 40 + 1.2*t + 3*sin(2*pi*t/9) + N(0,0.6); treated also adds the injected post-2012 effect."
    units: "index"
    source: "Simulation"
    kind: cont
  treat:
    label: "Treatment indicator (two-country file)"
    definition: "1 from the intervention year onward for the treated unit, else 0."
    construction: "as.integer(year >= 2012) for Atlantia; 0 for Borealis."
    units: "0/1"
    source: "Simulation"
    kind: dummy
  role:
    label: "Unit role (two-country file)"
    definition: "Whether the unit is the treated unit or the control/counterfactual."
    construction: "'treated' for Atlantia, 'control' for Borealis."
    units: "category"
    source: "Simulation"
    kind: str
  treated_unit:
    label: "Treated-unit flag (multi-country file)"
    definition: "1 if the country is ever treated (C01-C05), 0 for a never-treated donor."
    construction: "1 for the five treated units, 0 for the twenty donors."
    units: "0/1"
    source: "Simulation"
    kind: dummy
  adopt_year:
    label: "Adoption year (multi-country file)"
    definition: "The year treatment switches on for a treated unit; missing for donors."
    construction: "C01/C02 2010, C03 2013, C04/C05 2016; NA for donors."
    units: "year"
    source: "Simulation"
    kind: year
  treat_ms:
    label: "Time-varying treatment indicator (multi-country file)"
    definition: "1 from a treated unit's adoption year onward, else 0 (the multisynth treatment column)."
    construction: "as.integer(year >= adopt_year) for treated units; 0 for donors."
    units: "0/1"
    source: "Simulation"
    kind: dummy
  gdp_index:
    label: "Primary outcome (observed GDP index)"
    definition: "The primary observed outcome; for treated units it includes the injected effect."
    construction: "Y(0) from a three-factor model (mu + L1*f1 + L2*f2 + L3*f3 + noise) plus the injected effect for treated units."
    units: "index"
    source: "Simulation"
    kind: cont
  trade_index:
    label: "Secondary outcome (observed trade index)"
    definition: "A second correlated observed outcome used by augsynth_multiout."
    construction: "0.6*gdp_index_cf + nu + k*f1 + noise, plus 0.6x the gdp injected effect for treated units."
    units: "index"
    source: "Simulation"
    kind: cont
  gdp_index_cf:
    label: "True GDP counterfactual (Y(0))"
    definition: "The untreated potential outcome for gdp_index — the true counterfactual revealed for grading."
    construction: "Y(0) from the factor model, before adding any injected effect (equals gdp_index for donors)."
    units: "index"
    source: "Simulation (ground truth)"
    kind: cont
  trade_index_cf:
    label: "True trade counterfactual (Y(0))"
    definition: "The untreated potential outcome for trade_index — the true counterfactual revealed for grading."
    construction: "Second-outcome Y(0) before adding any injected effect (equals trade_index for donors)."
    units: "index"
    source: "Simulation (ground truth)"
    kind: cont
  true_effect_gdp:
    label: "True injected GDP effect"
    definition: "The known treatment effect on gdp_index (gdp_index minus gdp_index_cf); 0 before adoption and for donors."
    construction: "post*jump + slope*(year - adopt): a jump at adoption plus a yearly ramp."
    units: "index units"
    source: "Simulation (ground truth)"
    kind: cont
  true_effect_trade:
    label: "True injected trade effect"
    definition: "The known treatment effect on trade_index; 0 before adoption and for donors."
    construction: "0.6 * true_effect_gdp."
    units: "index units"
    source: "Simulation (ground truth)"
    kind: cont
