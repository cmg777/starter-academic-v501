    reference: "Mendez, C. (2026). See the post's R script analysis.R for the full data-generating process."
  - name: "Ben-Michael, Feller & Rothstein (2021)"
    provides: "The Augmented Synthetic Control Method estimator implemented in augsynth"
    reference: "Ben-Michael, E., Feller, A., & Rothstein, J. (2021). The Augmented Synthetic Control Method. Journal of the American Statistical Association, 116(536), 1415–1427."
  - name: "Abadie, Diamond & Hainmueller (2010)"
    provides: "The classic synthetic control method (the progfunc = None baseline)"
    reference: "Abadie, A., Diamond, A., & Hainmueller, J. (2010). Synthetic Control Methods for Comparative Case Studies. Journal of the American Statistical Association, 105(490), 493–505."
  - name: "augsynth package"
    provides: "Estimation (single_augsynth / multisynth / augsynth_multiout) and inference tools"
    reference: "Ben-Michael, E. augsynth: https://github.com/ebenmichael/augsynth"

formulas_html: |
  <p>Synthetic control answers a counterfactual question: among units that were <em>not</em> treated,
  find the weighted recipe whose pre-treatment path matches the treated unit, and read the
  post-treatment gap as the effect (the ATT).</p>
  <ul class="tight">
    <li><strong>SCM weight problem</strong>: choose convex donor weights
      <code>W</code> minimizing <code>||X1 − X0·W||_V</code> subject to
      <code>w_j ≥ 0</code> and <code>Σ_j w_j = 1</code> — an interpolation of the donors, never an
      extrapolation.</li>
    <li><strong>Augmented (bias-corrected) estimator</strong>:
      <code>τ̂_t^aug = (Y_1t − Σ_j w_j Y_jt) − (m̂_t(X_1) − Σ_j w_j m̂_t(X_j))</code> — the ordinary
      SCM gap minus what a prognostic model <code>m̂_t</code> (Ridge when <code>progfunc = "ridge"</code>)
      predicts the residual imbalance should be. With a perfect pre-fit the correction vanishes and
      ASCM equals SCM.</li>
  </ul>
  <p><strong>Two-country DGP</strong> (<code>synthetic_panel_2country_intuition</code>): a common trend
  <code>40 + 1.2·t + 3·sin(2π·t/9)</code> with Gaussian noise; Borealis follows the trend, Atlantia
  follows the trend plus an injected effect that switches on in 2012 and grows by 1.5 units/year. By
  construction Borealis <em>is</em> the counterfactual, so the post-2012 gap equals the injected effect.</p>
  <p><strong>Multi-country DGP</strong> (<code>synthetic_panel_multicountry</code>): a three-latent-factor
  model <code>Y(0) = μ + L1·f1 + L2·f2 + L3·f3 + noise</code> with a unit fixed effect; the second
  outcome is <code>0.6·Y1 + ν + k·f1 + noise</code>. Treated units C01&ndash;C04 are each a sparse convex
  blend of three named donors (a near-perfect synthetic control provably exists); C05 is placed
  <em>outside</em> the donor hull (loadings beyond every donor) to stress-test the methods. The injected
  effect on <code>gdp_index</code> is a jump at adoption plus a yearly ramp
  (<code>post·jump + slope·(year − adopt)</code>), with a correlated 0.6× effect on <code>trade_index</code>.</p>

caveats:
  - "<strong>Synthetic data.</strong> Both files are fully simulated; results are internally consistent with the calibration but are not empirical evidence about real-world policy effects. The real euro-area data underlying Part 2 is the Penn World Table panel in the post's reference/ folder, which is not documented here."
  - "<strong>C05 is outside the donor hull by design.</strong> No convex blend of the donors can reproduce its pre-treatment path, so plain SCM mis-signs its effect; this is intentional, to show where Ridge augmentation earns its keep."
  - "<strong>Ground-truth columns ship with the data.</strong> gdp_index_cf / trade_index_cf (the true counterfactuals) and true_effect_gdp / true_effect_trade (the injected effects) are revealed here for grading; real datasets never give you these."
  - "<strong>Significance is a choice.</strong> On these simulated panels the injected effects are real, so headlines are significant — but the jackknife and the wild bootstrap can still disagree (the pooled multisynth effect is significant under the jackknife yet not under the bootstrap). Match the inference tool to the estimator and report when they disagree."

