files:
  abdata.csv:
    label: "Arellano-Bond UK firm panel: employment, wages, capital (levels + logs)"
    grain: "firm-year"
    years: "1976-1984"
    coverage: "140 firms (unbalanced; 1,031 firm-years)"
    key: "id x year"
    purpose: "Raw input panel for the dynamic labor-demand estimators."
    note: "The classic Arellano & Bond (1991) UK manufacturing employment panel, distributed with pydynpd. Columns n/w/k/ys are the natural logs of emp/wage/cap/indoutpt; estimation uses the logged variables."
  data_prepared.csv:
    label: "Analysis sample: abdata plus firm-wise lags and first differences"
    grain: "firm-year"
    years: "1976-1984"
    coverage: "140 firms (1,031 rows; lag/difference columns missing in each firm's first year(s))"
    key: "id x year"
    purpose: "Identically-built lags/differences so every estimator runs on the same transformed variables."
    note: "abdata.csv with one-period lags (n_lag1, w_lag1, k_lag1), the two-period employment lag (n_lag2), and firm-wise first differences (d_n, d_w, d_k, d_n_lag1, d_w_lag1, d_k_lag1). All transforms computed within firm id; the lagged/differenced columns are blank for the observations that lack a prior year."

columns:
  id:
    label: "Firm identifier"
    definition: "Sequential firm (panel unit) identifier; 140 UK manufacturing firms."
    construction: "From the Arellano-Bond panel; the panel id passed to estimators as [id, year]."
    units: "integer"
    source: "Arellano & Bond (1991)"
    coverage: "both files"
    kind: id
  year:
    label: "Calendar year"
    definition: "Annual time index of the observation."
    construction: "From the Arellano-Bond panel; range 1976-1984."
    units: "year"
    source: "Arellano & Bond (1991)"
    coverage: "both files"
    kind: year
  emp:
    label: "Employment (level)"
    definition: "Firm employment in thousands (the level behind log employment n)."
    construction: "Raw level; n = log(emp)."
    units: "thousands of employees"
    source: "Arellano & Bond (1991)"
    coverage: "both files"
    kind: cont
  wage:
    label: "Real wage (level)"
    definition: "Firm real product wage (the level behind log wage w)."
    construction: "Raw level; w = log(wage)."
    units: "index/level"
    source: "Arellano & Bond (1991)"
    coverage: "both files"
    kind: cont
  cap:
    label: "Gross capital stock (level)"
    definition: "Firm gross capital stock (the level behind log capital k)."
    construction: "Raw level; k = log(cap)."
    units: "index/level"
    source: "Arellano & Bond (1991)"
    coverage: "both files"
    kind: cont
  indoutpt:
    label: "Industry output (level)"
    definition: "Industry-level output for the firm's sector (the level behind log industry output ys)."
    construction: "Raw level; ys = log(indoutpt)."
    units: "index/level"
    source: "Arellano & Bond (1991)"
    coverage: "both files"
    kind: cont
  n:
    label: "Log employment"
    definition: "Natural log of firm employment; the dependent variable of the dynamic model."
    construction: "log(emp)."
    units: "log thousands"
    source: "Arellano & Bond (1991)"
    coverage: "both files"
    kind: cont
  w:
    label: "Log real wage"
    definition: "Natural log of the firm real wage; a current control."
    construction: "log(wage)."
    units: "log level"
    source: "Arellano & Bond (1991)"
    coverage: "both files"
    kind: cont
  k:
    label: "Log capital stock"
    definition: "Natural log of the firm gross capital stock; a current control."
    construction: "log(cap)."
    units: "log level"
    source: "Arellano & Bond (1991)"
    coverage: "both files"
    kind: cont
  ys:
    label: "Log industry output"
    definition: "Natural log of industry output for the firm's sector (auxiliary variable)."
    construction: "log(indoutpt)."
    units: "log level"
    source: "Arellano & Bond (1991)"
    coverage: "both files"
    kind: cont
  n_lag1:
    label: "Log employment, one-period lag"
    definition: "Last year's log employment; the lagged dependent variable carrying persistence rho (labeled L1.n in GMM output)."
    construction: "Within firm id: n_i,t-1 = groupby('id')['n'].shift(1)."
    units: "log thousands"
    source: "Derived (this study)"
    coverage: "data_prepared"
    kind: cont
  w_lag1:
    label: "Log real wage, one-period lag"
    definition: "Last year's log real wage; a lagged control in the levels equation."
    construction: "Within firm id: w_i,t-1 = groupby('id')['w'].shift(1)."
    units: "log level"
    source: "Derived (this study)"
    coverage: "data_prepared"
    kind: cont
  k_lag1:
    label: "Log capital stock, one-period lag"
    definition: "Last year's log capital stock; a lagged control in the levels equation."
    construction: "Within firm id: k_i,t-1 = groupby('id')['k'].shift(1)."
    units: "log level"
    source: "Derived (this study)"
    coverage: "data_prepared"
    kind: cont
  n_lag2:
    label: "Log employment, two-period lag"
    definition: "Log employment two years ago; the Anderson-Hsiao instrument for the differenced lag."
    construction: "Within firm id: n_i,t-2 = groupby('id')['n'].shift(2)."
    units: "log thousands"
    source: "Derived (this study)"
    coverage: "data_prepared"
    kind: cont
  d_n:
    label: "First difference of log employment"
    definition: "Year-on-year change in log employment; the dependent variable of the differenced equation."
    construction: "Within firm id: n_it - n_i,t-1 = groupby('id')['n'].diff()."
    units: "log change"
    source: "Derived (this study)"
    coverage: "data_prepared"
    kind: cont
  d_w:
    label: "First difference of log real wage"
    definition: "Year-on-year change in the log real wage."
    construction: "Within firm id: w_it - w_i,t-1 = groupby('id')['w'].diff()."
    units: "log change"
    source: "Derived (this study)"
    coverage: "data_prepared"
    kind: cont
  d_k:
    label: "First difference of log capital stock"
    definition: "Year-on-year change in the log capital stock."
    construction: "Within firm id: k_it - k_i,t-1 = groupby('id')['k'].diff()."
    units: "log change"
    source: "Derived (this study)"
    coverage: "data_prepared"
    kind: cont
  d_n_lag1:
    label: "Lagged first difference of log employment"
    definition: "Last year's change in log employment; the endogenous regressor in the Anderson-Hsiao 2SLS."
    construction: "Within firm id: d_n_i,t-1 = groupby('id')['d_n'].shift(1)."
    units: "log change"
    source: "Derived (this study)"
    coverage: "data_prepared"
    kind: cont
  d_w_lag1:
    label: "Lagged first difference of log real wage"
    definition: "Last year's change in the log real wage; a control in the differenced equation."
    construction: "Within firm id: d_w_i,t-1 = groupby('id')['d_w'].shift(1)."
    units: "log change"
    source: "Derived (this study)"
    coverage: "data_prepared"
    kind: cont
  d_k_lag1:
    label: "Lagged first difference of log capital stock"
    definition: "Last year's change in the log capital stock; a control in the differenced equation."
    construction: "Within firm id: d_k_i,t-1 = groupby('id')['d_k'].shift(1)."
    units: "log change"
    source: "Derived (this study)"
    coverage: "data_prepared"
    kind: cont
