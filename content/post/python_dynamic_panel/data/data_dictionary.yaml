# Data dictionary metadata for python_dynamic_panel — drives build_data_dictionary.py.
# Generated by the write-data-dictionary skill from the post's text + data; edit and rerun.

study:
  title: "Dynamic Panel Data Models: Employment Persistence"
  subtitle: "The classic Arellano–Bond panel of 140 UK manufacturing firms (1976–1984), with the lagged/differenced analysis variables."
  overview: >
    Companion data for a hands-on Python tutorial that estimates how persistent firm-level
    employment is &mdash; the autoregressive coefficient <code>&rho;</code> of a dynamic
    labor-demand equation &mdash; using the canonical <strong>Arellano and Bond (1991)</strong>
    panel of 140 UK manufacturing firms observed annually over 1976&ndash;1984 (1,031 firm-years,
    unbalanced). The tutorial walks the full estimator ladder: pooled OLS (biased up by the omitted
    firm effect) and fixed effects (Nickell bias, biased down) via <code>pyfixest</code>, then
    Anderson&ndash;Hsiao IV, Arellano&ndash;Bond difference GMM and Blundell&ndash;Bond system GMM
    via <code>pydynpd</code>, with the AR(2), Hansen, and instrument-collapse diagnostics that
    separate the one defensible estimate (system GMM, <code>&rho;&#770; = 0.927</code>) from four
    seductive wrong ones. This dataset is the classic dynamic-panel teaching dataset, used by
    Arellano &amp; Bond, Blundell &amp; Bond (1998), and Roodman (2009).
  panel_structure: >
    <strong>Two files.</strong> <code>abdata</code> is the raw input panel &mdash; one row per firm
    &times; year, unbalanced over 1976&ndash;1984 &mdash; carrying employment, wages, capital, and
    industry output in both levels and logs. <code>data_prepared</code> is the analysis sample: the
    same panel with the one-period lags, the two-period lag of employment, and the first differences
    (computed firm-by-firm, respecting firm boundaries) that every estimator runs on. Requiring a
    single lag drops the panel from 1,031 to 891 usable rows; the GMM estimators run on 751.
  kpis:
    - {n: 2, l: "datasets"}
    - {n: 20, l: "variables"}
    - {n: 140, l: "firms"}
    - {n: "1976–1984", l: "years"}

dta_format_version: 118

sources:
  - name: "Arellano & Bond (1991)"
    provides: "The original UK manufacturing employment panel (140 firms, 1976–1984) — the abdata dataset"
    reference: "Arellano, M., & Bond, S. (1991). Some Tests of Specification for Panel Data: Monte Carlo Evidence and an Application to Employment Equations. Review of Economic Studies, 58(2), 277–297. https://doi.org/10.2307/2297968"
  - name: "pydynpd (Wu, Hua & Xu 2023)"
    provides: "Distribution of the dataset (bundled as abdata) and the published replication benchmark"
    reference: "Wu, D., Hua, L., & Xu, J. (2023). pydynpd: A Python package for dynamic panel model. Journal of Open Source Software, 8(83), 4416. https://doi.org/10.21105/joss.04416 — https://github.com/dazhwu/pydynpd"
  - name: "Method references"
    provides: "Estimators and concepts"
    reference: "Anderson & Hsiao (1981); Blundell & Bond (1998); Bond (2002); Roodman (2009); Windmeijer (2005); Nickell (1981)."

formulas_html: |
  <p>The model is a dynamic labor-demand equation for log employment <code>n</code>, with current
  and lagged log real wages <code>w</code> and log capital <code>k</code>, a firm fixed effect
  <code>&alpha;_i</code>, year effects <code>&delta;_t</code>, and an idiosyncratic shock
  <code>&epsilon;_it</code>:</p>
  <ul class="tight">
    <li><strong>Levels &rarr; logs</strong>: <code>n = log(emp)</code>, <code>w = log(wage)</code>,
      <code>k = log(cap)</code>, <code>ys = log(indoutpt)</code> &mdash; the estimation variables
      are the logged columns; the level columns are kept for reference.</li>
    <li><strong>Dynamic model</strong>:
      <code>n_it = &rho;&middot;n_i,t-1 + &beta;1&middot;w_it + &beta;2&middot;w_i,t-1
      + &beta;3&middot;k_it + &beta;4&middot;k_i,t-1 + &alpha;_i + &delta;_t + &epsilon;_it</code>
      &mdash; <code>&rho;</code> (the coefficient on <code>n_lag1</code> / <code>L1.n</code>) is the
      persistence parameter of interest.</li>
    <li><strong>One-period lag</strong> (per firm): <code>v_lag1 = v_i,t-1</code> for
      <code>v &isin; {n, w, k}</code>; <code>n_lag2 = n_i,t-2</code> (the Anderson&ndash;Hsiao
      instrument).</li>
    <li><strong>First difference</strong> (per firm): <code>d_v = v_it &minus; v_i,t-1</code> for
      <code>v &isin; {n, w, k}</code>; <code>d_v_lag1 = d_v_i,t-1</code>. Differencing eliminates
      <code>&alpha;_i</code> exactly.</li>
  </ul>
  <p>All lags and differences are computed within firm <code>id</code> after sorting by
  <code>[id, year]</code>, so no firm inherits a lag from another firm. The first observed year of
  every firm therefore has missing lags/differences.</p>

caveats:
  - "<strong>Teaching dataset.</strong> This is a methods showcase on 1970s&ndash;80s UK manufacturing, not a current estimate of employment dynamics; the value is in the workflow, not the era-specific numbers."
  - "<strong>Each lag burns data.</strong> With T as small as 7&ndash;9 per firm, every lag/difference costs each firm its first observed year(s): the panel falls from 1,031 rows to 891 (one lag), to 751 (GMM), to 611 (the two-lag replication spec). The lag/difference columns in <code>data_prepared</code> are missing for those dropped firm-years."
  - "<strong>Unbalanced panel.</strong> 103 firms appear for 7 years, 23 for 8, and 14 for all 9; estimators handle this natively but observation counts vary by specification."
  - "<strong>Variance is lopsided.</strong> The between-firm SD of log employment (1.339) is about seven times the within-firm SD (0.195), so the unobserved firm level dominates &mdash; which is exactly why naive estimators fail and why dynamic-panel GMM is needed."
  - "<strong>Headline caveat.</strong> The system-GMM 95% CI [0.773, 1.081] includes the unit root, so 'employment is stationary' is not a defensible claim &mdash; only the point estimate and its lower bound are."

