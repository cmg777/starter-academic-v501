files:
  carbontax_data.dta:
    label: "OECD country panel: transport CO2 + synthetic-control predictors"
    grain: "country-year"
    years: "1960-2005"
    coverage: "15 OECD countries (balanced)"
    key: "country (Countryno) x year"
    purpose: "DiD and Synthetic Sweden: the outcome (transport CO2) plus the predictors that build the counterfactual."
    note: "Balanced annual panel of 15 advanced economies, 1960-2005 (690 rows). Sweden is the treated unit (1991 carbon-tax reform; treatment dated 1990). Donor pool = the other 14 countries; the synthetic control selects six (Denmark, Belgium, New Zealand, Greece, US, Switzerland). GDP_per_capita has 10 missing values."
  disentangling_data.dta:
    label: "Sweden counterfactual CO2 paths — carbon tax vs VAT decomposition"
    grain: "year (Sweden only)"
    years: "1960-2005"
    coverage: "Sweden; scenario columns defined from 1970"
    key: "year"
    purpose: "Separate the carbon-tax-only effect from the bundled-VAT effect via three simulated emission paths."
    note: "Sweden-only annual series, 1960-2005 (46 rows). The three scenario columns (CarbonTaxandVAT, NoCarbonTaxWithVAT, NoCarbonTaxNoVAT) are simulated and present only from 1970 onward (36 non-missing). Used in Exercise 4.3; the gap between scenarios attributes the reduction to each tax component."

columns:
  Countryno:
    label: "Country number (1-15)"
    definition: "Integer identifier for each of the 15 OECD countries in the panel."
    construction: "Sequential code 1..15 assigned in alphabetical country order (1=Australia ... 15=United States)."
    units: "integer code"
    source: "Andersson (2019) replication file"
    coverage: "15 countries"
    kind: id
  country:
    label: "Country name"
    definition: "Name of the OECD country."
    construction: "One of the 15 advanced economies: Australia, Belgium, Canada, Denmark, France, Greece, Iceland, Japan, New Zealand, Poland, Portugal, Spain, Sweden, Switzerland, United States."
    units: "string"
    source: "Andersson (2019) replication file"
    coverage: "15 countries"
    kind: str
  year:
    label: "Calendar year"
    definition: "Annual time index (the panel time variable)."
    construction: "1960-2005, balanced for every country."
    units: "year"
    source: "Andersson (2019) replication file"
    coverage: "1960-2005"
    kind: year
  CO2_transport_capita:
    label: "Transport CO2 per capita (metric tons)"
    definition: "Per-capita carbon-dioxide emissions from the transport sector — the outcome variable."
    construction: "Total transport-sector CO2 emissions divided by population, per country-year."
    units: "metric tons / capita"
    source: "OECD/IEA via Andersson (2019)"
    coverage: "country-year panel"
    kind: cont
  GDP_per_capita:
    label: "GDP per capita (real US$)"
    definition: "Real gross domestic product per capita — a synthetic-control predictor."
    construction: "Real GDP per capita (PPP-adjusted in Andersson's source); averaged over 1980-1989 as an SCM predictor."
    units: "US$ per capita (real)"
    source: "PWT / World Bank via Andersson (2019)"
    coverage: "680 of 690 rows (10 missing)"
    kind: cont
  gas_cons_capita:
    label: "Gasoline consumption per capita"
    definition: "Per-capita road-transport gasoline consumption — a synthetic-control predictor."
    construction: "Gasoline consumption divided by population, per country-year; averaged 1980-1989 as an SCM predictor."
    units: "kg oil-equivalent / capita (approx.)"
    source: "IEA via Andersson (2019)"
    coverage: "country-year panel"
    kind: cont
  vehicles_capita:
    label: "Motor vehicles per capita"
    definition: "Per-capita stock of motor vehicles — a synthetic-control predictor."
    construction: "Number of registered vehicles divided by population (often expressed per 1,000 people), per country-year; averaged 1980-1989 as an SCM predictor."
    units: "vehicles per capita"
    source: "Andersson (2019) replication file"
    coverage: "country-year panel"
    kind: cont
  urban_pop:
    label: "Urban population share (%)"
    definition: "Share of the national population living in urban areas — a synthetic-control predictor."
    construction: "Urban population as a percentage of total population, per country-year; averaged 1980-1989 as an SCM predictor."
    units: "% (0-100)"
    source: "World Bank via Andersson (2019)"
    coverage: "country-year panel"
    kind: cont
  pop_density:
    label: "Population density"
    definition: "People per unit of land area (auxiliary covariate; not in the headline predictor set)."
    construction: "Total population divided by land area, per country-year."
    units: "persons / km^2 (approx.)"
    source: "World Bank via Andersson (2019)"
    coverage: "country-year panel"
    kind: cont
  CO2_reductions_simulation:
    label: "Simulated CO2 reduction series"
    definition: "Simulated per-capita CO2 reduction attributable to the reform (model-based)."
    construction: "Difference between simulated actual and counterfactual emission paths for Sweden, per year."
    units: "metric tons / capita"
    source: "Simulated (Andersson 2019)"
    coverage: "Sweden, 1960-2005"
    kind: cont
  CO2_reductions_synth:
    label: "Synthetic-control CO2 reduction series"
    definition: "Per-capita CO2 reduction implied by the Synthetic-Sweden gap (Sweden minus synthetic)."
    construction: "Sweden actual transport CO2 minus Synthetic-Sweden transport CO2, per year."
    units: "metric tons / capita"
    source: "Computed via synthetic control (Andersson 2019)"
    coverage: "Sweden, 1960-2005"
    kind: cont
  CarbonTaxandVAT:
    label: "Counterfactual: carbon tax + VAT (actual)"
    definition: "Simulated transport CO2 with all three components active (carbon tax, VAT, energy tax) — the factual path."
    construction: "Demand model simulated at the actual price/tax bundle, per year."
    units: "metric tons / capita"
    source: "Simulated (Andersson 2019)"
    coverage: "Sweden, 1970-2005 (36 rows)"
    kind: cont
  NoCarbonTaxWithVAT:
    label: "Counterfactual: no carbon tax, with VAT"
    definition: "Simulated transport CO2 if the carbon tax were removed but the VAT retained."
    construction: "Demand model simulated with the carbon tax switched off and VAT on, per year."
    units: "metric tons / capita"
    source: "Simulated (Andersson 2019)"
    coverage: "Sweden, 1970-2005 (36 rows)"
    kind: cont
  NoCarbonTaxNoVAT:
    label: "Counterfactual: no carbon tax, no VAT"
    definition: "Simulated transport CO2 if both the carbon tax and the VAT were removed (energy tax only)."
    construction: "Demand model simulated with carbon tax and VAT both switched off, per year."
    units: "metric tons / capita"
    source: "Simulated (Andersson 2019)"
    coverage: "Sweden, 1970-2005 (36 rows)"
    kind: cont
