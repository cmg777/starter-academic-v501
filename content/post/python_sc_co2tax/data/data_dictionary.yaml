# Data dictionary metadata for python_sc_co2tax — drives build_data_dictionary.py.
# Generated by the write-data-dictionary skill from the post's text + data; edit and rerun.

study:
  title: "Carbon Taxes and CO2 Emissions: Sweden as a Case Study"
  subtitle: "Replication data for a synthetic-control & IV analysis in Python of Sweden's 1991 carbon tax."
  overview: >
    Companion data for a Python tutorial that replicates <strong>Andersson (2019,
    <em>AEJ: Economic Policy</em>)</strong> on whether Sweden's 1991 carbon tax cut transport CO<sub>2</sub>
    emissions &mdash; and at what economic cost. The headline dataset is an OECD panel of 15 advanced
    economies observed over 1960&ndash;2005 (46 years; 30 pre-treatment, 16 post-treatment), measuring
    per-capita CO<sub>2</sub> emissions from transport in metric tons alongside the predictors used to
    build the counterfactual (GDP per capita, vehicles, gasoline consumption, urbanisation, population
    density). The post layers a naive before/after comparison, difference-in-differences, and the
    synthetic-control method (<code>pysyncon</code>) &mdash; validated by in-time, in-space, and
    leave-one-out placebo tests &mdash; then OLS/IV demand regressions (<code>pyfixest</code>).
    Synthetic Sweden, built from six donors (Denmark, Belgium, New Zealand, Greece, United States,
    Switzerland), implies an average 11.3% annual reduction over 1990&ndash;2005 with no measurable
    growth penalty. A second file carries the three counterfactual emission paths used to disentangle
    the carbon tax from the bundled VAT.
  panel_structure: >
    <strong>Two files.</strong> <code>carbontax_data</code> is the OECD country panel (one row per
    country &times; year; 15 countries, balanced 1960&ndash;2005) carrying the transport-CO<sub>2</sub>
    outcome and the synthetic-control predictors. <code>disentangling_data</code> is a Sweden-only
    annual time series (one row per year, 1960&ndash;2005) holding three simulated counterfactual
    emission paths (carbon-tax + VAT, no carbon tax / with VAT, no carbon tax / no VAT) plus two
    reduction series &mdash; the inputs to the carbon-tax-versus-VAT decomposition.
  kpis:
    - {n: 2, l: "datasets"}
    - {n: 14, l: "variables"}
    - {n: 15, l: "countries"}
    - {n: "1960–2005", l: "years"}

dta_format_version: 118

sources:
  - name: "Andersson (2019)"
    provides: "Replicated study; data, donor pool, synthetic-control design, OLS/IV specifications"
    reference: "Andersson, J. J. (2019). Carbon Taxes and CO2 Emissions: Sweden as a Case Study. American Economic Journal: Economic Policy, 11(4), 1–30. https://doi.org/10.1257/pol.20170144"
  - name: "Graefe (2020) — RTutor"
    provides: "Bundled replication package (exercise sequence + the .dta material files)"
    reference: "Graefe, T. (2020). RTutor: Carbon Taxes and CO2 Emissions. https://github.com/TheresaGraefe/RTutorCarbonTaxesAndCO2Emissions"
  - name: "Underlying data providers (via Andersson 2019)"
    provides: "OECD/IEA transport CO2 & fuel data; Penn World Table / World Bank GDP, vehicles, urbanisation, population"
    reference: "See Andersson (2019), Data section, for the full provenance of each series across the 15 OECD countries."
  - name: "Method references"
    provides: "Synthetic-control estimator and inference"
    reference: "Abadie, Diamond & Hainmueller (2010, JASA; 2015, AJPS); Abadie & Gardeazabal (2003, AER)."

formulas_html: |
  <p>The outcome throughout is <strong>per-capita CO<sub>2</sub> emissions from transport</strong>
  (<code>CO2_transport_capita</code>), in metric tons per person per year.</p>
  <p><strong>Synthetic control.</strong> Let <code>X&#8321;</code> be the pre-treatment predictor
  vector for Sweden and <code>X&#8320;</code> the same predictors for the donor countries (one column
  per donor). The donor weights <code>w</code> minimise the weighted distance</p>
  <ul class="tight">
    <li><code>w* = argmin&#8345; (X&#8321; &minus; X&#8320;w)&#7488; V (X&#8321; &minus; X&#8320;w)</code>
      subject to <code>w&#8202;&#8323; &ge; 0</code> and <code>&Sigma;&#8202;&#8323; w&#8323; = 1</code>
      &mdash; a convex combination, no extrapolation.</li>
    <li>The diagonal matrix <code>V</code> (predictor importances) is itself chosen to minimise the
      pre-treatment mean squared prediction error (MSPE) of the <em>outcome</em>, CO<sub>2</sub>.</li>
    <li><strong>Predictors</strong>: <code>GDP_per_capita</code>, <code>vehicles_capita</code>,
      <code>gas_cons_capita</code>, <code>urban_pop</code> (means over 1980&ndash;1989), plus three
      lagged outcome levels (CO<sub>2</sub> in 1970, 1980, 1989).</li>
  </ul>
  <p><strong>Treatment gap</strong>: year-by-year
  <code>gap&#8348; = CO2&#8345;&#8348;(Sweden) &minus; CO2&#8345;&#8348;(Synthetic Sweden)</code>,
  where the synthetic series is <code>&Sigma;&#8202;&#8323; w&#8323; &middot; CO2&#8345;&#8348;(donor&#8202;j)</code>.</p>
  <p><strong>Permutation inference</strong>: re-run the SCM treating each unit as treated; rank by the
  <em>post/pre MSPE ratio</em> <code>MSPE&#8345;&#8338;&#8347;&#8348; / MSPE&#8345;&#8341;&#8337;</code>;
  the p-value is the share of units with a ratio &ge; Sweden's (with 15 units the floor is 1/15 &asymp; 0.067).</p>
  <p><strong>Disentangling.</strong> The three columns in <code>disentangling_data</code> are simulated
  emission paths under different tax bundles. The vertical gap between two paths attributes the CO<sub>2</sub>
  reduction to the component switched between them &mdash; e.g.
  <code>(NoCarbonTaxWithVAT &minus; CarbonTaxandVAT) / NoCarbonTaxWithVAT</code> is the carbon-tax-only share.</p>

caveats:
  - "<strong>Single-country case.</strong> Sweden is one treated unit; external validity to larger emitters or developing economies is not guaranteed."
  - "<strong>Donor-pool size caps the p-value.</strong> With 15 countries the smallest possible permutation p-value is 1/15 &asymp; 0.067 — exactly the value the post hits."
  - "<strong>Coverage gaps.</strong> <code>GDP_per_capita</code> is missing for 10 of 690 country-year rows (688 present); the synthetic-control predictors are averaged over windows where data exist."
  - "<strong>Simulated counterfactual paths.</strong> The three <code>*CarbonTax*</code>/<code>*VAT*</code> columns in <code>disentangling_data</code> are model-simulated emission scenarios (defined only from 1970 onward), not raw observations; they normalise differently from the synthetic-control baseline, so the carbon-tax-only share (≈9.5% here) and Andersson's headline (6.3%) describe the same physical wedge under different denominators."
  - "<strong>Window ends in 2005.</strong> The panel predates the electric-vehicle surge and later EU climate policy; re-running with newer data would test persistence."

