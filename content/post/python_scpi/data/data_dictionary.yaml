study:
  title: "Synthetic Control with Prediction Intervals"
  subtitle: "The classic German-reunification panel behind a Python SCPI tutorial: GDP per capita for 17 countries, 1960–2003."
  overview: >
    Companion data for a hands-on Python tutorial that applies the <strong>synthetic control with
    prediction intervals</strong> (SCPI) framework of Cattaneo, Feng, and Titiunik (2021) to a
    classic question in political economy: did German reunification in 1990 reduce West Germany's
    GDP per capita, and how confident can we be in the estimate? The analysis treats West Germany
    as the treated unit and 16 OECD countries as the donor pool, builds a synthetic West Germany
    from 31 pre-treatment years (1960&ndash;1990) under a simplex constraint, and constructs
    prediction intervals that decompose uncertainty into in-sample (weight estimation) and
    out-of-sample (post-treatment) components with finite-sample coverage guarantees. The estimated
    gap grows to roughly &minus;\$3,465 per capita by 2003, and actual GDP falls below the 99%
    prediction interval in 7 of 13 post-treatment years.
  panel_structure: >
    <strong>One file.</strong> <code>data.csv</code> is an annual country panel (one row per country
    &times; year) covering 17 countries over 1960&ndash;2003 (748 rows). The tutorial uses only the
    <code>country</code>, <code>year</code>, and <code>gdp</code> columns
    (<code>features=None</code>); the remaining seven columns are the original Abadie predictor
    covariates (inflation, trade, schooling, investment ratios, industry share), carried verbatim
    from the source dataset and available for the post's covariate-adjustment exercise.
  kpis:
    - {n: 17, l: "countries"}
    - {n: "1960–2003", l: "years"}
    - {n: 748, l: "rows"}
    - {n: 11, l: "variables"}

