formulas_html: |
  <p>The synthetic control builds a counterfactual West Germany as a weighted average of donor
  countries, then reads the treatment effect off the post-treatment gap.</p>
  <ul class="tight">
    <li><strong>Synthetic counterfactual</strong>:
      <code>Ŷ_1T(0) = x_T' · ŵ</code> — donor GDP values <code>x_T</code> at time <code>T</code>
      times the estimated weight vector <code>ŵ</code>.</li>
    <li><strong>Simplex constraint</strong> (classic SC):
      <code>w_j ≥ 0</code> and <code>Σ_j w_j = 1</code> — a convex combination of real donors, no
      extrapolation. (Alternatives: lasso, ridge, OLS.)</li>
    <li><strong>Treatment effect (ATT for the treated unit)</strong>:
      <code>τ_T = Y_1T(1) − Ŷ_1T(0)</code> — the gap between actual and synthetic GDP in each
      post-1990 year. A negative gap means reunification lowered West Germany's GDP relative to its
      counterfactual.</li>
    <li><strong>Pre-treatment fit (RMSE)</strong>:
      <code>RMSE = √[ (1/T₀) Σ_t (Y_t − Ŷ_t)² ]</code> over the pre-treatment period
      (simplex RMSE = 0.072).</li>
    <li><strong>Prediction-interval decomposition</strong>:
      <code>τ̂_T − τ_T = p_T'(β₀ − β̂) [in-sample] + e_T [out-of-sample]</code> — the in-sample term
      reflects finite-sample weight uncertainty (Monte Carlo, HC1 variance); the out-of-sample term
      <code>e_T</code> reflects post-treatment forecasting noise (Gaussian bound). Combining the two
      yields intervals with finite-sample coverage guarantees.</li>
  </ul>

caveats:
  - "<strong>Most columns are not used by the tutorial.</strong> Only <code>country</code>, <code>year</code>, and <code>gdp</code> enter the synthetic-control estimation (<code>features=None</code>). The seven covariate columns are retained from the source dataset for the covariate-adjustment exercise and are not part of the headline results."
  - "<strong>Sparse covariate coverage.</strong> Several predictors are only sparsely populated: <code>schooling</code> has 151 of 748 values, and <code>invest60</code>/<code>invest70</code>/<code>invest80</code> are time-invariant period averages reported once per country (17 non-missing each)."
  - "<strong>Single treated unit.</strong> With one treated unit (West Germany), the method cannot assess heterogeneity in treatment effects, and results depend on the donor-pool composition — excluding or including specific countries can shift the estimated gap."
  - "<strong>Cointegration assumption.</strong> The estimation sets <code>cointegrated_data=True</code>, assuming GDP series share a common stochastic trend; if that assumption fails, the weights may be biased."

