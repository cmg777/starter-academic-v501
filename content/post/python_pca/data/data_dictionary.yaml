    reference: "Mendez, C. (2026). See the post's Python script script.py (simulate_health_data) for the full DGP."
  - name: "Method references"
    provides: "PCA and composite-index construction concepts"
    reference: "Jolliffe & Cadima (2016), Principal Component Analysis: A Review and Recent Developments; Pearson (1901); Hotelling (1933); OECD/JRC (2008) Handbook on Constructing Composite Indicators."

formulas_html: |
  <p>The dataset holds two raw indicators per country; the composite index is built from them in six
  steps (all derived columns are outputs of the post's script, not stored in this file).</p>
  <ul class="tight">
    <li><strong>Polarity adjustment</strong>: flip "more is worse" indicators &mdash;
      <code>IM* = -1 &times; infant_mort</code> &mdash; so higher always means better health.</li>
    <li><strong>Standardization (z-score)</strong>: <code>Z_ij = (X_ij - X&#772;_j) / &sigma;_j</code>
      (population SD, <code>ddof=0</code>); each variable then has mean 0 and SD 1.</li>
    <li><strong>Covariance matrix</strong>: <code>&Sigma; = (1/n) Z&#7488;Z</code>; for standardized
      data this is the 2&times;2 correlation matrix with 1s on the diagonal and <code>r</code> off it.</li>
    <li><strong>Eigen-decomposition</strong>: solve <code>&Sigma;v = &lambda;v</code>; for a 2&times;2
      correlation matrix <code>&lambda;&#8321; = 1 + r</code>, <code>&lambda;&#8322; = 1 - r</code>,
      with eigenvectors <code>[1/&radic;2, 1/&radic;2]</code> and <code>[1/&radic;2, -1/&radic;2]</code>.</li>
    <li><strong>PC1 score</strong>: <code>PC1_i = w&#8321;&middot;Z_i,LE + w&#8322;&middot;Z_i,IM</code>,
      the projection of country <code>i</code> onto the first eigenvector.</li>
    <li><strong>Variance explained</strong>: <code>&lambda;_k / &Sigma;&lambda;</code> (PC1 = 97.97%).</li>
    <li><strong>Min-Max normalization</strong>: <code>HI_i = (PC1_i - min) / (max - min)</code>,
      rescaling scores to the human-readable [0, 1] Health Index.</li>
  </ul>
  <p>Synthetic data-generating process (seed = 42): for country <code>i</code>,
  <code>base_health ~ Uniform(0, 1)</code> is a latent health capacity; then
  <code>life_exp = 55 + 30&middot;base_health + N(0, 2)</code> and
  <code>infant_mort = 60 - 55&middot;base_health + N(0, 3)</code>. Because both indicators load on the
  same latent factor with opposite signs, the raw correlation is a strong &minus;0.96 &mdash; ideal for
  near-lossless PCA compression.</p>

caveats:
  - "<strong>Synthetic data.</strong> There is no real data behind this tutorial; values are drawn from a known single-latent-factor process and are internally consistent with that calibration, but are not empirical evidence about real-world health outcomes."
  - "<strong>Two standardized variables → equal weights.</strong> With exactly two standardized indicators, PCA always assigns equal weights (1/&radic;2 each) regardless of the correlation, so PC1 is just a (scaled) simple average. PCA's real advantage appears only with three or more variables."
  - "<strong>Relative, not absolute.</strong> The Health Index measures performance relative to the 50-country sample (Min-Max maps the worst to 0 and the best to 1); it is not an absolute or cross-sample-comparable score."
  - "<strong>Derived columns are not stored here.</strong> <code>infant_mort_adj</code>, z-scores, PC1, and the Health Index are computed in the script and saved to the post's results CSVs; this file holds only the three raw input columns."

