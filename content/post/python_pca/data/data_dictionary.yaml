# Data dictionary metadata for python_pca — drives build_data_dictionary.py.
# Generated by the write-data-dictionary skill from the post's text + data; edit and rerun.

study:
  title: "Introduction to PCA for Building Development Indicators"
  subtitle: "Companion input data for a step-by-step PCA tutorial — a fully simulated cross-section of two health indicators for 50 countries."
  overview: >
    Companion data for a hands-on Python tutorial that builds a composite <strong>Health Index</strong>
    from two correlated health indicators using Principal Component Analysis (PCA). The dataset is
    <strong>fully simulated</strong>: 50 countries are generated from a single latent health factor
    that drives <code>life_exp</code> (Life Expectancy) positively and <code>infant_mort</code>
    (Infant Mortality) negatively, so that PCA's recovery of the known single-factor structure can be
    verified. The post follows a six-step manual pipeline in NumPy/pandas &mdash; polarity adjustment,
    z-score standardization, the covariance matrix, eigen-decomposition, PC1 scoring, and Min-Max
    normalization &mdash; then replicates it with scikit-learn. Polarity adjustment flips the raw
    correlation from &minus;0.9595 to +0.9595; eigen-decomposition yields eigenvalues 1.9595 and
    0.0405 with equal weights of 0.7071, so PC1 explains 97.97% of total variance and the manual
    scores match scikit-learn to within 1.33&times;10&#8315;&#185;&#8309;. This file is the single
    raw input the whole pipeline is built on.
  panel_structure: >
    <strong>One file.</strong> <code>health_data</code> is a cross-section &mdash; one row per country
    &mdash; with a country identifier and two raw health indicators. The composite Health Index is
    derived from these two columns and is <em>not</em> stored here (it is an output of the post's
    script, regenerated on every run).
  kpis:
    - {n: 1, l: "dataset"}
    - {n: 3, l: "variables"}
    - {n: 50, l: "countries"}
    - {n: "cross-section", l: "structure"}

