# Data dictionary metadata for python_panel_intro — drives build_data_dictionary.py.
# Generated by the write-data-dictionary skill from the post's text + data; edit and rerun.

study:
  title: "Introduction to Panel Data Methods in Python"
  subtitle: "An NLSY-style two-period wage panel for teaching seven panel-data estimators."
  overview: >
    Companion data for a beginner-friendly Python tutorial that walks through seven canonical
    panel-data estimators &mdash; pooled OLS, the between estimator, first-differences, the within
    (fixed-effects) estimator, two-way fixed effects, random effects, and Mundlak's correlated
    random effects (CRE) &mdash; on a single worker wage panel. The running question is whether
    union membership raises wages. The data are <strong>real</strong> NLSY-style observations on US
    workers from the <code>quarcs-lab/data-open</code> repository
    (<code>isds/wage_panel_bob4.dta</code>). The cross-sectional estimators report a union premium of
    7&ndash;11 log points; once unobserved worker traits are netted out, the within estimators report
    roughly 21 log points &mdash; a near-tripling that illustrates selection on unobservables. The
    Hausman test fails to reject random effects (H&nbsp;=&nbsp;1.79, p&nbsp;=&nbsp;0.180) while the
    Mundlak term (&minus;0.144, p&nbsp;=&nbsp;0.072) hints at negative selection; both point toward
    CRE/Mundlak as the specification to lead with.
  panel_structure: >
    <strong>Two files.</strong> <code>raw_data</code> is the full NLSY-style download &mdash; one row
    per worker &times; year, five waves (2010, 2012, 2014, 2016, 2018), 2,209 workers, balanced.
    <code>data_panel</code> is the tutorial's analysis sample: the same data restricted to
    <strong>2010 and 2012 only</strong> so that <em>T</em>&nbsp;=&nbsp;2 and the first-difference and
    within estimators coincide; rows with missing <code>lwage</code>/<code>union</code>/<code>age</code>/<code>schooling</code>
    are dropped (2,199 workers &times; 2 years = 4,398 observations, balanced) and a <code>female</code>
    dummy is added.
  kpis:
    - {n: 2, l: "datasets"}
    - {n: "2,209", l: "workers (raw)"}
    - {n: "2010–2018", l: "waves (raw)"}
    - {n: "T = 2", l: "analysis panel"}

dta_format_version: 118

sources:
  - name: "quarcs-lab data-open"
    provides: "The source wage panel (real NLSY-style worker observations)"
    reference: "QuaRCS-lab data-open repository, isds/wage_panel_bob4.dta. https://github.com/quarcs-lab/data-open"
  - name: "Method references"
    provides: "Estimators, specification tests, and the panel-data framework"
    reference: "Wooldridge (2010); Hausman (1978); Mundlak (1978)."

formulas_html: |
  <p>All estimators target the coefficient <code>&beta;</code> on <code>union</code> in the
  panel model <code>y_it = &alpha;_i + &beta; x_it + u_it</code>, where <code>y</code> is
  <code>lwage</code>, <code>x</code> is <code>union</code>, and <code>&alpha;_i</code> is the
  unobserved worker effect. They differ in <em>which variation</em> identifies <code>&beta;</code>.</p>
  <ul class="tight">
    <li><strong>Pooled OLS (POLS)</strong>: OLS on every row, ignoring the panel &mdash; uses all variation.</li>
    <li><strong>Between</strong>: OLS on worker means <code>&ybar;_i</code> on <code>&xbar;_i</code> &mdash; cross-sectional variation only.</li>
    <li><strong>First-differences (FDFE)</strong>: regress <code>&Delta;y_it</code> on <code>&Delta;x_it</code>; <code>&alpha;_i</code> cancels by differencing.</li>
    <li><strong>Within / Fixed effects (FE)</strong>: OLS on demeaned data <code>&xtilde;_it = x_it &minus; &xbar;_i</code>; <code>&alpha;_i</code> vanishes by demeaning. With <em>T</em>&nbsp;=&nbsp;2, FE &asymp; FDFE.</li>
    <li><strong>Two-way FE (TWFE)</strong>: absorbs worker effects <code>&alpha;_i</code> <em>and</em> year effects <code>&delta;_t</code>.</li>
    <li><strong>Random effects (RE)</strong>: GLS treating <code>&alpha;_i</code> as a random draw uncorrelated with the regressors &mdash; a weighted blend of between and within.</li>
    <li><strong>Correlated random effects (CRE / Mundlak)</strong>: RE plus the worker mean <code>&xbar;_i</code> of each time-varying regressor; the within coefficient equals FE and the mean coefficient tests RE-vs-FE.</li>
  </ul>
  <p><strong>Between/within variance decomposition</strong> (per variable): between SD is
  <code>SD(&xbar;_i)</code>, within SD is <code>SD(x_it &minus; &xbar;_i)</code>, and the between
  share is <code>between&sup2; / (between&sup2; + within&sup2;)</code>. <strong>Hausman</strong>:
  <code>H = (&beta;_FE &minus; &beta;_RE)&sup2; / (V_FE &minus; V_RE) ~ &chi;&sup2;(1)</code>.</p>

caveats:
  - "<strong>Two periods only in the analysis panel.</strong> <code>data_panel</code> keeps just 2010 and 2012 (<em>T</em>&nbsp;=&nbsp;2) so the first-difference and within estimators coincide; with only two waves the fixed-effects estimate is power-limited and the Hausman test has low power. <code>raw_data</code> retains all five waves for extensions."
  - "<strong>Thin within variation.</strong> Union status is 93.9% between-worker and only 9.1% within; schooling has zero within-variation in the two-period window, so fixed effects mechanically drops it."
  - "<strong>10 workers dropped.</strong> The analysis panel keeps 2,199 of the 2,209 raw workers; ten are dropped for missing values in <code>lwage</code>/<code>union</code>/<code>age</code>/<code>schooling</code>."
  - "<strong>Estimands differ.</strong> Within estimators (FDFE/FE/TWFE/CRE) identify the effect for union <em>switchers</em> under strict exogeneity; POLS/Between report a population-weighted association without a causal interpretation absent unconfoundedness."

