files:
  raw_data.csv:
    label: "Full worker wage panel: 5 waves, 2,209 workers"
    grain: "worker-year"
    years: "2010, 2012, 2014, 2016, 2018"
    coverage: "2,209 US workers (balanced, 5 waves)"
    key: "ID x year"
    purpose: "Source download; full NLSY-style panel for extensions (e.g. using all five waves)."
    note: "Full wage panel from quarcs-lab/data-open (isds/wage_panel_bob4.dta), exported verbatim except that union is mapped from Yes/No to 1/0. One row per worker-year, five biennial waves 2010-2018, 2,209 workers, balanced. The tutorial's analysis panel is the 2010+2012 subset in data_panel.csv."
  data_panel.csv:
    label: "Analysis panel: 2010 & 2012 only (T=2), with female dummy"
    grain: "worker-year"
    years: "2010, 2012"
    coverage: "2,199 US workers (balanced, 2 waves)"
    key: "ID x year"
    purpose: "Estimation sample for all seven panel estimators (POLS / Between / FDFE / FE / TWFE / RE / CRE)."
    note: "Analysis subset of raw_data.csv restricted to 2010 and 2012 so that T=2 and first-differences coincide with the within estimator. Rows missing lwage/union/age/schooling are dropped (2,199 of 2,209 workers retained), year is cast to integer, and a female dummy is added. Perfectly balanced: every worker contributes exactly two observations."

