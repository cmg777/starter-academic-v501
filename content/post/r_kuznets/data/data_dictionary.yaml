# Data dictionary metadata for r_kuznets — drives build_data_dictionary.py.
# Generated by the write-data-dictionary skill from the post's text + data; edit and rerun.

study:
  title: "Spatial Inequality and the Kuznets Curve"
  subtitle: "Parametric and semiparametric estimates in R, on a fully synthetic 56-country panel."
  overview: >
    Companion data for a hands-on R tutorial that replicates Lessmann (2014) on a <strong>fully
    synthetic</strong> dataset of regional GDP per capita for 56 countries over 1980&ndash;2009.
    The post measures spatial inequality with the population-weighted coefficient of variation
    (WCV) of regional income and estimates the spatial Kuznets curve &mdash; the hypothesis that
    regional inequality first rises then falls as development increases &mdash; using cross-section
    OLS, two-way fixed effects (fixest), and semiparametric methods (Robinson 1988, Baltagi&ndash;Li
    2002). The inverted-U is robust across estimators; the high-income upturn (N-shape) appears only
    in cross-country comparisons, not within countries over time. The entire data-generating process
    is open and reproducible.
  panel_structure: >
    <strong>Two files.</strong> <code>sim_country_panel</code> is an annual country panel (one row
    per country &times; year, unbalanced over 1980&ndash;2009) carrying the inequality indices and
    covariates. <code>sim_regional_gdp</code> is the regional micro cross-section (one row per region
    &times; country, at each country's base year) from which the indices are built.
  kpis:
    - {n: 2, l: "datasets"}
    - {n: 22, l: "variables"}
    - {n: 56, l: "countries"}
    - {n: "1980–2009", l: "years"}

dta_format_version: 118

sources:
  - name: "Lessmann (2014)"
    provides: "Replicated study; calibration targets and country scaffold (region counts, areas)"
    reference: "Lessmann, C. (2014). Spatial inequality and development — Is there an inverted-U relationship? Journal of Development Economics, 106, 35–51."
  - name: "Synthetic (this study)"
    provides: "All values — simulated via a calibrated lognormal data-generating process (open & reproducible)"
    reference: "Mendez, C. (2026). See the post's R script analysis.R for the full DGP."
  - name: "Method references"
    provides: "Estimators and concepts"
    reference: "Kuznets (1955); Williamson (1965); Robinson (1988); Baltagi & Li (2002)."

formulas_html: |
  <p>Inequality is measured <strong>within each country-year, across that country's regions</strong>,
  on regional GDP per capita <code>y_j</code> with population shares <code>p_j</code> and country mean
  <code>ȳ</code>.</p>
  <ul class="tight">
    <li><strong>Weighted coefficient of variation</strong> (<code>wcv</code>):
      <code>WCV = (1/ȳ) · [ Σ_j p_j (ȳ − y_j)² ]^(1/2)</code> — the headline scale-free index.</li>
    <li><strong>Unweighted CV</strong> (<code>cv</code>): standard deviation / mean of regional
      <code>gdp_pc</code> (robustness).</li>
    <li><strong>Regional Gini</strong> (<code>gini_reg</code>): population-weighted Gini over sorted
      regional income (robustness).</li>
    <li><strong>WCV excluding the capital</strong> (<code>wcv_nocap</code>): drop region 1,
      re-normalize shares, recompute WCV.</li>
  </ul>
  <p>Synthetic data-generating process: for region <code>j</code> in country <code>i</code>, year
  <code>t</code>, <code>y_ijt = country_mean · exp(δ_it · z_ij)</code>, where <code>z_ij</code> is a
  persistent regional position (a rich region stays rich) and <code>δ_it</code> (log-dispersion)
  follows a structural inverted-U in development. A time-invariant between-country cubic term yields
  the cross-section N-shape while the panel keeps a clean inverted-U. Polynomial terms
  <code>lnGDP2</code>/<code>lnGDP3</code> are powers of <code>lnGDP</code>.</p>

caveats:
  - "<strong>Synthetic data.</strong> There is no real data behind this tutorial; results are internally consistent with the calibration but are not empirical evidence about real-world spatial inequality."
  - "<strong>Fragile N-shape.</strong> The high-income upturn (cubic term) appears with income in logs and weakens in levels; the robust finding is the inverted-U, not the N-shape."
  - "<strong>Within vs. between.</strong> The genuine N-shape is cross-sectional (between countries); the within-country cubic term is insignificant."
  - "<strong>Significance ≠ shape.</strong> All income terms can be significant yet the discriminant D = β₂² − 3·β₁·β₃ be negative or the turning points fall outside the observed range — always check D > 0 and that turning points lie in range."

