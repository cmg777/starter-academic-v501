files:
  sim_country_panel.csv:
    label: "Annual country panel: inequality indices + covariates"
    grain: "country-year"
    years: "1980-2009"
    coverage: "56 countries (unbalanced)"
    key: "country x year"
    purpose: "Estimate the spatial Kuznets curve (OLS / two-way FE / semiparametric)."
    note: "Annual country panel; 56 synthetic countries, 1980-2009 (unbalanced). WCV and covariates per country-year; the income polynomial terms support the Kuznets-curve regressions."
  sim_regional_gdp.csv:
    label: "Regional micro cross-section (base year per country)"
    grain: "region-year (base year)"
    years: "base year per country"
    coverage: "56 countries; 2-51 regions each"
    key: "country x region"
    purpose: "Regional incomes + population shares from which the inequality indices are computed."
    note: "Regional micro-data at each country's first observation year; region 1 is typically the capital. The inequality indices in the country panel are built from these regions."

columns:
  country:
    label: "Country name"
    definition: "Synthetic country identifier (real country names used as labels)."
    construction: "From the hard-coded 56-country scaffold (region counts/areas from Lessmann 2014)."
    units: "string"
    source: "Scaffold (Lessmann 2014 appendix)"
    kind: str
  region_grp:
    label: "World Bank region group"
    definition: "Geographic grouping of the country."
    construction: "Assigned per country: EAP, ECA, LAC, MENA, NA, SA, SSA."
    units: "code"
    source: "Assigned"
    kind: str
  year:
    label: "Calendar year"
    definition: "Annual time index."
    construction: "Country-specific start/end years (unbalanced coverage)."
    units: "year"
    source: "Simulation"
    kind: year
  lnGDP:
    label: "Log GDP per capita"
    definition: "Natural log of country GDP per capita."
    construction: "Simulated: 2009 base value minus growth path plus AR-type residual."
    units: "log US$"
    source: "Simulation"
    kind: cont
  wcv:
    label: "Pop-weighted coefficient of variation"
    definition: "Population-weighted spread of regional GDP per capita / country mean (headline index)."
    construction: "WCV = (1/ȳ)·[Σ p_j (ȳ−y_j)²]^(1/2) over regions, per country-year."
    units: "0-1"
    source: "Computed (this study)"
    kind: cont
  cv:
    label: "Coefficient of variation (unweighted)"
    definition: "Unweighted spread of regional GDP per capita."
    construction: "SD / mean of regional gdp_pc."
    units: ">=0"
    source: "Computed (this study)"
    kind: cont
  gini_reg:
    label: "Regional Gini index"
    definition: "Population-weighted Gini of the regional income distribution."
    construction: "Gini over sorted regional income with population shares."
    units: "0-1"
    source: "Computed (this study)"
    kind: cont
  wcv_nocap:
    label: "WCV excluding the capital region"
    definition: "WCV recomputed after dropping the largest (capital) region."
    construction: "Exclude region 1, re-normalize population shares, recompute WCV."
    units: "0-1"
    source: "Computed (this study)"
    kind: cont
  trade_gdp:
    label: "Trade openness (% of GDP)"
    definition: "Exports + imports as a share of GDP."
    construction: "Country base mean + AR(1) noise, clamped to [15, 171]."
    units: "% GDP"
    source: "Simulation"
    kind: cont
  urbanization:
    label: "Urbanization rate (%)"
    definition: "Share of population in urban areas."
    construction: "Country base mean + random-walk drift, clamped to [20, 99]."
    units: "%"
    source: "Simulation"
    kind: cont
  nonag:
    label: "Non-agricultural share of GVA (%)"
    definition: "Share of gross value added outside agriculture (structural change)."
    construction: "Logistic transform of lnGDP."
    units: "% (0-100)"
    source: "Simulation"
    kind: cont
  ethnic:
    label: "Ethnic fractionalization index"
    definition: "Degree of ethnic/linguistic heterogeneity (time-invariant per country)."
    construction: "Beta(1.0, 1.7) draw rescaled to [0, 0.75]."
    units: "0-1"
    source: "Simulation"
    kind: cont
  federal:
    label: "Federal-state dummy (1=federal)"
    definition: "1 if the country has a federal constitution, else 0."
    construction: "1 for a fixed set of federal states (US, Canada, Brazil, India, Germany, ...)."
    units: "0/1"
    source: "Assigned"
    kind: dummy
  lnunits:
    label: "Log number of regions"
    definition: "Natural log of the count of territorial units."
    construction: "log(n_reg); region counts from Lessmann (2014) appendix."
    units: "log count"
    source: "Scaffold (Lessmann 2014)"
    kind: cont
  lnarea:
    label: "Log land area (km^2)"
    definition: "Natural log of country land area."
    construction: "log(area); areas from Lessmann (2014) appendix."
    units: "log km^2"
    source: "Scaffold (Lessmann 2014)"
    kind: cont
  area_units:
    label: "Area per region (log scale)"
    definition: "Land area relative to the number of regions."
    construction: "lnarea / lnunits."
    units: "log scale"
    source: "Derived"
    kind: cont
  period5:
    label: "5-year period group"
    definition: "Categorical 5-year period (1=1980-84 ... 6=2005-09)."
    construction: "Year binned into six 5-year periods."
    units: "1-6"
    source: "Derived"
    kind: id
  lnGDP2:
    label: "Log GDP per capita, squared"
    definition: "Quadratic income term for the Kuznets polynomial."
    construction: "lnGDP^2."
    units: "log^2"
    source: "Derived"
    kind: cont
  lnGDP3:
    label: "Log GDP per capita, cubed"
    definition: "Cubic income term (potential N-shape) for the Kuznets polynomial."
    construction: "lnGDP^3."
    units: "log^3"
    source: "Derived"
    kind: cont
  region:
    label: "Region index within country"
    definition: "Sequential, persistent region identifier (region 1 is typically the capital)."
    construction: "1..n_reg per country."
    units: "integer"
    source: "Simulation"
    kind: id
  pop_share:
    label: "Regional population share"
    definition: "Fraction of country population in the region (sums to 1 per country)."
    construction: "Gamma(0.85) draws sorted descending, adjusted for a capital weight."
    units: "0-1"
    source: "Simulation"
    kind: cont
  gdp_pc:
    label: "Regional GDP per capita"
    definition: "Simulated regional GDP per capita."
    construction: "exp(lnGDP)·exp(δ·z − 0.5·δ²): country mean scaled by a persistent regional position."
    units: "US$"
    source: "Simulation"
    kind: cont
