# Data dictionary metadata for r_causalpolicy_workshop — drives build_data_dictionary.py.
# Generated by the write-data-dictionary skill from the post's text + data; edit and rerun.

study:
  title: "Six Ways to Evaluate a Policy: Proposition 99"
  subtitle: "Companion data for an R tutorial that runs six causal estimators on California's 1989 cigarette-tax reform."
  overview: >
    Companion data for a hands-on R tutorial that evaluates California's 1989 <strong>Proposition
    99</strong> cigarette tax by applying six estimator families &mdash; naive pre-post,
    difference-in-differences, two interrupted time-series variants (linear growth curve and an
    AICc-selected ARIMA), regression discontinuity on time, synthetic control (<code>tidysynth</code>),
    and Bayesian structural time series (<code>CausalImpact</code>) &mdash; to one shared panel and
    asking how much they disagree. The data are a balanced annual panel of <strong>39 U.S.
    states</strong> over <strong>1970&ndash;2000</strong> (1,209 state-year rows) with per-capita
    cigarette pack sales as the outcome and four covariates, prepared from the canonical
    Abadie, Diamond &amp; Hainmueller (2010) Proposition 99 dataset distributed by the causalpolicy.nl
    workshop. Every causal method targets the average treatment effect on the treated (ATT) for
    California; the entire pipeline is open and reproducible.
  panel_structure: >
    <strong>Three files.</strong> <code>proposition99</code> is the source 39-state annual panel
    (one row per state &times; year, 1970&ndash;2000) with four partly-missing covariates.
    <code>data_california</code> is the California-only series (one row per year) with a
    <code>prepost</code> factor marking the 1989 policy date &mdash; the analysis subset used by the
    naive, ITS and RDD estimators. <code>data_imputed</code> is the full panel after one round of
    <code>mice</code> random-forest imputation that fills every covariate gap &mdash; the complete-case
    input for the CausalImpact model.
  kpis:
    - {n: 3, l: "datasets"}
    - {n: 8, l: "variables"}
    - {n: 39, l: "states"}
    - {n: "1970–2000", l: "years"}

dta_format_version: 118

sources:
  - name: "Abadie, Diamond & Hainmueller (2010)"
    provides: "Original Proposition 99 panel: per-capita cigarette sales + covariates for 39 states, 1970–2000"
    reference: "Abadie, A., Diamond, A., & Hainmueller, J. (2010). Synthetic control methods for comparative case studies: Estimating the effect of California's Tobacco Control Program. Journal of the American Statistical Association, 105(490), 493–505."
  - name: "causalpolicy.nl workshop (ODISSEI)"
    provides: "Prepared proposition99.rds distribution mirrored as proposition99.csv"
    reference: "ODISSEI Social Data Science Team. Causal Policy Evaluation workshop. https://causalpolicy.nl/"
  - name: "Method references"
    provides: "Estimators and concepts"
    reference: "Holland (1986); Rubin (1974); Hyndman & Athanasopoulos (2021, fpp3); Brodersen et al. (2015, CausalImpact); van Buuren & Groothuis-Oudshoorn (2011, mice)."

formulas_html: |
  <p>Every method targets the <strong>average treatment effect on the treated</strong> (ATT) for
  California over 1989&ndash;2000, each building the missing counterfactual
  <code>Ŷ₁ₜ(0)</code> &mdash; California's sales <em>without</em> Proposition 99 &mdash; a different
  way.</p>
  <ul class="tight">
    <li><strong>Naive pre-post</strong>: <code>Ŷ₁ₜ(0) = Ȳ₁,pre</code> &mdash; California's own
      pre-period mean.</li>
    <li><strong>Difference-in-Differences</strong>: <code>Ŷ₁ₜ(0) = Ȳ₁,pre + (Ȳ₀,post − Ȳ₀,pre)</code>
      &mdash; add Nevada's pre-to-post change.</li>
    <li><strong>ITS (growth curve)</strong>: <code>Ŷ₁ₜ(0) = α̂ + β̂·t</code> &mdash; extrapolate
      California's pre-period linear fit.</li>
    <li><strong>ITS (ARIMA)</strong>: <code>Ŷ₁ₜ(0)</code> = forecast from an AICc-selected
      ARIMA(1,2,0) fitted on 1970&ndash;1988.</li>
    <li><strong>RDD on time</strong>: segmented regression
      <code>cigsale ~ year0 + prepost + year0:prepost</code>; the level break <code>prepost</code>
      coefficient is the headline effect.</li>
    <li><strong>Synthetic Control</strong>: <code>Ŷ₁ₜ(0) = Σ wᵢ* Yᵢₜ</code> &mdash; convex
      weighted blend of donor states minimising pre-1988 RMSE.</li>
    <li><strong>CausalImpact (BSTS)</strong>: <code>y₁ₜ = μₜ + βᵀxₜ + εₜ</code> &mdash; a local-level
      trend plus a regression on donor-state series and covariates, fit on the pre-period and
      projected forward.</li>
  </ul>
  <p><strong>Covariate imputation</strong> (for <code>data_imputed</code>): missing
  <code>lnincome</code>, <code>beer</code> and <code>age15to24</code> values are filled with one
  round of random-forest multiple imputation, <code>mice(m = 1, method = "rf")</code>, under a global
  <code>set.seed(42)</code>. Only the three NA-bearing covariates change; the fully-observed
  <code>cigsale</code> and <code>retprice</code> are byte-identical to the source panel.</p>

caveats:
  - "<strong>Single imputation.</strong> data_imputed uses one random-forest draw (m = 1) for tutorial speed; with multiple imputation (m > 1) or a different model the CausalImpact estimate can move by 1–3 packs."
  - "<strong>Covariate missingness is heavy.</strong> In the source panel beer is missing 54.8% of rows, age15to24 32.3%, and lnincome 16.1%; cigsale and retprice are fully observed. The imputed values are model-based fills, not measurements."
  - "<strong>RDD is segmented regression.</strong> The workshop labels the year-as-running-variable specification 'RDD'; with calendar time as the running variable it reduces to a piecewise (segmented) regression, not the classical sharp RDD on a continuous score."
  - "<strong>Counterfactual, not data, drives the estimate.</strong> Five of six methods converge on a 13–20 pack reduction while DiD-vs-Nevada collapses to −5.7 packs (p = 0.31) and ARIMA-based ITS flips to +4.5 packs — the disagreement is the lesson, so triangulate across estimators."

