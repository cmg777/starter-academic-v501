files:
  proposition99.csv:
    label: "Source 39-state annual panel (raw, with covariate NAs)"
    grain: "state-year"
    years: "1970-2000"
    coverage: "39 U.S. states (balanced)"
    key: "state x year"
    purpose: "Shared input panel for all six estimators; outcome = cigsale, treated unit = California from 1989."
    note: "Mirror of the workshop's proposition99.rds. Balanced 39-state x 31-year panel (1,209 rows). cigsale and retprice fully observed; lnincome, beer, age15to24 carry missing values (filled in data_imputed.csv)."
  data_california.csv:
    label: "California-only series with Pre/Post factor"
    grain: "year (California only)"
    years: "1970-2000"
    coverage: "California (31 years: 19 Pre + 12 Post)"
    key: "year"
    purpose: "Within-California analysis subset for the naive pre-post, ITS growth-curve, ITS-ARIMA and RDD-on-time estimators."
    note: "California rows from the source panel with an added prepost factor (Pre = year <= 1988, Post = year >= 1989). Same seven columns as the source plus prepost. Covariate NAs are retained (these methods use only cigsale)."
  data_imputed.csv:
    label: "Full panel after random-forest imputation (no NAs)"
    grain: "state-year"
    years: "1970-2000"
    coverage: "39 U.S. states (balanced)"
    key: "state x year"
    purpose: "Complete-case wide-format input for the CausalImpact Bayesian structural time-series model."
    note: "Source panel after one round of mice(m = 1, method = 'rf') random-forest imputation under set.seed(42). Same 1,209 rows x 7 columns as the source, but lnincome, beer and age15to24 have every gap filled; cigsale and retprice are unchanged."

columns:
  state:
    label: "U.S. state name"
    definition: "Name of the U.S. state (treated unit is California; the other 38 are donor states)."
    construction: "From the source Abadie–Diamond–Hainmueller panel; data_california.csv is filtered to California only."
    units: "string"
    source: "Abadie, Diamond & Hainmueller (2010)"
    coverage: "39 states (1 in data_california.csv)"
    kind: str
  year:
    label: "Calendar year"
    definition: "Annual time index; 1989 is the Proposition 99 policy date."
    construction: "Source panel runs 1970–2000; the last full pre-period year is 1988."
    units: "year"
    source: "Abadie, Diamond & Hainmueller (2010)"
    coverage: "1970-2000"
    kind: year
  cigsale:
    label: "Per-capita cigarette pack sales"
    definition: "Annual per-capita sales of cigarette packs (the policy outcome)."
    construction: "Observed; fully populated in all three files (no imputation needed)."
    units: "packs per capita"
    source: "Abadie, Diamond & Hainmueller (2010)"
    coverage: "fully observed"
    kind: cont
  lnincome:
    label: "Log per-capita income"
    definition: "Natural log of per-capita personal income (covariate)."
    construction: "Source covariate; missing in 16.1% of source rows, filled in data_imputed.csv by random-forest imputation."
    units: "log US$"
    source: "Abadie, Diamond & Hainmueller (2010); imputed (mice rf) in data_imputed.csv"
    coverage: "16.1% missing in source; complete in imputed"
    kind: cont
  beer:
    label: "Per-capita beer consumption"
    definition: "Per-capita beer consumption (covariate proxy for tobacco-related behaviour)."
    construction: "Source covariate; missing in 54.8% of source rows, filled in data_imputed.csv by random-forest imputation."
    units: "gallons per capita"
    source: "Abadie, Diamond & Hainmueller (2010); imputed (mice rf) in data_imputed.csv"
    coverage: "54.8% missing in source; complete in imputed"
    kind: cont
  age15to24:
    label: "Share of population aged 15–24"
    definition: "Fraction of the state population aged 15 to 24 (covariate)."
    construction: "Source covariate; missing in 32.3% of source rows, filled in data_imputed.csv by random-forest imputation."
    units: "0-1 (share)"
    source: "Abadie, Diamond & Hainmueller (2010); imputed (mice rf) in data_imputed.csv"
    coverage: "32.3% missing in source; complete in imputed"
    kind: cont
  retprice:
    label: "Retail cigarette price"
    definition: "Average retail price of cigarettes (covariate)."
    construction: "Observed; fully populated in all three files (no imputation needed)."
    units: "US cents per pack"
    source: "Abadie, Diamond & Hainmueller (2010)"
    coverage: "fully observed"
    kind: cont
  prepost:
    label: "Pre/Post policy period (1=Post)"
    definition: "Factor marking the Proposition 99 period: Pre = up to 1988, Post = 1989 onward."
    construction: "factor(year > 1988, labels = c('Pre','Post')); present only in data_california.csv."
    units: "Pre/Post"
    source: "Derived (this study)"
    coverage: "data_california.csv only (19 Pre, 12 Post)"
    kind: str
