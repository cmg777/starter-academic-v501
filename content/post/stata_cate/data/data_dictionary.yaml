    reference: "Athey, Tibshirani & Wager (2019); Chernozhukov et al. (2018); Robinson (1988)."

formulas_html: |
  <p>The estimand is the <strong>Conditional Average Treatment Effect</strong> &mdash; the average effect
  of 401(k) eligibility <code>d</code> on net assets <code>y</code> for households with covariate profile
  <code>x</code>:</p>
  <ul class="tight">
    <li><strong>CATE</strong>: <code>τ(x) = E{ y(1) − y(0) | x = x }</code> &mdash; a function of <code>x</code>,
      not a single number.</li>
    <li><strong>ATE</strong>: <code>ATE = E{ τ(X) }</code> &mdash; the CATE averaged over the sample.</li>
    <li><strong>GATE</strong> (prespecified group <code>g</code>): <code>τ(g) = E{ Γ_i | G_i = g }</code>,
      the doubly robust AIPW score <code>Γ_i</code> averaged over households in group <code>g</code>.</li>
    <li><strong>GATES</strong>: the same average, but groups are <em>data-driven</em> quartiles of the
      predicted effect <code>τ̂_i</code> (out-of-sample, cross-fit).</li>
    <li><strong>AIPW score</strong>:
      <code>Γ_i = [ ŷ(1)_i + d_i{y_i − ŷ(1)_i}/f̂_i ] − [ ŷ(0)_i + (1−d_i){y_i − ŷ(0)_i}/(1−f̂_i) ]</code>
      &mdash; doubly robust (consistent if either the outcome model or the propensity model is correct).</li>
  </ul>
  <p>Stata 19's <code>cate</code> command estimates <code>τ(x)</code> with cross-fitted lasso nuisance models
  (the <strong>learners</strong> for the outcome and treatment functions) plus a <strong>generalized random
  forest</strong> for the individual-effect function, and an honest-tree bootstrap for inference. The
  <strong>PO</strong> (partialing-out, partial-linear) and <strong>AIPW</strong> (fully interactive) routes
  make different model assumptions but both return a per-household <code>τ̂(x_i)</code>. Note: the columns
  in <code>assets3_raw.csv</code> are the raw inputs only; the IATE predictions <code>τ̂_i</code> are
  produced by the do-file and not part of this dataset.</p>

caveats:
  - "<strong>Observational, not randomized.</strong> 401(k) eligibility is not randomly assigned (it depends on the employer the household head chose), so the raw eligible-versus-ineligible asset gap ($19,557) mixes the causal effect with selection; identification rests on unconfoundedness given the covariates."
  - "<strong>Eligibility, not participation.</strong> <code>e401k</code> records whether the employer offers a 401(k), not whether the household contributes — a distinct treatment from actual participation."
  - "<strong>Heavy-tailed outcome.</strong> Net <code>assets</code> is extremely right-skewed (mean $18,054 vs. median $1,499; max ≈ $1.5M; min ≈ −$502,302 for negative-net-worth households), so the treatment effect almost certainly varies across the distribution."
  - "<strong>String-coded categories.</strong> In this CSV the binary covariates are stored as their Stata value-label text (e.g. <code>e401k</code> = \"Eligible\"/\"Not eligible\", <code>pension</code> = \"Receives pension\"/\"No pension\") rather than 0/1; <code>incomecat</code> alone is numeric (0–4)."
  - "<strong>Excerpt.</strong> assets3 is a teaching excerpt of the original Chernozhukov &amp; Hansen (2004) data shipped with Stata; it is intended for illustration and may not match the full source extract variable-for-variable."

