# Generated by the write-data-dictionary skill from the post's text + data; edit and rerun.

study:
  title: "Conditional Average Treatment Effects (CATE) with Stata 19"
  subtitle: "The canonical 401(k) eligibility and household assets sample (assets3), for heterogeneous treatment-effect estimation."
  overview: >
    Companion data for a hands-on Stata tutorial on estimating <strong>Conditional Average Treatment
    Effects (CATE)</strong> with Stata 19's new <code>cate</code> command. The dataset is the canonical
    <code>assets3</code> excerpt &mdash; an extract from Chernozhukov &amp; Hansen (2004) that ships with
    Stata 19 (<code>webuse assets3</code>) &mdash; covering <strong>9,913 U.S. households</strong>. The
    outcome is net total financial <code>assets</code> (US$); the treatment is employer-offered 401(k)
    <code>e401k</code> eligibility (not actual participation); the remaining columns are demographic and
    financial covariates that describe the heterogeneity of interest. The post contrasts partialing-out (PO)
    and augmented inverse-probability weighting (AIPW) estimators against a parametric <code>teffects aipw</code>
    benchmark, then probes heterogeneity with <code>estat heterogeneity</code>, <code>estat projection</code>,
    GATE on prespecified income groups, GATES on data-driven quartiles, <code>estat classification</code>, and
    a nonparametric <code>estat series</code> fit. The raw eligible-versus-ineligible gap of $19,557 shrinks
    to a doubly robust ATE near $8,000, and income emerges as the dominant moderator.
  panel_structure: >
    <strong>One file, cross-sectional.</strong> <code>assets3_raw</code> is a single cross-section &mdash;
    one row per household, no time dimension. It is exported verbatim from Stata 19's built-in
    <code>assets3</code> sample by the post's do-file (<code>export delimited</code>); the string-coded
    columns (e.g. <code>e401k</code>, <code>pension</code>) carry Stata's value-label text rather than the
    underlying 0/1 codes.
  kpis:
    - {n: 1, l: "dataset"}
    - {n: 11, l: "variables"}
    - {n: "9,913", l: "households"}
    - {n: "cross-section", l: "structure"}

dta_format_version: 118

