files:
  saving.dta:
    label: "Savings panel: 56 countries x 15 periods (standardized)"
    grain: "country-year (balanced)"
    years: "1995-2010 (coded 1-15)"
    coverage: "56 countries (balanced); 840 obs"
    key: "code x year"
    purpose: "C-LASSO of savings behavior; pooled/FE baseline and static + dynamic group-specific models."
    note: "Strongly balanced panel from Su, Shi & Phillips (2016). All five economic variables are standardized to mean 0, SD 1; year is coded 1-15 (= 1995-2010). C-LASSO selects K=2 groups with opposite-signed CPI and interest-rate effects."
  democracy.dta:
    label: "Democracy & growth panel: 98 countries, 1970-2010 (ANRR 2019)"
    grain: "country-year (unbalanced)"
    years: "1970-2010"
    coverage: "98 countries; 4,018 obs"
    key: "country x year"
    purpose: "Replicate Acemoglu et al. (2019) pooled FE, then C-LASSO to reveal the +2.151 / -0.936 democracy-effect split."
    note: "Acemoglu, Naidu, Restrepo & Robinson (2019) panel. lnPGDP and GDP lags are log per-capita GDP x100; lnTrade and lnMort are likewise x100. The post uses lnPGDP, Democracy, and ly1 (lags ly2-ly4 support the empirical.do extensions)."

columns:
  # ---- saving.dta ----
  code:
    label: "Country code (savings panel)"
    definition: "Numeric country identifier in the savings panel (1-56)."
    construction: "Anonymized integer code; no country-name mapping is provided in the file."
    units: "integer code"
    source: "Su, Shi & Phillips (2016)"
    coverage: "56 countries"
    kind: id
  year:
    label: "Time period"
    definition: "Time index of the panel. In the savings panel coded 1-15 (= 1995-2010); in the democracy panel the calendar year."
    construction: "Sequential period index (savings) / calendar year (democracy)."
    units: "period / year"
    source: "Source panels"
    kind: year
  savings:
    label: "Savings-to-GDP ratio (standardized)"
    definition: "Standardized savings-to-GDP ratio — the outcome of the savings application."
    construction: "Savings/GDP standardized to mean 0, SD 1 across the panel."
    units: "SD units"
    source: "Su, Shi & Phillips (2016)"
    coverage: "840 obs"
    kind: cont
  lagsavings:
    label: "Lagged savings-to-GDP ratio (standardized)"
    definition: "One-period lag of the standardized savings ratio; the dynamic-model persistence term."
    construction: "L.savings within country; standardized to mean 0, SD 1."
    units: "SD units"
    source: "Su, Shi & Phillips (2016)"
    coverage: "840 obs"
    kind: cont
  cpi:
    label: "CPI inflation (standardized)"
    definition: "Standardized consumer-price-index inflation — the regressor whose sign reverses across groups."
    construction: "CPI inflation standardized to mean 0, SD 1."
    units: "SD units"
    source: "Su, Shi & Phillips (2016)"
    coverage: "840 obs"
    kind: cont
  interest:
    label: "Real interest rate (standardized)"
    definition: "Standardized real interest rate; also exhibits a group sign reversal."
    construction: "Real interest rate standardized to mean 0, SD 1."
    units: "SD units"
    source: "Su, Shi & Phillips (2016)"
    coverage: "840 obs"
    kind: cont
  gdp:
    label: "GDP growth (standardized)"
    definition: "Standardized GDP growth rate; positive in both savings groups."
    construction: "GDP growth standardized to mean 0, SD 1."
    units: "SD units"
    source: "Su, Shi & Phillips (2016)"
    coverage: "840 obs"
    kind: cont
  # ---- democracy.dta ----
  name:
    label: "Country name"
    definition: "Country name string for the democracy panel."
    construction: "Country identifier carried alongside the numeric code."
    units: "string"
    source: "Acemoglu et al. (2019)"
    coverage: "98 countries"
    kind: str
  country:
    label: "Numeric country code (democracy panel)"
    definition: "Generated numeric country code; the panel id for the democracy application."
    construction: "Generated integer code (embedded label: 'Generated numeric country code')."
    units: "integer code"
    source: "Acemoglu et al. (2019)"
    coverage: "98 countries"
    kind: id
  lnPGDP:
    label: "Log per-capita GDP x100 (2000 USD)"
    definition: "Log of GDP per capita in 2000 constant dollars, multiplied by 100 — the growth outcome."
    construction: "100 x log(real GDP per capita, 2000 constant USD)."
    units: "log USD x100"
    source: "Acemoglu et al. (2019)"
    coverage: "4,018 obs"
    kind: cont
  Democracy:
    label: "Democracy indicator (ANRR)"
    definition: "Binary democracy measure of Acemoglu, Naidu, Restrepo & Robinson: 1 if democratic country-year, else 0."
    construction: "ANRR dichotomous democracy classification."
    units: "0/1"
    source: "Acemoglu et al. (2019)"
    coverage: "4,018 obs (55% = 1)"
    kind: dummy
    value_labels: {0: "Non-democracy", 1: "Democracy"}
  ly1:
    label: "Lag 1 of log per-capita GDP x100"
    definition: "First lag of lnPGDP — the dynamic-model persistence term."
    construction: "L1.lnPGDP within country."
    units: "log USD x100"
    source: "Acemoglu et al. (2019)"
    coverage: "3,920 obs"
    kind: cont
  ly2:
    label: "Lag 2 of log per-capita GDP x100"
    definition: "Second lag of lnPGDP (used in the empirical.do lag-structure extensions)."
    construction: "L2.lnPGDP within country."
    units: "log USD x100"
    source: "Acemoglu et al. (2019)"
    coverage: "3,822 obs"
    kind: cont
  ly3:
    label: "Lag 3 of log per-capita GDP x100"
    definition: "Third lag of lnPGDP (used in the lag-structure extensions)."
    construction: "L3.lnPGDP within country."
    units: "log USD x100"
    source: "Acemoglu et al. (2019)"
    coverage: "3,724 obs"
    kind: cont
  ly4:
    label: "Lag 4 of log per-capita GDP x100"
    definition: "Fourth lag of lnPGDP (used in the lag-structure extensions)."
    construction: "L4.lnPGDP within country."
    units: "log USD x100"
    source: "Acemoglu et al. (2019)"
    coverage: "3,626 obs"
    kind: cont
  lnpop:
    label: "Log population"
    definition: "Log of population."
    construction: "log(population)."
    units: "log persons"
    source: "Acemoglu et al. (2019)"
    coverage: "4,014 obs"
    kind: cont
  lnpop95:
    label: "Log population in 1995"
    definition: "Log of population in 1995 (time-invariant per country)."
    construction: "log(population in 1995)."
    units: "log persons"
    source: "Acemoglu et al. (2019)"
    coverage: "95 countries"
    kind: cont
  lnTrade:
    label: "Log trade x100 (% of GDP)"
    definition: "Log of trade (exports + imports as % of GDP), multiplied by 100."
    construction: "100 x log(trade share of GDP)."
    units: "log x100"
    source: "Acemoglu et al. (2019)"
    coverage: "3,845 obs"
    kind: cont
  lnMort:
    label: "Log child mortality x100"
    definition: "Log of the child mortality rate, multiplied by 100."
    construction: "100 x log(child mortality rate)."
    units: "log x100"
    source: "Acemoglu et al. (2019)"
    coverage: "3,932 obs"
    kind: cont
  transition:
    label: "Transition-year indicator"
    definition: "1 if the country-year is a democratic-transition year, else 0."
    construction: "ANRR transition-year flag."
    units: "0/1"
    source: "Acemoglu et al. (2019)"
    coverage: "4,018 obs"
    kind: dummy
  transid:
    label: "Transition-country indicator"
    definition: "1 if the country ever experiences a transition, else 0 (time-invariant per country)."
    construction: "ANRR transition-country flag."
    units: "0/1"
    source: "Acemoglu et al. (2019)"
    coverage: "4,018 obs"
    kind: dummy
