# Data dictionary metadata for stata_panel_lasso_cluster — drives build_data_dictionary.py.
# Generated by the write-data-dictionary skill from the post's text + data; edit and rerun.
# Documents the two SOURCE datasets the post actually analyzes (saving.dta, democracy.dta).
# The package demo file refMaterials/classifylasso.dta is NOT used by the post and is not documented.

study:
  title: "Latent Group Structures in Panel Data"
  subtitle: "Source data for the Classifier-LASSO (C-LASSO) tutorial in Stata: a savings panel and a democracy-and-growth panel."
  overview: >
    Companion data for a hands-on Stata tutorial that uses the <strong>Classifier-LASSO</strong>
    (C-LASSO) method of Su, Shi &amp; Phillips (2016), via the <code>classifylasso</code> command
    (Huang, Wang &amp; Zhou 2024), to discover <em>latent group structures</em> in panel data &mdash;
    subsets of units that share slope coefficients while groups differ. Two source datasets drive the
    post. <code>saving</code> is a balanced panel of 56 countries observed over 15 years (840
    observations) on savings behavior, from the Su&ndash;Shi&ndash;Phillips (2016) replication.
    <code>democracy</code> is the Acemoglu, Naidu, Restrepo &amp; Robinson (2019) democracy-and-growth
    panel of 98 countries from 1970&ndash;2010 (4,018 observations). The tutorial shows that the
    pooled democracy&ndash;growth effect of +1.055 masks a +2.151 effect in 57 countries and a
    &minus;0.936 effect in 41 countries &mdash; a sign reversal exemplifying Simpson's paradox.
  panel_structure: >
    <strong>Two files.</strong> <code>saving</code> is a strongly balanced country panel (one row per
    country &times; period, 56 countries &times; 15 periods = 840 rows; <code>year</code> is coded
    1&ndash;15, corresponding to 1995&ndash;2010); all five economic variables are standardized to mean
    zero, standard deviation one. <code>democracy</code> is an unbalanced country panel (one row per
    country &times; year, 4,018 rows over 1970&ndash;2010) carrying log per-capita GDP, a binary
    democracy indicator, four lags of GDP, and demographic/trade/mortality covariates.
  kpis:
    - {n: 2, l: "datasets"}
    - {n: 21, l: "variables"}
    - {n: "56 / 98", l: "countries"}
    - {n: "1970–2010", l: "years"}

dta_format_version: 118

sources:
  - name: "Su, Shi & Phillips (2016)"
    provides: "C-LASSO method and the savings panel (saving.dta) used for replication"
    reference: "Su, L., Shi, Z., & Phillips, P. C. B. (2016). Identifying latent structures in panel data. Econometrica, 84(6), 2215–2264. https://doi.org/10.3982/ECTA12560"
  - name: "Huang, Wang & Zhou (2024)"
    provides: "The classifylasso Stata command implementing C-LASSO"
    reference: "Huang, W., Wang, Y., & Zhou, L. (2024). Identify latent group structures in panel data: The classifylasso command. Stata Journal, 24(1), 173–203. https://doi.org/10.1177/1536867X241233664"
  - name: "Acemoglu, Naidu, Restrepo & Robinson (2019)"
    provides: "The democracy-and-growth panel (democracy.dta)"
    reference: "Acemoglu, D., Naidu, S., Restrepo, P., & Robinson, J. A. (2019). Democracy does cause growth. Journal of Political Economy, 127(1), 47–100. https://doi.org/10.1086/700936"
  - name: "Method references"
    provides: "Dynamic-panel bias correction and estimators"
    reference: "Dhaene & Jochmans (2015), half-panel jackknife; Nickell (1981), dynamic-panel bias; reghdfe (Correia) for cluster-robust two-way fixed effects."

formulas_html: |
  <p>C-LASSO minimizes a <strong>penalized least-squares</strong> objective that shrinks each unit's
  slope vector toward one of <code>K</code> group centers, then re-estimates each group by plain OLS
  (<em>postlasso</em>) for valid inference.</p>
  <ul class="tight">
    <li><strong>Objective</strong>:
      <code>Q = (1/NT) Σ_i Σ_t (y_it − β_i'x_it)² + (λ/N) Σ_i Π_k ‖β_i − α_k‖</code> — SSR plus a
      product-form group penalty (the LASSO penalty <code>λ_NT = c_λ·T^(−1/3)</code>).</li>
    <li><strong>Group membership</strong>: <code>β_i = α_k</code> if <code>i ∈ G_k</code>, for
      <code>k = 1,…,K</code> — each unit takes its group's slope vector.</li>
    <li><strong>Number of groups</strong>: chosen to minimize an information criterion (IC); the
      complexity tuning parameter is <code>ρ_NT = c_ρ·(NT)^(−1/2)</code>. K = 2 is selected in all
      specifications.</li>
    <li><strong>Cluster-robust inference</strong>: standard errors are clustered by country
      (<code>cluster(country)</code>), adjusting for within-country serial correlation in the
      two-way fixed-effects (country + year) postlasso step.</li>
    <li><strong>Dynamic bias correction</strong>: with a lagged dependent variable (<code>lagsavings</code>
      / <code>ly1</code>), the <code>dynamic</code> option applies the half-panel jackknife to remove
      Nickell bias before grouping.</li>
  </ul>
  <p>The savings panel is pre-standardized (each variable demeaned and scaled to unit SD), so its
  coefficients are read in standard-deviation units. The democracy panel's <code>lnPGDP</code> and the
  GDP lags are log per-capita GDP &times; 100.</p>

caveats:
  - "<strong>Standardized savings variables.</strong> In <code>saving.dta</code>, savings, lagsavings, cpi, interest, and gdp are each standardized to mean 0, SD 1 — coefficients are in standard-deviation units, not raw economic magnitudes."
  - "<strong>Coded time index.</strong> In <code>saving.dta</code>, <code>year</code> is coded 1–15 (not calendar years); these 15 periods correspond to 1995–2010 in the source."
  - "<strong>Numeric country codes.</strong> Both panels identify units by numeric code (<code>code</code> in savings; <code>country</code> in democracy). The democracy file carries a <code>name</code> string; the savings file does not, so savings groups cannot be mapped to named countries."
  - "<strong>Scaled GDP variables.</strong> In <code>democracy.dta</code>, <code>lnPGDP</code> and its lags <code>ly1–ly4</code> are log per-capita GDP multiplied by 100; <code>lnTrade</code> and <code>lnMort</code> are likewise scaled by 100."
  - "<strong>Associations, not proven causation.</strong> The group-specific C-LASSO estimates are conditional associations within the panel model; a causal reading of the democracy effect requires the same identifying assumptions as Acemoglu et al. (2019)."
  - "<strong>Close IC in the democracy model.</strong> IC values across K = 1–5 span only 3.267–3.280; K = 2 is optimal but not dominant, so group assignments are sensitive to the tuning parameter ρ."

