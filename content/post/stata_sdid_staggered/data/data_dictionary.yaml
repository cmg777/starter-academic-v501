    years: "1990-2015"
    coverage: "119 countries (9 ever-treated, 110 never-treated)"
    key: "country x year"
    purpose: "Estimate the effect of gender quotas on women in parliament via staggered SDID."
    note: "Balanced annual panel from the sdid package (Bhalotra, Clarke, Gomes & Venkataramani 2023): 119 countries x 26 years = 3,094 obs. Outcome womparl, absorbing treatment quota, covariate lngdp; quotaYear gives each adopting country's cohort (2000-2013), missing for the 110 never-treated."

