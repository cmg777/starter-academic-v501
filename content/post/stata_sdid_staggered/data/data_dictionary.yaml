formulas_html: |
  <p>The estimand is the <strong>average treatment effect on the treated (ATT)</strong> — the effect
  of adopting a quota on the women-in-parliament share, in the countries that adopted one, averaged
  over their post-adoption years:</p>
  <p><code>&tau; = (1 / N_tr · T_post) · &Sigma;_(i: W_i=1) &Sigma;_(t&gt;T_pre) [ Y_it(1) − Y_it(0) ]</code></p>
  <p>SDID (Arkhangelsky et al., 2021) is a <strong>weighted two-way fixed-effects regression</strong>
  that chooses the ATT plus a constant, unit fixed effects, and time fixed effects to minimize a
  weighted sum of squared residuals, weighting each observation by a unit weight
  <code>&omega;_i</code> times a time weight <code>&lambda;_t</code>:</p>
  <ul class="tight">
    <li><strong>Objective</strong>: <code>min &Sigma;_i &Sigma;_t (Y_it − &mu; − &alpha;_i − &beta;_t − W_it·&tau;)² · &omega;_i · &lambda;_t</code>.</li>
    <li><strong>Unit weights</strong> <code>&omega;</code>: chosen (with an intercept and a ridge penalty) so a non-negative blend of control countries tracks the treated cohort's pre-period trend; the level gap is absorbed by the unit fixed effect.</li>
    <li><strong>Time weights</strong> <code>&lambda;</code>: chosen so the weighted pre-period years best predict each control's post-period average — recent, similar years count more.</li>
  </ul>
  <p><strong>Staggered extension.</strong> Run single-cohort SDID once per adoption cohort
  <code>a</code> (cohort's treated units + never-treated controls only), obtaining
  <code>&tau;_a</code>, then aggregate with non-negative treated-period-share weights:
  <code>ATT = &Sigma;_a [ N_tr^a · T_post^a / &Sigma;_b N_tr^b · T_post^b ] · &tau;_a</code>.
  Because each cohort is compared only to never-treated controls, an already-treated unit is never
  used as a control for a later adopter — the contamination that breaks naive TWFE under staggered
  timing.</p>

caveats:
  - "<strong>Teaching subset.</strong> <code>quota_example</code> is the example dataset distributed with the <code>sdid</code> package, drawn from Bhalotra et al. (2023); the numbers illustrate the <em>method</em>, not a final verdict on quota policy."
  - "<strong>Effect concentration.</strong> The +8 aggregate ATT leans heavily on a few cohorts — the 2012 cohort alone contributes +21.8 points and the early 2000/2002/2003 cohorts carry most of the aggregation weight; dropping 2012 lowers the average noticeably."
  - "<strong>Fragile counterfactuals.</strong> With 110 controls and as few as one treated country per cohort, some synthetic controls are imprecise (the 2003 cohort's standard error of 9.13 is the tell)."
  - "<strong>Identifying assumptions.</strong> SDID requires no anticipation, an absorbing treatment, no cross-country spillovers, and that quota timing is not itself a response to the outcome's trajectory; the flat event-study placebos support, but cannot prove, the parallel-(synthetic-)trends assumption."
  - "<strong>Missing covariate.</strong> <code>lngdp</code> has 104 missing country-years; SDID needs a balanced panel, so those rows are dropped before the covariate specifications and event study."

