# Data dictionary metadata for stata_sdid_staggered — drives build_data_dictionary.py.
# Generated by the write-data-dictionary skill from the post's text + data; edit and rerun.

study:
  title: "Staggered Synthetic Difference-in-Differences: Gender Quotas and Women in Parliament"
  subtitle: "The quota_example panel from the Stata sdid package — 119 countries, 1990–2015, with staggered quota adoption."
  overview: >
    Companion data for a Stata tutorial that extends synthetic difference-in-differences (SDID) to
    <strong>staggered adoption</strong>, where units adopt treatment at different times. The single
    file is <code>quota_example.dta</code>, the balanced panel distributed with the
    <code>sdid</code> package (Bhalotra, Clarke, Gomes &amp; Venkataramani, 2023): 119 countries
    observed annually from 1990 to 2015 (3,094 observations). The outcome is the share of seats
    held by women in the national parliament; the treatment is the adoption of a reserved-seat
    gender quota (absorbing — once adopted it stays on); the covariate is log GDP per capita.
    Treatment is <strong>staggered</strong>: 9 countries adopt a quota across 7 cohorts (2000,
    2002, 2003, 2005, 2010, 2012, 2013) and 110 countries remain never-treated, forming the donor
    pool. The post estimates a separate, clean SDID per cohort against the never-treated controls,
    aggregates the cohort effects into an overall ATT of +8.0 percentage points, and complements it
    with the <code>sdid_event</code> event study and bootstrap, jackknife, and placebo inference.
  panel_structure: >
    <strong>One file, balanced panel.</strong> <code>quota_example</code> is an annual country panel
    (one row per country &times; year), 119 countries &times; 26 years = 3,094 rows with no gaps in
    the outcome or treatment. Set with <code>xtset country year</code>. The treatment
    <code>quota</code> is absorbing and switches on for only ~3% of country-years;
    <code>quotaYear</code> records each adopting country's cohort (missing for the 110 never-treated
    countries); <code>lngdp</code> has 104 missing values that matter only when used as a covariate.
  kpis:
    - {n: 1, l: "dataset"}
    - {n: 7, l: "variables"}
    - {n: 119, l: "countries"}
    - {n: "1990–2015", l: "years"}

dta_format_version: 118

