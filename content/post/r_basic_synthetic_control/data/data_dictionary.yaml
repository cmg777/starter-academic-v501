files:
  source_data.csv:
    label: "Basque regional panel: GDP + 13 synthetic-control predictors"
    grain: "region-year"
    years: "1955-1997"
    coverage: "18 regional units (Spain aggregate + 17 autonomous communities)"
    key: "regionno x year"
    purpose: "Source panel for the synthetic control: outcome (gdpcap) + pre-treatment predictors matched by synth()."
    note: "The basque dataset bundled with the Synth R package (Abadie, Diamond & Hainmueller 2011); originally compiled by Abadie & Gardeazabal (2003). 18 units x 43 years = 774 rows, 1955-1997. Region 1 is the Spain national aggregate (dropped); region 17 is the treated Basque Country (terrorism onset 1970). gdpcap is observed every year; the predictor columns are pooled period averages / snapshots and are therefore sparse. Sectoral and school variable names were dotted in the original (sec.agriculture) and are renamed to underscores here for Stata validity; values unchanged."

