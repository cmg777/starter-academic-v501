  - name: "Method references"
    provides: "The synthetic control estimator and inference"
    reference: "Abadie, Diamond & Hainmueller (2010); Abadie (2021)."

formulas_html: |
  <p>The synthetic control method estimates the missing counterfactual GDP path of the treated unit (the
  Basque Country) as a weighted average of donor (untreated) regions. Let <code>X1</code> be the treated
  unit's pre-treatment predictor vector (13 &times; 1), <code>X0</code> the donor predictor matrix
  (13 &times; 16), and <code>Z1</code>/<code>Z0</code> the pre-treatment outcomes (annual
  <code>gdpcap</code>) for the treated unit and donors.</p>
  <ul class="tight">
    <li><strong>Donor weights</strong> <code>W*</code> (inner problem): minimize the weighted predictor
      distance <code>‖X1 − X0·W‖_V = √[(X1 − X0·W)′ V (X1 − X0·W)]</code> over <code>W ≥ 0</code>,
      <code>Σ w_j = 1</code> (a convex combination of donors).</li>
    <li><strong>Predictor weights</strong> <code>V*</code> (outer problem): minimize the pre-treatment
      outcome error <code>(Z1 − Z0·W*(V))′(Z1 − Z0·W*(V))</code> &mdash; the diagonal of <code>V</code>
      dials how much each predictor matters; chosen by cross-validation on pre-1970 GDP.</li>
    <li><strong>ATT (gap)</strong>: <code>α̂_1t = Y_1t − Σ_j w_j* · Y_jt</code> for <code>t ≥ 1970</code>
      &mdash; actual Basque GDP minus the synthetic (donor-weighted) GDP, year by year; the headline ATT
      averages this over 1970&ndash;1997.</li>
    <li><strong>Placebo / MSPE ratio</strong>: run the same pipeline treating each donor as if treated;
      rank by the post/pre mean-squared-prediction-error ratio. A trimmed pseudo p-value compares the
      Basque ratio to the distribution of comparable-fit placebos.</li>
  </ul>
  <p>Education predictors are converted to within-region percentage shares and the top two education levels
  are collapsed before matching (inside the post's <code>prepare_basque()</code> helper); the sectoral
  predictors are pooled 1961&ndash;1969 averages. The raw, untransformed values are stored here.</p>

caveats:
  - "<strong>Predictor columns are sparse by design.</strong> Only <code>gdpcap</code> is observed for all 774 rows. The six sectoral shares (~90 non-missing) and five education levels (~108) are pooled period averages/snapshots, and <code>popdens</code> is a single 1969 cross-section (18 rows). The <code>Synth</code> workflow reads these via period-aggregation arguments, so the gaps are expected, not data errors."
  - "<strong>School columns are raw counts, not shares.</strong> <code>school_illit</code>, <code>school_prim</code>, <code>school_med</code>, <code>school_high</code>, and <code>school_post_high</code> are stored as raw figures; the post converts them to within-region percentage shares (and collapses <code>school_high</code> + <code>school_post_high</code>) before matching."
  - "<strong>Region 1 is an aggregate.</strong> Row group <code>regionno == 1</code> (&ldquo;Spain (Espana)&rdquo;) is the national total and is dropped from the analysis; the 17 autonomous communities are regions 2&ndash;18."
  - "<strong>Column names use underscores.</strong> The source <code>basque</code> object names sectoral and school variables with dots (e.g. <code>sec.agriculture</code>); they are renamed to underscores here (<code>sec_agriculture</code>) so the variables are valid Stata names. Values are unchanged."
  - "<strong>Real data, single treated unit.</strong> This is real regional accounting data, not simulated. With one treated region and a 16-region donor pool, inference rests on placebos rather than standard errors; the discrete pseudo p-values have limited resolution."

