# Data dictionary metadata for r_basic_synthetic_control — drives build_data_dictionary.py.
# Generated by the write-data-dictionary skill from the post's text + data; edit and rerun.

study:
  title: "Basic Synthetic Control: The Basque Country Case Study"
  subtitle: "The real Basque regional panel that ships with the Synth R package — the data behind Abadie & Gardeazabal's economic-cost-of-conflict study."
  overview: >
    Companion data for a beginner-friendly R tutorial on the <strong>synthetic control method</strong>,
    applied to the classic Basque Country case study of Abadie and Gardeazabal (2003). The panel is the
    <code>basque</code> dataset bundled with the <strong>Synth</strong> R package: annual observations from
    1955&ndash;1997 for 18 Spanish regional units. The outcome is real GDP per capita
    (<code>gdpcap</code>, 1986 thousands of USD); the remaining columns are the 13 pre-treatment predictors
    matched by the algorithm &mdash; six sectoral production shares, five education levels, an
    investment-to-GDP ratio, and a 1969 population density. The tutorial frames the analysis as a causal
    problem (estimand: ATT), builds a &ldquo;synthetic Basque&rdquo; from a weighted recipe of the other
    regions (85% Catalonia, 15% Madrid), and stress-tests the result with Catalonia and in-space placebos.
  panel_structure: >
    <strong>One file.</strong> <code>source_data</code> is an annual regional panel (one row per region
    &times; year, 18 units &times; 43 years = 774 rows over 1955&ndash;1997). Region 1
    (&ldquo;Spain (Espana)&rdquo;) is the national aggregate and is dropped from the analysis; regions
    2&ndash;18 are the 17 autonomous communities. Region 17 is the Basque Country, the treated unit
    (terrorism onset 1970). The outcome <code>gdpcap</code> is observed for every row; the predictor
    columns are sparse by design &mdash; the sectoral shares are pooled period averages
    (one block per region), the education levels are period snapshots, and <code>popdens</code> is a single
    1969 cross-section &mdash; which is why their non-missing counts are far below 774.
  kpis:
    - {n: 1, l: "dataset"}
    - {n: 17, l: "variables"}
    - {n: 18, l: "regions"}
    - {n: "1955–1997", l: "years"}

dta_format_version: 118

