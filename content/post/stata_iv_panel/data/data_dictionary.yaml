# Data dictionary metadata for stata_iv_panel — drives build_data_dictionary.py.
# Generated by the write-data-dictionary skill from the post's text + data; edit and rerun.

study:
  title: "Economic Shocks and Civil Conflict at the Regional Level"
  subtitle: "Replication panel for IV / 2SLS estimation in Stata, after Hodler & Raschky (2014)."
  overview: >
    Replication data for a hands-on Stata tutorial that estimates the <strong>causal</strong> effect
    of economic shocks on civil conflict by replicating <strong>Hodler &amp; Raschky (2014,
    <em>Economics Letters</em>)</strong>. The panel covers <strong>96,591 region&ndash;year
    observations</strong> from <strong>5,689 subnational administrative regions</strong> across
    African countries over <strong>1994&ndash;2010</strong>. Conflict is a binary region-year outcome
    (1+ or 25+ battle deaths from UCDP); nighttime light intensity (DMSP) proxies local economic
    activity; and lagged log rainfall and the lagged Palmer Drought Severity Index serve as
    instruments. The endogenous light variable is instrumented because conflict suppresses light
    (reverse causality) and light measures activity with error (attenuation). OLS returns a near-zero
    coefficient; 2SLS using both weather instruments yields about &minus;0.30 on conflict (1+ deaths),
    with first-stage F-statistics above the Stock&ndash;Yogo threshold and a Hansen J p-value of 0.93.
    This is <strong>real observational data</strong>, not simulated.
  panel_structure: >
    <strong>One file.</strong> <code>EL_regional_conflict_replication</code> is an annual
    region panel (one row per region &times; year, <code>objectid &times; year</code>, 1994&ndash;2010)
    holding the conflict outcomes, the nighttime-light proxy, and the two weather instruments. Every
    estimation variable ships in two forms: the <strong>raw</strong> series and a
    <strong>detrended</strong> (<code>_dt</code>) series &mdash; residuals from a region-specific
    linear time trend, equivalent to including region-specific trends in the regression. The
    tutorial uses the detrended variables throughout, following the original paper.
  kpis:
    - {n: 1, l: "dataset"}
    - {n: 14, l: "variables"}
    - {n: "5,689", l: "regions"}
    - {n: "1994–2010", l: "years"}

dta_format_version: 118

sources:
  - name: "Hodler & Raschky (2014)"
    provides: "Replicated study; the assembled region-year panel and detrended (_dt) variables"
    reference: "Hodler, R. & Raschky, P.A. (2014). Economic shocks and civil conflict at the regional level. Economics Letters, 124(3), 530–533."
  - name: "UCDP Georeferenced Event Dataset (GED)"
    provides: "Civil-conflict outcomes (battle deaths geocoded to regions; 1+ and 25+ death dummies)"
    reference: "Uppsala Conflict Data Program (UCDP), Georeferenced Event Dataset. https://ucdp.uu.se/"
  - name: "DMSP-OLS nighttime lights"
    provides: "Nighttime light intensity — proxy for local economic activity (logged, lagged)"
    reference: "NOAA/NGDC DMSP-OLS Nighttime Lights Time Series. Henderson, Storeygard & Weil (2012), American Economic Review, 102(2), 994–1028."
  - name: "Weather instruments (rainfall & PDSI)"
    provides: "Lagged log rainfall and the lagged Palmer Drought Severity Index (the instruments)"
    reference: "Rainfall (GPCC); Palmer Drought Severity Index (PDSI). Used as instruments per Miguel, Satyanath & Sergenti (2004), Journal of Political Economy, 112(4), 725–753."
  - name: "Method references"
    provides: "IV / 2SLS estimators and weak-instrument diagnostics"
    reference: "Miguel, Satyanath & Sergenti (2004); Stock & Yogo (2005); Stock & Wright (2000); Hansen J overidentification test."

formulas_html: |
  <p>The IV design isolates the causal effect of economic activity on conflict using weather as an
  external shifter. With region fixed effects <code>α_i</code>, region-specific trends
  <code>β_i·t</code>, and year fixed effects <code>γ_t</code>:</p>
  <ul class="tight">
    <li><strong>Structural model (second stage)</strong>:
      <code>Conflict_it = α_i + β_i·t + γ_t + δ · Light_(i,t−1) + ε_it</code> — the parameter of
      interest is <code>δ</code>, the causal effect of economic activity on conflict probability
      (a Local Average Treatment Effect for weather-driven compliers).</li>
    <li><strong>First stage</strong>:
      <code>Light_(i,t−1) = α̃_i + β̃_i·t + γ̃_t + δ̃ · Weather_(i,t−2) + ε̃_it</code>, where
      <code>Weather_(i,t−2)</code> is lagged rainfall, lagged PDSI, or both.</li>
    <li><strong>Instrument used for the endogenous regressor</strong>: lagged nighttime light
      <code>llnlight01</code> is instrumented by lagged log rainfall <code>l2lnrain01</code> and the
      lagged Palmer Drought Severity Index <code>l2meanpdsi</code> (weather at <code>t−2</code>).</li>
    <li><strong>Exclusion restriction</strong>: weather at <code>t−2</code> affects conflict at
      <code>t</code> <em>only</em> through its effect on economic activity (light) at
      <code>t−1</code> — no direct path. The two-year lag makes a direct effect implausible; with two
      instruments the Hansen J test checks joint validity (p = 0.93).</li>
    <li><strong>Detrending</strong>: each <code>_dt</code> variable is the residual from regressing
      the raw series on <code>year</code> within each region — equivalent to region-specific linear
      time trends. All regressions use the <code>_dt</code> variables.</li>
  </ul>

caveats:
  - "<strong>Real observational data.</strong> Outcomes are from UCDP (geocoded battle deaths), lights from DMSP-OLS, weather from rainfall/PDSI products — not simulated. Causal claims rest on the instrument's validity, not on randomization."
  - "<strong>Nighttime lights are a noisy proxy.</strong> Light measures economic activity with error; classical measurement error biases OLS toward zero (attenuation), which is why OLS (≈0.001) and 2SLS (≈−0.30) differ by orders of magnitude."
  - "<strong>Exclusion is untestable with one instrument.</strong> With a single instrument the exclusion restriction cannot be tested; it is defended by the two-year lag. The over-identified (two-instrument) model lets the Hansen J test probe joint validity."
  - "<strong>Conflict is a rare event.</strong> Only 4.6% of region-years have 1+ conflict deaths and 1.4% have 25+; estimates are interpreted relative to these low baselines."
  - "<strong>Within vs. between variation.</strong> Most variation in lights and rainfall is between regions; the fixed-effects estimator uses only within-region variation, so strong instruments are essential."
  - "<strong>Detrended (_dt) variables only.</strong> The analysis uses the residualized series; the raw series are provided for reference but are not the regression inputs."

