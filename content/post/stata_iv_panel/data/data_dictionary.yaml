files:
  EL_regional_conflict_replication.dta:
    label: "Region-year panel: conflict, nighttime lights, weather instruments (+ detrended)"
    grain: "region-year"
    years: "1994-2010"
    coverage: "5,689 subnational regions; 43 African countries"
    key: "objectid x year"
    purpose: "Estimate the causal effect of economic shocks on civil conflict via FE-OLS and 2SLS/IV."
    note: "Annual region panel replicating Hodler & Raschky (2014). 96,591 region-year observations across 5,689 subnational regions, 1994-2010. Conflict outcomes from UCDP, nighttime lights from DMSP, instruments from lagged rainfall and the Palmer Drought Severity Index. Each estimation variable ships raw and detrended (_dt = residual from a region-specific linear time trend); regressions use the _dt series."

columns:
  objectid:
    label: "Region identifier (panel ID)"
    definition: "Unique identifier for each subnational administrative region (the panel unit)."
    construction: "Region code from the original replication; panel set via tsset objectid year."
    units: "integer ID"
    source: "Hodler & Raschky (2014)"
    coverage: "5,689 regions"
    kind: id
  year:
    label: "Calendar year"
    definition: "Annual time index (the panel time variable)."
    construction: "Observation year, 1994-2010."
    units: "year"
    source: "Hodler & Raschky (2014)"
    coverage: "1994-2010"
    kind: year
  countrycode:
    label: "Country ISO3 code"
    definition: "Three-letter ISO country code of the region's country."
    construction: "From the original panel (variable label 'ISO')."
    units: "ISO 3166-1 alpha-3"
    source: "Hodler & Raschky (2014)"
    coverage: "43 countries"
    kind: str
  countryname:
    label: "Country name"
    definition: "Name of the country containing the region."
    construction: "From the original panel (variable label 'NAME_0')."
    units: "string"
    source: "Hodler & Raschky (2014)"
    coverage: "43 countries"
    kind: str
  ucdp_death_dummy:
    label: "Conflict (1+ deaths), raw"
    definition: "1 if the region-year had at least one conflict-related death, else 0 (outcome 1)."
    construction: "From UCDP geocoded battle deaths aggregated to the region-year."
    units: "0/1"
    source: "UCDP GED"
    coverage: "region-year"
    kind: dummy
    value_labels: {0: "No conflict (0 deaths)", 1: "Conflict (1+ deaths)"}
  ucdp_25death_dummy:
    label: "Conflict (25+ deaths), raw"
    definition: "1 if the region-year had 25 or more conflict-related deaths, else 0 (outcome 2)."
    construction: "From UCDP geocoded battle deaths aggregated to the region-year."
    units: "0/1"
    source: "UCDP GED"
    coverage: "region-year"
    kind: dummy
    value_labels: {0: "Fewer than 25 deaths", 1: "Conflict (25+ deaths)"}
  llnlight01:
    label: "Ln nighttime lights (t-1), raw"
    definition: "Log nighttime light intensity lagged one year — proxy for local economic activity (endogenous regressor)."
    construction: "Natural log of DMSP-OLS nighttime light intensity, lagged one year."
    units: "log intensity"
    source: "DMSP-OLS nighttime lights"
    coverage: "region-year"
    kind: cont
  l2lnrain01:
    label: "Ln rainfall (t-2), raw"
    definition: "Log rainfall lagged two years — instrument 1 for economic activity."
    construction: "Natural log of annual rainfall (GPCC), lagged two years."
    units: "log mm"
    source: "Rainfall (GPCC)"
    coverage: "region-year"
    kind: cont
  l2meanpdsi:
    label: "Palmer Drought Severity Index (t-2), raw"
    definition: "Lagged Palmer Drought Severity Index — instrument 2 (higher = less drought)."
    construction: "Mean PDSI for the region, lagged two years; the label reads '(Non) Drought'."
    units: "PDSI (index)"
    source: "PDSI"
    coverage: "region-year"
    kind: cont
  ucdp_death_dummy_dt:
    label: "Conflict (1+ deaths), detrended"
    definition: "Detrended conflict (1+ deaths): residual from a region-specific linear time trend."
    construction: "Residual of ucdp_death_dummy on year, fitted within each region (objectid)."
    units: "deviation"
    source: "Derived (this study)"
    coverage: "region-year"
    kind: cont
  ucdp_25death_dummy_dt:
    label: "Conflict (25+ deaths), detrended"
    definition: "Detrended conflict (25+ deaths): residual from a region-specific linear time trend."
    construction: "Residual of ucdp_25death_dummy on year, fitted within each region (objectid)."
    units: "deviation"
    source: "Derived (this study)"
    coverage: "region-year"
    kind: cont
  llnlight01_dt:
    label: "Ln nighttime lights (t-1), detrended"
    definition: "Detrended log nighttime lights — the endogenous regressor used in all regressions."
    construction: "Residual of llnlight01 on year, fitted within each region (objectid)."
    units: "deviation (log)"
    source: "Derived (this study)"
    coverage: "region-year"
    kind: cont
  l2lnrain01_dt:
    label: "Ln rainfall (t-2), detrended"
    definition: "Detrended log rainfall — instrument 1 as used in the regressions."
    construction: "Residual of l2lnrain01 on year, fitted within each region (objectid)."
    units: "deviation (log)"
    source: "Derived (this study)"
    coverage: "region-year"
    kind: cont
  l2meanpdsi_dt:
    label: "Palmer Drought Severity Index (t-2), detrended"
    definition: "Detrended PDSI — instrument 2 as used in the regressions."
    construction: "Residual of l2meanpdsi on year, fitted within each region (objectid)."
    units: "deviation"
    source: "Derived (this study)"
    coverage: "region-year"
    kind: cont
