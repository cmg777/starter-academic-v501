files:
  sim_resource_curse.csv:
    label: "District-year panel: outcomes, treatment, moderators, controls"
    grain: "district-year"
    years: "2003-2012"
    coverage: "300 districts, 8 countries (balanced)"
    key: "district_id x year"
    purpose: "Estimate heterogeneous treatment effects of mining/prices via Stata 19 cate (ATE/GATE/IATE)."
    note: "Balanced district-year panel; 300 synthetic districts over 2003-2012 across 8 fictional countries (3,000 rows). Outcomes ntl_log and conflict; a 4-level mining/price treatment; institutional moderators (exec_constraints, quality_of_govt) plus economic and geographic covariates. Treatment is highly imbalanced (~85% control). Known ground-truth effects allow direct validation."

