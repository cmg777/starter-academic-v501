    definition: "District identifier; the panel unit."
    construction: "Sequential integer 1..300 in the simulation."
    units: "integer"
    source: "Simulation"
    coverage: "all rows"
    kind: id
  country_id:
    label: "Country ID (1-8)"
    definition: "Country identifier; districts are nested within 8 fictional countries."
    construction: "Integer 1..8 assigned in the simulation; used as i.country_id control."
    units: "integer"
    source: "Simulation"
    coverage: "all rows"
    kind: id
  year:
    label: "Calendar year (2003-2012)"
    definition: "Annual time index; the panel time dimension."
    construction: "2003..2012 for every district (balanced); used as i.year control."
    units: "year"
    source: "Simulation"
    coverage: "all rows"
    kind: year
  treatment:
    label: "Treatment group (0=none,1=low,2=med,3=high price)"
