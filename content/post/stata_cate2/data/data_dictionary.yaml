# Data dictionary metadata for stata_cate2 — drives build_data_dictionary.py.
# Generated by the write-data-dictionary skill from the post's text + data; edit and rerun.

study:
  title: "Causal Machine Learning and the Resource Curse"
  subtitle: "Heterogeneous treatment effects of mining and mineral prices on development, on a fully synthetic district-year panel for Stata 19's cate command."
  overview: >
    Companion data for a hands-on Stata 19 tutorial that replicates the three core findings of
    Hodler, Lechner &amp; Raschky (2023) on a <strong>fully synthetic</strong> panel with
    <strong>known ground-truth causal effects</strong>. The panel has 3,000 district-year
    observations (300 districts &times; 10 years, 2003&ndash;2012) across 8 fictional countries,
    with log nighttime lights (<code>ntl_log</code>) and a conflict indicator (<code>conflict</code>)
    as outcomes, a four-level mining/price <code>treatment</code>, and executive constraints and
    quality of government as institutional moderators. The post estimates average (ATE), group
    (GATE), and individualized (IATE) treatment effects for six pairwise binary contrasts via
    generalized random forests, comparing the Partialing-Out (PO) and doubly robust Augmented IPW
    (AIPW) estimators with 5-fold cross-fitting, supported by formal heterogeneity tests. Because
    the data-generating process is known, every estimate can be checked against the truth.
  panel_structure: >
    <strong>One file.</strong> <code>sim_resource_curse</code> is a balanced district-year panel:
    one row per district &times; year (300 districts &times; 10 years = 3,000 rows, 2003&ndash;2012)
    across 8 fictional countries. The treatment distribution is highly imbalanced &mdash; about 85%
    of observations are controls (no mining) and each of the three treated price levels holds about
    5% &mdash; mirroring real mining data. (Stata's <code>cate</code> command additionally derives an
    integer <code>exec_con</code> = <code>round(exec_constraints)</code> at run time for grouping;
    it is not stored in this CSV.)
  kpis:
    - {n: 300, l: "districts"}
    - {n: "2003–2012", l: "years"}
    - {n: 8, l: "countries"}
    - {n: "3,000", l: "rows"}

dta_format_version: 118

sources:
  - name: "Hodler, Lechner & Raschky (2023)"
    provides: "Replicated study; structure, outcomes, moderators, and the three target findings"
    reference: "Hodler, R., Lechner, M., & Raschky, P. A. (2023). Institutions and the resource curse: New insights from causal machine learning. PLoS ONE, 18(5), e0284968. https://journals.plos.org/plosone/article?id=10.1371/journal.pone.0284968"
  - name: "Synthetic (this study)"
    provides: "All values — simulated via a data-generating process with known ground-truth treatment effects (open & reproducible)"
    reference: "Mendez, C. (2026). See the post's Stata do-file analysis.do for the full simulation/DGP."
  - name: "Method references"
    provides: "Estimators and concepts behind Stata 19's cate"
    reference: "Athey, Tibshirani & Wager (2019, GRF); Nie & Wager (2021, PO/R-learner); Knaus (2022) & Kennedy (2023, AIPW); StataCorp (2025, Stata 19 cate)."
  - name: "Resource-curse theory"
    provides: "Substantive motivation"
    reference: "Sachs & Warner (1995); Mehlum, Moene & Torvik (2006)."

formulas_html: |
  <p>The Conditional Average Treatment Effect is the treatment effect for units with covariate
  profile <code>x</code>:</p>
  <ul class="tight">
    <li><strong>CATE</strong>: <code>τ(x) = E{ y_i(1) − y_i(0) | x_i = x }</code> — a function of
      <code>x</code>, not a single number.</li>
    <li><strong>ATE</strong>: <code>E{ τ(X) }</code> — the CATE averaged over the whole sample (the
      headline number).</li>
    <li><strong>GATE</strong>: <code>τ(g) = E{ τ(x) | G = g }</code> — the CATE averaged within a
      pre-specified group (e.g. each executive-constraints level).</li>
    <li><strong>IATE</strong>: <code>τ(x_i)</code> — one estimated effect per observation.</li>
  </ul>
  <p>Stata 19's <code>cate</code> uses a partial linear model with cross-fitting (here
  <code>xfolds(5)</code>): <code>y = d·τ(x) + g(x,w) + ε</code> and <code>d = f(x,w) + u</code>, where
  <code>g</code>/<code>f</code> are machine-learning nuisance functions, <code>x</code> are CATE
  variables (potential moderators) and <code>w</code> are controls (here <code>i.country_id i.year</code>).</p>
  <p><strong>Two estimators.</strong> <strong>PO</strong> (Partialing-Out) residualizes both
  <code>y</code> and <code>d</code> on <code>(x,w)</code> and regresses the residuals via a
  generalized random forest. <strong>AIPW</strong> (Augmented IPW) builds doubly robust scores from an
  outcome model and a propensity model; it stays consistent if <em>either</em> nuisance model is right.</p>
  <p><strong>Multi-valued treatment via pairwise binaries.</strong> The 4-level <code>treatment</code>
  (0=none, 1=low, 2=med, 3=high price) is split into six binary contrasts (1-0, 2-0, 3-0, 2-1, 3-1,
  3-2), subsetting to the two relevant groups each time, e.g. <code>treat_1v0 = (treatment == 1)</code>.</p>
  <p><strong>Ground truth (NTL contrasts).</strong> The DGP fixes the true ATEs: 1-0 = 0.25, 2-0 = 0.30,
  3-0 = 0.55, 2-1 = 0.05, 3-1 = 0.30, 3-2 = 0.25 — the small 2-1 step vs the large 3-1 step encodes the
  price non-linearity.</p>

caveats:
  - "<strong>Synthetic data.</strong> There is no real data behind this tutorial; values are simulated with known ground-truth effects, so results validate the method but are not empirical evidence about real-world mining or conflict."
  - "<strong>Direction differs from the paper.</strong> Hodler et al. (2023) found stronger institutions amplify mining benefits (upward GATE slope); this DGP produces the opposite sign (weaker institutions, larger mining effect). The reproduced structural finding is that institutions systematically moderate mining, not prices — not the sign."
  - "<strong>Severe treatment imbalance.</strong> ~85% of rows are controls; each treated price level is only ~5% (~150 obs). Within-mining price contrasts (2-1, 3-1, 3-2) use only ~300 observations, so confidence intervals are wide."
  - "<strong>Overlap failure (3-2).</strong> The high-vs-medium price contrast has propensity scores near 0/1 on its tiny subsample; AIPW fails and even PO with pstolerance(1e-8) returns an unreliable ATE. It is excluded from the summary."
  - "<strong>Finite-sample variability.</strong> Several estimates deviate from the ground truth (e.g. 1-0 = 0.149 vs 0.25) due to small treated samples, 5-fold cross-fitting, and the random seed; directional patterns are robust, point estimates are seed-dependent."
  - "<strong>Conflict ground truths.</strong> The DGP does not specify ground-truth ATEs for the conflict outcome; conflict results are interpreted directionally only."
  - "<strong>Requires Stata 19+.</strong> The cate command does not exist in Stata 18; the do-file aborts on older versions."

