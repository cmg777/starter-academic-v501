# Generated by the write-data-dictionary skill from the post's text + data; edit and rerun.

study:
  title: "The Augmented Synthetic Control Method: The Kansas Tax Cuts"
  subtitle: "The augsynth `kansas` panel — 50 U.S. states, quarterly 1990 Q1–2016 Q1, log GDP per capita."
  overview: >
    Companion data for a beginner-friendly R tutorial on the <strong>Augmented Synthetic Control
    Method (ASCM)</strong> of Ben-Michael, Feller &amp; Rothstein (2021), estimating the effect of
    the May 2012 Kansas personal-income-tax cut on log gross state product (GSP) per capita. The
    dataset is the <code>kansas</code> object shipped with the <code>augsynth</code> R package: a
    <strong>balanced</strong> panel of 50 U.S. states observed every quarter from 1990 Q1 to 2016 Q1
    (105 quarters per state, 5,250 rows). Kansas (FIPS 20) is the single treated unit, switched on
    from 2012 Q2 (<code>year_qtr = 2012.25</code>) onward; the other 49 states form the donor pool.
    The outcome is <code>lngdpcapita</code>; per-capita revenue, wage, establishment and employment
    series serve as auxiliary covariates. The tutorial moves from classic SCM through ridge
    augmentation and covariate balancing, then compares four ways to do inference.
  panel_structure: >
    <strong>One file.</strong> <code>kansas</code> is a balanced state-by-quarter panel (one row per
    state &times; quarter) over 1990 Q1&ndash;2016 Q1. The key is <code>fips</code> &times;
    <code>year_qtr</code>. The treatment indicator <code>treated</code> is 1 only for Kansas
    (FIPS 20) from 2012 Q2 onward (89 pre-treatment + 16 post-treatment quarters), 0 everywhere else.
    Three state/local revenue series are observed only annually and are <code>NA</code> in most
    quarters.
  kpis:
    - {n: 50, l: "states"}
    - {n: 32, l: "variables"}
    - {n: "1990–2016", l: "quarters"}
    - {n: 5250, l: "rows"}

dta_format_version: 118

