files:
  kansas.csv:
    label: "Balanced state-quarter panel: log GSP per capita + covariates"
    grain: "state-quarter"
    years: "1990 Q1 - 2016 Q1"
    coverage: "50 U.S. states (balanced; 105 quarters each)"
    key: "fips x year_qtr"
    purpose: "Estimate the ATT of the 2012 Kansas tax cut via classic SCM, Ridge ASCM and covariate ASCM."
    note: "The augsynth package's bundled kansas object, copied to CSV. Kansas (FIPS 20) is the single treated unit from 2012 Q2; 49 donor states. 5,250 rows = 50 states x 105 quarters. Revenue series are annual (NA in 3 of 4 quarters)."

columns:
  fips:
    label: "State FIPS code"
    definition: "Federal Information Processing Standard numeric state identifier (Kansas = 20)."
    construction: "From the augsynth kansas object; the panel unit id."
    units: "code"
    source: "augsynth kansas"
    coverage: "50 states"
    kind: id
  year:
    label: "Calendar year"
    definition: "Year of the observation (1990-2016)."
    construction: "From the kansas object."
    units: "year"
    source: "augsynth kansas"
    kind: year
  qtr:
    label: "Calendar quarter (1-4)"
    definition: "Quarter of the year (1 = Q1 ... 4 = Q4)."
    construction: "From the kansas object."
    units: "1-4"
    source: "augsynth kansas"
    kind: id
  state:
    label: "State name"
    definition: "Full U.S. state name."
    construction: "From the kansas object."
    units: "string"
    source: "augsynth kansas"
    kind: str
  gdp:
    label: "Gross state product (level)"
    definition: "Quarterly gross state product (gross domestic product by state)."
    construction: "From the kansas object (BEA GSP)."
    units: "US$ (millions)"
    source: "BEA (via augsynth)"
    kind: cont
  revenuepop:
    label: "State revenue per capita (annual)"
    definition: "Total state revenue per resident; observed annually only."
    construction: "From the kansas object; NA in non-reporting quarters."
    units: "US$ per capita"
    source: "augsynth kansas"
    coverage: "annual (NA in 3 of 4 quarters)"
    kind: cont
  rev_state_total:
    label: "Total state government revenue (annual)"
    definition: "Total state-government revenue for the state-year; observed annually only."
    construction: "From the kansas object; NA in non-reporting quarters."
    units: "US$"
    source: "augsynth kansas"
    coverage: "annual (NA in 3 of 4 quarters)"
    kind: cont
  rev_local_total:
    label: "Total local government revenue (annual)"
    definition: "Total local-government revenue for the state-year; observed annually only."
    construction: "From the kansas object; NA in non-reporting quarters."
    units: "US$"
    source: "augsynth kansas"
    coverage: "annual (NA in 3 of 4 quarters)"
    kind: cont
  popestimate:
    label: "Population estimate"
    definition: "Estimated state resident population for the quarter."
    construction: "From the kansas object; used as the per-capita denominator."
    units: "persons"
    source: "augsynth kansas"
    kind: cont
  qtrly_estabs_count:
    label: "Quarterly establishment count"
    definition: "Number of business establishments in the state-quarter (QCEW)."
    construction: "From the kansas object."
    units: "establishments"
    source: "BLS QCEW (via augsynth)"
    kind: cont
  month1_emplvl:
    label: "Employment level, month 1 of quarter"
    definition: "Employment count in the first month of the quarter (QCEW)."
    construction: "From the kansas object."
    units: "persons"
    source: "BLS QCEW (via augsynth)"
    kind: cont
  month2_emplvl:
    label: "Employment level, month 2 of quarter"
    definition: "Employment count in the second month of the quarter (QCEW)."
    construction: "From the kansas object."
    units: "persons"
    source: "BLS QCEW (via augsynth)"
    kind: cont
  month3_emplvl:
    label: "Employment level, month 3 of quarter"
    definition: "Employment count in the third month of the quarter (QCEW)."
    construction: "From the kansas object."
    units: "persons"
    source: "BLS QCEW (via augsynth)"
    kind: cont
  total_qtrly_wages:
    label: "Total quarterly wages"
    definition: "Total wages paid in the state-quarter (QCEW)."
    construction: "From the kansas object."
    units: "US$"
    source: "BLS QCEW (via augsynth)"
    kind: cont
  taxable_qtrly_wages:
    label: "Taxable quarterly wages"
    definition: "Portion of quarterly wages subject to unemployment-insurance tax (QCEW)."
    construction: "From the kansas object."
    units: "US$"
    source: "BLS QCEW (via augsynth)"
    kind: cont
  avg_wkly_wage:
    label: "Average weekly wage"
    definition: "Average weekly wage in the state-quarter (QCEW)."
    construction: "From the kansas object."
    units: "US$ per week"
    source: "BLS QCEW (via augsynth)"
    kind: cont
  year_qtr:
    label: "Decimal year-quarter"
    definition: "Time index as year plus quarter fraction (e.g. 2012.25 = 2012 Q2)."
    construction: "year + (qtr-1)/4; the panel's time variable in augsynth()."
    units: "decimal year"
    source: "Derived"
    kind: cont
  treated:
    label: "Treated indicator (1 = Kansas post-2012 Q2)"
    definition: "1 for Kansas (FIPS 20) from 2012 Q2 onward, 0 for all other state-quarters."
    construction: "Indicator switched on at year_qtr >= 2012.25 for Kansas only."
    units: "0/1"
    source: "augsynth kansas"
    kind: dummy
    value_labels: {0: "Untreated", 1: "Treated (Kansas, post-2012Q2)"}
