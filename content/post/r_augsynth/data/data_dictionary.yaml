    definition: "Natural log of quarterly gross state product."
    construction: "log(gdp)."
    units: "log US$"
    source: "Derived"
    kind: cont
  lngdpcapita:
    label: "Log GSP per capita (OUTCOME)"
    definition: "Natural log of gross state product per capita — the study outcome."
    construction: "log(gdpcapita)."
    units: "log US$ per capita"
    source: "Derived"
    kind: cont
  revstatecapita:
    label: "State revenue per capita (annual)"
    definition: "Total state revenue per resident; annual covariate (log-transformed in the model)."
    construction: "rev_state_total / popestimate; NA in non-reporting quarters."
    units: "US$ per capita"
    source: "Derived"
    coverage: "annual (NA in 3 of 4 quarters)"
    kind: cont
  revlocalcapita:
    label: "Local revenue per capita (annual)"
    definition: "Total local revenue per resident; annual covariate (log-transformed in the model)."
    construction: "rev_local_total / popestimate; NA in non-reporting quarters."
    units: "US$ per capita"
