    construction: "qtrly_estabs_count / popestimate."
    units: "ratio"
    source: "Derived"
    kind: cont
  abb:
    label: "State abbreviation"
    definition: "Two-letter U.S. state postal abbreviation (e.g. KS for Kansas)."
    construction: "From the kansas object."
    units: "string"
    source: "augsynth kansas"
    kind: str
