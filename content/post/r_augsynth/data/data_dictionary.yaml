    kind: cont
  emplvl1capita:
    label: "Month-1 employment per capita"
    definition: "First-month employment level as a share of population."
    construction: "month1_emplvl / popestimate."
    units: "ratio"
    source: "Derived"
    kind: cont
  emplvl2capita:
    label: "Month-2 employment per capita"
    definition: "Second-month employment level as a share of population."
    construction: "month2_emplvl / popestimate."
    units: "ratio"
    source: "Derived"
    kind: cont
  emplvl3capita:
    label: "Month-3 employment per capita"
    definition: "Third-month employment level as a share of population."
    construction: "month3_emplvl / popestimate."
    units: "ratio"
    source: "Derived"
    kind: cont
  emplvlcapita:
    label: "Employment per capita (covariate)"
    definition: "Quarterly employment level as a share of population; an ASCM covariate."
    construction: "Quarterly employment / popestimate."
    units: "ratio"
    source: "Derived"
    kind: cont
  totalwagescapita:
    label: "Total wages per capita"
    definition: "Total quarterly wages per resident."
    construction: "total_qtrly_wages / popestimate."
    units: "US$ per capita"
