    reference: "Abadie, Diamond & Hainmueller (2010); Abadie & Gardeazabal (2003); Chernozhukov, Wüthrich & Zhu (2021)."

formulas_html: |
  <p>The estimand is the <strong>ATT</strong> — actual minus synthetic, for Kansas, after 2012 Q2 —
  on the outcome <code>lngdpcapita</code>. Write <code>X1</code> for Kansas's pre-treatment outcome
  vector and <code>X0</code> for the donors' matching matrix.</p>
  <ul class="tight">
    <li><strong>Classic SCM weights</strong> (<code>progfunc = "None"</code>):
      <code>γ̂_scm = argmin_γ ‖X1 − X0'γ‖₂²</code> subject to <code>Σ γ_i = 1, γ_i ≥ 0</code> — a
      non-negative, sum-to-one (convex) blend of donors.</li>
    <li><strong>Per-quarter effect</strong>: <code>τ̂_t = Y_1t − Σ_i γ̂_i Y_it</code> for
      <code>t &gt; T₀</code> (actual minus synthetic).</li>
    <li><strong>Ridge-augmented counterfactual</strong> (<code>progfunc = "Ridge"</code>):
      <code>Ŷ_aug(0) = Σ_i γ̂_i Y_iT + (m̂_1T − Σ_i γ̂_i m̂_iT)</code> — SCM plus a bias correction
      from a ridge outcome model <code>m̂</code> of post-period outcomes on lagged outcomes,
      penalty <code>λ‖η‖₂²</code> (λ chosen by leave-one-pre-period-out CV, one-SE rule).</li>
    <li><strong>Covariate ASCM</strong>: list covariates after a <code>|</code> in the formula
      (<code>lngdpcapita ~ treated | log(revstatecapita) + … + emplvlcapita</code>); both lagged
      outcomes and covariates enter the SCM balancing problem and the ridge model.</li>
  </ul>
  <p>Per-capita series are constructed by dividing a state-quarter total by population
  (<code>popestimate</code>); <code>lngdp</code>/<code>lngdpcapita</code> are natural logs of
  <code>gdp</code>/<code>gdpcapita</code>. <code>year_qtr</code> encodes the quarter as
  <code>year + (qtr−1)/4</code> (e.g. 2012 Q2 = 2012.25).</p>

caveats:
  - "<strong>Net effect, not tax-only.</strong> The ATT is the gap between actual Kansas and a synthetic blend; over 2012–2016 Kansas also faced a severe drought and aerospace-sector shocks that SCM cannot strip out separately."
  - "<strong>Annual revenue series.</strong> <code>rev_state_total</code>, <code>rev_local_total</code>, <code>revenuepop</code>, and the per-capita <code>revstatecapita</code>/<code>revlocalcapita</code> are recorded only once a year and are <code>NA</code> in the other three quarters (2,250–2,850 missing of 5,250)."
  - "<strong>Single treated unit, modest donor pool.</strong> One Kansas and 49 donors limit statistical power; the four inference methods disagree at the margin (jackknife+ excludes zero; conformal p = 0.066; permutation p = 0.10)."
  - "<strong>SCM identifying assumption.</strong> Results rest on a convex (or lightly extrapolated) blend of donors standing in for Kansas's untreated path, and on no donor state being affected by Kansas's policy."

