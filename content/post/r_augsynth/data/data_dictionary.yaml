    kind: cont
  taxwagescapita:
    label: "Taxable wages per capita"
    definition: "Taxable quarterly wages per resident."
    construction: "taxable_qtrly_wages / popestimate."
    units: "US$ per capita"
    source: "Derived"
    kind: cont
  avgwklywagecapita:
    label: "Average weekly wage (per-capita covariate)"
    definition: "Average weekly wage used as an ASCM covariate (log-transformed in the model)."
    construction: "From avg_wkly_wage; an auxiliary covariate."
    units: "US$ per week"
    source: "Derived"
    kind: cont
  estabscapita:
    label: "Establishments per capita (covariate)"
