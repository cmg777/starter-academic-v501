# Data dictionary metadata for r_demeaning_twfe — drives build_data_dictionary.py.
# Generated by the write-data-dictionary skill from the post's text + data; edit and rerun.

study:
  title: "What Does TWFE Actually Do? Manual Demeaning and the FWL Theorem"
  subtitle: "Companion data for an R tutorial proving that two-way fixed effects is OLS on two-way demeaned data, on a synthetic Barro convergence panel."
  overview: >
    Companion data for a hands-on R tutorial that takes the <strong>two-way fixed effects</strong>
    (TWFE) estimator apart to show it is nothing more than ordinary least squares applied to
    <strong>two-way demeaned</strong> data &mdash; the equivalence guaranteed by the
    <strong>Frisch&ndash;Waugh&ndash;Lovell (FWL) theorem</strong>. The tutorial uses a balanced,
    <strong>synthetic</strong> Barro convergence panel of 150 countries observed over 8 time
    periods (1,200 observations), regressing GDP-per-capita growth on log initial income,
    investment share, population growth, human capital, and government consumption. It estimates
    the model with country and time fixed effects via <code>fixest::feols()</code>, then replicates
    the coefficients by hand &mdash; subtracting country means, subtracting time means, and adding
    back the grand mean before running base R&apos;s <code>lm()</code>. The two routes match to at
    least 12 significant digits (the convergence coefficient is &minus;0.055286 either way; the
    largest coefficient difference is 3.05&times;10<sup>&minus;16</sup>, on the order of machine
    epsilon), while naive <code>lm()</code> standard errors understate uncertainty by 7&ndash;22%
    because they ignore the degrees of freedom consumed by the absorbed fixed effects.
  panel_structure: >
    <strong>Two files.</strong> <code>source_data</code> is the raw balanced country&times;period
    panel as loaded for the analysis (one row per country&times;year, 1,200 rows). <code>data_demeaned</code>
    is the <strong>within-transformed analysis dataset</strong>: the same 1,200 rows carrying the six
    model variables in both their raw form and their two-way demeaned form (the
    <code>_dm</code> columns), each equal to the observed value minus its country mean minus its time
    mean plus the grand mean.
  kpis:
    - {n: 2, l: "datasets"}
    - {n: 17, l: "variables"}
    - {n: 150, l: "countries"}
    - {n: "8 periods", l: "time span"}

dta_format_version: 118

sources:
  - name: "Synthetic (this study)"
    provides: "All values — a simulated balanced Barro convergence panel (open & reproducible)"
    reference: "Mendez, C. (2026). See the post's R script analysis.R and referenceMaterials/manual_demeaning_twfe_tutorial.qmd for the data-generating process."
  - name: "Frisch–Waugh–Lovell theorem"
    provides: "The result that guarantees the TWFE / OLS-on-demeaned equivalence"
    reference: "Frisch, R., & Waugh, F. V. (1933). Partial Time Regressions as Compared with Individual Trends. Econometrica, 1(4), 387–401. Lovell, M. C. (1963). Seasonal Adjustment of Economic Time Series and Multiple Regression Analysis. JASA, 58(304), 993–1010."
  - name: "Method references"
    provides: "Two-way fixed effects / within transformation, growth convergence, and the estimator"
    reference: "Berge, L. (2018). fixest: Fast Fixed-Effects Estimations (R package). Barro, R. J., & Sala-i-Martin, X. (2004). Economic Growth (2nd ed.). MIT Press."

formulas_html: |
  <p>The model is a two-way fixed-effects growth regression over country <code>i</code> and period
  <code>t</code>:</p>
  <ul class="tight">
    <li><strong>TWFE specification</strong>:
      <code>growth_it = α_i + λ_t + β·x_it + u_it</code> — country fixed effects <code>α_i</code>
      and time fixed effects <code>λ_t</code> absorb every time-invariant country trait and every
      country-invariant time shock.</li>
    <li><strong>Two-way within (demeaning) transformation</strong>:
      <code>x̃_it = x_it − x̄_i. − x̄_.t + x̄_..</code> — observed value minus the country mean
      (<code>x̄_i.</code>, average over periods), minus the time mean (<code>x̄_.t</code>, average
      over countries), plus the grand mean (<code>x̄_..</code>). The <code>_dm</code> columns in
      <code>data_demeaned</code> are exactly this transform of the six model variables.</li>
    <li><strong>Grand-mean correction</strong>: the <code>+ x̄_..</code> term cancels the
      double-subtraction of the overall level (the grand mean is removed once via <code>x̄_i.</code>
      and once via <code>x̄_.t</code>); without it the demeaned variables are not centered at zero.</li>
    <li><strong>FWL equivalence</strong>:
      <code>β̂_TWFE = β̂_OLS on demeaned data</code> — running plain OLS (<code>lm()</code>) on the
      <code>_dm</code> columns returns exactly the <code>feols()</code> TWFE slopes (up to machine
      precision).</li>
  </ul>
  <p>Regressor construction from the raw inputs:
  <code>log_s_k = log(s_k)</code> (log investment share),
  <code>log_n_gd = log(n_pop + 0.05)</code> (log of population growth plus the standard 0.05 for
  growth + depreciation), and <code>log_hcap = log(hcap)</code> (log human capital).</p>

caveats:
  - "<strong>Synthetic data.</strong> The panel is simulated; coefficient values reflect the data-generating process, not real-world economic dynamics — they are not empirical evidence about growth convergence."
  - "<strong>Coefficients match, standard errors do not.</strong> OLS on the demeaned data reproduces the TWFE point estimates exactly, but naive <code>lm()</code> standard errors are too small (by 7–22% here) because they do not subtract the degrees of freedom consumed by the 150 country plus 8 time effects. Always use a dedicated panel estimator (e.g. <code>feols()</code>) for inference."
  - "<strong>Balanced panel only.</strong> The closed-form two-way demeaning used here is exact because the panel is balanced; unbalanced panels require the iterative projection that <code>fixest</code> performs internally."
  - "<strong>Demeaning kills time-invariant regressors.</strong> Any variable constant within a country over time equals its own country mean, so its demeaned column is zero everywhere and it drops out — this is why fixed-effects models cannot identify time-invariant characteristics."

