files:
  source_data.csv:
    label: "Raw balanced Barro convergence panel (country x period)"
    grain: "country-year (period)"
    years: "8 periods (indexed 1-8)"
    coverage: "150 countries (balanced)"
    key: "id x time"
    purpose: "The raw analysis panel: TWFE growth regression of growth on log initial income and four controls."
    note: "Synthetic balanced panel; 150 countries x 8 periods = 1,200 obs. Carries the dependent variable (growth), log initial income, the raw investment/population/human-capital inputs, and the three log regressors. This is the file feols() is estimated on."
  data_demeaned.csv:
    label: "Within-transformed (two-way demeaned) analysis data"
    grain: "country-year (period)"
    years: "8 periods (indexed 1-8)"
    coverage: "150 countries (balanced)"
    key: "id x time"
    purpose: "OLS on the _dm columns reproduces the TWFE coefficients, demonstrating the FWL theorem."
    note: "The within-transformed version of source_data: the same 1,200 rows with each of the six model variables in both raw form and two-way demeaned form (suffix _dm). The _dm column = value - country mean - time mean + grand mean."

columns:
  id:
    label: "Country identifier"
    definition: "Sequential country index (the entity dimension of the panel; treated as a factor for the fixed effects)."
    construction: "1..150, one per synthetic country."
    units: "integer code"
    source: "Simulation"
    coverage: "both files"
    kind: id
  time:
    label: "Time period identifier"
    definition: "Sequential time-period index (the time dimension of the panel; treated as a factor for the fixed effects)."
    construction: "1..8, one per period."
    units: "integer code"
    source: "Simulation"
    coverage: "both files"
    kind: id
  growth:
    label: "GDP per capita growth (dependent variable)"
    definition: "Annualized GDP-per-capita growth rate — the outcome regressed in the TWFE model."
    construction: "Simulated outcome of the Barro convergence data-generating process."
    units: "rate (per year)"
    source: "Simulation"
    coverage: "both files"
    kind: cont
  ln_y_initial:
    label: "Log initial income (convergence term)"
    definition: "Natural log of initial GDP per capita — the beta-convergence regressor (a negative slope means poorer countries grow faster)."
    construction: "Simulated log initial income."
    units: "log US$"
    source: "Simulation"
    coverage: "both files"
    kind: cont
  s_k:
    label: "Investment share of GDP"
    definition: "Physical-capital investment share of GDP (Solow-style accumulation rate)."
    construction: "Simulated; log_s_k = log(s_k)."
    units: "0-1 (share)"
    source: "Simulation"
    coverage: "source_data only"
    kind: cont
  n_pop:
    label: "Population growth rate"
    definition: "Population growth rate (the n in the Solow n + g + d term)."
    construction: "Simulated; log_n_gd = log(n_pop + 0.05)."
    units: "rate (per year)"
    source: "Simulation"
    coverage: "source_data only"
    kind: cont
  hcap:
    label: "Human capital index"
    definition: "Human-capital stock proxy (e.g., schooling-based index)."
    construction: "Simulated; log_hcap = log(hcap)."
    units: "index"
    source: "Simulation"
    coverage: "source_data only"
    kind: cont
  gov_cons:
    label: "Government consumption share"
    definition: "Government consumption as a share of GDP — a control regressor."
    construction: "Simulated."
    units: "0-1 (share)"
    source: "Simulation"
    coverage: "both files"
    kind: cont
  log_s_k:
    label: "Log investment share"
    definition: "Natural log of the investment share of GDP (Solow capital-accumulation regressor)."
    construction: "log(s_k)."
    units: "log share"
    source: "Derived"
    coverage: "both files"
    kind: cont
  log_n_gd:
    label: "Log of population growth + g + d"
    definition: "Natural log of population growth plus the standard 0.05 for growth and depreciation — the Solow n + g + d regressor."
    construction: "log(n_pop + 0.05)."
    units: "log rate"
    source: "Derived"
    coverage: "both files"
    kind: cont
  log_hcap:
    label: "Log human capital"
    definition: "Natural log of the human-capital index."
    construction: "log(hcap)."
    units: "log index"
    source: "Derived"
    coverage: "both files"
    kind: cont
  growth_dm:
    label: "Demeaned GDP per capita growth"
    definition: "Two-way demeaned growth: deviation of growth from its country mean and time mean (grand mean added back). The within-variation that identifies the TWFE coefficient."
    construction: "growth - country_mean(growth) - time_mean(growth) + grand_mean(growth); mean ≈ 0."
    units: "rate (deviation)"
    source: "Derived (within transform)"
    coverage: "data_demeaned only"
    kind: cont
  ln_y_initial_dm:
    label: "Demeaned log initial income"
    definition: "Two-way demeaned log initial income (deviation from country + time means, grand mean restored)."
    construction: "ln_y_initial - country mean - time mean + grand mean; mean ≈ 0."
    units: "log US$ (deviation)"
    source: "Derived (within transform)"
    coverage: "data_demeaned only"
    kind: cont
  log_s_k_dm:
    label: "Demeaned log investment share"
    definition: "Two-way demeaned log investment share (deviation from country + time means, grand mean restored)."
    construction: "log_s_k - country mean - time mean + grand mean; mean ≈ 0."
    units: "log share (deviation)"
    source: "Derived (within transform)"
    coverage: "data_demeaned only"
    kind: cont
  log_n_gd_dm:
    label: "Demeaned log(n + g + d)"
    definition: "Two-way demeaned log of population growth plus g + d (deviation from country + time means, grand mean restored)."
    construction: "log_n_gd - country mean - time mean + grand mean; mean ≈ 0."
    units: "log rate (deviation)"
    source: "Derived (within transform)"
    coverage: "data_demeaned only"
    kind: cont
  log_hcap_dm:
    label: "Demeaned log human capital"
    definition: "Two-way demeaned log human capital (deviation from country + time means, grand mean restored)."
    construction: "log_hcap - country mean - time mean + grand mean; mean ≈ 0."
    units: "log index (deviation)"
    source: "Derived (within transform)"
    coverage: "data_demeaned only"
    kind: cont
  gov_cons_dm:
    label: "Demeaned government consumption share"
    definition: "Two-way demeaned government consumption share (deviation from country + time means, grand mean restored)."
    construction: "gov_cons - country mean - time mean + grand mean; mean ≈ 0."
    units: "share (deviation)"
    source: "Derived (within transform)"
    coverage: "data_demeaned only"
    kind: cont
