# Tutorial gallery topic taxonomy
# Source of truth for /post/ gallery grouping and the homepage Posts & Tutorials widget.
# Multi-bucket: a post appears in EVERY topic whose `category_matches` overlaps
# its categories: list. The `foundations` topic is a residual catch-all —
# only tutorials (slug starts python_/r_/stata_/gee_/rpy_) that match NO other
# topic land there. Posts with `Announcement` are routed to the bottom strip.

topics:
  - id: causal-ml
    label: Causal Machine Learning
    accent: "#6a9bcc"
    icon: brain
    category_matches:
      - Double Machine Learning
      - Heterogeneous Treatment Effects (CATE)
      - Causal Machine Learning

  - id: did
    label: Difference-in-Differences
    accent: "#d97757"
    icon: chart-line
    category_matches:
      - Difference-in-Differences (DiD)

  - id: synthetic-control
    label: Synthetic Control
    accent: "#7a5cba"
    icon: vials
    category_matches:
      - Synthetic Control

  - id: iv
    label: Instrumental Variables
    accent: "#e0b94c"
    icon: random
    category_matches:
      - Instrumental Variables (IV)

  - id: rdd-matching
    label: RDD & Matching
    accent: "#c0506b"
    icon: cut
    category_matches:
      - Regression Discontinuity (RDD)
      - Matching and Propensity Score
      - Regression Discontinuity
      - Matching

  - id: panel-fe
    label: Panel Data & Fixed Effects
    accent: "#00d4c8"
    icon: layer-group
    category_matches:
      - Fixed Effects and TWFE
      - FWL Theorem
      - Bayesian Model Averaging (BMA)
      - Panel Data
      - Dynamic Panel

  - id: causal-foundations
    label: Causal Inference (Foundations)
    accent: "#b07a3e"
    icon: project-diagram
    category_matches:
      - Causal Inference
      - IPW and Doubly Robust
      - Partial Identification
      - Randomized Controlled Trial (RCT)

  - id: ml-basics
    label: Machine Learning & Dimensionality Reduction
    accent: "#8a4fbf"
    icon: sitemap
    category_matches:
      - Random Forest
      - Principal Component Analysis (PCA)
      - Machine Learning

  - id: foundations
    label: Other Methods
    accent: "#6c757d"
    icon: book
    category_matches: []   # residual catch-all (handled in template)

  - id: spatial
    label: Spatial Econometrics
    accent: "#3f9b6e"
    icon: globe-americas
    category_matches:
      - Spatial Regression (SAR, SEM, SDM)
      - Spatial Autocorrelation (ESDA)
      - GWR and MGWR
      - Spatial inequality
      - Convergence

  - id: gis-rs
    label: GIS & Remote Sensing
    accent: "#1f6f8b"
    icon: satellite
    category_matches:
      - Remote Sensing
      - GEE
      - Interactive Dashboard

# Language palette for the language chip on each card.
languages:
  python:
    label: Python
    color: "#3776ab"
  r:
    label: R
    color: "#276dc3"
  stata:
    label: Stata
    color: "#1a5490"
  gee:
    label: GEE
    color: "#34a853"
  rpy:
    label: Python + R
    color: "#5a4fbe"
